丸至七丸溫酒下婦人醋湯或當歸酒下妊娠不宜服烏荊丸見下血大三五七散和劑治八風五痹癱瘓嚲曳口眼喎斜眉角牽引項背拘強牙關緊急心中憒悶神色如醉遍身發熱骨節煩疼肌肉麻木腰膝不仁皮膚瞤動或如蟲行又治陽虛頭痛風寒入腦目旋運轉如舟船之上耳內蟬鳴或如風雨之聲應風寒濕痹腳氣緩弱等疾山茱萸乾薑炮茯苓去皮各三斤細辛一斤八兩防風四斤附子炮去皮臍三十五枚上為細末溫酒調下二錢食前服四生散和劑治男婦肝腎風毒上攻眼赤癢痛不時羞明多淚下疰腳膝生瘡及遍身風癬服藥不驗居常多覺兩耳中癢黃耆川羌活蒺藜沙苑者白附子各等分生用上為細末每服二錢薄荷酒調下如腎臟風下疰生瘡以豬腰批開入藥二錢合定紙里煨熟空心細嚼以鹽酒送下省風湯和劑治卒急中風口噤全不能言口眼喎斜筋脈攣急抽搐疼痛風盛痰實旋暈僵仆頭目眩重胸膈煩滿左癱右瘓手足麻痹骨節煩疼步履艱辛恍忽不定神志昏憒一切風證可預服之防風南星生用各四兩半夏白好者水浸洗生用黃芩去粗皮甘草生用各二兩㕮咀每服四大錢水二大盞薑十片煎一中盞去滓溫服無時四生丸和劑治左癱右瘓口眼喎斜中風涎急半身不遂不能舉者悉皆療之五靈脂去石骨碎補川烏頭去皮尖當歸各等分上為細末用無灰酒打麵糊為丸如桐子大每服七丸漸加至十五丸溫酒下服此藥莫服靈寶丹恐藥無效輕腳丸治左癱右瘓腳弱不能行履木鱉子別研白膠香別研白芍藥各二兩草烏去皮尖四兩赤小豆一兩別研為末打糊上末之赤豆糊為丸如梧子大每七丸加至十丸溫酒或木瓜湯下病在上食後臨臥病在下空心服忌熱物少時伏虎丹和劑專治左癱右瘓生乾地黃蔓荊子白殭蠶炒去絲各二錢半五靈脂去皮半兩躑躅花炒南星白膠香草烏炮各一兩末之酒煮半夏末為糊丸如龍眼大每一丸分四服酒吞下日進二服此建康烏衣巷有老人姓鍾素好道因酒患風百治無效一日忽有道人至授此方藥服之道人忽不見已而病除乃知仙方換腿丸和劑治腎經虛弱下注腰膝或當風取涼冷氣所乘沉重少力移步遲緩筋脈攣痛不能屈伸腳心隱痛有防履地大治乾溼腳氣赤腫痛楚發作無時呻吟難忍氣滿喘促舉動艱難面色黧黑傳送祕澀並皆療之薏苡仁石楠葉南星洗薑製炒川牛膝酒浸焙肉桂去粗皮當歸去蘆天麻去苗附子炮去皮臍羌活防風去杈石斛去根萆薢微炙黃耆蜜炙續斷各一兩蒼朮米泔浸一兩半檳榔半兩乾木瓜四兩上為細末麵糊丸梧子大每服三十丸至五十丸空心溫酒或木瓜湯下日二三服常服舒筋輕足永無腳氣之患昔有人患此疾服之一月腳力頓健委有換腿之功左經丸和劑治左癱右瘓手足顫掉言語謇澀渾身疼痛筋脈拘攣不得屈伸項背強直下注腳膝行履艱難及跌撲閃肭外傷內損常服通經絡活血脈疏風順氣壯骨輕身生黑豆一斤以斑蝥二十一枚去頭足同煮候豆脹為度去之取豆焙乾川烏炮去皮臍二兩乳香研一兩沒藥一兩半草烏炮四兩上為末醋糊為丸如梧子大每服三十丸溫酒下不拘時木瓜丸和劑治腎經虛弱下攻腰膝沉重少力腿腳腫癢疰破生瘡腳心隱痛筋脈拘攣或腰膝緩弱步履艱難舉動喘促面色黧黑大小便祕澀飲食減少無問久新並宜服之熟地黃洗焙陳皮去白烏藥各四兩黑牽牛三兩右楠藤杏仁去皮尖當歸蓯蓉酒浸焙乾木瓜續斷牛膝酒浸各二兩赤芍藥一兩上為細末酒糊為丸如桐子大空心木瓜湯吞三五十丸溫酒亦得犀角防風湯統旨治一切諸風口眼喎斜手足嚲曳語言謇澀四肢麻木犀角磨水臨服時入防風甘草炙天麻羌活各五分滑石一錢五分石膏七分麻黃獨活山梔各五分荊芥連翹當歸黃芩全蠍炒薄荷桔梗白朮細辛各四分水二盅薑五片煎一盅稍熱服取汗大便祕結加大黃一錢追風如聖散統旨治男婦諸般風證左癱右瘓半身不遂口眼歪斜腰腿疼痛手足頑麻語言謇澀行步艱難遍身瘡癬上攻頭目耳內蟬鳴痰涎不利皮膚搔癢偏正頭風無問新舊及破傷風角弓反張蛇犬咬傷金刃所傷血出不止敷之立止川烏草烏蒼朮各四兩金叉石斛一兩川芎白芷細辛當歸防風麻黃荊芥何首烏全蠍天麻藁本各五錢甘草三兩人參三錢兩頭尖二錢上為細末每服半錢匕臨臥茶清下溫酒亦可不許多飲酒服後忌一切熱物飲食一時恐動藥力蠲風飲子正傳治中風癱瘓口眼喎斜及一切手足走注疼痛肢節攣急麻痹不仁防風去蘆杜仲去粗皮薑汁炒羌活白芷川當歸酒洗去蘆川芎生地黃酒浸白芍藥川牛膝去蘆酒洗秦艽去蘆何首烏萆薢蒼朮米泔浸一宿白朮木通大楓子肉威靈仙血藤即過山龍防己丁公藤各一兩荊芥穗海桐皮去粗皮五加皮南星煨裂半夏湯泡七次橘紅赤茯苓去皮桑寄生天麻殭蠶炒去絲嘴釣藤各半兩薄桂去粗皮草烏去皮尖甘草節川烏去皮臍炮豬牙皂角各二錢半兩頭尖陰地蕨一名地茶大薊小薊理省藤桑絡藤各一兩半生薑一兩另搗細上各切細用無灰好酒二斗五升以瓷罐盛酒浸藥皮紙十數重封口冬半月夏七日秋春十日每清晨午前午後臨臥各服一大白盞忌雞豬魚羊驢馬飛禽蝦蟹等肉味及煎爆油膩水果生冷花麥熱面一切動氣發風之物豨蘞丸濟生治中風口眼喎斜時吐涎沫語言謇澀手足緩弱豨蘞草一名火杴草生於沃壤間帶豬苓氣者是上五月五日六月六日採葉洗淨不拘多少九蒸九曝每蒸用酒蜜灑之蒸一飯頃日乾為末煉蜜丸桐子大每服百丸空心溫酒米飲任下一方每豨蘞一斤加四物料各半兩川烏一錢半羌活防風各二錢拯濟換骨丹元戎治半身不遂口眼喎斜手足不仁言語謇澀或骨痛連髓或痹襲皮膚或中急風涎潮不言精神昏澀行步艱難筋脈拘急左癱右瘓一切風疾槐莢子生人參桑白皮蒼朮白芷何首烏蔓荊子威靈仙防風各二兩五味子苦參香附川芎各一兩麝香二錢龍腦二錢另研一本無上一十四味為細末入麝香令勻又用麻黃十斤去根節天河水三石三斗熬至六斗濾去滓再煎至二升半入銀石器內熬成膏入前藥和勻杵三五千下每一兩作十丸硃砂為衣每服一丸先搗碎酒一盞自晨浸至晚食後臨臥攪勻服之神清無睡是藥之驗再服須更隔五日服之如中風無汗宜服若體虛自汗服之是重亡津液也若風盛之人當於密室溫臥取汗搜風順氣丸聖惠治三十六種風七十二般氣去上熱下冷腰腳疼痛四肢無力多睡少食漸漸羸瘦顏色不完黃赤惡瘡下疰口苦無味憎寒毛聳節年癥癖氣塊丈夫陽事斷絶女子久無子嗣久患寒瘧吐逆瀉痢變成勞疾百節痠疼小兒老人皆可服補精駐顏疏風順氣車前子二兩半白檳榔火麻子微炒去殼另研郁李仁湯泡去皮研菟絲子酒浸焙炮曬乾牛膝酒浸二宿乾山藥各三兩枳殼去瓤麩炒防風去杈獨活各一兩錦紋大黃五錢半生半熟上為末煉蜜丸桐子大每服二十丸酒茶米飲任下百無所忌早晨臨臥各一服服經一月消食二月去腸內宿滯三月無倦少睡四月精神強勝五月耳目聰明六月腰腳輕健一年百病皆除老者返少如服藥覺臟腑微動以羊肚肺羹補之久患腸風便血服之除根如顫語謇澀及癱瘓服之隨即平復酒後一服宿酲消盡百病不生孕婦勿服愈風丹治足三陰虧損風邪所傷致肢體麻木手足不隨等證天麻牛膝酒浸焙萆薢玄參各六兩杜仲七兩羌活十四兩當歸熟地黃生地黃各一斤獨活五兩肉桂三兩上為末煉蜜丸桐子大用白湯下五七十丸史國公浸酒方專治左癱右瘓四肢頑麻骨節痠疼諸般寒濕風氣當歸虎脛骨酒浸一日焙乾酥炙羌活鱉甲炙萆薢防風去蘆杈秦艽川牛膝松節晚蠶砂各二兩枸杞子五兩干茄根八兩飯上蒸熟用無灰酒一斗絹袋盛藥入酒內封十日取飲時不可面向壇口恐藥氣衝人頭面飲酒不可間斷飲盡藥滓曬乾為末米糊丸梧子大空心酒下五十丸忌食發風動氣之物中寒蘇合香丸見卒中五積散和劑治感冒寒邪頭疼身痛項背拘急惡寒嘔吐或有腹痛又治傷寒發熱頭疼惡風無問內傷生冷外感風寒及寒濕客於經絡腰腳痠疼及婦人經血不調或難産並治白芷茯苓半夏湯洗七次當歸川芎甘草炙肉桂芍藥各三兩枳殼去瓤麩炒麻黃去節根陳皮去白各六兩桔梗去蘆十二兩厚朴去粗皮薑製乾薑各四兩爁蒼朮泔浸去皮二十四兩上㕮咀每服四錢水一盞薑三片蔥白三根煎七分熱服冒寒用煨薑挾氣則加茱萸婦人調經催産則加艾醋薑附湯發明治中寒口噤四肢強直失音不語忽然暈倒口吐涎沫狀如暗風手足厥冷或復煩躁兼治陰證傷寒大便自利而發熱者乾薑熟附子各等分上㕮咀每服四錢水一盞半煎至七分去滓溫服或慮此藥性太燥即以附子理中湯相繼服餌薑附本治傷寒經下後又復發汗內外俱虛身無大熱晝則煩躁夜則安靜不嘔不渴六脈沉伏並宜服此不知脈者更宜審之兼治中脘虛寒久積痰水心腹冷痛霍亂轉筋四肢厥逆一方附子湯以生用者名曰白通湯內加白朮倍之甘草減半名生附子白朮湯治中風濕昏悶恍惚腹脹滿身重手足瘛瘲漐漐自汗失音不語便利不禁一方用薑附湯加麻黃白朮人參甘草等分名附子麻黃湯治中寒濕昏暈緩弱腰脊強急口眼喎噼語聲渾濁胸腹䐜脹氣上喘急不能轉動更宜審而用之附子理中湯乾薑炮白朮人參甘草炙各二錢半附子炮二錢水二盅煎八分食前溫服不換金正氣散和劑治四時傷寒溫疫時氣頭疼壯熱腰背拘急山嵐瘴氣寒熱往來霍亂吐瀉臟腑虛寒下痢赤白蒼朮制橘皮去白半夏曲炒厚朴薑製藿香各二錢甘草炙一錢上作一服水二盅生薑五片紅棗二枚煎至一盅去滓食前稍熱服忌生冷油膩毒物若出遠方不服水土尤宜服之中暑來復丹和劑治上盛下虛裡寒外熱伏暑泄瀉如水硝石一兩同硫黃為末入瓷碟內以微火炒用柳萆攪不可火太過恐傷藥力再研極細名二氣末太陰玄精石研飛舶上硫黃透明者各一兩五靈脂水澄去砂曬乾青皮去白陳皮去白各二兩上用五靈脂二橘皮為末次入玄精石末及前二氣末拌勻好醋打糊為丸豌豆大每服三十丸空心米飲下蘇合香丸見卒中卻暑散得效赤茯苓去皮甘草生各四兩寒食麵生薑各一斤上為細末每服二錢不拘時新汲水或白湯調服香薷飲和劑治伏暑引飲口燥咽乾或吐或瀉並皆治之一方又加黃連四兩用薑汁同炒令黃色名黃連香薷散如有搐搦加羌活煎服香薷去土一斤白扁豆微炒半斤厚朴去皮薑汁炙熟半斤上㕮咀每服三錢水一盞入酒少許煎七分沉冷不拘時服香薷湯和劑白扁豆炒茯神厚朴去粗皮銼薑汁炒各一兩香薷二兩甘草炙半兩上為細末每服二錢不拘時沸湯點服鹽湯點亦得大順散和劑治冒暑伏熱引飲過多脾胃受濕水穀不分霍亂嘔吐臟腑不調甘草銼寸長三十斤乾薑杏仁去皮尖炒肉桂去粗皮各四斤上先將甘草用白砂炒及八分黃熟次入乾薑同炒令薑裂次入杏仁同炒令杏仁不作聲為度用篩篩淨後入桂一處搗羅每服二錢水一盅煎七分溫服如煩躁井花水調服不拘時以沸湯點服亦得枇杷葉散和劑治中暑伏熱煩渴引飲嘔噦噁心頭目昏眩枇杷葉去毛炙陳皮湯浸去瓤焙丁香厚朴去皮塗薑汁炙各半兩白茅根麥門冬去心乾木瓜甘草炙各一兩香薷七錢半上搗羅為末每服二錢水一盞生薑三片煎七分溫服溫湯調服亦得如煩躁用井花水調下小兒三歲以下可服半錢更量大小加減二氣丹濟生治伏暑傷冷二氣交錯中脘痞