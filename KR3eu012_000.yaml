所傷以本物湯下吐水梨湯下氣病乾薑湯下小兒天吊風搐防風湯下防己亦可小兒疳痢蔥白湯下小兒乳食傷白湯下月信不通紅花酒下婦人腹痛川芎酒下懷孕半年後胎漏艾湯下有子氣衝心酒下産暈痛溫酒下血氣痛當歸酒下産後心腹脹滿豆淋湯下難産益智湯下産後血痢當歸湯下赤白帶下酒煎艾湯下解內外傷寒粥飲下室女血氣不通酒下子死腹中葵子湯下又治小兒驚癇大人顛狂一切風及無孕婦人身上頑麻狀如蟲行四肢俱腫呻吟走痛等疾楊駙馬患風氣衝心飲食吐逆遍身枯瘦日服五丸至七丸至二十日瀉出肉塊如蝦蟆五六枚白膿二升愈趙侍郎先食後吐目無所見耳無所聞服至五十日瀉青蛇五七條長四寸許惡膿三升愈王氏患大風病眉發墮落手掌生瘡服之半月瀉出癩蟲二升如馬尾長寸許後愈李靈患肥氣日服五丸經一月瀉出肉鱉三枚愈茹黃門卒中風病發時服藥泄出惡膿四升赤黃水一升一肉蟲如亂髮愈李知府妻楊氏帶下病七年月崩不止骨痿著床日服五丸至十丸十五丸取下膿血五升黃水一升肉塊如雞子狀愈此藥治一切萬病如神唯初有孕者不宜服溫白丸和劑治心腹積聚久癥癖塊大如杯碗黃疸宿食朝起嘔吐支滿上氣時時腹脹心下堅結上來搶心旁攻兩脅十種水氣八種痞塞翻胃吐逆飲食噎塞五種淋疾九種心痛積年食不消化或瘧疾連年不瘥及療一切諸風身體頑麻不知痛癢或半身不遂或眉發墮落及療七十二種風三十六種遁尸疰忤及癲癇及婦人諸疾斷緒不生帶下淋瀝五邪失心憂愁思慮飲食減少月水不調及腹中一切諸疾有似懷孕連年羸瘦困憊或歌或哭如鬼所使但服此藥無不除愈即前萬病紫菀丸方減羌活獨活防風易老治五積肺息賁人參紫菀心伏梁菖蒲黃連桃仁脾痞氣吳茱萸乾薑肝肥氣柴胡川芎腎奔豚丁香茯苓遠志俱於溫白丸內加之萬病感應丸於上溫白丸內加羌活三稜甘遂杏仁防風各一兩五錢威靈仙一兩卻減蜀椒厚朴丸見反胃千金硝石丸止可磨塊不令困人須量虛實硝石六兩大黃八兩人參甘草各三兩上為細末以三年苦酒醋也三升置器中以竹片作準每入一升作一刻先入大黃不住手攪使微沸盡一刻乃下余藥又盡一刻微火熬便可丸如雞子黃大每服一丸如不用大丸作梧子大每服三十丸服後下如雞肝米泔赤黑色等物下後忌風冷宜軟粥將息醋煮三稜丸寶鑑治一切積聚不拘遠年近日治之神效京三稜四兩醋煮軟竹刀切片曬乾川芎二兩醋煮微軟切片大黃半兩醋浸濕紙裹煨過切上為末醋糊丸如桐子大每服三十丸溫水下無時病甚者一月效小者半月效神功助化散太無專治男子婦人腹中痞塊不拘氣血食積所成此方之妙不可盡述地萹蓄瞿麥穗大麥糵各五錢神麯二錢半沉香木香各一錢半甘草五錢大黃二兩上為細末淨依分兩和勻男以燈芯淡竹葉二味等分煎湯及無灰酒同調服湯多於酒婦人用紅花燈芯當歸等分煎湯及無灰酒同調服酒多於湯忌油膩動氣之物及房事一月藥須於黃昏服大小便見惡物為度聖散子寶鑑治遠年積塊及婦人乾血氣硇砂大黃各八錢麥糵六兩炒取淨面乾漆炒煙盡三兩萹蓄茴香炒檳榔各一兩婦人乾血氣加穿山甲二兩炮上為細末每服五錢臨臥溫酒調下仰臥此藥只在心頭至天明大便如爛魚腸小便赤為驗藥並無毒有神效小兒用一錢十五以上三錢空心服之更效此按古本校定今綱目刻本硇砂乃六兩大黃乃八兩豈不誤人雞爪三稜丸寶鑑治五臟痃癖氣塊雞爪三稜石三稜京三稜木香青皮去白陳皮去白各半兩硇砂三錢檳榔肉豆蔻各一兩上為細末生薑汁打麵糊為丸桐子大每服二十丸薑湯下空心臨臥各一服忌一切生冷硬黏物硇砂煎丸寶鑑消磨積塊痃癖一切凝滯黑附子二枚各重五錢以上正坐妥者炮裂去皮臍剜作甕子硇砂木香各三錢破故紙隔紙微炒蓽茇各一兩上將硇砂末用水一斛續續化開納在甕內火上熬干為末安在附子甕內卻用剜出附子末填蓋口用和成白麵裹約半指厚慢灰火內燒勻黃色去面同木香等為細末卻用元裹附子熟黃面為末醋調煮糊為丸如桐子大每服十五丸至三十丸生薑湯下紅丸子見傷飲食削堅丸治五積六聚氣結成塊食積癖瘕心腹脹滿瘦悴少食鱉甲醋浸兩宿去裙襴再蘸醋炙黃取末稱乾漆搗碎炒令煙出取末稱京三稜銼如半棗大好醋浸兩宿焙取末稱以上各二兩半細松煙墨燒去膠沉香肉桂去粗皮乾薑炮沒藥另研蘿蔔子乾蠍去毒炒胡椒檳榔木香硇砂通明者為末用湯內飛另研各半兩乳香另研粉霜另研輕粉各二錢半為細末研勻好醋煮薄麵糊為丸如小緑豆大每服二十丸淡醋煎生薑湯送下日進二服夜間一服如未利漸加丸數服微利即減二賢散消積塊進飲食橘紅一斤淨甘草四兩鹽半兩上用水二四碗後早煮至夜以爛為度水乾則添水曬乾為末淡薑湯調下有塊者加薑黃半兩同前藥煮氣滯加香附二兩同前藥煮氣虛者加沉香半兩另入噤口痢加蓮肉二兩去心另入妙應丸即控涎丹見行痹龍薈丸見脅痛阿魏丸去諸積山楂肉南星皂角水浸半夏同南星浸麥芽神麯黃連各一兩連翹阿魏醋浸貝母栝蔞各半兩風化硝石鹼胡黃連白芥子各二錢半蘿蔔子蒸一兩上為末薑汁浸炊餅丸一方加香附蛤粉治嗽阿魏丸去肉積阿魏山楂肉各二兩連翹五錢黃連六錢半上三味為末以阿魏醋煮為糊丸如梧桐子大每服五六十丸食前用白湯送下脾胃虛者用白朮三錢陳皮茯苓各一錢煎湯送下導痰湯五飲湯俱見痰飲散聚湯三因治九氣積聚狀如癥瘕隨氣上下發作心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏湯洗七次檳榔當歸各七錢半陳皮去白杏仁