兩阿膠炒一兩半麥門冬去心三兩上為細末煉蜜為丸如彈子大每服一丸或二丸食後細嚼茶酒任下葫蘆巴丸治氣攻頭痛如破葫蘆巴炒三稜銼醋浸炒乾乾薑炮各一兩上為細末每服二錢不拘時溫生薑湯或溫酒調服及治瘴瘧瘥後頭痛偏頭風川芎散寶鑑甘菊花石膏川芎白殭蠶各六錢上為極細末每服三錢茶清調下潔古方治頭痛連睛痛石膏鼠黏子炒上為細末茶清食前調下細辛散東垣細辛兩分川芎七分柴胡兩分黃芩酒炒一錢生黃芩五分瓦粉兩分甘草炙一錢半黃連酒炒七分芍藥半錢每服三錢水煎食後溫服治偏頭疼方鬱金一顆苦葫蘆子一合上為細末用白絹子裹藥末一錢於新汲水內浸過滴向患處鼻中得黃水出即瘥仙靈脾浸酒方治偏頭風手足不遂皮膚不仁用仙靈脾一斤細銼以無灰酒兩鬥浸之春五夏三秋七冬十日取出藥每日隨性暖酒飲之常令醺醺不得大醉酒盡再合合時忌雞犬見之白附散本事治風寒客於頭中疼痛牽引兩目遂至失明白附子一兩麻黃不去節川烏南星各半兩全蠍五個乾薑硃砂麝香各兩錢半上為細末酒調一字服略睡少時效治偏頭風豬牙皂角去皮筋香白芷白附子各等分上為末每服一錢臘茶調下右疼右邊臥左疼左邊臥皆疼仰臥食後服一粒金東垣治偏頭風蓽茇以豬膽汁拌勻入膽內懸待陰乾用玄胡索青黛白芷川芎各一兩上為細末無根水為丸每用一丸以無根水化開搐鼻內外以銅錢咬口內出涎雷頭風清震湯保命治頭面疙瘩憎寒拘急發熱狀如傷寒升麻蒼朮米泔浸一宿各四錢荷葉一個全者用水二盅煎八分食後服茶調散即二仙散大黃黃芩各二兩牽牛滑石各四兩上為細末滴水為丸如小豆大溫水下十五丸每服加十丸以利為度日三服神芎丸子和治心經積熱風痰壅滯頭目赤腫或有瘡癤咽膈不利大小便閉澀一切風熱之證並宜服之大黃生黃芩各二兩牽牛生滑石各四兩黃連薄菏葉川芎各半兩為末滴水丸梧桐子大每服五十丸食後溫水送下烏荊丸見中風愈風餅子子和川烏炮半兩川芎甘菊白芷防風細辛天麻羌活荊芥薄荷甘草炙各一兩上為細末水浸蒸餅為劑捏作餅子每服三五餅細嚼茶酒送下不計時候涼膈散見發熱黑錫丹和劑治真頭痛沉香附子制葫蘆巴肉桂各半兩茴香破故紙肉豆蔻金鈴子木香各一兩黑錫硫黃與黑錫結砂子各二兩上為末同研勻酒煮麵糊和丸如梧桐子大陰乾以布袋擦令光瑩每服四十丸空心薑鹽湯送下一方有陽起石半兩巴戟一兩普濟消毒飲子東垣黃芩黃連各半兩人參三錢橘紅玄參甘草生各二錢連翹鼠黏子板藍根馬屁勃各一錢白殭蠶炒升麻各七分柴胡桔梗各二錢上共為細末用湯調時時服或拌蜜為丸噙化或加防風薄荷川芎當歸身㕮咀如麻豆大每服五錢水煎去渣熱服之食後時時服之如大便硬加酒煨大黃一錢或二錢以利之腫熱甚者宜砭刺之黑白散潔古治大頭病如神烏黑蛇酒浸白花蛇去頭尾酒浸雄黃二錢大黃煨半兩上為極細末每服一二錢白湯調無時甘桔湯見咽喉眉稜骨痛選奇湯東垣防風羌活各三錢酒黃芩一錢冬不用如能食熱痛者加之甘草三錢夏生冬炙用每服三錢水煎稍熱服食後時時祛風清上散統旨治風熱上攻眉稜骨痛酒黃芩二錢白芷一錢半羌活防風柴胡梢各一錢川芎一錢二分荊芥八分甘草五分水二盅煎八分食後服二陳湯見痰飲羌烏散丹溪治因風眉骨痛不止者川烏草烏各一錢此二味俱用童便浸二宿細辛羌活片芩酒拌炒甘草炙各半錢上為細末分二服茶清調下生熟地黃丸見目導痰湯見痰飲小芎辛湯良方治風寒在腦或感濕邪頭痛腦暈及眉稜眼眶痛者川芎三錢細辛洗去土白朮各二錢甘草一錢水二盅薑二片煎八分食遠服上清散奇效治頭痛眉骨痛眼痛不可忍者川芎鬱金芍藥荊芥穗芒硝以上各半兩薄荷葉乳香沒藥以上各一錢片腦半錢上為細末每用一字鼻內搐之治眉心並眉梁骨疼者用二陳湯煎飲下青州白丸子立驗頭風屑瀉青丸當歸去蘆焙稱草龍膽焙稱川芎梔子川大黃煨羌活防風去蘆上各等分為末煉蜜為丸雞頭大每服一丸煎竹葉湯同砂糖溫水化下人參消風散寶鑑治諸風上攻頭目昏痛項背拘急肢體煩疼肌肉蠕動目眩旋運耳嘯蟬鳴眼澀好睡鼻塞多嚏皮膚頑麻燥癢癮疹又治婦人血風頭皮腫癢眉骨疼旋欲倒痰逆噁心芎藭羌活防風人參茯苓去皮白殭蠶炒藿香葉荊芥穗甘草炙蟬殼去土各二兩厚朴去皮薑製陳皮去白各半兩上為細末每服二錢茶清調下如久病偏頭風每三日服便覺輕減如脫著沐浴暴感風寒頭痛聲重寒熱倦疼用荊芥茶清調下半盞小兒虛風目澀昏倦及急慢驚風用乳香荊芥湯調下亦得紫菀丸見積聚頭重紅豆散麻黃根炒半錢苦丁香半錢紅豆十粒羌活燒連翹各三錢上五味為細末鼻內搐之治頭內如蟲蛀響名天白蟻用茶子細末吹鼻中頸項強痛驅邪湯會編麻黃桂枝杏仁甘草防風羌活獨活川芎藁本柴胡家葛白芷升麻上生薑薄荷水煎服又方多加紫金藤消風豁痰湯黃芩酒炒羌活紅花半夏薑製陳皮白茯苓甘草獨活防風白芷家葛柴胡升麻上生薑煎服又方多加紫金藤疏風滋血湯當歸川芎白芍藥熟地黃羌活獨活紅花牛膝防風白芷家葛升麻甘草柴胡桃仁上生薑煎服又方多加紫金藤升麻防荊湯柴胡黃芩半夏薑製甘草防風荊芥羌活獨活家葛升麻赤芍藥川芎白芷上生薑薄荷煎服無汗加麻黃有汗加桂枝加味勝濕湯羌活獨活藁本防風蔓荊子川芎蒼朮泔浸炒黃柏酒炒荊芥甘草炙上生薑煎服又方多加紫金藤發熱惡寒有外邪者加麻黃桂枝腰痛沉沉者加熟附防己虛極者去黃柏加人參養神湯東垣黃耆一錢人參三分甘草七分蒼朮五分白朮三分柴胡四錢升麻四錢歸身五分麥芽五分木香一分川芎三分半夏七分橘皮一錢黃連五分黃芩酒浸二分黃柏一分㕮咀每服五錢水二盞煎去渣稍熱服無時椒附散本事治項筋痛連背髀不可轉移大附子一枚六錢以上者炮去皮臍末之上末每二大錢好川椒二十粒用白麵填滿水一盞半生薑七片同煎至七分去椒入鹽空心服豫一親患此服諸藥無效嘗憶千金髓有腎氣攻背強一證處此方與之一服瘥木瓜煎本事本瓜兩個取蓋去瓤沒藥研二兩乳香研二錢半二味內木瓜中蓋合竹籤簽定飯上蒸三四次研成膏每服三五匙地黃酒化下生地黃汁半盞和無灰酒二盞用八分一盞暖化服和氣飲見水腫六味地黃丸見虛損心痛胃脘痛金鈴子散保命治熱厥心痛或作或止久不愈者金鈴子玄胡索各一兩上為末每服三錢酒調下痛止與枳朮丸枳朮丸見傷食煮黃丸潔古治飲食過多心腹脹滿脅肋走氣痃癖刺痛如神雄黃研一兩巴豆五錢去皮心研如泥上入白麵二兩同研勻滴水丸如桐子大滾漿水煮十二丸濾入冷漿水內令沉冷每用時用浸藥冷漿下一丸一日十二時盡十二丸以微利為度不必盡劑藁本湯潔古治大實心痛大便己利宜以此撤其痛也藁本半兩蒼朮一兩每服一兩水二盞煎至半盞溫服朮附湯活人治寒厥暴心痛脈微氣弱附子炮去皮臍一兩白朮四兩甘草炙一兩上粗末每三錢水一盞半薑五片棗一枚煎至一盞去渣溫服食前麻黃桂枝湯三因治外因心痛惡寒發熱內攻五臟拘急不得轉側麻黃去節湯浸焙桂心芍藥細辛去苗乾薑甘草炙各七錢半半夏香附各五錢每服五錢水盞半生薑五片煎七分去渣食前服大便祕入大黃量虛實加減九痛丸金匱治九種心痛附子炮二兩生狼牙炙香巴豆去皮心炒研如脂各半兩人參乾薑吳茱萸各一兩上為末煉蜜丸如桐子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹口不能言又治連年積冷流注心胸痛並冷腫上氣落馬墜車血疾等證皆主之忌口如常法烏頭赤石脂丸金匱蜀椒一兩烏頭炮二錢五分附子炮半兩乾薑炮一兩赤石脂二兩末之蜜丸如桐子大先食服一丸日三服疾未已稍加服栝蔞薤白半夏湯金匱栝蔞實一枚薤白三兩白酒一斗半夏半升上同煮至四升服一升日三服大建中湯金匱蜀椒二合去汗乾薑四兩人參二兩以水四升煮取二升去渣內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜溫覆之桂枝生薑枳實湯金匱桂枝生薑各一兩枳實五個水六升煮取三升分溫三服藿香正氣散見中風五積散見中寒扶陽助胃湯羅謙甫治漕運使崔君長男云卿年二十五體本豐肥奉養高粱時有熱證友人勸食寒涼物因服寒藥至元庚辰秋瘧發醫以砒霜等藥治之新汲水下禁食熱物瘧病未除反添吐瀉脾胃復傷中氣愈虛腹痛腸鳴時復胃脘當心而痛不任其苦屢醫未效至冬不瘥延至四月間勞役煩惱過度前證大作請豫治之診視脈得弦細而微手足稍冷面色青黃不澤情思不樂惡人煩冗飲食減少微飽則心下痞悶嘔吐酸水每發作冷汗時出氣促悶亂不安須人額相抵而坐少時易之豫思內經云中氣不足溲便為之變腸為之苦鳴下氣不足則為痿厥心冤又曰寒氣客於腸胃之間則卒然而痛得熱則已非甘辛大熱之劑則不能愈遂制此方附子炮去皮臍二錢乾薑炮一錢半草豆蔻益智仁揀參甘草炙官桂白芍藥各一錢吳茱萸陳皮白朮各五分內經曰寒淫於內治以辛熱佐以苦溫附子乾薑大辛熱溫中散寒故以為君草豆蔻益智仁辛甘大熱治客寒犯胃為佐脾不足者以甘補之炙甘草甘溫白朮陳皮苦溫補脾養氣水挾木氣亦來侮土故作急痛桂辛熱以退寒水芍藥味酸以瀉木來剋土吳茱萸苦熱泄厥氣上逆於胸中為使上銼如麻豆大都作一服水二盞薑三片棗二枚同煎至一盞去渣溫服食前三服大勢去痛減半至秋先灸中脘三七壯以助胃氣次灸氣海百餘壯生髮元氣滋榮百脈以遠少丹服之喜飲食添肌肉皮膚潤澤明年春灸三里二七壯乃胃之合穴亦助胃氣引氣下行又以芳香助脾服育氣湯加白檀香平治之戒以懲忿窒欲慎言語節飲食一年而平復草豆蔻丸東垣治客寒犯胃熱亦宜用止可一二服草豆蔻一錢四分麵裹煨熱去皮吳茱萸湯泡去苦益智仁殭蠶炒各八分當歸身青皮各六分神麯薑黃各四分生甘草六分桃仁去皮七個半夏湯泡七次一錢澤瀉一錢小便利減半一作一分疑誤麥糵炒黃一錢半炙甘草六分柴胡四分詳脅下痛多少與之人參黃耆陳皮各八分上除桃仁另研如泥外為極細末同研勻湯浸炊餅為丸桐子大每服三十丸熟白湯送下食遠旋斟酌多少用之大柴胡湯見傷寒往來寒熱大承氣湯見傷寒潮熱小胃丹見痰飲厚朴丸見積聚紫菀丸見積聚星半安中湯統旨治痰積作痛南星半夏各一錢半俱薑湯泡滑石香附枳殼麩炒青皮醋炒木香蒼朮米泔浸一宿炒砂仁山梔炒黑茯苓橘紅各一錢甘草炙五分氣攻痛者去南星滑石加厚朴玄胡索各一錢痰甚加白螺獅殼燒灰一錢臨服入水二盅薑三片煎八分食前服海蛤丸丹溪治痰飲心痛海蛤燒為灰研極細過數日火毒散用之栝蔞仁帶瓤同研上以海蛤入栝蔞內乾溼得所為丸每服五十丸清中湯統旨治火痛黃連山梔炒各二錢陳皮茯苓各一錢半半夏一錢薑湯泡七次草豆蔻仁捶碎甘草炙各七分水二盅薑三片煎八分食前服妙香散良方治心氣不足精神恍惚虛煩少睡夜多盜汗常服補益氣血安鎮心神山藥薑汁炙茯苓去皮茯神去皮木遠志去心妙黃耆各一兩人參桔梗去蘆甘草炙各半兩木香煨二錢半辰砂三錢另研麝香一錢另研上為細末每服二錢不拘