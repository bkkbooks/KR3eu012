有防風無黃耆蓯蓉潤腸丸濟生治發汗利小便亡津液大腑祕結老人虛人皆可服肉蓯蓉酒浸焙二兩沉香另研一兩上為末麻子仁汁打糊丸如梧子大每服七十丸空心米飲送下四物湯見虛勞導滯通幽湯東垣治幽門不通上衝吸門不開噎塞氣不得上下大便難脾胃初受熱中多有此證治在幽門以辛潤之當歸身升麻梢桃仁泥甘草炙各一錢紅花少許熟地黃生地黃各五分水二大盞煎至一盞調檳榔細末五分稍熱服一方加麻仁大黃各等分唯紅花少許名潤燥湯益血丹海藏治大便燥久虛亡血當歸酒浸焙熟地黃各等分上為末煉蜜丸如彈子大細嚼酒下一丸五仁丸得效治津液枯竭大腸祕澀傳導艱難桃仁杏仁炒去皮各一兩柏子仁半兩松子仁一錢二分半郁李仁一錢炒陳皮四兩另為末上將五仁另研如膏入陳皮末研勻煉蜜丸如梧子大每服五十丸空心米飲下黃耆湯治年高老人大便祕澀綿黃耆陳皮去白各半兩上為末每服三錢用大麻仁一合爛研以水投取漿水一盞濾去滓於銀石器內煎候有乳起即入白蜜一大匙再煎令沸調藥末空心食前服祕甚者不過兩服愈常服即無祕澀之患此藥不冷不燥其效如神益血潤腸丸熟地黃六兩杏仁炒去皮尖麻仁各三兩以上三味俱杵膏枳殼麩炒橘紅各二兩五錢阿膠炒肉蓯蓉各一兩半蘇子荊芥各一兩當歸三兩末之以前三味膏同杵千餘下仍加煉蜜丸如桐子大每服五六十丸空心白湯下實祕神芎丸見頭痛木香和中丸木香沉香白豆蔻枳實炒檳榔蓬朮青皮陳皮當歸酒洗黃芩木通黃連縮砂豬牙皂角去皮弦並子蜜水潤炙乾郁李仁湯去皮三稜各淨末一兩大黃四兩香附三兩黃柏二兩牽牛頭末三兩為末水丸每服三錢重白湯下或薑湯下脾積丸治飲食停滯腹脹痛悶嘔惡吞酸大便祕結蓬莪朮三兩京三稜二兩青皮去白一兩良薑同蓬朮三菱用米醋一升於瓷瓶內煮乾乘熱切焙南木香各半兩不蛀皂角三大錠燒存性百草霜村莊家鍋底者佳上末用川巴豆半兩去殼研如泥漸入藥末研和麵糊丸麻子大每服五十丸加至六十丸橘皮煎湯下穿結藥治大實大滿心胸高起氣塞不通者為結也蟾酥輕粉麝香各等分巴豆少許另研上研極細用孩兒乳汁和丸如黍米大每服二三丸不拘時薑湯下通治潤腸丸東垣治胃中伏火大便祕澀或乾燥不通全不思食乃風結血祕皆令閉塞須潤燥和血疏風則自然通矣羌活當歸梢大黃煨各半兩麻仁桃仁泡去皮尖各一兩上為末除麻仁桃仁另研如泥外為細末煉蜜為丸如桐子大每服三五十丸空心白湯送下活血潤腸丸治大便風祕血祕時常結燥當歸梢一錢防風二錢羌活大黃煨各一兩麻子仁二兩半桃仁二兩研如泥皂角仁炮存性去皮稱一兩其性得濕則滑滑則燥結自除上除桃仁麻仁另研如泥外為極細末煉蜜為丸如桐子大每服五十丸白湯下二三服後須以蘇子麻子粥每日早晚食之大便日久再不結燥余藥以瓷器盛之紙密封勿使見風神功丸寶鑑治三焦氣壅心腹痞悶大腑風熱大便不通腰腿疼痛肩背重疼頭昏面熱口苦咽乾心胸煩躁睡臥不安及治腳氣並素有風人大便結燥火麻仁另搗如膏人參各二兩訶藜勒皮大黃錦紋者麵裹煨各四兩上為細末入麻仁搗研勻煉蜜為丸如桐子大每服二十丸溫湯下溫酒米飲皆可服食後臨臥如大便不通可倍丸數以利為度黃耆人參湯傷暑麻黃白朮湯麻黃不去根節白豆蔻炒曲各五分吳茱萸白茯苓澤瀉各四分桂枝厚朴柴胡白朮蒼朮青皮去穰黃連酒浸黃柏酒浸黃耆人參豬苓各三分升麻橘紅各二分杏仁四枚生甘草熟甘草各一分上㕮咀分作二服每服水二大盞半先煎麻黃沸去沫再入諸藥同煎至一盞去渣稍熱服食遠小便不通氣分熱清肺散東垣治渴而小便閉或黃或澀茯苓二錢豬苓三錢澤瀉瞿麥琥珀各五分燈芯一分萹蓄木通各七分通草二分車前子一錢炒上為細末每服五錢水一盞半煎至一盞稍熱服黃芩清肺飲見淋豬苓湯五苓散並消疸茯苓琥珀湯小便數紅秫散治小便不通上喘萹蓄一兩半燈芯一百根紅秫黍根二兩上㕮咀每服五錢用河水二盞煎至七分去滓熱服空心食前血分熱滋腎丸治下焦陰虛腳膝軟無力陰汗陰痿足熱不能履地不渴而小便閉黃柏酒洗焙知母酒洗焙各二兩肉桂二錢內經曰熱者寒之又云腎惡燥急食辛以潤之以黃柏之苦寒瀉熱補水潤燥故以為君以知母苦寒瀉腎火故以為佐肉桂辛熱寒因熱用也上為細末熟水為丸如芡實大每服百丸加至二百丸百沸湯空心下黃連丸即滋陰化氣湯潔古治因服熱藥小便不利諸藥莫能效者或臍下痛不可忍者黃連炒黃柏炒甘草各等分上㕮咀水煎溫服食前如再不通加知母導氣除燥湯東垣治小便不通乃血澀致氣不通而竅澀也知母三錢酒製黃柏四錢酒製滑石二錢炒黃澤瀉末三錢茯苓去皮二錢上和勻每服半兩水煎稍熱空心服如急閉小便不拘時服水氣栝蔞瞿麥湯仲景治小便不利而渴亦氣分藥也栝蔞根二兩茯苓薯蕷各三兩附子炮一枚瞿麥一兩上為末煉蜜丸如桐子大每服三丸日三服不知增至七八丸以小便利腹中溫謂之知八正散寶鑑治大人小兒心經邪熱一切蘊毒咽乾口燥大渴引飲心忪面赤煩躁不寧目赤睛疼唇焦鼻衄口舌生瘡咽喉腫痛又治小便赤澀或癃閉不通及熱淋血淋並宜服之亦氣分藥也瞿麥萹蓄車前子滑石甘草炙山梔子仁木通大黃麵裹煨去面切焙各一斤上為散每服二錢水一盞入燈芯煎至七分去滓溫服食後臨臥小兒量力少少與之桃仁煎本事治婦人積血桃仁大黃朴硝各一兩虻蟲半兩炒黑上四味為末以醇醋二升半銀石器內慢火煎取一升五合下大黃虻蟲桃仁等不住手攪良久出之丸如梧子大前一日不晚食五更初溫酒吞下五丸日午取下如赤豆汁或如雞肝蛤蟆衣狀未下再作如見鮮血即止續以調血氣藥補之此方出千金藥峻不可輕用代抵當丸蓄血牛膝膏見淋以上三方皆血分藥也木香流氣飲水腫實證白花散寶鑑治膀胱有熱小便不通朴硝不以多少為末上每服二錢用茴香湯調下食前木通湯治小便不通小腹痛不可忍木通滑石各半兩牽牛取頭未二錢半上作一服水二盅燈芯十莖蔥白一莖煎至一盅食前服虛證八味丸治腎虛小便不通或過服涼藥而祕澀愈甚者每服五十丸溫鹽湯下方見虛勞琥珀散治老人虛人心氣閉塞小便不通用琥珀為末每服一錢濃煎人參湯下有驗利氣散治老人氣虛小便閉塞不通綿黃耆去蘆陳皮去白甘草各等分上銼散每服三錢水一盞煎服自然流通參耆湯治心虛客熱乘之小便澀數數而瀝赤茯苓七錢半生乾地黃綿黃耆去蘆桑螵蛸微炙地骨皮去骨各半兩人參去蘆北五味子去梗菟絲子酒浸研甘草炙各二錢半上銼散新汲水一盞煎臨熟入燈芯二十一莖溫服轉胞滑石散治胞為熱所迫或忍小便俱令水氣迫於胞屈闢不得充張外水應入不得入內溲應出不得出小腹急痛不得小便小腹脹不治害人寒水石二兩葵子一合白滑石亂髮灰車前子木通去皮節各一兩上銼散水一斗煮取五升時時服一升即利八味丸治虛人下元冷胞轉不得小便膨急切痛經四五日困篤欲死每服五十丸鹽湯下方見虛勞蔥白湯治小便卒暴不通小腹膨急氣上衝心悶絶欲死此由暴氣乘膀胱或從驚憂氣無所伸鬱閉而不流氣衝胞系不正陳皮三兩葵子一兩蔥白二莖上銼散水五升煮取二升分三服洗方治胞轉小便不能通先用良薑蔥頭紫蘇莖葉各一握上煎湯密室內熏洗小腹外腎肛門留湯再添蘸綿洗以手撫於臍下拭乾綿被中仰坐垂腳自舒其氣次用蜀葵子二錢半赤茯苓赤芍藥白芍藥各半兩上銼散每服三錢煎取清汁再暖乘熱調蘇合香丸三丸並研細青鹽半錢食前溫服又法炒鹽半斤囊盛尉小腹蔥尉法治小便難小腸脹不急治殺人用蔥白三斤細銼炒令熟以帕子裹分作兩處更替尉臍下即通治忍小便胞轉方上以自爪甲燒灰水服治男子婦人過忍小便胞轉上以滑石末蔥湯調服通治蒲黃散治心腎有熱小便不通蒲黃生用木通荊芥車前子桑白皮炒滑石燈芯赤芍藥赤茯苓甘草炙各等分上為細末每服二錢食前用蔥白紫蘇煎湯調服通心飲治心經有熱唇焦面赤小便不通木通連翹各等分上為細末每服一二錢不拘時麥門冬煎湯或燈芯煎湯調服治小便不通數日欲死者神效桃枝柳技木通旱蓮子漢椒白礬枯各一兩蔥白一握燈芯一束上細銼以水三斗煎至一斗五升用瓷瓶一個熱盛一半藥汁熏外腎周回以被圍繞輒不得外風入良久便通如赤豆汁若冷即換之其功甚大一方無旱蓮子獨蒜塗臍方治小便不通大蒜獨顆者一枚梔子三七枚鹽花少許上搗爛攤紙花子上貼臍良久即通未通塗陰囊上立通牛膝湯治小便不通莖中痛及治女人血結腹堅痛牛膝根葉一握生用當歸焙一兩黃芩去黑心半兩上銼碎每服五錢匕水一盞半煎七分去滓溫服日三妊娠葵子茯苓散仲景葵子茯苓各三兩上二味杵為散飲服方寸匕日三服小便利則愈歸母苦參丸仲景當歸貝母苦參各四兩上三味為末煉蜜丸如小豆大飲服三丸至十丸男子加滑石半兩淋金匱要略曰淋之為病小便如粟狀小腹弦急痛引臍中趺陽脈數胃中有熱即消穀引食大便必堅小便即數淋家不可發汗發汗則必便血小便不利者有水氣其人苦渴用後丸主之栝蔞瞿麥丸栝蔞根二兩茯苓薯蕷各三兩附子一枚炮瞿麥一兩上五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之蒲灰散蒲灰一兩七錢半滑石三分上二味杵為散飲服方寸匕日三服滑石白魚散滑石亂髮燒存性白魚各五錢上三味杵為散飲服半錢匕日三服茯苓戎鹽湯茯苓半斤白朮二兩戎鹽彈丸大一枚上三味五芩散見消疸熱淋益元散見傷暑火府丹本事治心經蘊熱小便赤少五淋澀痛黃芩一兩生乾地黃二兩木通三兩上為末煉蜜丸如桐子大每服五十丸木通煎湯下導赤散治心虛蘊熱小便赤淋或成淋痛見發熱石韋散和劑治腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞倦即發或尿如豆汁或便出砂石並皆治之芍藥白朮滑石葵子瞿麥各三兩石韋去毛木通各二兩當歸去蘆甘草炙王不留行各一兩上為細末每服二錢煎小麥湯調下日二三服空心地膚子湯濟生治諸病後體虛觸熱熱結下焦遂成淋疾小便赤澀數起少出莖痛如刺或尿出血地膚子豬苓各一錢半海藻洗去咸甘草梢瞿麥去梗通草黃芩知母枳實麩炒升麻葵子各一錢上作一服水二盅薑三片煎一盅不拘時服五淋散治膀胱有熱水道不通淋瀝不止臍腹急痛或尿如豆汁或如砂石膏淋尿血並皆治之山茵陳淡竹葉各一錢木通滑石甘草炙各一錢半山梔仁炒赤芍藥赤茯苓各二錢上作一服水二盅煎至一盅食前服鬱金黃連丸治心火炎上腎水不升致使水火不得相濟故火獨炎上水流下淋膀胱受心火所熾而脬囊中積熱或癃閉不通或遺泄不禁或白濁如泔水或膏淋如膿或如梔子汁或如砂石或如粉糊相似俱為熱證此藥治之鬱金黃連各一兩琥珀研大黃酒浸黃芩各二兩白茯苓滑石各四兩黑牽牛炒取頭末三兩上為細末滴水為丸如梧桐子大每服五十丸空心白湯下琥珀茯苓丸治膀胱經積熱以致小便癃閉淋瀝琥珀另研赤茯苓去皮滑石桂府者另研知母去毛黃柏去粗皮蛤粉另研川木通去皮當