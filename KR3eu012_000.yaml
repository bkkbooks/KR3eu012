連湯川芎生地黃當歸各七錢赤芍藥梔子黃芩黃連各三錢防風一兩上為粗末每服三錢水一盞煎至七分去渣取清飲無時徐徐與之若脈實者加大黃下之大抵此證非大實即大虛當審其因察其脈參其證而分若黑白矣實而便祕大承氣瀉之虛而便滑獨參湯補之厥逆者加附子婁全善云嘗治循衣摸床者數人皆用大補氣血之劑惟一人兼瞤振脈代遂於補劑中略加桂二分振亦止脈和而愈喜笑不休黃連解毒湯見發熱治喜笑欲死者針列缺二穴在手大指後臂上三寸及大陵二穴在掌後橫紋中針三分治喜死四肢冷氣絶色不變者刺陽池穴用口溫針勿令針入三分徐徐出針以手捫其穴即復蘇也善太息半夏湯治膽腑實熱精神恍惚寒濕泄瀉或寢汗憎風善太息半夏一錢五分黃芩遠志各一錢生地黃二錢秫米一合酸棗仁三錢炒宿薑一錢五分上長流水煎服驚五飲湯見痰飲溫膽湯三因治心膽虛怯觸事易驚或夢寐不祥遂致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗半夏湯洗枳實竹茹各一兩橘皮一兩半去白甘草炙四錢白茯苓七錢每服四錢水一盞半生薑七片棗一枚煎七分食前熱服十四友丸補諸虛不足益血收斂心氣治怔忡不寧精神昏憒睡臥不安柏子仁另研遠志湯浸去心酒灑蒸酸棗仁炒香紫石英明亮者干熟地黃當歸洗白茯苓去皮茯神去木人參去蘆黃耆蜜炙阿膠蛤粉炒肉桂去粗皮各一兩龍齒二兩辰砂別研二錢半上為末煉蜜丸如梧子大每服三四十丸食後棗湯送下平補鎮心丹和濟治心血不足時或怔忡夜多異夢如墮崖谷常服安心腎益榮衛酸棗仁去皮炒二錢半車前子去土白茯苓去皮麥門冬去心五味子去枝梗茯神去木肉桂去皮不見火各一兩二錢半龍齒熟地黃酒浸蒸天門冬去心遠志去心甘草水煮山藥薑汁製各一兩半人參去蘆硃砂細研為衣各半兩上為末煉蜜丸如桐子大每服三十丸空心米湯溫酒任下又平補鎮心丹治證同前熟乾地黃生乾地黃乾山藥天門冬麥門冬去心柏子仁茯神各四兩一方七兩辰砂別研為衣苦梗炒各三兩遠志去心甘草煮三四沸七兩石菖蒲節密者十六兩當歸去蘆六兩龍骨一兩上為細末煉蜜為丸如梧子大每服三十丸空心米飲吞下溫酒亦得漸加至五十丸宜常服遠志丸治因事有所大驚夢寐不祥登高涉險神魂不安心志恐怯遠志去心薑汁淹石菖蒲各五錢茯神去皮木茯苓人參龍齒各一兩上為末煉蜜丸如桐子大辰砂為衣每服七十丸食後臨臥熟水下妙香散見狂琥珀養心丹治心血虛驚悸夜臥不寧或怔忡心跳者琥珀另研二錢龍齒煅另研一兩遠志黑豆甘草同煮去骨石菖蒲茯神人參酸棗仁炒各五錢當歸生地黃各七錢黃連三錢柏子仁五錢硃砂另研三錢牛黃另研一錢上為細末將牛黃硃砂琥珀龍齒研極細以豬心血丸如黍米大金箔為衣每服五十丸燈芯湯送下定志丸治心氣不足驚悸恐怯菖蒲炒遠志去心各二兩茯神人參各三兩上為末煉蜜為丸如桐子大硃砂為衣每服五十丸米湯下一方去茯神名開心散服二錢匕不時寧志丸治心虛血少多驚人參去蘆茯神去木白茯苓去皮柏子仁遠志酒浸去心焙酸棗仁酒浸去殼微炒當歸琥珀以上各半兩石菖蒲硃砂另研乳香各二錢半上為細末煉蜜為丸如梧子大每服三十丸食後用棗湯送下人參遠志丸治心氣不安驚悸恍惚人參去蘆遠志去心酸棗仁炒黃耆以上各半兩桔梗去蘆官桂去皮丹砂各二錢半天門冬去心白茯苓去皮菖蒲各七錢半上為細末煉蜜丸如桐子大每服三十丸食遠米湯下真珠母丸本事治肝經因虛內受風邪臥則寬散而不收若驚悸狀珠母研細七錢五分當歸熟地黃各一兩半人參酸棗仁柏子仁犀角茯苓各一兩沉香龍齒各半錢上為細末煉蜜丸如桐子大辰砂為衣每服四五十丸金銀薄荷湯下日午後臥時服獨活湯獨活羌活防風人參前胡細辛半夏曲五味子沙參白茯苓酸棗仁炒甘草各一兩上為粗末每服四大錢水一盞半薑三片烏梅半個同煎至七分去渣不拘時服紹興癸丑豫待次四明有董生者患神氣不寧每臥則魂飛揚覺身在床而神魂離體驚悸多魘通夕無寐更醫不效豫為診視詢之曰醫作何病治董曰衆皆以為心病豫曰以脈言之肝經受邪非心病也肝氣因虛邪氣襲之肝藏魂者也遊魂為變平人肝不受邪臥則魂歸於肝神靜而得寐今肝有邪魂不得歸是以臥則魂飛揚若離體也肝主怒故小怒則劇董欣然曰前此未之聞雖未服藥已覺沉疴去體矣原求治之豫曰公且持此説與衆醫議所治之方而徐質之閲旬日復至云醫遍議古今方無與病相對者故豫處此二方以贈服一月而病悉除此方用真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝同類也龍齒虎睛今人例以為鎮心藥殊不知龍齒安魂虎睛定魄各言其類也蓋東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專靜故魄止而有守豫謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物有成理而不失在夫人達之而已羌活勝濕湯見腰痛壽星丸見癇控涎丹見行痹黃連安神丸見虛煩寒水石散三因治因驚心氣不行鬱而生涎涎結為飲遂成大疾松悸隕穫不自勝持少遇驚則發尤宜服之但中寒者不可服寒水石煅滑石水飛各一兩生甘草二錢半上為末每服二錢熱則新汲水下寒則薑棗湯下加龍膽少許尤佳加味四七湯得效治心氣鬱滯豁痰散驚半夏薑製二錢半厚朴薑製炒茯苓去皮各一錢半紫蘇葉茯神去皮各一錢遠志去心石菖蒲甘草各半錢水二盅薑三片紅棗一枚煎一盅不拘時服十味溫膽湯治證見前溫膽湯下兼治四肢浮腫飲食無味心虛煩悶坐臥不安半夏湯泡枳實麩炒陳皮