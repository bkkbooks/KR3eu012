朮服二十餘帖平安血鬱湯凡七情鬱結盛怒叫呼或起居失宜或挫閃致瘀一應飢飽勞役皆能致血鬱其脈沉澀而芤其體胸脅常有痛如針刺者是也香附童便制二錢牡丹皮赤曲川通草穿山甲降真香蘇木山楂肉大麥芽炒研各一錢紅花七分水酒各一半煎去滓入桃仁去皮泥七分韭汁半盞和勻通口服熱鬱湯有陰虛而得之者有胃虛食冷物抑遏陽氣於脾土中而得之者其治法皆見發熱條中此則治夫非陰虛非陽陷亦不發熱而常自蒸蒸不解者也連翹四錢薄荷葉黃芩各一錢五分山梔仁二錢麥門冬去心三錢甘草五分鬱金一錢栝蔞皮穰二錢竹葉七片煎問何不用蒼朮香附撫芎曰火就燥燥藥皆能助火故不用也痰鬱於痰飲門求之食鬱於傷食門求之故不著方痞海藏云仲景諸瀉心等湯手少陰也以其心下痞故入陽明例大黃黃連瀉心湯治太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽血氣並竭無陽則陰獨復加燒針因胸煩面青黃膚瞤者難治若色微黃手足溫者易愈心下痞按之濡其脈關上浮者大黃二兩黃連一兩加黃芩為伊尹三黃湯上銼如麻豆沸湯二升漬之須臾絞去滓分溫再服附子瀉心湯治心下痞而復惡寒汗出本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之大黃黃連黃芩各一兩附子一枚炮去皮切別煮取汁上四味切三味以麻沸湯二升漬之絞去滓納附子汁分溫再服生薑瀉心湯治傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑半夏洗各二兩甘草炙黃芩人參各一兩半乾薑黃連各半兩大棗六枚擘上八味以水五升煮取三升去滓再煎取一升半溫服半升伊尹甘草瀉心湯治傷寒中風醫反下之其人下痢日數十行米穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬宜此湯治之甘草二兩半夏一兩黃芩乾薑各三兩半黃連人參各半兩大棗六枚上七味以水五升煮取三升去滓再煎取一升半溫服半升分三半夏瀉心湯治心下滿而不痛者痞也痛即為結胸半夏半升泡黃芩乾薑人參各三兩黃連一兩甘草炙二兩大棗十二枚上七味以水一斗煮取六升去滓再煮取三升分溫三服錢氏瀉心湯見發熱黃耆補中湯東垣黃耆人參各二錢甘草白朮蒼朮陳皮各一錢澤瀉豬苓茯苓各五分水一盅煎七分溫服送下大消痞丸大消痞丸東垣治一切心下痞滿積年久不愈者白朮薑黃各一兩黃芩去焦黃連炒各六錢枳實麥炒五錢半夏湯洗七次陳皮人參各四錢澤瀉厚朴砂仁各三錢豬苓二錢五分乾生薑神麯炒炙甘草各二錢上為細末湯浸蒸餅為丸如桐子大每服五七十丸至百丸食遠白湯下黃連消痞丸東垣治心下痞滿壅塞不散煩熱喘促不寧黃連一兩黃芩炒二兩半夏九錢枳實炒七錢橘紅豬苓各五錢茯苓白朮炙甘草各三錢澤瀉薑黃各一錢乾生薑二錢制丸服法同上失笑丸一名枳實消痞丸東垣治右關脈浮弦心下濕痞惡食懶倦開胃進食枳實黃連各五錢白朮人參半夏曲各三錢厚朴炙四錢乾生薑炙甘草白茯苓麥糵各二錢上為細末湯浸蒸餅為丸桐子大每服五七十丸白湯下不拘時量虛實加減服劉宗厚云以上二方並半夏瀉心湯加減法也內有枳朮湯四君子五苓平胃等利濕消痞補虛之藥也黃芩利膈丸東垣除胸中熱利膈上痰黃芩生炒各一兩白朮枳殼陳皮南星各三錢半夏黃連澤瀉各五錢白礬五分上為末水浸蒸餅丸每服三五十丸白湯下食遠服合加薄荷葉一兩玄明粉二錢葶藶丸一名人參順氣飲子治心下痞胸中不利半夏洗厚朴炙石膏青皮以上各五分當歸身七分白豆蔻仁縮砂仁茵陳酒製炒乾葛以上各一錢炙甘草羌活黃芩一半酒洗半炒苦葶藶酒洗炒人參柴胡據獨活以上各三錢上為細末湯浸蒸餅和勻篩子內擦如米大每服二錢臨臥用一口湯下消痞湯一名木香化滯湯治因憂氣鬱結中脘腹皮里微痛心下痞滿不思飲食枳實炒當歸梢各二分陳皮生薑木香各三分柴胡四分草豆蔻炙甘草各五分半夏一錢紅花少許試效方有益智三分無木香上為粗末作一服水二盞生薑三片煎至一盞食遠服忌酒濕面理中丸治胃寒而痞人參甘草白朮乾薑以上各三兩上四味搗篩為末蜜和丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸增損理中丸傷寒治太陰下之胸滿硬諸結胸宜服此人參白朮各一兩甘草黃芩各半兩枳殼十二片上為細末煉蜜丸如彈子大沸湯化一丸渴者加栝蔞根汗出者加牡蠣枳實理中丸傷寒治寒實結胸茯苓人參白朮乾薑甘草各二兩枳實十六片上為細末煉蜜丸如雞子黃大每服一丸熱湯化下連進二三服活人桔梗枳殼湯治傷寒痞氣胸滿欲絶桔梗枳殼去瓤炒各三兩上銼水煎分作二服此手太陰經藥也活人書云審知是痞先用此湯無不驗也緣枳殼行氣下膈故效上清散一名通氣防風湯清利頭目寬快胸膈黃耆三錢甘草二錢人參葛根各一錢五分防風根一錢蔓荊子半錢上分作二服每服水一盞半煎至一盞去渣臨臥溫服以夾衣蓋覆面首不語須臾汗出為效未服藥預一日不語服畢亦一日不語枳朮丸見傷食回金丸瀉肝火行濕與熱能開痞結治肝邪補脾土見發熱檳榔丸見傷食煮黃丸見心痛瓜蒂散見傷食二陳湯見痰飲平胃散見中食五苓散見消疸越鞠丸見郁撾脾湯見嘔吐丁沉透膈湯見反胃木香流氣飲四七湯並見氣導痰湯見痰飲來復丹見中暑四君子湯見虛勞補中益氣湯見勞倦木香順氣湯見脹滿但減人參木香寬中散治七情傷於脾胃以致胸膈痞滿停痰氣逆或成五膈之病青皮陳皮丁香各四兩厚朴