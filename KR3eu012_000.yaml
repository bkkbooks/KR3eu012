前白湯下三五十丸又和中丸治久病厭厭不能食而臟腑或祕或結或溏此皆胃虛之所致也常服和中理氣消痰去濕厚腸胃進飲食白朮二兩四錢厚朴薑製二兩陳皮去白一兩六錢半夏湯泡一兩檳榔五錢枳實五錢甘草炙四錢木香二錢上八味為末生薑自然汁浸蒸餅和丸如梧子大每服三十丸溫水送下食遠服七珍散本事開胃養氣溫脾進食續易簡十珍散即此加扁豆砂仁桔梗五味子人參白朮黃耆蜜炙山藥白茯苓粟米微炒甘草各等分上為細末每服三錢薑棗煎服如故不思飲食加扁豆一兩名八珍散六神湯海藏治傷寒虛羸不思飲食人參白朮黃耆各一兩枳殼白茯苓各半兩甘草二錢上為末每服五錢薑棗同粳米合許煎食前服錢氏異功散治脾胃虛弱難任飲食人參白茯苓白朮甘草橘紅木香各等分上薑棗水煎服寬中進食丸滋形氣喜飲食草豆蔻仁五錢半夏曲七錢大麥芽面炒一兩神麯炒半兩砂仁甘草炙各一錢半陳皮三錢木香五分白朮白茯苓各三錢乾薑豬苓去黑皮澤瀉人參青皮各一錢枳實炒四錢上為末湯浸蒸餅為丸每服三五十丸白湯下按此方輕重懸絶理不可曉疑有舛誤以重改古本姑仍之木香枳朮丸木香乾薑枳朮丸俱見傷食二神丸本事治脾胃虛弱全不進食及泄瀉不止破故紙炒四兩肉豆蔻生二兩上為末用肥棗四十九枚生薑四兩切片同煮爛去薑取棗剝去皮核肉研為膏入藥末和杵丸如桐子大每服三四十丸鹽湯下八味丸見虛勞啓脾丸楊氏治脾胃不和氣不升降中滿痞塞心腹膨脹腸鳴泄瀉不思飲食人參白朮青皮湯洗去瓤陳皮湯洗去白神麯炒麥糵炒縮砂仁乾薑炮厚朴去粗皮銼生薑汁製各一兩甘草炙一兩半上為細末煉蜜丸如彈子大每服一丸食前細嚼用米飲送下煮朴丸即厚朴煎丸百一溫中下氣理脾進食常云補腎不如補脾胃壯則飲食進而精血自盛矣紫油厚朴一斤銼生薑一斤不去皮切片二味用水五升同煮乾去薑以厚朴焙乾舶上茴香乾薑各四兩附子炮二兩甘草二兩銼半寸長同乾薑二味再用水五升同前厚朴煮水盡去甘草只用薑朴二味焙乾上為細末生薑煮棗肉為丸梧子大每服五十丸米飲下理中丸見痞鹿茸橘皮煎丸和劑治脾胃俱虛不進飲食肌體瘦悴四肢乏力常服壯脾胃益腎荊三稜煨當歸萆薢厚朴薑製肉桂肉蓯蓉酒浸焙附子炮巴戟去心陽起石酒浸研如粉石斛去根牛膝去蘆酒浸鹿茸茄子者燎去毛劈開酒浸炙菟絲子酒浸焙吳茱萸淘去浮者焙杜仲薑汁炒去絲乾薑炮各三兩甘草炙一兩橘皮去白十五兩另為末上為細末用酒五升於銀石器內將橘皮煎熬如餳卻入諸藥末在內攪和搗五百杵丸如梧子大每服三十丸空心溫酒鹽湯任下丁香煮散治翻胃嘔逆丁香石蓮肉各十四枚北棗七枚切碎生薑七片黃秫米半合洗水一碗半煮稀粥去藥啜粥失笑丸見痞附方參朮調中湯治內傷自利臍腹痛肢體倦不喜食食即嘔嗜臥懶言足胻冷頭目昏人參黃耆各五錢當歸身厚朴薑製益智仁草豆蔻木香白朮甘草炙神麯炒麥糵面橘皮各三錢上十二味銼如麻豆大每服一兩水二盞薑三片煎至一盞去滓溫服食前育氣湯通流百脈調暢脾元補中脘益氣海祛陰寒止腹痛進飲食大益臟虛疼痛木香丁香藿香人參白朮白茯苓縮砂白豆蔻蓽澄茄炙甘草各半兩乾山藥一兩陳橘皮去白青皮去白各二錢半加白檀香半兩上為末每服一錢至二錢用木瓜湯調下空心食前鹽湯亦得凝神散收斂胃氣清涼肌表人參白朮茯苓山藥各一錢半白扁豆知母生地黃粳米甘草各一錢淡竹葉地骨皮麥門冬各五分上作一服水二盅薑三片紅棗一枚煎至一盅食遠服加減思食丸治脾胃俱虛水穀不化胸膈痞悶腹脅時脹連年纍月食減嗜臥口苦無味虛羸少氣又治胸中有寒飲食不下反胃噁心霍亂嘔吐及病後心虛不勝穀氣或因病氣衰食不復常並宜服之神麯炒黃麥糵炒黃各二兩烏梅四兩乾木瓜切半兩白茯苓去皮揀甘草細銼炒各二錢半上為細末煉蜜為丸如櫻桃大每服一丸不拘時細嚼白湯送下如渴時噙化一丸生津液進飲食一方無木瓜茯苓有人參乾薑各三錢和胃丸治脾胃虛冷食即嘔逆水穀不化或時泄痢厚朴去粗皮生薑汁炙透四兩乾薑炮當歸切焙各一兩半檳榔銼桔梗焙人參各一兩半夏湯洗七次去滑陳皮湯浸去白焙白朮各二兩甘草炙半兩訶藜勒皮七錢半上為細末酒煮糊丸如桐子大每服十五丸漸加至二十丸溫生薑棗湯下米飲亦得不拘時生胃丹大南星四兩用黃土半斤將生薑汁拌黃土成曲劑包裹慢火煨香透去土不用將南星切細焙乾同後藥研丁香不見火木香不見火厚朴去皮薑製炒神麯炒麥糵炒縮砂仁白豆蔻仁青皮去白各一兩半夏二兩人參沉香不見火甘草炙各半兩粟米一升用生薑二斤和皮搗取自然汁浸蒸焙上為細末法丸如緑豆大每服七十丸不拘時淡薑湯下養胃進食丸治脾胃虛弱心腹脹滿面色痿黃肌肉消瘦怠惰嗜臥全不思食常服滋養脾胃進美飲食消痰逐飲闢風寒濕冷邪氣蒼朮五兩泔浸去皮神麯二兩半炒白茯苓去皮二兩厚朴薑製二兩大麥糵炒陳皮去白各一兩半白朮二兩人參甘草炙各一兩上九味為末水麵糊丸如桐子大每服三十丸至五十丸食前溫薑湯送下粥飲亦得資生丸健脾開胃消食止瀉調和臟腑滋養榮衛余初識繆仲淳時見袖中出彈丸咀嚼問之曰此得之祕傳飢者服之即飽飽者食之即飢因疏其方余大善之而頗不信其消食之功已於醉飽後頓服二丸徑投枕臥夙興了無停滯如信此方之神也先恭簡年高脾弱食少痰多余齡葆攝全賴此方因特附著於此與世共之白朮米泔水浸用山黃土拌蒸九次曬九次去土切片焙乾三兩人參去蘆人乳浸透飯鍋上蒸熟三兩白茯苓去粗皮水飛去筋膜人乳拌飯鍋上蒸曬乾一兩五錢橘紅山楂肉蒸神麯炒各二兩川黃連薑汁炒白豆蔻仁微炒澤瀉去毛炒各三錢半桔梗米泔浸炒真藿香洗甘草蜜炙去皮各五錢白扁豆炒去殼蓮肉去心各一兩薏苡仁淘淨炒三兩乾山藥炒麥芽面炒芡實淨肉炒各一兩五錢末之煉蜜丸每丸二錢重每服一丸醉飽後二丸細嚼淡薑湯下健脾丸治一應脾胃不和飲食勞倦白朮白者二兩半炒木香另研黃連酒炒甘草各七錢半白茯苓去皮二兩人參一兩五錢神麯炒陳皮砂仁麥芽炒取面山藥肉豆蔻麵裹煨熟紙包捶去油以上各一兩上為細末蒸餅為丸如緑豆大每服五十丸空心下午各一次陳米湯下沖和丸養心扶脾疏肝開胃人參石斛白豆蔻仁廣陳皮各一兩山楂肉二兩上各取淨末和勻碗盛葉蓋飯上蒸過候冷方開此調胃補心接丹田之氣也遠志甘草湯泡去心一兩香附童便浸半日洗淨醋炒山梔仁炒焦各二兩上各取淨末如上法蒸過勿令泄氣此透暢心胞達膈間之滯氣也海石蒼朮米泔浸洗去皮炒黃各二兩如上法蒸此消痰飲通內外之用也川芎二兩北柴胡青黛各一兩如上法蒸此疏肝鬱伐肝邪者也夫心為脾母補母則子旺肝為脾賊平賊則脾安安穀則昌用谷糵取粉打糊為丸如梧子大曬乾用益元散五錢飛過辰砂五錢為衣食後少頃白湯下五十丸胃開氣順少覺舒泰則減數服之可與補中益氣湯六君子湯相兼服喑訶子湯河間治失音不能言語訶子四個半生半炮桔梗一兩半生半炙甘草二寸半炙半生上為細末每服二錢童便一盞水一盞煎五七沸溫服甚者不過三服愈桔梗通利肺氣訶子泄肺導氣童便降火甚速又方桔梗三兩大訶子四個甘草二兩制度同上每服一錢匕入砂糖一小塊不用童便獨用水五盞煎至三盞時時細呷一日服盡其效甚速發聲散海藏治咽喉語聲不出栝蔞皮銼白殭蠶去頭甘草各等分各炒黃上為細末每服三錢溫酒或生薑自然汁調下用五分綿裹噙化咽津亦得日兩三服玉粉丸寶鑑治冬月寒痰結咽喉不利語聲不出半夏洗五錢草烏一字炒桂一字上為末生薑汁浸蒸餅為丸如芡實大每服一丸至夜含化蛤蚧丸丹溪治肺間邪氣胸中積血作痛失音並治久咳失音蛤蚧一對去嘴足溫水浸去膜颳了血脈用好米醋炙訶子煨去核阿膠炒生地黃麥門冬去心北細辛去苗甘草炙各半兩上為末煉蜜丸如棗大每服一丸食後含化治暴嗽失音語不出方千金杏仁研如泥薑汁砂糖白蜜各一升五味子紫菀各三兩通草貝母各四兩桑白皮五兩上以水九升煮五味子紫菀通草貝母桑白皮取三升去滓入杏仁泥薑汁白蜜和勻微火煎取四升初服四合日再夜一後稍加通聲膏方五味子款冬花通草各三兩人參細辛桂心青竹皮菖蒲各二兩杏仁泥一升白蜜二斤棗膏薑汁各一升酥五升上以水五升微火煎三上三下去渣納薑汁棗膏酥蜜煎令調和酒服如棗二大丸七珍散治産後不語人參石菖蒲生地黃川芎各一兩細辛防風辰砂另研各半兩上為細末每服一錢薄荷湯下地黃飲子見中風加味逍遙散見癘風加味歸脾湯見健忘八珍湯見虛勞秦艽升麻湯見中風柴胡清肝散見耳衄小柴胡湯見往來寒熱六君子湯四君子湯俱見虛勞佛手散即芎歸散見喘消疸腎氣丸即八味丸見虛勞五苓散金匱治小便不利而渴豬苓去皮七錢半澤瀉一兩二錢七分茯苓七錢半桂去皮半兩白朮七錢半上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈豬苓湯金匱治發熱脈浮渴欲飲水小便不利豬苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內膠煬消溫服七合日三服白虎加人參湯見傷暑文蛤散金匱治渴欲飲水不止用文蛤四兩杵為散以沸湯五合和服方寸匕人參石膏湯保命治膈消上焦煩渴不欲多食人參五錢石膏一兩知母七錢甘草四錢每服五錢水煎食後溫服加減地骨皮散錢氏治上消知母柴胡甘草炙半夏地骨皮赤茯苓白芍藥黃耆石膏黃芩桔梗各等分上為細末每服三錢薑五片水煎食遠溫服竹葉石膏湯仲景石膏一斤竹葉二把半夏半升湯洗粳米半升麥門冬去心一升人參三兩甘草二兩炙上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服竹葉黃耆湯治氣血虛胃火盛而作渴淡竹葉生地黃各二錢黃耆麥門冬當歸川芎黃芩炒甘草芍藥人參半夏石膏煅各一錢上水煎服宣明黃耆湯治心移寒於肺為肺消飲少溲多當被肺平心黃耆三兩五味子人參麥門冬桑白皮銼各二兩枸杞子熟地黃各一兩半上為末每服五錢水二盞煎至一盞去渣溫服無時錢氏白朮散治虛熱而渴人參白朮白茯苓藿香去土木香甘草各一兩乾葛二兩上為末每服三錢煎溫服如飲水多多與服之海藏云四君子加減法治濕勝氣脫泄痢太過宣明麥門冬飲子治心移熱於肺傳為膈消胸滿心煩精神短少人參茯神麥門冬五味子生地黃炙甘草知母葛根栝蔞根各等分上㕮咀每服五錢加竹葉十四片煎至七分溫服無時易老門冬飲子治老弱虛人大渴人參枸杞子白茯苓甘草各七錢半五味子麥門冬去心各半兩上薑水煎服白虎湯涼膈散並見發熱小柴胡湯見往來寒熱四君子理中湯見虛勞霍亂加減三黃丸子和治丹石毒及熱渴以意測度須大實者方用黃芩春四兩夏秋六兩冬三兩大黃春三兩夏一兩秋二兩冬四兩黃連春四兩夏七兩秋三兩冬二兩上為末煉蜜丸如梧子大每服十丸服一月病愈止渴潤燥湯治消渴大便乾燥喜溫飲陰頭短縮舌上白燥唇裂口乾眼澀難開及於黑處如見浮雲升麻一錢半柴胡七錢甘草梢五分杏仁六個研桃仁研麻仁研當歸身防風根荊芥穗黃柏酒