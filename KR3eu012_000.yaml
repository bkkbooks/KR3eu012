中調木香末一錢匕麻黃主於表而不主於裡故去之腰脅走注疼痛者加硝石當歸甘草一服各二錢調車前子末海金砂末各一錢故經曰腰者腎之府破傷風者如在表則辛以散之在裡則苦以下之兼散之汗下後通利榮血祛逐風邪每一兩加荊芥穗大黃各二錢調全蠍末一錢羌活末一錢諸風癇搐小兒急慢驚風大便祕結邪熱暴甚腸胃乾燥寢汗咬牙上竄睡語筋轉驚悸肌肉蠕動每一兩加大黃二錢梔子二錢茯苓末二錢匕如肌肉蠕動者調羌活末一錢經曰肌肉蠕動命曰微風風傷於肺咳嗽喘急者每一兩加半夏桔梗紫菀各二錢如打撲傷損肢節疼痛腹中惡血不下每一兩加當歸大黃各三錢半調沒藥乳香末各二錢解利四時傷寒內外所傷每一兩加益元散一兩蔥白十莖鹽豉一合生薑半兩水一碗同煎至五七沸或煎一小碗溫冷服一半以箸投之即吐吐罷後服一半稍熱服汗出立解如飲酒中風身熱頭痛如破者加黃連須二錢蔥白十莖依法立愈慎勿用桂枝麻黃湯解之頭旋腦熱鼻塞濁涕時下每一兩加黃連薄荷各二錢半內經曰膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不已王注曰膽液不澄則為濁涕不已如水泉者故曰鼻淵也此為足太陽脈與陽明脈俱盛也如氣逆者調木香末一錢搜風丸河間治邪氣上逆風熱上攻頭目眩暈大小便結滯人參茯神各半兩滑石二兩藿香二錢半乾薑白礬生各一兩蛤粉南星一作半兩大黃黃芩各二兩牽牛四兩薄荷半兩半夏寒水石各一兩上為末滴水丸小豆大每服十丸生薑湯下加至二十丸日三服白朮附子湯仲景治風虛頭重眩苦極不知食味白朮二兩附子一兩半炮去皮甘草炙一兩每服五錢薑五片棗一枚水一盅煎至七分去渣溫服芎附湯見鼻衄正元散見自汗靈砂丹見嘔吐養正丹見氣茸朱丸見頭痛沉香磁石丸治上盛下虛頭目眩暈耳鳴耳聾沉香別碎蔓荊子青鹽別研甘菊花各半兩巴戟去心葫蘆巴山藥炒川椒去目炒磁石火煅醋淬細研水飛山茱萸去核陽起石火煅研附子炮去皮臍各一兩上為細末用酒煮米糊和丸梧子大每服五十丸加至七十丸空心用鹽湯送下松花浸酒方治風頭旋腦皮腫痹上以松花並臺春三月取五六寸如鼠尾者不拘多少蒸細切一升生絹囊盛貯以酒三升浸五日每日空心暖飲五合晚食前再服癲星香散見中風壽星丸見癇抱膽丸治男婦一切癲癇風狂或因驚恐怖畏所致及婦人産後血虛驚氣入心並安室女經脈通行驚邪蘊結纍效水銀二兩硃砂一兩細研黑鉛一兩半乳香一兩細研上將黑鉛入銚子內下水銀結成砂子次下硃砂滴乳乘熱用柳木槌研勻丸雞頭大每服一丸空心井花水吞下病者得睡切莫驚動覺來即安再一丸可除根清心湯即涼膈散加黃連麥門冬見發熱四七湯見氣靈苑辰砂散見狂養正丹見氣三生飲見卒中三化湯見中風五邪湯治中風神思昏憒五邪所侵或歌或哭或笑或喜或怒發則無時防風去蘆桂心白芍藥遠志去心獨活去蘆甘草炙白朮去蘆人參去蘆秦艽去蘆土牡蠣煅石膏禹餘糧醋淬各二兩雄黃水飛防己去皮石菖蒲茯神去木蛇蛻皮炒各一兩每服四錢水二盞煎一盞去渣溫服不拘時候日進二服九精丸一名九物牛黃丸治男子沾鬼魅欲死所見驚怖欲走時無休止邪氣不能自絶者牛黃土精一云火精龍骨水精荊實人精玄參玄武精去蘆赤石脂朱雀精玉屑白虎精曾青蒼龍精空青天精研雄黃地精無石者妙研以上各一兩上九味名九精上通九天下通九地為細末煉蜜和丸如小豆大每服一丸日三服以知為度附方獨效苦丁香散得效治忽患心疾癲狂不止得之驚憂之極痰氣上犯心包當伐其源上以苦丁香即瓜蒂半兩為末每服一錢重井花水調滿一盞投之得大吐之後熟睡勿令人驚起凡吐能令人目翻吐時令閉雙目或不省人事則令人以手密掩之信乎深痼之疾必投瞑眩之藥吐不止以生麝香少許溫湯調下即解控涎丹下痰涎見行痹甘遂散治癲癇及婦女心風血邪甘遂一錢為末用豬心取三管血三條和甘遂多少和之將心批作二片入藥在內合之線縛外用皮紙裹濕慢火煨熟勿令焦取藥細碾入辰砂末一錢和勻分作四丸每服一丸將所煨豬心煎湯化下再服用別豬心亦可過半日大便下惡物後調和胃氣凡此病乍作乍醒者蘇不食迷癡者不治瀉心湯治心受積熱譫言發狂逾牆上屋大黃黃芩黃連各五錢上銼散每服四錢水一盞半煎服引神歸舍丹治心氣亦治心風大天南星刮去皮取心稱一兩生用附子一枚重七錢以上者炮去皮臍硃砂一兩水飛上為末用豬心血丸梧子大如不稠黏用麵糊少許煎忘憂草根湯下子午之交各一服祕方半夏丸集驗治心風狂張德明傳其內人失心狂數年服此藥而愈後再作服人參琥珀丸而安半夏一兩用生薑汁煮三五十沸取出切作塊更煮令熟焙乾為細末麝香一錢研水銀半兩生薄荷一大握和水銀研如泥上件藥入薄荷泥內更研千百下丸如芥子每服十五丸金銀湯臨臥下三日再服人參琥珀丸人參去蘆琥珀另研茯神去木白茯苓去皮石菖蒲節密小者遠志各半兩酒浸半日去心乳香另研酸棗仁溫酒浸半日去殼紙上炒令香熟硃砂另研水飛各二錢半上為細末煉蜜丸桐子大每服二十丸食後溫酒送下日再服如不能飲棗湯下可常服寧志丸得效好硃砂一兩將熟絹一小片包裹線扎豶豬心一枚竹刀切開不犯鐵用紙拭去血入硃砂包於豬心內再用線縛合又用甜筍殼重裹麻皮扎定無灰酒二升入銀器或砂罐內煮酒盡去包取出硃砂另研將豬心竹刀細切砂盆內研爛卻入後藥末並硃砂棗肉為丸留少硃砂為衣藥末須隔日碾下棗肉於煮豬心日絶早煮熟去皮核取肉四兩用患心風服此一料其病頓減人參白茯苓當歸洗去土及蘆石菖蒲乳香別研酸棗仁用五兩許湯浸去皮可取半兩淨仁炒令赤香熟為度以上各半兩上為末和丸如梧子大以留下硃砂為衣每服五十丸人參湯下蕊珠丸大豬心一枚取血大硃砂一兩為末青靛花一匙上先將青靛花豬心血一處同研次以硃砂末共丸如梧子大每服二十丸茶酒任下不拘時一醉散即一醉膏見狂天門冬煎治風癲天門冬十斤湯浸二日去心生地黃肥淨者三十斤上二味安木臼內搗一二千杵取其汁再入溫湯更搗又取其汁不論幾次直待二藥無味方止以文武火熬成膏子盛瓷器內每服一匙溫酒化下不拘時日進三服狂生鐵落飲生鐵四十斤入火燒赤沸砧上鍛之有花出如蘭如蛾紛紛墜地者是名鐵落用水二斗煮取一斗入後藥石膏三兩龍齒研白茯苓去皮防風去蘆各一兩半玄參秦艽各一兩上為粗散入鐵汁中煮取五升去渣入竹瀝一升和勻溫服二合無時日五服硃砂丸鎮心神化痰涎退潮熱利咽膈止煩渴鐵粉天竺黃各一兩金銀箔各二十片人參二錢腦子半錢生麝香一錢輕粉二錢真犀角二錢海金砂一兩硃砂五錢上為末水丸硃砂為衣共丸作六百丸每一丸至五丸痰盛潮熱薄荷砂糖生葛自然汁井水下狂言譫語涎壅膈上地龍三兩薄荷及砂糖水研心神不寧金銀箔薄荷湯化下抱膽丸見癲養正丹見氣瓜蒂散見傷食來蘇膏瑞竹治遠年近日風癇心病風狂中風涎沫潮閉牙關不開及破傷風搐皂角一兩肥大不蛀者去皮弦上將皂角切碎用漿水一大碗春秋浸三四日冬七日夏一二日揉開取淨浸透皂角汁入銀器或砂鍋內以文武火熬用新柳條槐枝攪熬似膏藥取出攤於夾紙上陰乾收頓如遇病人取手掌大一片用溫漿化在盞內用小竹管盛藥水將病人扶坐定頭微抬起以藥吹入左右鼻孔內良久扶起涎出為驗欲要涎止將溫鹽湯令病人服一二口便止忌雞魚生硬濕面大承氣湯見大便不通當歸承氣湯保命當歸大黃各一兩甘草半兩芒硝七錢上銼如麻豆大每二兩水一大碗薑五片棗十枚煎至一半去渣熱溫服洗心散治風壅涎盛心經積熱口苦唇燥眼澀多淚大便祕結小便赤澀白朮一兩半麻黃和節當歸去苗洗荊芥穗芍藥甘草大黃麵裹煨去面切焙各六兩上銼散每服三錢水一盞半生薑三片薄荷葉七皮水煎服為末茶清調亦可涼膈散解毒湯俱見發熱寧志膏本事人參酸棗仁各一兩辰砂五錢乳香二錢半上為細末煉蜜和丸如彈子大每服一丸薄荷湯送下豫族弟婦緣兵火失心制此方與之服二十粒愈親舊傳去服之皆驗一醉膏治心恙用無灰酒二碗香油四兩和勻用楊柳枝二十條逐條攪一二百下候香油與酒相入成膏煎至八分灌之熟睡則醒或吐下即安矣靈苑辰砂散治風痰諸癇狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地吐沫戴目魂魄不守辰砂一兩須光明有牆壁者酸棗仁半兩微炒乳香半兩光瑩者上量所患人飲酒幾何先令恣飲沉醉但勿令吐至靜室中以前藥都作一服溫酒調作一盞調之令頓飲如飲酒素少人但以隨量取醉服藥訖便安置床枕令臥病淺者半日至一日病深者三兩日令家人潛伺之鼻息勻調但勿喚覺亦不可驚觸使覺待其自醒即神魂定矣萬一驚寤不可復治吳正肅公少時心病服此一劑五日方寤逐瘥祛風一醉散治陽厥氣逆多怒而狂硃砂水飛半兩曼陀羅花二錢半上為細末每服二錢溫酒調下若醉便臥勿令驚覺為佳有痰者先服勝金丸一方加乳香二錢依前法服之防己地黃湯治病如狂狀妄言獨語不休無寒熱其脈浮防己一錢桂枝防風各三錢甘草二錢上四味以酒一杯漬一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服驚氣丸本事治驚痙積氣風邪發則牙關緊急涎潮昏塞醒則精神若癡附子木香白殭蠶白花蛇橘紅天麻麻黃乾葛各半兩紫蘇葉一兩南星洗切薑汁浸一宿半兩硃砂一錢留少許為衣上為末加腦麝少許同研極勻煉蜜杵丸如龍眼大每服一丸金銀薄荷湯化下溫酒亦得此豫家祕方也戊申年軍中一人犯法褫衣將受刑而得釋精神頓失如癡豫與一丸服訖而寐及覺病已失矣提轄張載揚其妻因避寇失心已數年豫授此方不終劑而愈又黃彥奇妻狂厥者逾十年諸醫不驗豫授此方去附子加鐵粉亦不終劑而愈鐵粉非但化痰鎮心至如摧抑肝邪特異若多恚怒肝邪太盛鐵粉能制伏之素問云陽厥狂怒治以鐵落飲金制木之意也此亦前人未嘗論及牛黃膏保命治熱入血室發狂不認人者牛黃二錢半硃砂鬱金牡丹皮各三錢腦子甘草各一錢上為細末煉蜜丸如皂角子大新汲水化下妙香散見心痛青州白丸子見中風十四友丸見驚六一散即天水散見傷暑癇龍腦安神丸集驗治男婦小兒五積癲癇無問遠年近日發作無時但服此藥無不痊愈龍腦研麝香研牛黃各三錢研犀角屑茯神去木人參去蘆麥門冬去心硃砂水飛各二兩金箔三十五片馬牙硝二錢甘草炙地骨皮桑白皮各一兩炒上為細末煉蜜和丸如彈子大金箔為衣如有風癇病歲久冬月用溫水化下夏月用涼水化下不拘時候如病二三年日進三服小兒一丸分作二服又治男婦虛勞發熱喘嗽新汲水一盞化開服其喘滿痰嗽立止又治男子婦人語澀舌強食後溫涼水化下日進三服龍齒丹治因驚神志恍惚久而成癇時發時止龍齒研白殭蠶炒白花蛇肉酒浸硃砂水飛鐵粉研石菖蒲遠志去心木香橘紅去白麻黃去節天麻天南星薑製人參去蘆各半兩紫蘇子一兩龍腦研半錢全蠍二錢半炒麝香一錢另研上為細末次入研藥和勻煉蜜為丸每一兩作十五丸每服一丸空心薄荷湯下三聖散瓜蒂揀淨炒微黃防風去蘆各三兩藜蘆聖惠方減用之或一兩或半兩或三錢上為粗末每服約半兩以齏汁三茶盞先用二盞煎三五沸去齏汁次入水一盞煎至三沸卻將先二盞同一處熬二沸去渣澄清放溫徐徐服之以吐為度不必盡劑清神湯治心熱痰迷胞絡茯神去皮木黃連各二錢酸棗仁炒石菖蒲柏子仁去殼遠志各一錢甘草同煮去骨甘草五分痰壅加南星半夏橘紅栝蔞仁竹瀝薑汁水二盅煎八分食遠服承氣湯見大便不通東垣安神丸見虛煩通聖散見眩暈星香散見中風楊氏五癇丸治癲癇潮發不問新久白附子半兩炮半夏二兩湯洗皂角二兩捶碎用水半升揉汁去渣與白礬一處熬干為度研天南星薑製白礬生烏蛇酒浸各一兩全蠍炒二錢蜈蚣半條白殭蠶炒一兩半麝香三字研硃砂二錢半水飛雄黃水飛一錢半上為細末生薑汁煮麵糊為丸如梧桐子大每服三十丸溫生薑湯送下食後服犀角丸河間治風癲癇發作有時揚手擲足口吐痰涎不省人事暗倒屈伸犀角末半兩赤石脂三兩朴硝二兩白殭蠶一兩薄荷葉一兩上為末麵糊丸如梧子大每服二三十丸溫水下日三服不拘時如覺痰多即減數忌油膩炙爆參朱丸治風癇大有神效人參蛤粉硃砂各等分上為細末豶豬心血為丸如梧子大每服三十丸金銀煎湯下食遠服琥珀壽星丸局方用南星一斤硃砂二兩琥珀一兩無豬心血天南星一斤掘坑深二尺用炭火五斤於坑內燒熱紅取出炭掃淨用好酒一升澆之將南星趁熱下坑內用盆急蓋訖泥壅合經一宿取出再焙乾為末琥珀四兩另研硃砂一兩研飛以一半為衣上和勻豬心血三個生薑汁打麵糊攪令稠黏將心血和入藥末丸如桐子大每服五十丸煎人參湯空心送下日三服葶藶苦酒湯治發狂煩躁面赤咽痛苦酒一升半葶藶一合生艾汁無生艾以熟艾汁半升上煎取七合作三服瀉青丸見頭痛導赤散見發熱妙香丸治丈夫婦人時疾傷寒解五毒治潮熱積熱及小兒驚癇百病巴豆三百一十五粒去皮心膜炒熟研如面牛黃研龍腦研膩粉研麝香研各三兩辰砂飛研九兩金箔研九十片上合研勻煉黃蠟六兩入白蜜三分同煉令勻為丸每兩作三十丸如治潮熱積熱傷寒結胸發黃狂走躁熱口乾面赤大小便不通煎大黃炙甘草湯下一丸毒利下血煎黃連湯調膩粉少許如患酒毒食毒茶毒氣毒風痰伏痞吐逆等並用膩粉龍腦米飲下中毒吐血悶亂煩躁欲死者用生人血下立愈小兒百病驚癇急慢涼風涎潮搐搦用龍腦膩粉蜜湯下緑豆大二丸諸積食積熱頰赤煩躁睡臥不寧驚哭瀉痢並用金銀薄荷湯下更量歲數加減如大人及婦人因病傷寒時疾陰陽氣交結伏毒氣胃中喘躁眼赤潮發不定再經日數七八日己下至半月日未安醫所不明證候脈息交亂者可服一丸或分作三丸亦可並用龍腦膩粉米飲調半盞已來下此一服取轉下一切惡毒涎並藥丸瀉下如要卻收水洗淨以油單紙裹埋入地中五日取出可再與大人小兒依法服一丸救三人即不堪使如要藥速行即用針刺一孔子冷水浸少時服之即效更速五生丸李仲南傳治癇有神南星半夏川烏白附子各一兩大豆去皮稱二錢半上為細末滴水為丸桐子大每服三丸至五丸不得過七丸薑湯下又五生丸治風癇川烏頭附子各生用去皮臍天南星生半夏生乾生薑各半兩上為細末醋煮大豆汁作糊和丸如梧桐子大每服五丸冷酒送下不拘時升陽湯治陽蹺癇足太陽下行宜升陽氣麻黃八錢不去節羌活一兩半防風根八錢炙甘草五錢每服三錢水五大盞煎至一盞去渣稍熱服宿食消盡腹中空服之後避風寒一二時辰乃效厚朴丸見反胃妙功丸治諸癇無不愈者丁香木香沉香各半兩乳香研麝香另研熊膽各二錢半白丁香三百粒輕粉四錢半雄黃研青皮去白黃芩胡黃連各半兩黃連黑牽牛炒荊三稜煨甘草炙蓬莪朮陳皮去白雷丸鶴蝨各一兩大黃一兩半赤小豆三百粒巴豆七粒去皮心膜油上為細末蕎麵一兩半作糊和勻每兩作十丸硃砂水飛一兩為衣陰乾每服一丸用溫水浸一宿去水再用溫水化開空心服之小兒加減服十年病一服即愈若未愈三五日再服重者不過三服昔有一人好酒得癇病二十年用藥一服取下蟲一枚約長四五寸身有鱗其病遂愈金匱風引湯除熱癲癇大黃乾薑龍骨各四兩桂枝去皮三兩甘草炙牡蠣煅各二兩凝水石滑石赤石脂石膏紫石英白石脂各六兩上一十二味杵粗末篩以韋囊盛之取三指撮井花水三升煮三沸去渣溫服一升深師云大人風引少小驚癇後瘛瘲日數十發醫所不治除熱方效宜風引也治癇疾川芎二兩防風豬牙皂角鬱金明礬各一兩蜈蚣黃腳赤腳各一條上六味為細末蒸餅丸如梧子大空心茶清下十五丸一月除根神應丹治諸癇好辰砂不以多少上細研豬心血和勻以蒸餅裹劑蒸熟就熱取出丸如桐子大每服一丸人參湯下食後臨臥珠子辰砂丹治風癇久不愈山藥人參遠志防風紫石英茯神虎骨虎睛龍齒五味子石菖蒲丹參細辛各二錢半真珠末四分辰砂二錢研為衣上為末麵糊丸如桐子大硃砂為衣每服三五十丸煎金銀湯送下日進三服忌魚肉濕面動風之物治風癇及心風病皂角三挺捶碎挼濾取汁熬如稀糊攤紙上曝令乾取兩葉如小錢大用溫漿水浸洗下去紙注於兩鼻內各一蜆殼許須臾涎下咬箸瀝涎盡後用赭石生一兩白礬生二兩上為末稀糊丸如桐子大每服三十丸冷水送下無時以效為度法煮萆麻子治諸癇病不問年深日近萆麻子取仁二兩黃連一兩銼如豆大上用銀石器內水一大碗慢火熬水盡即添水熬三日兩夜為度去黃連只用萆麻子仁風乾不得見日用竹刀切每個作四段每服五粒作二十段荊芥湯下食後日二服凡服萆麻子者終身忌食豆若犯之則腹脹而死銀箔丸治風癇積年不瘥風痰漸多得熱即發銀箔三十片鐵