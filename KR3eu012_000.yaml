口乾小便不通及霍亂吐瀉下利腸澼偏主石淋及婦人産難催生下乳神效桂府滑石膩白者六兩粉草一兩研爛上為極細末每服三錢白湯調下新水亦得加薄荷末少許名雞蘇散加青黛末少許名碧玉散治療並同但以回避世俗之輕侮耳十味香薷飲百一消暑氣和脾胃香薷一兩人參去蘆陳皮湯泡去白白朮白茯苓白扁豆炒去殼黃耆去蘆乾木瓜厚朴薑汁製炒黑色炙甘草各半兩上為細末每服二錢不拘時熱湯或冷水調下三黃丸見發熱養胃湯見瘧四君子湯見虛勞星香散見中風消風散見眩暈二陳湯見痰飲白虎湯調胃承氣湯並見發熱三黃石膏湯黃連二錢黃柏山梔玄參各一錢黃芩知母各一錢五分石膏三錢甘草七分上水煎服清暑益氣湯黃耆一錢半汗少減五分蒼朮一錢半升麻一錢人參去蘆白朮陳皮神麯澤瀉各五分甘草炙黃柏酒浸葛根青皮去瓤當歸身麥門冬去心各三分五味子九粒水二大盞煎至一盞去滓食遠稍熱服劑之多少臨時斟酌黃耆人參湯黃耆一錢如自汗過多者加一錢人參去蘆白朮各五分蒼朮半錢無汗一錢橘皮不去白甘草炙當歸身酒洗麥門冬去心各二分黃柏酒洗神麯炒各三分升麻六分五味子九粒水二盞煎至一盞去滓稍熱食遠或空心服之忌酒濕面大料物之類及過食冷物如心下痞悶加黃連二三分胃脘當心痛減大寒藥加草豆蔻仁五分脅下痛或縮急加柴胡二三分頭痛目中溜火加黃連二三分川芎三分頭目不清利上壅上熱加蔓荊子三分藁本二分細辛一分川芎三分生地黃二分如氣短精神少夢寐間困乏無力加五味子九粒大便澀滯隔一二日不見者致食少食不下血中伏火而不得潤也加當歸身生地黃各五分桃仁三粒去皮尖另研麻子仁研泥五分如大便通行所加之藥勿再服如大便又不快利勿用別藥少加大黃煨半錢如又不利非血結血祕而不通也是熱則生風其病人必顯風證單血藥不可復加止常服黃耆人參湯只用羌活半兩防風半兩二味以水四盞煎至一盞去滓空心服之大便必大走也一服便止胸中氣滯加青皮並去白陳皮倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之氣滯太甚或補藥太過或人心下有憂滯鬱結之事更加木香二分或三分砂仁二分或三分白豆蔻仁二分與正藥同煎服腹痛不惡寒者加芍藥半錢黃芩二分卻減五味子人參益氣湯見著痹清燥湯東垣黃耆一錢半黃連去須蒼朮白朮各一錢陳皮五分五味子九粒人參白茯苓升麻各三分當歸一錢二分澤瀉五分柴胡麥門冬生地黃神麯炒豬苓黃柏酒製甘草炙各二分每服半兩水二盞煎一盞去滓稍熱空心服潑火散治傷暑煩躁口苦舌乾頭痛惡心不思飲食昏迷欲死者即中暑門地榆散水葫蘆丸治胃暑毒解煩渴川百藥煎三兩人參二錢麥門冬烏梅肉白梅肉乾葛甘草各半兩上為細末麵糊為丸如雞頭實大每服含化一丸夏月出行可度一日香薷丸和劑治大人小兒傷暑伏熱燥渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦舌乾肢體困倦不思飲食或發霍亂吐痢轉筋香薷去根一兩紫蘇去粗梗乾木瓜藿香洗去沙土茯神去木各五錢甘草炙赤色檀香銼丁香各二錢半上為細末煉蜜和丸每兩作三十丸每服一丸至二丸細嚼溫湯下傷濕除濕湯見中濕腎著湯三因治腎虛傷濕身重腰冷如坐水中不渴小便自利乾薑炮茯苓各四兩甘草炙白朮各二兩每服四錢水一盞煎七分空心溫服滲濕湯和劑治寒濕所傷身體重著如坐水中小便赤澀大便溏泄蒼朮白朮甘草炙各一兩茯苓去皮乾薑炮各二兩橘紅丁香各二錢半每服四錢水一盞棗一枚薑三片煎七分食前去滓溫服五苓散見消疸戊己丸見泄瀉敗毒散活人羌活獨活前胡柴胡芎藭枳殼白茯苓桔梗人參以上各一兩甘草半兩上為細末每服二錢水一盞入生薑二片煎至七分溫服或沸湯點亦得治傷寒溫疫風濕風眩拘蜷風痰頭疼目眩四肢痛憎寒壯熱項強睛疼及老人小兒皆可服或疸煙之地或瘟疫時行或人多風痰或處卑濕腳弱此藥不可缺也日二三服以知為度煩熱口乾加黃芩桂枝湯仲景桂枝芍藥生薑各三兩甘草二兩炙大棗十二枚擘上㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服不必盡劑五積散見中寒防己黃耆湯見身重五痹湯見痹青木香丸見氣清熱滲濕湯黃柏鹽水炒二錢黃連茯苓澤瀉各一錢蒼朮白朮各一錢半甘草五分水二盅煎八分服如單用滲濕去黃連黃柏加橘皮乾薑拈痛湯見身體痛朮附湯治風濕相搏身體疼煩不能轉側不嘔不渴大便堅硬小便自利及風虛頭目眩重甚者不知食味此藥暖肌補中助陽氣止自汗見心痛傷燥滋燥養榮湯治皮膚皺揭筋燥爪干當歸酒洗二錢生地黃熟地黃白芍藥秦艽黃芩各一錢五分防風一錢甘草五分上水煎服大補地黃丸治精血枯涸燥熱黃柏鹽酒炒熟地黃酒蒸各四兩當歸酒洗山藥枸杞子甘州佳各三兩知母鹽酒炒山茱萸肉白芍藥各二兩生地黃二兩五錢肉蓯蓉酒浸玄參各一兩五錢上為細末煉蜜丸如桐子大每服七八十丸空心淡鹽湯送下清涼飲子治上焦積熱口舌咽鼻乾燥黃芩黃連各二錢薄荷玄參當歸芍藥各一錢五分甘草一錢用水二盅煎至八分不拘時服大便祕結加大黃二錢導滯通幽湯治大便燥澀潤腸丸俱見大便不通八正散見淋傷飲食葛花解酲湯東垣治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足顫搖飲食減少小便不利青皮去瓤三錢木香五分橘紅人參豬苓去皮白茯苓各一錢半神麯炒澤瀉乾薑白朮各二錢白豆蔻葛花砂仁各五錢上為極細末每服三錢白湯調服但得微汗則酒病去矣此蓋不得已而用之豈可恃此酗飲成病自損元氣惟病酒者宜之五苓散見消疸瓜蒂散治大滿大實氣上衝逆上部有脈下部無脈填塞悶亂者用之如尺寸俱盛者宜用備急丸瓜蒂炒赤小豆煮等分上為細末每服二錢溫漿水調下取吐為度仲景以香豉七合煮汁和散一匕服之若不至兩尺脈絶者不宜便吐此藥恐損元氣令人胃氣不復若止胸中窒塞悶亂不通以物探之得吐則已如探不去方以此劑吐之治中湯即理中湯加陳皮青皮等分紅丸子和劑壯脾胃消宿食去膨脹京三稜浸軟切片蓬莪朮煨青皮去白陳皮去白各五斤乾薑炮胡椒各三斤上為末用醋麵糊丸如梧桐子大礬紅為衣每服三十丸食後薑湯送下小兒臨時加減與服易簡紅丸子修合治療之法並見局方蓬朮三稜桔皮青皮胡椒乾薑阿魏礬紅上每服六十丸薑湯下大治大人小兒脾胃之證極有神效但三稜蓬朮本能破癥消癖其性猛烈人不以此為常服之劑然今所用者以生産之處隔絶二藥不得其真乃以紅蒲根之類代之性雖相近而功力不同應老弱虛人小兒妊婦以其治病不能傷耗真氣但服之弗疑此藥須是合令精緻用好米醋煮陳米粉為丸若修合之時去阿魏礬紅名小橘皮煎治尋常飲食所傷中脘痞滿服之應手而愈大病之後穀食難化及治中脘停醋並生薑湯下脾寒瘧疾生薑橘皮湯下心腹脹痛紫蘇橘皮湯下脾疼作楚菖蒲湯下酒疸谷疸遍身昏黃大麥湯下兩脅引乳痛沉香湯下酒積食積面黃腹脹時或乾嘔煨薑湯下婦人脾血作楚及血癥氣塊經血不調或過時不來並用醋湯咽下寒熱往來者尤宜服之産後狀如癲癇者此乃敗血上攻迷亂心神所致當以此藥熱醋湯下其效尤速男子婦人癲疾未必皆由心經蓄熱亦有因膽氣不舒遂致痰飲上迷心竅故成斯疾若服涼劑過多則愈見昏亂常以此藥衣以辰砂用橘葉煎湯咽下名小鎮心丸妊婦惡阻嘔吐全不納食百藥不治惟此最妙乃佐二陳湯服之但人疑其墜胎必不信服每易名用之時有神效但恐妊婦偶爾損動必歸咎此藥耳大七香丸和劑治脾胃虛冷心膈噎塞漸成膈氣脾泄瀉痢反胃嘔吐香附子二兩麥糵一兩丁香皮三兩半縮砂仁藿香官桂甘草陳皮各二兩半甘松烏藥各六錢半上十味為末蜜丸彈子大每服一丸鹽酒鹽湯任嚼下忌生冷肥膩物小七香丸和劑溫中快膈化積和氣治中酒嘔逆氣膈食噎茶酒食積小兒疳氣甘松八兩益智仁六兩香附子炒丁香皮甘草炙各十二兩蓬朮煨縮砂各二兩上為末蒸餅為丸緑豆大每服二十丸溫酒薑湯熟水任下上二黃丸東垣治傷熱食痞悶兀兀欲吐煩亂不安黃芩二兩黃連酒洗一兩升麻柴胡各三錢甘草二錢枳實炒半兩上為末湯浸蒸餅丸每服五七十丸白湯下枳朮導滯丸東垣治傷濕熱之物不得旋化而作痞滿悶亂不安黃芩茯苓白朮黃連各三錢澤瀉二錢枳實麩炒去瓤神麯炒各五錢大黃煨一兩上為末湯浸蒸餅為丸食遠白湯下五十丸保和丸丹溪治食積酒積山楂肉二兩半夏薑製橘紅神麯麥芽炒白茯苓各一兩連翹萊蔔子炒黃連各半兩上為末滴水為丸加白朮二兩名大安丸枳木丸潔古治痞積治食強胃海藏云本仲景枳朮湯也今易老改為丸治老幼虛弱飲食不化或臟腑軟弱者枳實去瓤麩炒一兩白朮二兩上為末荷葉裹燒飯為丸如桐子大每服五十丸白朮湯下服白朮者本意不取其食速化但久服令人胃氣強實不復傷也曲糵枳朮丸治強食所致心胸滿悶不快神麯炒麥糵炒枳實去瓤麩炒各一兩白朮二兩上制服如枳朮丸法木香枳朮丸破滯氣消飲食開胃進食木香枳實各一兩白朮二兩亦照前法丸服檳榔丸消宿食破滯氣檳榔三錢木香人參各二錢陳皮五錢甘草一錢上為末蒸餅丸每服二三十丸食前白湯下木香檳榔丸見氣三黃枳朮丸丹溪治傷肉食濕面辛辣厚味之物填塞悶亂胸膈不快黃芩二兩黃連酒炒大黃煨神麯炒白朮陳皮各一兩上為末湯浸蒸餅為丸如緑豆大每服五十丸白湯下除濕益氣丸東垣治傷濕面心腹滿悶肢體沉重枳實炒白朮黃芩生用神麯炒各一兩紅花三錢蘿蔔子炒半兩上為末荷葉燒飯丸每服五十丸白湯下白朮丸治傷豆粉濕面油膩之物白朮半夏制神麯炒枳實炒各一兩橘紅七錢黃芩半兩枯白礬三分上為末湯浸蒸餅為丸量所傷多少加減服之如素食多用乾薑故以黃芩瀉之附治食索粉片積方用紫蘇濃煎汁加杏仁泥服之即散半夏枳朮丸治因冷食內傷一方有澤瀉一兩為小便淋故也半夏薑製枳實炒各一兩白朮二兩上為末荷葉燒飯為丸桐子大每服五十丸白湯下木香乾薑枳朮丸破滯氣消寒飲食木香三錢乾薑炮五錢枳實炒一兩白朮一兩半上為末荷葉燒飯為丸食前白湯下五十丸丁香爛飯丸治食傷太陰又治卒心胃痛丁香木香廣朮炮京三稜炮甘草各一錢炙丁香皮甘松淨縮砂仁益智仁各三錢香附子半兩上為末湯浸蒸餅為丸如緑豆大每服三十丸白湯下或細嚼亦可感應丸和劑治中虛積冷氣弱有傷停積胃脘不能傳化或因氣傷冷或因飢飽食飲酒過多心下堅滿兩脅脹痛心腹大痛霍亂吐瀉大便頻數後重遲澀久痢赤白膿血相雜米穀不化愈而復發又治中酒嘔吐痰逆噁心喜睡頭旋胸膈痞滿四肢倦怠不思飲食不拘新舊冷積並皆治之南木香肉豆寇丁香各一兩半乾薑炮一兩巴豆七十粒去皮心膜研出油杏仁一百四十粒湯泡去皮尖研百草霜二兩上前四味為末外入百草霜研與巴豆杏仁七味同和勻用好黃蠟六兩溶化成汁以重絹濾去滓更以好酒一升於銀石器內煮蠟數沸傾出候酒冷其蠟自浮於上取蠟稱用丸春夏修合用清油一兩銚內熬令香熟次下酒煮蠟四兩同化成汁就銚內乘熱拌和前項藥末秋冬修合用清油一兩半同煎煮熟成汁和匱藥末成劑分作小錠油紙裹放旋丸服之每三十丸空心薑湯下雄黃聖餅子脾胃治一切酒食所傷心腹滿不快巴豆一百枚去油膜雄黃半兩白麵十兩炒又羅過上二味為細末同面和勻用新汲水攪和作餅如手大以水再煮候浮於湯上看硬軟捏作餅子每服五七餅加至十餅十五餅嚼食一餅利一行二餅利二行食前茶酒任下木香檳榔丸寶鑑治一切氣滯心腹痞滿脅肋脹悶大小便澀滯不快利者木香檳榔青皮去白陳皮去白枳殼麩炒廣朮煨切黃連各一兩黃柏去粗皮香附揀炒大黃炒各三兩黑牽牛生取頭末四兩上為末滴水丸如豌豆大每服三五十丸食後薑湯送下加至微利為度消積集香丸寶鑑治寒飲食所傷心腹滿悶疼痛及消散積聚痃癖氣塊久不愈者木香陳皮青皮京三稜炮廣朮炮黑牽牛炒白牽牛炒茴香炒各半兩巴豆半兩不去皮用白米一勺同炒米黑去米上為末醋糊丸如桐子大每服七丸至十丸溫薑湯下無時以利為度忌生冷硬物備急丹治心腹百病卒痛如錐刺及脹滿下氣皆治之易老名獨行丸脾胃論名備急大黃丸川大黃末乾薑末巴豆去皮心研去油用霜上各等分和合一處研勻煉蜜丸臼內杵千百下如泥丸如小豆大夜臥溫水下一丸如下氣實者加一丸如卒病不計時候婦人有胎不可服神保丸和劑治心膈痛腹痛血痛腎氣脅下痛大便不通氣噎宿食不消木香胡椒各二錢半巴豆十粒去皮心膜研乾蠍七枚上四味為末湯浸蒸餅為丸麻子大硃砂三錢為衣每服五丸心膈痛柿蒂燈芯湯下腹痛柿蒂煨薑煎湯下血痛炒薑醋湯下腎氣脅下痛茴香酒下大便不通蜜湯調檳榔末一錢下氣噎木香湯下宿食不消茶酒漿飲任下三稜消積丸脾胃治傷生冷硬物不能消化心腹滿悶神麯炒京三稜炮廣朮炮各七錢懷香炒青皮陳皮各五錢丁皮益智各三錢巴豆和米皮炒焦去米五錢上為末醋麵糊為丸如桐子大每服十丸至二十丸溫薑湯下食前服量虛實加減得更衣止後服神應丸元戎治傷一切冷物潼乳腹痛腸鳴饗泄許學士云此方得之王景長之家近世名醫多用即知此方乃古方也惟此為真局方高殿前家亦非也本方雖云祕者能下泄者能止用之少效豫反復本草味藥性但言巴豆得火者良豫改法為神應丸木香一錢丁香別研乾薑炮百草霜研細各半兩以上四味為末和勻杏仁半兩巴豆半兩炒去油盡微存性蠟二兩醋煮去垢先備下上同研為泥上四味和勻重羅細入泥中熔化蠟入小油半兩同藥研及數百回後至凝可搓作挺蠟紙封裹每挺可重一錢米飲下獺肝丸治食魚鱠不消生瘕常欲食鱠者獺骨肝肺大黃各八分蘆根鶴骨各七分桔梗五分乾薑桂心各四分斑蝥二十一枚炙上為細末煉蜜和丸酒服十丸至十五丸日再瘥治食鱠在心胸間不化吐不出速下除之久成癥病方仲景陳皮一兩大黃朴硝各二兩上三味用水一大升煮取半升頓服消又用馬鞭草搗汁飲又飲薑葉汁一升亦消又可服吐藥吐之治食狗肉不消心下堅或腹脹口乾大渴心急發熱狂言妄語或洞下方上用杏仁一升去皮研以沸湯三升和絞汁三服狗肉原片皆出淨又方以蘆根水煮汁飲之消當歸四逆湯見厥通脈四逆湯見泄瀉理中丸見痞五積散見中寒養胃湯見傷暑芎芷香蘇飲見腳氣和解散和劑治四時傷寒頭痛煩躁自汗咳嗽吐利厚朴去粗皮薑汁製陳皮洗各四兩藁本桔梗甘草各半斤蒼朮去皮一斤上為粗末每服三錢水一盞半薑三片棗二枚煎七分不拘時熱服沖和湯即參蘇飲加木香半夏茯苓湯見痰飲理中湯見霍亂縮脾飲見中暑酒煮黃連丸見傷暑枳實半夏湯和劑枳實半夏各等分加麥糵每服七錢水二盞薑五片煎八分溫服無時曲糵丸治酒積癖不消心腹脹滿噫酸噦逆不食脅肋疼痛神麯炒麥糵炒各一兩黃連半兩銼同巴豆三粒炒黃去巴豆上為細末沸湯搜和丸如梧桐子大每服五十丸食前薑湯下酒癥丸治飲酒過度頭旋噁心嘔吐酒停遇酒即吐久而成癖者雄黃如皂角子大巴豆不去油皮蠍梢各十五枚上研細入白麵五兩半水和丸如豌豆大候稍干入麩炒香將一丸放水中浮即去麩每服二丸溫酒下茶亦可飲酒令無酒氣方千金下同干蔓青根二七枚三遍蒸為末取兩錢許酒後水服治惡酒健嗔方取其人床上塵和酒飲之空井中倒生草燒灰飲之勿令知斷酒方酒七升著瓶中熟硃砂半兩著酒中急塞瓶口安著豬圈中任豬搖動經七日取酒盡飲又方故氈中葈耳子七枚燒作灰黃昏時暖一杯酒咒言與病狂人飲也勿令知之後不喜飲酒也又方白豬乳汁一升飲之永不飲酒又方鸕鷀屎燒灰水服方寸匕永斷又方自死蠐螬干搗末和酒與飲永世聞酒名即嘔神驗又方酒客吐中肉七枚陰乾燒末服之法制陳皮消食化氣寬利胸膈美進飲食茴香炒甘草炙各二兩青鹽炒一兩乾生薑烏梅肉各半兩白檀香二錢半上六味為末外以陳皮半斤湯浸去白淨四兩切作細條子用水一大碗煎藥末三兩同陳皮條子一處慢火煮候陳皮極軟控干少時用干藥末拌勻焙乾每服不拘多少細嚼溫薑湯下無時法制檳榔治酒食過度胸膈膨滿口吐清水一切積聚雞心檳榔一兩切作小塊縮砂取仁白豆蔻取仁丁香切作細條粉草切作細塊各一兩橘皮去白切作細條生薑各半斤切作細條鹽二兩上件用河水兩碗浸一宿次日用慢火砂鍋內煮乾焙乾入新瓶收每服一撮細嚼酒下或為細末湯調服亦可傷勞倦補中益氣湯東垣黃耆病甚熱甚者一錢人參三分有嗽去之甘草炙五分當歸身酒製橘皮升麻柴胡各二分白朮三分薛新甫常用方耆參術各一錢半歸一錢橘七分柴升各五分水二盞煎至一盞量氣弱氣盛臨病斟酌水盞大小去渣