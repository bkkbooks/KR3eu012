黍米大退驚疳積熱不須下者常服十丸此藥峻利非有實積者不宜輕用慎之利積丸玄珠下同黃連四兩天水散八兩當歸二兩蘿蔔子炒巴豆去油同黃連炒乳香各一兩上為末醋糊丸如桐子大弱者服十五丸實者二十五丸導氣丸青木香蘿蔔子茴香檳榔黑牽牛各四兩為細末薄粥為丸如梧子大每服參十丸舟車神佑丸見痰飲藿香正氣散中風感應丸見傷食蘇合香丸卒中五苓散消疸黃連丸濟生乾薑炮黃連去須縮砂仁炒川芎阿膠蛤粉炒白朮各一兩乳香另研三錢枳殼去穰麩炒半兩上為末用鹽梅三個取肉少入醋同杵丸如梧子大每服四十丸白痢乾薑湯下赤痢甘草湯下赤白痢乾薑甘草湯下俱食前服黃連阿膠丸和劑治冷熱不調下痢赤白裡急後重臍腹疼痛口燥煩渴小便不利黃連去須三兩阿膠碎炒一兩茯苓去皮二兩上以連苓為細末水熬阿膠膏搜和丸如桐子大每服三十丸空心溫米飲下茶梅丸用臘茶為細末不以多少用白梅肉和丸赤痢甘草湯下白痢烏梅湯下泄瀉不止陳米飲下每服二十丸團茶尤佳大凡痢疾不以赤白分冷熱若手足和暖則為陽宜先服五苓散粟米飲調下次服感應丸二十粒即愈若手足厥冷則為陰宜已寒丸附子之類如此治痢無不效有人夏月患痢一日六七十行用五苓散立止白頭翁湯金匱白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服阿膠梅連丸治下痢無問久新赤白青黑疼痛諸證阿膠淨草灰炒透明白研不細者再炒研細盡烏梅肉炒黃連黃柏炒赤芍藥當歸炒赤茯苓去皮乾薑炮各等分上八味為末入阿膠末和勻水丸如桐子大每服十丸溫米飲送下食前敗毒散傷濕理中湯霍亂四君子湯虛勞加減平胃散潔古經云四時皆以胃氣為本久下血則脾胃虛損血水流於四肢卻入於胃而為血痢宜服此滋養脾胃白朮厚朴陳皮各一兩木香檳榔各三錢甘草七錢桃仁人參黃連阿膠炒茯苓各五錢上㕮咀每服五錢薑三片棗一枚水煎溫服無時血多加桃仁熱泄加黃連小便澀加茯苓澤瀉氣不下後重加檳榔木香腹痛加官桂芍藥甘草膿多加阿膠濕多加白朮脈洪大加大黃青六丸丹溪去三焦濕熱治泄瀉多與清化丸同服並不單服兼治産後腹痛或自利者能補脾補血亦治血痢效六一散三兩紅曲炒半兩活血上飯為丸一方酒糊丸胃風湯下血膠艾湯溲血蒼朮地榆湯潔古治脾經受濕下血痢蒼朮三兩地榆一兩每一兩水二盞煎一盞溫服槐花丸潔古青皮槐花荊芥穗各等分上為末水煎空心溫服地榆散見中暑茜根丸治一切毒痢及蠱注下血如雞肝心煩腹痛茜根洗川升麻犀角鎊地榆洗當歸去蘆酒洗黃連去須枳殼去瓤麩炒白芍藥各等分上為末醋煮麵糊為丸如梧桐子大每服七十丸空心用米飲湯下地榆丸治瀉痢或血痢地榆微炒當歸微炒阿膠糯米炒黃連去須訶子取肉炒木香曬乾烏梅去核取肉稱各半兩上為細末煉蜜為丸如桐子大每服二三十丸空心陳米飲吞下先公頃在括蒼病痢逾月得此方而愈頃在霅上士人蘇子病此危甚其婦翁孫億來告急此方以與之旋即痊安玉粉散治血痢解臟腑積熱毒上以海蛤為細末每服二錢蜜水調服犀角散治熱痢下赤黃膿血腹痛心煩困悶犀角屑黃連去須微炒地榆黃耆各一兩當歸半兩炒木香二錢半上為散每服三錢以水一盞煎至六分去滓溫服無時黃連丸一名羚羊角丸治一切熱痢及休息痢日夜頻並兼治下血黑如雞肝色黃連去須二兩半羚羊角鎊黃柏去粗皮各一兩半赤茯苓去黑皮半兩上為細末煉蜜和丸如梧子大每服二十丸薑蜜湯下暑月下痢用之尤驗一方用白茯苓臘茶送下生地黃湯治熱痢不止生地黃半兩地榆七錢半甘草炙二錢半上㕮咀如麻豆大用水二盞煎至一盞去滓分溫二服空心日晚再服鬱金散治一切熱毒痢下血不止川鬱金槐花炒各半兩甘草炙二錢半上為細末每服一二錢食前用豆豉湯調下蒲黃散治血痢蒲黃三合乾地黃桑耳甘草芒硝茯苓人參柏葉阿膠艾葉生薑各二兩禹餘糧黃連各一兩赤石脂一兩二錢半上㕮咀以水一斗煮取四升分作五服茜根散治血痢心神煩熱腹中痛不納飲食茜根地榆生乾地黃當歸微炒犀角屑黃芩各一兩梔子仁半兩黃連二兩去須微炒上㕮咀每服四錢以水一中盞入豉五十粒薤白七寸煎至六分去滓不拘時溫服聚珍丸治血痢酒痢尤效川百藥煎陳槐花炒各半兩感應丸一帖薄荷煎兩帖麝香少許上件為末拌勻煉蜜為丸如梧桐子大每服二十丸食前服男子用龍牙草煎湯下女人用生地黃煎湯下除濕湯見中濕十寶湯治冷痢如魚腦者三服見效甚疾黃耆四兩熟地黃酒浸白茯苓人參當歸酒浸白朮半夏白芍藥五味子官桂各一兩甘草半兩上為粗末每服二錢水一盞生薑三片烏梅一個煎至七分食前溫服豆蔻丸治白滯痢腹臟撮痛肉豆蔻麵裹煨熟草豆蔻麵裹煨熟枇杷葉去毛炙縮砂仁母丁香各一兩木香沉香各半兩地榆二兩墨燒紅為末半兩上為細末燒粟米飯為丸如櫻桃大每服二丸食前用米飲化下萬補丸治脾胃久虛大腸積冷下痢白膿或腸滑不固久服諸藥不效服之神驗併産前産後皆可服人參當歸切焙草豆蔻炮去皮嫩茄茸酥炙乳香各一兩半白朮陽起石火煅細研肉桂去皮縮砂仁赤石脂鍾乳粉肉豆蔻麵裹煨沉香白薑炮蓽茇牛乳半盞慢火煎乾茴香炒丁香厚朴去皮薑製白茯苓各一兩地榆大麥糵炒神麯炒各半兩附子七錢炮去皮臍肉蓯蓉二兩淨洗用酒浸一宿切焙罌粟殼和米者二十枚炙上為細末研勻用木瓜十五枚去瓤蒸爛同藥末搗和得所丸如梧桐子大曬乾每服三十丸食前米飲下頻並者加至五七十丸香薷飲六和湯俱傷暑厚朴丸積聚紫參湯泄瀉茯苓湯東垣茯苓六分澤瀉一錢當歸身四分芍藥一錢半蒼朮二錢生薑二錢肉桂五分生黃芩三分豬苓六分炙甘草五分升麻柴胡各一錢上作二服水煎稍熱服神效越桃散寶鑑大梔子良薑各三錢上為末米飲或酒調下三錢建中湯見勞倦芍藥黃芩湯東垣治泄痢腹痛或後重身熱久不愈脈洪疾者及下痢膿血稠黏黃芩芍藥各一兩甘草五錢上㕮咀每服一兩水一盞半煎至一盞溫服無時如痛加桂少許當歸導氣湯東垣甘草一錢半當歸芍藥各一錢木香檳榔各三錢青皮槐花炒各七分澤瀉五分生地黃一錢半或二錢酒浸陰乾上共為末用水煎食前溫服如小便利去澤瀉聖餅子寶鑑治瀉痢赤白臍腹撮痛久不愈者定粉密陀僧舶上硫黃各三錢黃丹二錢輕粉少許上五味為末入白麵四錢匕滴水丸如指頭大捻成餅蔭干食前溫漿水磨下大便黑色為效通神丸治膿血雜痢後重疼痛日久不瘥沒藥研五靈脂去砂石研乳香研各一錢巴豆霜研半錢上同研勻滴水為丸如黃米大每服七丸食前煎生木瓜湯下小兒服三丸隨歲加減魚鮓湯治痢下五色膿血或如爛魚腸並無大便腸中攪痛不可忍呻吟叫呼聲聞於外粉霜研輕粉硃砂研硇砂去砂石研白丁香各一錢乳香半錢巴豆二七粒去殼不去油上為末蒸棗肉為丸嬰兒三丸如粟米大二三歲如麻粒大四五歲每服三四丸並旋丸煎鮓湯吞下仍間服調胃藥此證緣久積而成故小兒多有之香連丸直指治下痢赤白裡急後重黃連去蘆二十兩用吳茱萸十兩同炒令赤揀去茱萸不用木香四兩八錢八分不見火上為細末醋糊丸如桐子大每服三十丸空心飯飲下導氣湯治下痢膿血日夜無度裡急後重木香檳榔黃連各六分大黃黃芩各一錢半枳殼一錢麩炒芍藥六錢當歸三錢上㕮咀作二服水二盞煎一盞去滓食前溫服清涼飲子見發熱進承氣法治太陰證不能食是也當先補而後瀉乃進藥法也先銼厚朴半兩薑製水一盞煎至半盞服若二三服未已胃有宿食不消加枳實二錢同煎服二三服泄又未已如不加食尚有熱毒又加大黃三錢推過泄未止者為腸胃久有塵垢滑黏加芒硝半合垢去盡則安矣後重兼無虛證者宜之若力倦氣少脈虛不能食者不宜此法蓋厚朴枳實大瀉元氣故也退承氣法治陽明證能食是也當先瀉而後補乃退藥法也先用大承氣五錢水一盞依前法煎至七分稍熱服如瀉未止去芒硝減大黃一半煎二服如熱氣雖已其人心腹滿又減去大黃但與枳實厚朴湯又煎二三服如腹脹滿退泄亦自安後服厚朴湯數服則已水煮木香膏寶鑑治脾胃受濕臟腑滑泄腹中疼痛日夜無度腸鳴水聲不思飲食每欲痢時裡急後重或下赤白或便膿血等並皆治之御米殼蜜水浸濕炒黃六兩乳香研肉豆蔻砂仁各一兩半當歸白芍藥木香丁香訶子皮藿香黃連去須青皮去白厚朴薑製甘草炙陳皮去白各一兩乾薑炮枳實麩炒各半兩上十七味為細末煉蜜丸如彈子大每服一丸水一盞棗一枚擘開煎至七分和滓稍熱食前服白朮安胃散寶鑑治一切瀉痢無問膿血相雜裡急後重窘痛日夜無度及治小腸氣痛婦人臍下虛冷併産後兒枕痛虛弱寒熱不止者御米殼三兩去頂蒂醋煮一宿茯苓車前子白朮烏梅肉各一兩五味子各半兩上為粗末每服五錢水二盞煎至一盞空心溫服升陽除濕防風湯見下血三奇散治痢后里急後重枳殼黃耆防風各等分上為末每服二錢用蜜湯調下或米飲調亦得治裡急後重好蛤粉穿山甲炒上二味等分為末每服一錢空心用好酒調服木香黃連湯治下痢膿血裡急後重神效木香黃連川木通川黃柏枳殼麩炒陳皮各二錢半大黃三錢上㕮咀分作二帖用水二盞煎至八分去滓食前溫服堅中丸白膠香散俱泄瀉純陽真人養臟湯和劑治大人小兒冷熱不調下痢赤白或便膿血有如魚腦裡急後重臍腹㽱痛及脫肛墜下酒毒溫毒便血並宜服之人參白朮當歸各六錢白芍藥木香各一兩六錢甘草肉桂各八錢肉豆蔻麵裹煨半兩御米殼蜜炙三兩六錢訶子肉一兩二錢上為㕮咀每服四錢用水一盞半煎至八分去滓食前溫服忌酒面生冷魚腥油膩之物臟腑滑泄夜起久不瘥者可加附子四片煎服七宣丸見大便不通芍藥柏皮丸芍藥黃柏各等分上為細末醋糊為丸如桐子大每服五七十丸食前溫湯下固腸丸見泄瀉桃花湯金匱治下痢膿血赤石脂一升一半銼一半篩末乾薑一兩梗米一升上三味以水七升煮米令熟去滓溫七合納赤石脂末方寸匕日三服若一服愈余勿服易簡斷下湯治下痢赤白無問新久長幼白朮茯苓各一錢甘草五分草果連皮一枚上㕮咀用罌粟殼十四枚去筋膜並萼蒂剪碎用醋淹為粗末用作一服水一大碗薑七片棗子烏梅各七枚煎至一大盞分二服服之赤痢者加烏豆二粒白痢者加乾薑五錢罌粟殼治痢服之如神但性緊澀多令人嘔逆既以醋製加以烏梅不致為害然嘔吐人則不可服大率痢疾古方謂之滯下多因腸胃素有積滯而成此疾始得之時不可遽止先以巴豆感應丸十餘粒白梅湯下令大便微利仍以前藥服之無不應手作效若脾胃素弱用豆蔻橘紅罌粟殼各等分為末醋煮麵糊為丸桐子大每服五十丸烏梅湯下兼治泄瀉暴下不止一服既愈更令藥力相倍為佳如覺噁心卻以理中湯四物湯加豆蔻木香輩調其胃氣仍以二陳湯煮木香丸以定其嘔逆大凡痢疾乃腹心之患尊年人尤非所宜若果首尾用平和之劑決難作效必致危篤雖欲服此則已晚矣其秦艽地榆黃柏木通之類其性苦寒卻難輕服血痢當服胃風湯並膠艾湯之類白者宜服附子理中湯震靈丹之屬更宜審而用之若五色雜下泄瀉無時當用熟烏頭一兩厚朴乾薑甘草各一分生薑煎服今之治痢多用駐車丸黃連阿膠丸之類其中止有黃連肥腸其性本冷若所感積輕及余痢休息不已則服之取效若病稍重則非此可療訶子皮散東垣御米殼五分去花萼蜜炒乾薑六分炮陳皮五分訶子皮七分煨去核水煎服或為末白湯調服亦可地榆芍藥湯保命治泄痢膿血脫肛蒼朮八兩地榆卷柏芍藥各三兩上㕮咀每服二兩水煎溫服病退勿服敗毒散見傷濕參苓白朮散和劑治久瀉及大病後痢後調理消渴者尤宜人參乾山藥蓮肉去心白扁豆去皮薑汁浸炒各一斤半白朮於潛者二斤桔梗炒令黃色砂仁白茯苓去皮薏苡仁炙甘草各一斤上為細末每服二錢米湯調下或加薑棗煎服或棗肉和藥丸如桐子大每服七十丸空心用米湯送下或煉蜜丸如彈子大湯化下治中湯見嘔吐倉廩湯治禁口痢有熱乃毒氣衝心食即吐人參茯苓甘草炙前胡川芎羌活獨活桔梗柴胡枳殼陳倉米各等分上㕮咀每服五錢水一盞半生薑三片煎至七分去滓不拘時熱服木香散本事治隔年痢不止並治血痢尤捷木香半兩銼用黃連半兩同炒罌粟殼半兩銼用生薑半兩同炒甘草炙一兩上為細末入麝香少許每服一錢陳米飲下訶藜勒丸寶鑑治休息痢晝夜無度臍腹撮痛諸藥不效椿根白皮二兩訶子半兩去核母丁香三十粒為細末醋糊丸如梧子大每服五十丸陳米飲湯入醋少許一日三服效椿樹俗謂虎眼樹又謂之樗蕪荑丸治久痢不瘥有蟲並下部脫肛蕪荑炒黃連去須各二兩蚺蛇膽半兩上為細末煉蜜丸如梧桐子大每服三十丸食前用杏仁湯下日再服駐車丸和劑治一切下痢無問冷熱阿膠搗碎蛤粉炒成珠為末以醋四升熬成膏十五兩當歸去蘆十五兩黃連去須三十兩乾薑炮十兩上為末醋煮阿膠膏丸梧桐子大每服三十丸食前米飲下日三服小兒丸如麻子大更量歲數加減服歸連丸治痢無問冷熱及五色痢入口即定當歸黃柏黃芩阿膠熟艾各二兩黃連一兩上為末以醇醋二升煮膠煬下藥煮令可為丸如豆大每服七八十丸日二夜一用米湯下若産婦痢加蒲黃一兩煉蜜和丸麥糵丸治休息痢不能飲食及羸瘦大麥糵炒附子炮裂去皮臍陳曲炒官桂去皮烏梅肉炒白茯苓去皮人參各一兩上為細末煉蜜和丸如梧桐子大每服三十丸煮棗肉飲下不拘時一方用七月七日曲治休息痢羸瘦黃連去須為末定粉研各半兩大棗二十枚去核上舂棗如泥鋪於紙上安二味藥裹之燒令通赤取出候冷細研為末每服使好精羊肉半斤切作片子用散藥三錢摻在肉上濕紙裹燒熟放冷食之不過三兩服效又方杏仁一兩湯浸去皮尖及雙仁麩炒黃色豶豬肝一具去筋膜切作片上件將肝用水洗去血切作片於淨鐺內一重肝一重杏仁入盡用童子小便二升入鐺中蓋定慢火煎令小便盡即熟放冷任意食之又方一名羊肝散砂仁一兩去皮肉豆蔻半兩去殼上為細末用羊肝半具細切拌藥以濕紙三五重裹上更以麵裹用慢火燒令熟去面並紙入軟飯搗和丸如梧子大每服三十丸食前粥飲下蕷蓮飲石蓮肉乾山藥各等分上為細末生薑茶煎湯調下三錢異功散七珍散俱不能食六柱飲泄瀉獨活寄生湯見腰痛虎骨四斤丸腳氣大防風湯鶴膝風橘皮枳朮丸傷食附方神效參香散治大人小兒臟氣虛怯冷熱不調積而成痢或下鮮血或如豆汁或如魚腦或下瘀血或下紫黑血或赤白相雜裡急後重日夜頻數無問新久並皆治之白扁豆炒木香人參去蘆各二兩茯苓去皮肉豆蔻煨各四兩罌粟殼去蒂陳皮去白各十兩上為細末每服三錢用溫米飲調下無時黑丸子治脾胃怯弱飲食過傷留滯不化遂成痢下服此藥推導更須斟酌受病淺深增減丸數當逐盡積滯方佳然後徐徐補之烏梅肉杏仁去皮尖另研半夏湯泡七次縮砂各十四粒百草霜六錢巴豆霜去油半錢上為細末和勻稀糊為丸如黍米大每服十五丸加至二十丸用白湯送下看人虛實加減丸數服之不二散治諸般瀉痢神效罌粟殼青皮去瓤焙乾陳皮去白焙乾各二兩當歸去蘆炒甘草炙甜藤如無只以乾葛代之各一兩上件㕮咀每服三錢水一盞煎七分去滓通口服如患赤白痢用酸石榴皮一片同煎極妙神效雞清丸治一切瀉痢木香二兩黃連二兩半肉豆蔻七個大者生用上先為細末取雞子清搜和藥作餅子於慢火上炙令黃色變紅極干再研為末用麵糊丸如桐子大每服五十丸空心米飲下御米丸治一切瀉痢肉豆蔻訶子肉白茯苓白朮各一兩石蓮肉當歸各半兩乳香三錢罌粟殼一兩半蜜炙上為細末水糊為丸如梧桐子大每服三五十丸空心用米飲送下如血痢減豆蔻白朮當歸粟殼犀角丸但是痢服之無不瘥者犀角屑取黑色文理粗者産後用彌佳宣州黃連苦參多買輕搗金州黃柏赤色緊薄者川當歸五味俱取細末上各搗研為末各等分和勻空腹爛煮糯米飲調方寸匕服之日再服忌黏滑油膩生菜栝蔞散治五色痢久不愈者栝蔞一個黃色者以炭火煨存性用蓋在地下一宿出火毒上研為細末作一服用溫酒調服胡大卿有一僕人患痢半年至杭州遇一道人傳此方而愈葛根湯專治酒痢葛根枳殼半夏生地黃杏仁去皮尖茯苓各二錢四分黃芩一錢二分甘草炙半錢上分作二帖水二盞黑豆百粒生薑五片白梅一個煎至一盞去滓食前溫服神效散治休息痢氣痢膿血不止疼痛困弱當歸烏梅肉黃連各等分上為細末研大蒜作膏和丸如梧子大每服三四十丸厚朴煎湯下一方加阿膠又方治赤白痢新舊疾上用鹽霜梅三個用黃泥裹於慢火煨乾研為細末用米湯調下治腸蟲先下赤後下黃白沫連年不愈兼治痢下應先白後赤若先赤後白為腸蟲上用牛膝一兩切椎碎以醇酒一升漬一宿平旦空心服之再服愈阿膠丸治冷熱不調痢下膿血下止腹痛不可忍阿膠銼碎炒令燥乾薑炮木香黃連炒當歸炒黃芩各一兩赤石脂龍骨各二兩厚朴一兩半去粗皮生薑汁塗炙上為細末煉蜜和丸如梧子大每服三十丸不拘時以粥飲下木香散治冷熱痢虛損腹痛不能飲食日漸乏力木香乾薑炮甘草炙黃芩各半兩柏葉炙當歸炒白朮干熟地黃各七錢半黃連炒五錢上銼散每服三錢水一中盞煎至五分去滓不拘時溫服楊子建萬全護命方今有人患痢其脈微小再再尋之又沉而澀此之一候若下白痢其勢雖重庶幾可治若是下血切忌發熱通身發熱者死熱見七日死以上所陳雖未足以達痢之淵源亦足以明其粗迹議者謂如子所言自甲子至於癸亥每六十年中未嘗有一年不生痢疾今世人所患痢疾於數年中間忽止有一年其故何也答曰六十年中未嘗有一年無木土相攻未嘗無土火相郁未嘗無水火相犯但五運之政譬如權衡一年間五行氣數更相承製得其平等則其疾自然不作若或一氣太過一臟有餘痢疾之生應不旋踵豫故備陳其粗以開後學之未悟庶幾診療之間無差誤之過者矣但毒痢傷人不一惟水邪犯心為重世人初患痢時先發寒熱投藥治之其熱不退發熱太甚食則嘔逆下痢不止心熱如火只要入涼處只思吃冷水忽思狂走渾身肌肉疼痛著手不得此候十難治其三四也治疫毒痢方須是子細首尾讀此方論令分明識病根源然後吃藥但毒痢初得時先發寒熱忽頭痛忽壯熱忽轉數行便下赤痢忽赤白相雜忽止下白痢或先下白痢後變成赤痢或先下赤痢後卻變成白痢並宜吃此方但初下痢時先發寒熱頭痛即是寒邪犯心寒氣犯心水火相戰故初病時先發寒熱水火相犯血變於中所以多下赤痢如紫草水如莧菜水無色澤者寒邪犯心之重也先發寒熱而所下之痢止白色者寒邪犯心之未動也先下白痢而後有赤痢之變者寒邪犯心其勢漸加也先下赤痢而後變成白痢者寒邪犯心其勢漸減也赤白相等者水火相犯其氣相等寒濕之氣相搏也忽有赤多而白少忽有赤少而白多此寒邪之勢有多少毒痢之病有重輕以白多為輕赤多為重治之之法先奪其寒則其所下之藥一也以太歲分之則丙子丙午甲子甲午庚子庚午年丙寅丙申年甲寅甲申年庚寅庚申並辰戌之年運遇丙甲及庚運所臨其害尤甚及丑未之年宜有此候又兼無問太歲蓋天地變化其候多端難可窮盡今此但世人亦不必撞定太歲但看一年中春夏之內多有寒肅之化陽光少見忽寒熱二氣更相交爭忽於夏月多寒濕之化寒邪犯心所受之痢先發寒熱忽頭痛忽先轉數行後有赤痢忽赤白相雜忽止下痢並宜吃此通神散吃後取壯熱便退若兩三盞後壯熱不退更不吃此方自別有方論在下麻黃去根節官桂去粗皮各七錢半大川芎白朮各二兩藁本獨活桔梗防風芍藥白芷各半兩牡丹皮去心甘草各二錢半細辛三錢三分羡牽牛一錢七分上為細末每服二錢非時熟湯調下和滓熱吃若吃兩三盞後寒熱不退更不請吃自別有方論在下若吃此藥後寒熱已退赤痢已消減便修合第二方第三方藥吃取安效若寒熱已退赤痢未消減更服兩三盞然不可多吃一日只兩盞後赤痢消減忽變成白痢旋次修合第二方吃候出後度數減少便修合第三方吃取平安但六甲之年六庚之歲春夏之內時氣多寒人得痢疾此藥通神若是六甲之年丑未之歲濕化偏多人得痢疾先發寒熱即於方內添草豆蔻一兩同修合也又不問太歲但一年間春夏之內多寒人有痢疾先發寒熱並宜此方治毒痢初得時先發寒熱吃前方寒熱已退赤痢已消減宜進此還真散若吃前方藥寒熱未退赤痢未消減更不宜進此藥但天地變化其候非常痢疾證候多端此不得不盡其仔細訶子五枚用麵裹火煨熟不要生亦不要焦去面不用就熱咬破訶子擎去核不用只用皮焙乾上搗羅為細末每服二錢匕以米湯一盞半同藥煎取一盞空心和滓吃若吐出一兩口涎更佳如此吃經數盞大腑漸安出後減少修合第三方藥吃以牢固大腸若吃前方藥壯熱未退血痢未減不可進此藥治疫毒痢吃前面兩方藥病勢已減所下之痢止余些小或下清糞或如鴨糞或如茶湯或如燭油或只餘些小紅色宜吃此方以牢固大腸還復真氣舶上硫黃丸舶上硫黃二兩去砂石細研為末薏苡仁二兩炒杵為末上二味相和令勻滴熟水和為丸如桐子大每服五十丸空心米湯下黃耆散治熱痢下赤黃膿腹疼心煩黃耆銼龍骨當歸各七錢半生乾地黃五錢黃連去須微炒一兩黃柏黃芩犀角屑地榆各半兩上為細末每服二錢不拘時粥飲調下祕傳斗門散治八種毒痢臟腑撮痛膿血赤白或下瘀血或成片子或五色相雜日夜頻並兼治禁口惡痢裡急後重渴不止全不進食他藥不能治者立見神效黑豆炒去皮十二兩乾薑炮四兩罌粟殼蜜炒半斤地榆炒甘草炙各六兩白芍藥三兩上㕮咀每服三錢水一盞煎七分溫服栝蔞根湯治下痢冷熱相沖氣不和順本因下虛津液耗少口乾咽燥常思飲水毒氣更增煩躁轉甚宜服此藥救之栝蔞根白茯苓甘草炙各半兩麥門冬去心二錢半上㕮咀每服五錢水一盞半棗二枚擘破煎至七分去滓服不拘時陳米湯治吐痢後大渴飲水不止上用陳倉米二合水淘淨以水二盞煎至一盞去滓空心溫服晚食前再煎服治痢後渴上用糯米二合以水一盞半同煮研絞汁空心頓服之澤漆湯治痢後腫滿氣急喘嗽小便如血澤漆葉微炒五兩桑根白皮炙黃郁李仁湯浸去皮尖炒熟各三兩陳皮去白白朮炒杏仁湯浸去皮尖雙仁炒各一兩人參一兩半上㕮咀每服五錢水二盞生薑三片煎取八分去滓溫服候半時辰再服取下黃水數升或小便利為度茯苓湯治痢後遍身浮腫赤茯苓去黑皮澤漆葉微炒白朮微炒各一兩桑根白皮炙黃黃芩射干防己澤瀉各三兩上㕮咀每服五錢匕先