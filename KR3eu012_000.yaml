如無地黃與藕汁計升數添水同煎生漆湯元戎病人七八日後兩手脈沉細而數或關前脈大臍下滿或狂走或喜妄或譫語不大便小便自利若病人年少氣實即血凝難下恐抵當丸力不能及宜此生地黃汁一升如無汁用生乾地黃三兩半犀角一兩鎊為末大黃三兩銼碎如骰子大桃仁三十個擂碎上作一處用水三升好酒一升慢火熬三升以來傾出濾去滓再入鍋投點光生漆一兩半再熬之至二升即住淨濾去滓放冷作三服每投服候半日許血未下再投一服候血下即止服藥如無生地黃汁更添水一升同煎活人大黃湯元戎治陽毒傷寒未解熱結在內恍惚如狂者桃仁二十粒麩炒黃官桂七錢芒硝二錢半大黃甘草木通大腹皮各一兩上㕮咀每服四錢水一盅煎至六分去滓溫服無時此方細末蜜丸桐子大溫酒下二三十丸治婦人經閉或不調若瘀血已去以復元通氣散加當歸煎服亦可又法筋骨損傷用左經丸之類或用草烏頭棗肉為丸服之以行諸經者以其內無瘀血故用之藥劑寒熱溫涼不一惟智者能擇之而不可偏執也代抵當丸行瘀血自制大黃川産如錦紋者去皮及黑心四兩芒硝一兩如欲穩以玄明粉代桃仁麩炒黃去皮尖另研如泥六十枚當歸尾生地黃穿山甲蛤粉炒各一兩桂三錢或五錢上為極細末煉蜜丸如桐子大蓄血在上焦丸如芥子大臨臥去枕仰臥以津咽之令停留喉下搜逐膈上中焦食遠下焦空心俱桐子大以百潦水煎湯下之用歸地者欲下血而不損血耳且引諸藥至血分也諸藥皆獷悍而欲以和劑之也如血老成積此藥攻之不動宜去歸地加廣朮醋浸透焙乾一兩肉桂七錢通真丸婦人通經男子破血大黃去皮米醋同煮爛桃仁各四兩去皮尖另研天水末四兩天水一名益元散乾漆二兩用瓦上焙煙盡杜牛膝二兩生上為末醋糊丸如桐子大每服六七十丸大內傷丸治血瘀白朮黃土炒枳殼麩炒黃芩酒炒各六錢厚朴薑汁炒香附童便炒蒼朮米泔水洗蔥汁炒草果炒木瓜赤曲炒三稜蜜炙各五錢蓬朮蜜水炒七錢青皮麩炒川芎白芍藥酒炒神麯炒枳實麩炒石菖蒲各一兩小茴香炒肉桂甘草炙乳香出汗各一兩前藥二十一味共為細末神麯糊丸如彈子大硃砂一兩為衣湯酒任下多不過二丸上部內傷方牡丹皮一錢江西紅曲八分香附八分童便制麥芽一錢桔梗五分中部不用川通草一錢穿山甲一錢麩炒有孕不用降香一錢為末紅花七分山楂八分蘇木一錢捶碎上酒水各一盅煎八分甚者加童便一盅如痰盛加薑製半夏七分半有孕者油炒如痛甚加真乳香沒藥各七分半中部加枳殼脅痛加柴胡第四册頭痛麻黃附子細辛湯見傷寒太陽吳茱萸湯見傷寒吐清空膏東垣羌活防風各一兩柴胡七錢川芎五錢甘草炙一兩半黃連炒一兩黃芩三兩一半酒製一半炒上為細末每服二錢熱盞內入茶少許湯調如膏抹在口內少用白湯臨臥送下白虎湯見傷寒發熱安神散東垣黃耆羌活酒黃柏各一兩防風二錢半酒知母酒生地黃柴胡升麻各五錢炙甘草生甘草各三錢每服半兩水二盞煎至一盞半加蔓荊子半錢川芎三分再煎至一盞臨臥去渣熱服東垣丹溪治虛熱頭痛大率皆以酒芩酒連酒柏加風劑也川芎散寶鑑治頭風偏正頭痛昏眩妙方川芎細辛羌活槐花甘草炙香附子石膏各半兩荊芥薄荷菊花防風去叉茵陳各一兩上為末每服二錢食後茶清調下日三服忌動風物清上瀉火湯東垣昔有人年少時氣弱於氣海三里節次約灸五七百壯至年老添熱厥頭痛雖冬天大寒獨喜風寒其頭痛便愈微來暖處或見煙火其痛復作五七年不愈皆灸之過也羌活三錢酒知母酒黃芩各一錢半黃耆酒黃柏各一錢防風升麻各七分柴胡藁本酒黃連生地黃甘草各五分川芎荊芥蔓荊子各二分蒼朮當歸各三分細辛紅花各少許分作二服每服水二盞煎至一盞去渣稍熱服食遠補氣湯東垣服前藥之後服此藥黃耆八分甘草炙當歸身各二錢柴胡升麻各二分細辛少許麻黃炒苦丁香各半錢上水煎服石膏散寶鑑麻黃去根節石膏各一兩何首烏半兩葛根七錢半上為細末每服三錢生薑三片水煎稍熱服石膏散寶鑑川芎石膏亂紋好者白芷各等分上為細末每服四錢熱茶清調下荊芥散本事治頭風荊芥石膏煅存性等分上為細末每服二錢薑三片蔥白三寸和須使水一盞煎至七分食後服治丈夫婦人風虛頭疼氣虛頭疼婦人胎前産後傷風頭疼一切頭疼並皆治之茵陳揀淨五兩麻黃石膏煅存性各二兩上為末每服一錢臘茶調下食後服服畢仰臥霎時羌活附子湯東垣黃耆麻黃各一錢羌活蒼朮各半錢防風升麻甘草各二分黑附子一分白芷白殭蠶黃柏各三分水煎去渣溫服食後若有寒嗽加佛耳草三分麻黃吳茱萸湯東垣蒼朮一錢麻黃羌活各五分吳茱萸三分藁本柴胡升麻黃耆當歸黃柏黃連黃芩各二分半夏川烏蔓荊子各一分細辛紅花各少許水二盞煎至一盞去渣稍熱服食遠透頂散本事治偏正頭風夾腦風並一切頭風不問年深日近細辛表白者三莖瓜蒂七個丁香三粒糯米七粒腦子麝香各一黑豆大上將腦麝乳鉢內研極細卻將前四味研勻另自治為末然後入乳鉢內燙起腦麝令勻用瓦罐子盛之謹閉罐口患人隨左右搐之一大豆許良久出涎一升許則安大川芎丸河間治頭風旋暈眩急外合陽氣風寒相搏胃膈痰飲偏正頭疼身體拘倦川芎一斤天麻四兩用鄆州者上為末煉蜜丸每兩作十丸每服一丸細嚼茶酒下食後服神聖散河間治腦風邪氣留飲不散項背怯寒頭痛不可忍者麻黃去節細辛去苗乾蠍生一半炒一半藿香葉各等分上為末每服二錢煮荊芥薄荷酒調下茶調亦得並治血風證乳香盞落散寶鑑治男子婦人偏正頭疼不可忍者御米殼去蒂四兩陳皮甘草炙