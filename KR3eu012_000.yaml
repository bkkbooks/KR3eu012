片放藥在上面鋪著借硇砂氣熏用大碟子一片合碗上勿令透氣撅一地坑放藥碗在坑內用竹箄一片蓋了然後以黃土蓋之七日出淨瓷瓶中收其硇砂不用如患浮翳膜侵瞳人及一切目疾但臨臥將一餅札在眼眥頭即睡至曉用水一碗向東覷水碗其藥自落在水中淨浴卻用絹帛子裹起安潔淨處臨臥依前再使每餅可用半月候藥力慢時方易一餅如兩目有疾即用兩餅通光散治攀睛翳膜昏澀風毒腫痛洗眼方上用栝蔞一枚割下頂蓋取瓤並子同豬𦚠子搗勻卻裝在栝蔞內用元蓋蓋之坐淨土上取桑條子十兩約長四五寸簇栝蔞上用炭火燒扇之煙盡將成灰即住火扇冷和灰通研極細每用二錢沸湯浸澄清去腳洗之指甲散治眼翳及諸物入眼上以左手中指甲洗淨候乾以刀刮其屑用燈草蘸點眼中翳處一二次即去或用懷孕婦人爪甲屑置目中去翳珊瑚散治眼赤痛生翳障遠視不明癢澀珊瑚七錢半硃砂五錢龍腦半錢上各研細令勻每以銅箸取一米許日三四度點之神效青金丸治風毒攻眼成外障翳膜銅青真者蕤仁去皮尖與銅青同浸二宿去水研石決明淨水磨瀝乾生犀角淨水磨紙上飛過各一錢龍腦研白丁香水研飛去滓海螵蛸水飛過各半錢上將銅青與蕤仁先研如糊次入白丁香研次入四味研極細用好墨研濃汁於淨器中和熟為丸如緑豆大每用人乳汁化開點眼未用者常以龍腦養於瓷器中豬膽方上以豬膽一枚用銀銚或瓦銚煎成膏入水腦如黍米大點入眼中微覺翳輕又將豬膽白膜皮陰乾合作小繩如叉股大小止用一頭燒灰待冷點翳數日後翳退雙目如舊此治翳如重者尤良不過三五度瘥療翳五十年不瘥貝齒一枚燒豆豉三十粒三年苦酒三升一作三年醋上先漬貝齒三宿消盡後納豆豉微火煎如膠取三合藥置筒中夜臥時著如小麥大於眥頭明日以湯洗之治赤眼後生翳膜上以蘭香子洗淨曬乾每用一粒以箸頭點大眥頭閉目即覺藥在目內團圓旋轉藥力過即不轉須臾自隨眵淚出惹翳膜在上如魚眼再入一粒以病退為度一方為細末每取如米大點眼眥頭昔盧州知録彭大辨父在臨安暴得此疾一僧以此藥治之坐間瞭然因得此方屢以治人枸杞煎治眼中翳少輕者兼治眼澀痛上取枸杞及車前子葉等分手中熟挼使汁欲出又別取桑葉兩三重裹之懸於陰地經宿乃摘破桑葉取汁點目中不過三五度瘥雀乳散治眼熱毒卒生翳及赤白膜上以雄雀糞細研用人乳汁和點之真珠膏治眼虛熱目赤痛卒生翳膜昏暗真珠一兩研麝香硃砂胡粉各二錢半貝齒五枚燒灰鯉魚膽二枚白蜜四兩煎濾過上除魚膽蜜外都研如粉以魚膽汁蜜於銅器中調令勻慢火煎成膏每以銅箸取少許點之日三四雞子殼散治眼卒生翳膜雞子殼抱出子者去膜取白殼研二錢半貝齒三枚煅灰上研極細入瓷盒中盛取少許日三五度點之羌活退翳膏一名復明膏治足太陰寒水膜子遮左右睛白翳在上視物不明羌活根七分椒樹西北根二分東南根二分當歸梢六分黃連二錢防風根柴胡根麻黃去節根升麻根生地黃各三分甘草梢四分蕤仁六個漢防己藁本各二分上用淨新汲水一大碗先將漢防己黃連甘草梢生地黃煎至一半下余藥外藥再煎至一盞去滓入銀石器中再煎如膏點之有效為度蠍附散搐鼻退翳膜全蠍附子尖薑黃青黛各二錢半薄荷一兩鵝不食草半兩上為細末口含水搐少許玉餅子治翳膜海螵蛸蛤粉南康真者各五分片腦半分黃蠟五分上為末先熔蠟持起攪微冷入末為丸如青葙子大帶扁些每用一餅臨臥納入眼中翳膜上經宿以水照之其餅自出照水丸治翳神驗海螵蛸一錢硃砂五分片腦半分黃蠟八分上末先熔蠟攪微冷入末和為丸如麻子大帶匾些臨臥納眼中翳膜上次日照水自落內障人參補胃湯試效友治勞役所傷飲食不節內障昏暗黃耆人參各一兩炙甘草八錢蔓荊子二錢半黃柏酒拌四遍白芍藥各三錢上㕮咀每服三五錢冰二盞煎至一盞去滓食遠稍熱服臨臥三五服後兩目廣大視物如童時覺兩腳踏地不知高下蓋冬天多服升陽藥故也病減住服候五七日再服此藥春間服乃時藥也圓明內障升麻湯即沖和養胃湯黃芩黃連湯黃芩酒洗炒生地黃酒洗草龍膽酒洗炒四次以上各一兩黃連去須酒洗炒七錢上㕮咀每服二錢水二盞煎數沸去滓再煎至一盞熱服午後晚間俱不可服唯午飯時服之方效復明散治內障黃耆一錢半生地黃柴胡連翹甘草炙各一錢當歸二錢蒼朮川芎陳皮各五分黃柏三分水二大盞煎至一盞去渣稍熱服食後忌酒濕面辛熱大料之物羌活退翳丸一名地黃丸治內障右眼小眥青白翳大眥微顯白翳腦痛瞳子散大上熱惡熱大便澀或時難小便如常遇天熱暖處頭痛睛脹能食日沒後天陰則昏暗此證亦可服滋陰地黃丸熟地黃八錢生地黃酒製黃柏酒製當歸身酒製茺蔚子丹參各半兩黑附子炮寒水石生用各一錢芍藥一兩三錢防己酒製二錢知母酒製牡丹皮羌活川芎各三錢柴胡半兩或三錢上為細末煉蜜丸如小豆大每服五七十丸空心白湯送下如消食未盡候飢時服之忌語言隨後以食壓之東垣蘭室祕藏方云翳在大眥加葛根升麻翳在小眥加柴胡羌活是也當歸湯見瞳子散大沖和養胃湯治內障初起視覺微昏空中有黑花神水變淡緑色次則視物成二神水變淡白色久則不睹神水變純白色柴胡七錢人參當歸酒浸炙甘草白朮升麻葛根各一兩黃耆羌活各一兩半白芍藥六錢防風五錢白茯苓三錢五味子二錢乾生薑一錢上㕮咀每服六錢水三盞煎至二盞入黃芩黃連各一錢再煎至一盞去滓稍熱食後服上方因肝木不平內挾心火故以柴胡平肝人參開心黃連瀉心火為君酒製當歸榮百脈五味斂百脈之沸心包絡主血白芍藥順血脈散惡血為臣白茯苓瀉膀胱之濕羌活清利小腸之邪甘草補三焦防風升膽之降為佐陰陽皆總於脾胃黃耆補脾胃白朮健脾胃升麻葛根行脾胃之經黃芩退壯火乾生薑入壯火為導為使此方逆攻從順反異正宜俱備益氣聰明湯治證同上並治耳聾耳鳴黃耆人參各一錢二分半升麻七錢半葛根三錢蔓荊子一錢半芍藥黃柏酒炒各一錢炙甘草半錢每服四錢水二盞煎至一盞去渣臨睡熱服五更再煎服上方以黃耆人參之甘溫治虛勞為君甘草之甘平承接和協升麻之苦平微寒行手陽明足陽明足太陰之經為臣葛根之甘平蔓荊子之辛溫皆能升發為佐芍藥之酸微寒補中焦順血脈黃柏之苦寒治腎水膀胱之不足為使酒製又炒者因熱用也或有熱可漸加黃柏春夏加之盛暑倍加之加多則不效脾胃虛者去之熱倍此者瀉熱黃連湯主之瀉熱黃連湯治內障證同上有眵淚眊臊黃芩酒炒黃連酒洗柴胡酒炒生地黃酒洗各一兩龍膽草三錢升麻五錢每服三錢水二盞煎至一盞去滓午食前熱服午後服之則陽逆不行臨睡休服為反助陰也上方治主治客之劑也治主者升麻主脾胃柴胡行肝經為君生地黃涼血為臣為陽明太陰厥陰多血故也治客者黃連黃芩皆療濕熱為佐龍膽草專除眼中諸疾為使為諸濕熱俱從外來為客也干金磁朱丸治神水寬大漸散昏如霧露中行漸睹空中有黑花漸睹物成二體久則光不收及內障神水淡緑色淡白色者磁石吸針者辰砂神麯先以磁石置巨火中煅醋淬七次曬乾另研極細二兩辰砂另研極細一兩生神麯末三兩與前藥和勻更以神麯末一兩水和作餅煮浮為度搜入前藥煉蜜為丸如梧桐子大每服十丸加至三十丸空心飯湯下上方以磁石辛鹹寒鎮墜腎經為君令神水不外移也辰砂微甘寒鎮墜心經為臣肝其母此子能令母實也肝實則目明神麯辛溫甘化脾胃中宿食為佐生用者發其生氣熟用者斂其暴氣也服藥後俯視不見仰視漸睹星月者此其效也亦治心火乘金水衰反制之病久病纍發者服之則永不更作空心服此午前更以石斛夜光丸主之按此方磁石法水入腎硃砂法火入心而神麯專入脾胃乃道家黃婆媒合嬰奼之理倪生釋之為費詞矣或加沉香半兩升降水火尤佳石斛夜光丸治證同上天門冬焙人參茯苓各二兩麥門冬熟地黃生地黃各一兩菟絲子酒浸甘菊花草決明杏仁去皮尖乾山藥枸杞子牛膝酒浸各七錢半五味子蒺藜石斛蓯蓉川芎炙甘草枳殼麩炒青葙子防風黃連烏犀角鎊羚羊角鎊各半兩為細末煉蜜丸如桐子大每服三五十丸溫酒鹽湯任下上方羡補藥也補上治下利以緩利以久不利以速也故君以天門冬人參菟絲子之通腎安神強陰填精也臣以五味子麥門冬杏仁茯苓枸杞子牛膝生熟地黃之斂氣除濕涼血補血也佐以甘菊花蒺藜石斛肉蓯蓉川芎甘草枳殼山藥青葙子之治風療虛益氣祛毒也使以防風黃連草決明羚羊角生烏犀之散滯泄熱解結明目也陰弱不能配陽之病並宜服之此後則順之治法也益陰腎氣丸治證上同熟地黃酒三兩生地黃酒製炒四兩當歸尾酒製牡丹皮五味子乾山藥山茱萸柴胡各半兩茯苓澤瀉各二錢半為末煉蜜丸如桐子大水飛辰砂為衣每服五七十丸空心淡鹽湯下上方壯水之主以鎮陽光氣為怒傷散而不聚也氣病血亦病也肝得血而後能視又目為心之竅心主血故以熟地黃補血衰當歸尾行血牡丹皮治積血為君茯苓和中益真氣澤瀉除濕瀉邪氣生地黃補腎水真陰為臣五味子補五臟乾山藥平氣和胃為佐山茱萸強陰益精通九竅柴胡引入厥陰經為使蜜劑者欲泥膈難下也辰砂為衣者為通於心也然必兼千金磁朱丸服之庶易效滋陰地黃丸治證同上眵多眊矂者並治黃芩當歸身酒製熟地黃各半兩天門冬焙甘草炙枳殼柴胡五味子各三錢人參地骨皮各二錢黃連一兩生地黃酒製一兩半為細末煉蜜丸桐子大每服百丸食後茶湯下日三服上方治主以緩緩則治其本也以黃連黃芩苦寒除邪氣之盛為君當歸身辛溫生熟地黃苦甘寒養血涼血為臣五味子酸寒體輕浮上收神水之散大人參甘草地骨皮天門冬枳殼苦甘寒瀉熱補氣為佐柴胡引用為使也亡血過多之病有熱者亦宜服羚羊角湯治青風內障勞倦加昏重頭旋腦痛眼內痛澀者羚羊角人參玄參地骨皮羌活各一兩車前子一兩半上為末以水一盞散一錢煎至五分食後去滓溫服婁全善云此方並後羚羊角散補肝散羚羊角引子皆以羚羊角玄參細辛羌活防風車前子為君蓋羚羊角行厥陰經藥也丹溪云羚羊角入厥陰經甚捷是也玄參細辛行少陰經藥也海藏云玄參治空中氤氳之氣無根之火為聖藥也羌活防風車前子行太陽經藥也如筋脈枯澀者諸方中更加夏枯草能散結氣有補養厥陰血脈之功嘗試之有驗然此諸方又當悟邪之所在若氣脫者必與參膏相半服之氣虛者必與東垣補胃人參湯益氣聰明湯之類相半服之血虛者必與熟地黃丸之類相兼服之更能內觀靜守不幹塵纍使陰氣平伏方許作效杏仁方治肝腎風虛瞳人帶青眼多黑暗潤澤臟腑洗垢開光能驅風明目上用杏仁五枚去皮尖五更初就床端坐勿言勿呼息慮澄神嚼杏仁一粒勿咽逐一細嚼五粒候津液滿口分為三咽直入肝腎惟在久而成功羚羊角散治緑風內障頭旋目痛眼內痛澀者羚羊角防風知母人參茯苓玄參黃芩桔梗車前子各一兩細辛三兩上為末以水一盞散一錢煎五分食後去渣溫服又羚羊角散治緑風內障白菊花川烏炮川芎車前子防風各五錢羌活半夏羚羊角薄荷各二錢半細辛二錢上生薑煎服或為末荊芥湯調服白附子散補腎磁石丸俱見目昏花還睛散治眼翳膜昏澀淚出瘀血胬肉攀睛川芎草龍膽草決明石決明荊芥枳實野菊花野麻子白茯苓去皮炙甘草木賊白蒺藜川椒炒去子仙靈脾茵陳各半兩上為細末每服二錢食後茶清調下日三服忌雜魚肉及熱面蕎麥等物一方有楮實子無仙靈脾茵陳枳實三味蘆薈丸治黑水凝翳內障不痛不癢微有頭旋脈澀者蘆薈甘草各二錢半人參牛膽各半兩柏子仁細辛各一兩羚羊角二兩蜜炙上為末煉蜜丸如桐子大空心茶清下十丸大黃瀉肝散治烏風郁李仁荊芥各二錢半甘草大黃各五錢上水煎食後服墜翳丸治偃月內障及微有頭旋額痛青羊膽青魚膽鯉魚膽各七個熊膽二錢半牛膽半兩石決明一兩麝香少許上為細末麵糊為丸如桐子大每服十丸空心茶清下磁石丸治雷風內障頭旋噁心嘔吐磁石燒赤醋淬二次五味子牡丹皮乾薑玄參各一兩附子炮半兩上為末煉蜜丸如桐子大食前茶下十丸補肝散治肝風內障不痛不癢眼見花發黃白黑赤或一物二形難辨羚羊角防風各三兩人參茯苓各二兩細辛玄參車前子黃芩炒羌活各一兩上為末食後米飲調服一錢又補肝散治圓翳內障熟地黃白茯苓白菊花細辛白芍藥柏子仁甘草防風北柴胡上水煎食後服補腎丸治圓翳內障巴戟山藥破故紙炒牡丹皮茴香各五錢肉蓯蓉枸杞子各一兩青鹽二錢半上為末煉蜜為丸如梧桐子大每服三十丸空心鹽湯下羚羊角飲子龍木治圓翳內障不痛不癢羚羊角三兩細辛知母車前子人參黃芩各二兩防風二兩半上為末每服一錢以水一盞煎至五分食後去滓溫服皂角丸見外障生熟地黃丸和劑治肝虛目暗膜入水輪眼見黑花如豆纍纍數十或見如飛蟲諸治不瘥或視物不明混睛冷淚翳膜遮障內外障眼並皆治之石斛枳殼防風牛膝各六兩生地黃熟地黃各一斤半羌活杏仁各四兩菊花一斤上末煉蜜丸如桐子大每服三十丸以黑豆三升炒令煙盡為度淬好酒六升每用半盞食前送下或蒺藜湯下通肝散治冰翳內障梔子蒺藜炒枳殼荊芥各四兩車前子牛蒡子炒各二錢甘草四錢上末每服二錢苦竹葉湯食後調下八味還睛散治散翳內障蒺藜炒防風甘草炙木賊梔子各四兩草決明八錢青葙子炒蟬蛻各二錢上末每服二錢麥門冬湯調食後服空青丸治沉翳細看方見其病最深空青一錢一方用一銖細辛五味子石決明另研車前子各一兩知母生地黃防風各二兩上為細末煉蜜丸如桐子大每服十丸空心茶湯下涼膽丸治眼狀青色大小眥頭澀痛頻頻下淚口苦少飲食兼治黑花翳黃連洗不見火黃芩荊芥龍膽草各半兩蘆薈防風各一兩黃柏去皮地膚子各二錢半上為細末煉蜜和丸如梧子大每服二十丸食後薄荷湯送下還睛丸川芎白蒺藜木賊白朮羌活菟絲子熟地黃甘草各等分上為細末煉蜜丸如彈子大空心熟湯嚼下又方川烏地黃白朮茯苓石決明杏仁川芎菟絲子各三兩當歸防風荊芥蔓荊子各半兩上為末豬膽汁和丸如梧子大每服三十丸麥門冬湯下除風湯治五風變成內障頭旋偏腫痛瞳人結白者羚羊角車前子芍藥人參茯苓大黃黃芩芒硝各一兩上為末水一盞散一錢煎至五分食後去滓溫服本事方治內障白羯羊肝只用子肝一片薄切新瓦上焙熟地黃一兩半菟絲子蕤仁車前子麥門冬地膚子去殼澤瀉防風黃芩白茯苓五味子杏仁炒桂心炒細辛枸杞子茺蔚子苦葶藶青葙子各一兩上為細末煉蜜丸如桐子大每服三四十丸溫湯下日三服不拘時候張臺卿嘗苦目暗京師醫者令灸肝俞遂轉不見物因得此方眼目遂明一男子內障醫治無效因以余劑遺之一夕燈下語其家曰適偶有所見如隔門縫見火者及旦視之眼中翳膜俱裂如線張云此藥靈勿妄與人忽之則無驗豫益信之且欲廣其傳也羅漢應夢丸治內障及因病赤眼食鹹物而得者夜明砂淨當歸蟬蛻洗木賊去節各等分上為末用羯羊子肝四兩水煮爛搗如泥入前藥末搗和丸如桐子大每服五十丸食後熟水下百日眼如故昔日徐道亨奉母至孝患眼食蟹遂內障暗誦般若經與市得錢米既侍母忽一夕夢羅漢授此方服眼得復明神仙碧霞丹治內障當歸沒藥各二錢血竭白丁香硼砂片腦麝香各一錢馬牙硝乳香各半錢黃連三錢銅緑一兩半為衣上為細末熬黃連膏和丸如雞頭實大每用新汲水半盞於瓷盒內浸常用每一丸可洗四五日大病不過一月小病半月冷淚三日見效內外障通治遠志丸清心明目益肝退翳遠志水浸去心曬乾薑汁蘸焙車前子白蒺藜炒去刺細辛各七錢半全蠍五枚蟬殼一兩洗焙熟地黃洗焙茯神去木川芎人參茺蔚子蘆薈研琥珀生地黃蔓荊子各半兩上為細末煉蜜為丸如梧子大每服五十丸空心用米飲臨睡用菖蒲湯下局方明目地黃丸治男女肝腎俱虛風邪所乘熱氣上攻目翳遮睛目澀多淚牛膝酒浸三兩石斛枳殼炒杏仁去皮炒防風各四兩生熟地黃各一斤上為末煉蜜丸如梧子大每服三十丸食前鹽湯下固本還睛丸治遠年一切目疾內外翳膜遮睛風弦爛眼及老弱人目眵多糊迎風冷淚視物昏花等證天門冬麥門冬生地黃熟地黃各三兩白茯苓枸杞子人參山藥各一兩五錢川牛膝石斛草決明杏仁菟絲子酒煮焙白菊花枳殼各一兩羚羊角屑烏犀角屑青葙子防風各八錢五味子甘草炙蒺藜川芎黃連各七錢上為末煉蜜丸梧子大每服五十丸鹽湯下還睛丸治眼目昏翳蟬蛻蒼朮熟地黃川芎蒺藜炒各一兩羌活防風茺蔚子木賊白菊花荊芥蔓荊子杏仁菟絲子酒煮焙石決明煆蛇皮酒浸洗淨焙各五錢上為末煉蜜丸如彈子大每服一丸細嚼薄茶下仙術散治眼中翳膜蛇皮用皂角水洗木賊蟬蛻蒺藜炒穀精草防風羌活川芎杏仁甘草各二錢五分蒼朮一兩二錢半上細末每服一錢食後蜜湯下夢靈丸治內外障眼防風蜜炙威