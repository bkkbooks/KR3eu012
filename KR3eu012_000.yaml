入於別器內更澄以新綿濾過極清者置重湯內令熱開眼淋洗逐日一次但是諸眼疾皆效立應散治內外障翳昏澀多淚及暴赤眼一切目疾並皆治之三次嗅鼻香白芷洗當歸去蘆洗雄黃另研後入鵝不食草淨洗川附子炮各等分躑躅花減半上為細末入麝香少許和勻含水嗅鼻內去盡濁涕眼淚為度治內外障眼嗅藥麻黃根一兩當歸身一錢上同為粗末炒黑色入麝香乳香少許乃為細末口含水鼻內嗅之蟾光膏治遠年病目不通道路退去云膜須用十二月開成日合白砂蜜四兩用隔年蔥根去須皮切短與蜜同熬去白膜候蔥熟為度以綿濾淨紙取蠟面黃丹密陀僧各水飛三錢生用爐甘石火煅五錢水飛以上三味研極細入前蜜中桃柳無節者各一枝攪勻當歸赤芍藥各半兩黃連去蘆各二兩杏仁湯泡去皮尖川芎各五錢秦皮訶子皮防風石膏玄精石井泉石無名異玄參代赭石石決明各三錢以上十五味㕮咀用雪水或長流水五升於銀器內熬至二升濾去滓淨再熬至一升傾入前藥蜜內銀器內慢火熬紫金色時再下後藥勿令過火乳香沒藥琥珀硃砂蕤仁各三錢以上五味先乾研極細入蕤仁研細水飛澄清極細方傾入前藥一同復熬以箸點藥於水中不散為度勿令過與不及取下於土中埋七日取出置於銀器或瓷器中如法收貯便再添入後細藥以桃柳枝攪勻南硼砂珍珠龍腦珊瑚枝各一枝麝香半錢上五味研極細入藥中封定如有取不盡藥用淨水斟酌洗渲熬過另於洗眼或膏子稠了傾些小調解碧霞膏治內外障並效爐甘石黃丹各四兩銅緑二兩黃連一兩當歸尾二錢乳香沒藥硃砂硼砂血竭海螵蛸青鹽白丁香輕粉各一錢麝香五分上為細末黃連膏為丸如皂角子大每用一丸新汲水半盞於瓷盒內浸洗每一丸可洗四五次大病不過一月小病半月冷淚三日見效日精月華光明膏能開一切內障善治翳膜遮睛及攀睛胬肉不日掃除無問年久日深或一目兩目俱患但能見人影者悉皆治之如雲開見日黃連四兩研末當歸一兩訶子一對去核研石決明二兩研細石膏一兩半研用蠟入水或雪水浸三日大鵝梨二十枚捶碎用布扭去滓豬胰二具草挾扭去筋膜爐甘石四兩火燒童子小便淬燒五次黃丹四兩炒研細馬牙硝飛二錢半銅緑研真膽礬研硼砂另研各一錢半沒藥四錢另研乳香三錢另研防風一錢天花粉半錢輕粉一錢另研麝香半錢另研片腦半錢另研上先將黃連等五味浸三日卻用大砂鍋一口納藥水再添滿七分熬重綿濾過至四五碗卻入鵝梨豬胰再熬至三碗再濾過再下鍋入爐甘石黃丹再熬至二碗又濾過卻下馬牙硝等八味以槐柳枝不住手攪勻候成膏仍濾淨入瓶內卻入腦麝粉三味攪勻以油紙密封勿令水入放冷水內浸三日取出每用以銅箸點眼良瞳神散大熟地黃丸治血弱陰虛不能養心致火旺於陰分瞳子散大少陰為火君主無為不行其令相火代之與心包絡之脈出心系分為三道少陽相火之體無形其用在其中矣火盛則能令母實乙木肝旺是也其心之脈挾目系肝之脈連目系況手足少陽之脈同出耳中至耳上角斜起終於目外小眥風熱之盛亦從此道來上攻頭目致偏頭腫悶瞳子散大視物昏花血虛陰弱故也法當養血涼血益血收火散火而除風熱則愈矣熟地黃一兩柴胡去苗八錢生地黃七錢半酒浸焙當歸身酒洗黃芩各半兩天門冬去心焙五味子地骨皮黃連各三錢人參去蘆枳殼炒甘草炙各二錢上為細末煉蜜丸如緑豆大每服一百丸茶湯送下食後日二服制之緩也大忌辛辣物助火邪及食寒冷物損其胃氣藥不上行也又一論云瞳子黑眼法於陰由食辛熱之物助火乘於胸中其睛故散睛散則視物亦大也保命集當歸湯治翳補益瞳子散大黃連柴胡各一錢當歸身黃芩芍藥各二錢熟地黃甘草炙各三錢上水煎臨臥服濟陰地黃丸治足三陰虧損虛火上炎致目睛散大視物不的或昏花澀緊作痛畏明或卒見非常之處等證其功效與六味還少丹相似五味子麥門冬當歸熟地黃肉蓯蓉山茱萸乾山藥枸杞子甘菊花巴戟肉各等分上為末煉蜜丸桐子大每服七八十丸空心白湯下瞳神緊小抑陽酒連散治神水緊小漸如菜子許及神水外圍相類蟲蝕者然皆能睹物不昏微有眊矂羞澀之證生地黃獨活黃柏防風知母防己各三分蔓荊子前胡羌活白芷生甘草各四分黃芩酒製梔子寒水石黃連酒製各五分水二盞煎至一盞去滓大熱服上方抑陽緩陰之藥也以生地黃補腎水真陰為君獨活黃柏知母俱益腎水為臣蔓荊子羌活防風白芷群隊升陽之藥為佐者謂既抑之令其分而更不相犯也生甘草黃芩梔子寒水石防己黃連寒而不走之藥為使者惟欲抑之不欲祛除也酒製者為引導也還陰救苦湯嗅鼻碧雲散俱目赤目昏花羊肝丸鎮肝明目羯羊肝一具新瓦盆中爆了更焙之肝大止用一半甘菊花羌活柏子仁細辛官桂白朮五味子各半兩黃連七錢半上為細末煉蜜丸如梧子大空心食前溫湯下三四十丸千金補肝散治自失明青羊肝一具去膜薄切以瓦瓶子未用者入肝於中炭火炙之為極細末決明子半升蓼子一合熬令香上為末食後服方寸匕日二加至三匕不過一二劑能一歲服可夜讀細書養肝丸濟生治肝血不足眼目昏花或生眵淚當歸酒洗車前子酒蒸焙防風去蘆白芍藥蕤仁另研熟地黃酒蒸焙川芎枳實各等分上為末煉蜜為丸如桐子大每服七十丸熟水送下不拘時一方無川芎枳實地黃丸一名菊花丸治用力勞心肝虛風熱攻眼赤腫羞明漸生翳膜兼肝腎風毒熱氣上衝目痛久視傷血血主肝故勤書則傷肝而目昏肝傷則木生風而熱氣上湊目昏亦盛不宜專服補藥當益血鎮肝而目自明矣熟地黃一兩半甘菊花防風光明硃砂羌活桂心沒藥各半兩決明子黃連各一兩上為細末煉蜜丸如梧子大每服三十丸食後熟水下日三晉範寧嘗苦目痛就張湛求方湛戲之曰古方宋陽子少得其術以授魯東門伯次授左丘明遂世世相傳以及漢杜子夏晉左太衝凡此諸賢並有目疾得此方云省讀書一減思慮二專內視三簡外觀四旦起晚五夜早眠六凡六物熬以神火下以氣篩蘊於胸中七月然後納諸方寸修之一時近能數其目睫遠視尺箠之餘長服不已非但明目且亦延年審如是而行非可謂之嘲戲亦奇方也補肝湯治肝虛兩脅滿痛筋脈拘急不得喘息眼目昏暗面多青色防風去杈細辛去苗柏子仁白茯苓去皮官桂去粗皮山茱萸蔓荊子去浮皮桃仁湯浸去皮尖雙仁炒甘草微炒各等分上㕮咀每服五錢水一盞半大棗二枚擘破同煎至八分溫服無時日再雷岩丸治男婦肝經不足風邪內乘上攻眼睛淚出羞明怕日多見黑花翳膜遮睛瞼生風粟或癢或痛隱澀難開兼久患偏正頭風牽引兩目漸覺細小視物不明皆因腎水不能既濟肝木此藥久服大補腎臟添目力枸杞子菊花各二兩肉蓯蓉巴戟酒浸一宿去皮心牛膝各一兩川椒三兩去目黑附子青鹽二錢以泔水三升同煮水盡去皮臍上為細末浸藥酒煮麵糊和丸梧子大每服十丸空心酒下補肝丸治眼昏暗將成內障茺蔚子青葙子枸杞子五味子決明子杏仁茯苓去皮各一兩乾地黃三兩菟絲子二兩山藥車前子地骨皮焙柏子仁大黃黃芩去黑心黃連去須人參細辛防風去杈甘草炙各一兩半上為細末煉蜜丸如梧子大每服二十丸加至三十丸食後米飲下石決明丸治證同上石決明槐子肉蓯蓉酒浸一宿去鱗甲炙乾菟絲子酒浸三日曝乾另研為末陽起石酒煮七日細研水飛過熟地黃各一兩桂心半兩磁石一兩半火煅醋淬七次細研水飛過上為細末煉蜜和搗二三百杵丸如梧子大每服二十丸旋加至三十丸食前鹽湯下益本滋腎丸黃柏去粗皮知母去毛各銼碎酒洗炒各等分上為極細末滴水丸如桐子大每服一百五十丸空心熱湯下服後以乾物壓之補腎丸治腎氣不足眼目昏暗瞳人不明漸成內障磁石煅醋淬七次水飛過菟絲子酒蒸二次各二兩五味子枸杞子石斛去根熟地黃酒蒸焙覆盆子酒浸楮實子蓯蓉酒浸焙車前子酒蒸各一兩沉香青鹽二味另研各半兩上為末煉蜜丸如桐子大每服七十丸空心鹽湯下六味地黃丸八味地黃丸並見虛勞千金滋朱丸石斛夜光丸益陰腎氣丸滋陰地黃丸並見內障羚羊羌活湯治肝腎俱虛眼見黑花或作蠅翅羚羊角屑羌活黃芩去黑心附子去皮臍人參澤瀉秦艽去苗山茱萸車前子青葙子決明子微炒柴胡去苗各一兩半黃耆二兩甘草微炙一兩每服五錢水一盞半煎至八分去滓不拘時溫服日再菊睛丸治肝腎不足眼昏常見黑花多淚枸杞子三兩蓯蓉酒浸炒巴戟去心各一兩甘菊花四兩上為末煉蜜為丸如梧子大每服五十丸溫酒鹽湯食遠任下余太宰方加熟地黃二兩石決明丸治肝虛血弱日久昏暗知母焙山藥熟地黃焙細辛去苗各一兩半石決明五味子菟絲子酒浸一宿另搗為末各一兩上為細末煉蜜丸如桐子大每服五十丸空心米飲送下駐景丸治肝腎虛眼昏翳熟地黃車前子各三兩菟絲子酒煮五兩為末煉蜜丸桐子大每服五十丸食前白茯苓石菖蒲湯任下又方加枸杞子一兩半尤佳加減駐景丸治肝腎氣虛視物䀮䀮血少氣多車前子略炒五味子枸杞子各二兩當歸去尾熟地黃各五兩楮實無翳者不用川椒炒各一兩菟絲子酒煮焙半斤上為細末蜜水煮糊丸如桐子大每服三十丸空心溫酒送下鹽湯亦可白附子散治發散初起黑花昏蒙內障荊芥白菊花防風木賊白附子粉草蒼朮人參羌活蒺藜上水煎食後服補腎磁石丸治腎肝氣虛上攻眼目昏暗遠視不明時見黑花漸成內障磁石火煅紅醋淬甘菊花石決明肉蓯蓉酒浸切焙菟絲子酒浸一宿慢火焙乾各一兩上為細末用雄雀十五隻去毛嘴足留肚腸以青鹽二兩水三升同煮令雄雀爛水欲盡為度取出先搗如膏和藥末為丸如梧子大每服二十丸空心溫酒送下千金神麯丸即磁朱丸見前三仁五子丸治肝腎不足體弱眼昏內障生花不計近遠柏子仁薏苡仁酸棗仁菟絲子酒製五味子枸杞子酒蒸覆盆子酒浸車前子酒浸肉蓯蓉熟地黃白茯苓當歸沉香各等分上為細末煉蜜丸如桐子大每服五十丸空心用鹽酒送下羚羊角散治肝臟實熱眼目昏暗時多熱淚羚羊角鎊羌活去蘆玄參車前子黃芩去黑心山梔仁栝蔞各半兩胡黃連菊花各七錢半細辛去苗二錢半上為細末食後竹葉煎湯調服二錢蕤仁丸治眼見黑花飛蠅澀痛昏暗漸變青盲蕤仁去皮地膚子細辛去苗人參地骨皮去土石決明洗淨別搗羅白茯苓去皮白朮各二兩熟地黃焙楮實各三兩空青另研防風去杈各一兩半石膽研如粉半兩鯉魚膽五枚青羊膽一枚上為細末研勻以膽汁同煉蜜搜和丸如桐子大每服二十丸食後米飲送下熟地黃丸見瞳神散大摩頂膏治肝腎虛風上攻眼生黑花或如水浪空青研青鹽研各半兩槐子木香附子各一兩牛酥二兩鵝脂四兩旱蓮草自然汁一升龍腦半錢丹砂二錢半研上為細末先以旱蓮草汁牛酥鵝脂銀器中熬三五沸下諸藥末煎減一半即止盛瓷器中臨臥用舊鏵鐵一片重二三兩蘸藥於頂上摩二三十遍令人發竅中次服決明丸忌鐵器又方治眼前見花黃黑紅白不定附子炮製去皮臍木香各一兩硃砂二錢半龍腦半錢青鹽一兩半牛酥二兩鵝脂四兩上將前藥為末同酥脂以慢火熬成膏每用少杵不拘時頂上摩之決明丸治眼見黑花不散決明子甘菊花各一兩防風去蘆車前子芎藭細辛梔子仁蔓荊子玄參白茯苓薯蕷各半兩生地黃七錢半上為細末煉蜜和搗二三百杵丸如梧子大每服二十丸食後煎桑枝湯送下日三白龍粉治腎水衰虛肝經邪熱視物不明或生障翳胬肉攀睛或迎風淚出眼見黑花或如蠅飛或如油星或睛澀腫痛或癢不可忍並皆治之上用硝三斗於二九月造一大罐熱水化開以綿濾過入銀器或石器內煎至一半以上就鍋內放溫傾銀盆內於露地放一宿次日結成塊子於別水內洗淨再用小罐熱水化開熬入蘿蔔二個切作片子同煮以蘿蔔熟為度傾在瓷器內撈蘿蔔不用於露地露一宿次日結成塊子去水於日中曬一日去盡水入好紙袋盛放於透風日處挂曬至風化開成用逐旋於乳鉢內日曬研極細點眼如常法亦名玄明粉煮肝散治眼生黑花漸成內障及鬥睛偏視風毒攻眼腫痛澀癢短視倒睫雀目羌活去蘆獨活去蘆青葙子甘菊花各一兩上為細末每服三錢匕羊子肝一葉銼細淡竹葉數片同裹如粽子別用雄黑豆四十九粒米泔一碗銀石器內同煮黑豆爛泔干為度取肝細嚼溫酒下又將豆食盡空心日午夜臥服服椒方治肝腎虛風上攻眼目生黑花頭目不利能通神延年用川椒一斤揀淨去目及合口者於銚內炒令透於地上鋪淨紙二重用新盆合定周回用黃土培之半日去毒出汗然後取之曝乾為度只取椒於瓷盒子內收每日空心新汲水下十粒芎藭散治目暈昏澀視物不明芎藭地骨皮荊芥穗何首烏去黑皮菊花旋覆花草決明石決明刷淨甘草炙各一兩青葙子蟬蛻去土木賊各半兩白芷二錢半上為細末每服一錢匕食後米泔水調下磁石丸治眼因患後起早元氣虛弱目無翳膜視物昏暗欲成內障磁石二兩煅醋淬七次杵碎細研水飛過肉蓯蓉一兩酒浸一宿刮去皺皮炙令乾菟絲子酒浸五日曝乾另研為末三兩補骨脂微炒巴戟去心石斛去根遠志去心熟地黃各一兩木香五味子甘草炙赤桂心各半兩上為細末研勻煉蜜和搗二三百杵丸如梧子大每服三十丸食前溫酒送下一方有茯神無遠志石斛四物五子丸治心腎不足眼目昏暗當歸酒浸川芎熟地黃白芍藥枸杞子覆盆子地膚子菟絲子酒浸炒車前子酒蒸量虛實加減各等分上為細末煉蜜和丸如桐子大每服五十丸不拘時鹽湯送下杞苓丸治男子腎臟虛耗水不上升眼目昏暗遠視不明漸成內障枸杞子四兩酒蒸白茯苓八兩去皮當歸二兩菟絲子四兩酒浸蒸青鹽一兩另研上為細末煉蜜和丸如桐子大每服七十丸食前用白湯送下瑞竹四神丸治腎經虛損眼目昏花補虛益損及雲翳遮睛甘州枸杞子一斤揀色赤滋潤者以酒一杯潤之分作四分一分同川椒一兩炒一分同小茴香一兩炒一分同芝麻一合炒一分獨炒用炒過將川椒等篩去不用再加熟地黃白朮白茯苓各一兩共為細末煉蜜和丸如梧子大每服五七十丸空心溫酒送下或加甘菊花一兩夜光丸一名雙美丸治眼目昏暗及諸疾兼退翳膜蜀椒去目併合口者炒出汗一斤半搗末一斤甘菊花取末一斤上和勻取肥地黃十五斤切搗研絞取汁八九升許將前藥末拌浸令勻曝稍干入盤中攤曝三四日內取干候得所即止勿令太燥入煉蜜二斤同搗數千杵丸如梧桐子大每服三十丸空心日午熟水下久服目能夜視發白再黑通神強志延年益壽一方用熟地黃二兩酒浸九蒸九曝食後細嚼新淅米十粒以湯送下或茶下亦得密蒙花散治冷淚昏暗密蒙花甘菊花杜蒺藜石決明木賊去節白芍藥甘草炙各等分上為細末每服一錢茶清調下服半月後加至二錢流氣飲治風熱上攻視物不明常見黑花見外障還睛補肝丸治肝虛兩目昏暗衝風淚下白朮細辛去苗芎藭決明子微炒人參羌活去蘆當歸切焙白茯苓去皮苦參防風去杈官桂去粗皮地骨皮玄參黃芩去黑心五味子車前子微炒菊花青葙子甘草炙各等分上為細末煉蜜為丸如梧子大每服三十丸加至四十丸不拘時米飲下鎮肝丸治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開多眵灑淚怕日羞明時發腫赤或生翳障遠志去心地膚子茺蔚子白茯苓去皮防風去蘆決明子蔓荊子人參各一兩山藥青葙子柴胡去苗柏子仁炒甘草炙地骨皮玄參車前子甘菊花各半兩細辛去苗上為細末蜜水煮糊丸如桐子大每服三十丸食後用米湯下日三真珠煎治肝虛寒目茫茫不見物真珠二錢半細研鯉魚膽二枚白蜜二兩上合和銅器中微火煎取一半新綿濾過瓷瓶中盛每以銅箸點如黍米著目眥即淚出頻點取瘥又方以黃柏一爪甲許每朝含使津置掌中拭目訖以水洗之至百日眼明此終身行之永除眼疾治暑月或行路目昏澀多眵黏者以生龍腦薄荷五七葉淨洗手揉爛以生絹捩汁滴入眼中妙治眼目昏暗用園桑老皮燒灰水一盞煎至七分去滓澄清洗一周年如童子眼光明並開洗眼日於後正月初八二月初十三月初五四月初八五月初八六月初七七月初七八月初三九月初十十月初九十一月初十十二月二十二又方用朴硝六錢重用水一盞煎至八分候冷定澄清下次分定每月一日洗至一年之間眼如童子光明正月初一二月初八三月初四四月初五五月初五六月初四七月初五八月初一九月十三十月十三十一月十六十二月初五青魚膽方治目暗上用青魚膽汁滴目中又方用鷹眼睛一對炙乾搗末研令極細以人乳汁再研每以銅箸取少許點於瞳人上日夜三度可以夜見物或取臘月雊鵒眼依上法用效三日見碧霄中物忌煙熏金絲膏治一切目疾昏暗如紗羅所遮或疼痛宣黃連半兩銼碎水一盞浸一宿取汁再添水半盞浸滓經半日絞取汁與前汁放一處滓別用水半盞浸蜜一兩白礬一字井鹽一分如無以青鹽代山梔子好者二錢捶碎與黃連滓同煮五七十沸取盡力揉濾去滓與前黃連汁一處入余藥上用銀瓷器內熬十餘沸用生絹上細紙數重再濾過用時常點點鹽法明目去昏翳大利老眼得補益之良上以海鹽隨多少淨揀以百沸湯泡去不淨濾取清汁於銀石器內熬取雪白鹽花用新瓦器盛每早用一大錢作牙藥揩擦以水漱動用左右手指背遞互口內蘸鹽津洗兩眼大小眥內閉目良久卻用水洗面名洞視千里明目堅齒實為妙法東坡手録目赤不可具湯浴並忌用湯泡足湯驅體中熱並集於頭目喪明必矣青盲救睛丸見旋螺尖起雀盲決明夜靈散治目至夜則昏雖有燈月亦不能睹石決明另研夜明砂另研各二錢豬肝一兩生用不食豬者以白羯羊肝代上二藥末和勻以竹刀切肝作兩片以藥鋪於一片肝上以一片合之用麻皮纏定勿令藥得泄出淘米泔水一大碗貯沙罐內不犯鐵器入肝藥於中煮至小半碗臨睡連肝藥汁服之上方以決明鎮腎經益精為君夜明沙升陽主夜明為臣米泔水主脾胃為佐肝與肝合引入肝經為使蛤粉丸治雀目日落不見物蛤粉細研黃蠟等分上熔蠟搜粉為丸如棗大每用豬肝一片二兩許比刀開裹藥一丸麻線纏入罐內水一碗煮熟傾出乘熱熏目至溫吃肝以愈為度瀉肺飲治肝虛雀目恐變成內障防風去杈黃芩去黑心桔梗炒芍藥大黃炒各一兩上銼碎每服三錢匕水一盞半煎至一盞入芒硝半字去滓放溫食後臨臥服豬肝散治雀目蛤粉黃丹夜明砂各等分上末豬肝切開入藥末用線扎米泔水煮熟不拘時嚼服原汁送下夜明丸治雀目青盲夜明砂木賊防風田螺殼青木香細辛各等分上為末爛煮豬肝用末藥於淨沙盆內研令極勻丸如桐子大每服三十丸米飲或酒下轉光丸治肝虛雀目青盲生地黃白茯苓川芎蔓荊子熟地黃防風山藥白菊花細辛各等分上為末煉蜜和丸如梧子大每服二十丸空心桑白皮湯送下炙雀目疳眼法寶鑑小兒雀目夜不見物灸手大拇指甲後一寸內臁橫文頭白肉際灸一炷如小麥大小兒疳眼灸合谷二穴各一壯炷如小麥大在手大指次指兩骨間陷者中按灸法詳見資生等經茲不備録神水將枯瀉膽散治瞳仁幹缺外障玄參黃芩地骨皮麥門冬知母各一兩黃耆茺蔚子各一兩半每服五錢水一盞煎五分去滓食後溫服轆轤轉關天門冬飲子天門冬茺蔚子知母各二兩五味子防風各一兩人參茯苓羌活各一兩半每服五錢水一盞煎五分去滓食後溫服玄參瀉肝散麥門冬二兩大黃黃芩細辛芒硝各一兩玄參桔梗各一兩半上水煎食後服麥門冬湯見目赤雙目睛通牛黃膏治小兒通睛牛黃一錢犀角二錢甘草一分二釐金銀箔各五片上為末煉蜜丸緑豆大每服七丸薄荷湯下倒睫拳毛黃耆防風飲子治眼稜緊急以致倒睫拳毛損睛生翳及上下瞼眥赤爛羞澀難開眵淚稠黏蔓荊子黃芩各半錢炙甘草黃耆防風各一錢葛根一錢半細辛二分一方有人參一錢當歸七分半水二盞煎至一盞去滓大熱服一方只葛根防風蔓荊子細辛甘草余藥不用名神效明目湯上方以蔓荊子細辛為君除手太陽手少陰之邪肝為二經之母子平母安此實則瀉其子也以甘草葛根為臣治足太陰足陽明之弱肺為二經之子母薄子單此虛補其母也黃耆實皮毛防風散滯氣用之以為佐黃芩療濕熱去目中赤腫為之使也無比蔓荊子湯治證同上黃耆人參生甘草各一錢黃連柴胡各七分蔓荊子當歸葛根防風各五分細辛葉三分水二盞煎至一盞去滓稍熱服上方為肺氣虛黃耆人參實之為君心受邪黃連除之肝受邪柴胡除之小腸受邪蔓荊子除之為臣當歸和血葛根解除為佐防風療風散滯生甘草大瀉熱火細辛利九竅用葉者取其升上之意為使也決明益陰丸見目痛菊花決明散見目赤瀉肝散洗刀散五退還光散五退散皂角丸俱見前青黛散治眼倒睫神效棗樹上黃直棘針刺蝟皮炒焦白芷青黛各等分為細末口噙水左眼倒睫左鼻內嗅之右眼倒睫右鼻內嗅之四退散治倒睫拳毛蟬蛻蛇蛻醋煮豬蹄蛻炒蠶蛻荊芥各二錢半川烏蛻穿山甲燒粉草各半兩上為末每服一錢淡鹽湯調下又方加防風石決明草決明各五錢起睫膏木鱉子去殼一錢自然銅五分制上搗爛為條子嗅鼻又以石燕末入片腦少許研水調敷眼弦上起倒睫用石燕為細末先鑷去睫毛次用水調末貼眼弦上常以黃連水洗之睥急緊小神效黃耆湯治兩目緊急縮小羞明畏日或隱澀難開或視物無力睛痛昏花手不得近或目少睛光或目中熱如火服五六次神效黃耆二兩人參去蘆炙甘草白芍藥各一兩陳皮去白半兩蔓荊子二錢每服四五錢水一盞八分煎至一盞去滓臨臥稍熱服如小便淋澀加澤瀉五分如有大熱證加黃柏三錢酒炒四次如麻木不仁雖有熱不用黃柏再加黃耆一兩如眼緊小去芍藥忌酒醋濕面大料物蔥韭蒜及淡滲生冷硬物撥雲湯見外障連翹飲子治目中溜火惡日與火隱澀小角緊久視昏花迎風有淚連翹當歸紅葵花蔓荊子人參甘草生用生地黃各三分柴胡二分黃芩酒製黃耆防風羌活各半錢升麻一錢上銼每服五錢水二盞煎至一盞去滓食後稍熱服雷岩丸見目昏蟬花無比散見通治睥肉黏輪排風散治兩瞼黏睛外障天麻桔梗防風各二兩五味子烏蛇細辛芍藥乾蠍各一兩上為細末每服一錢食後米飲調下龍膽丸治眼兩胞黏睛赤爛成瘡苦參龍膽草牛蒡子各等分上為末煉蜜丸如梧桐子大每服二十丸食後米泔下廣大重明湯見外障風沿爛眼紫金膏見前菊花通聖散治兩瞼潰爛或生風粟白菊花一兩半滑石三兩石膏黃芩甘草桔梗牙硝黃連羌活各一兩防風川芎當歸赤芍藥大黃薄荷連翹麻黃白蒺藜芒硝各半兩荊芥白朮山梔子各二錢半上㕮咀每服三錢水一盞半生薑三片同煎七分食後服洗刀散見前柴胡散治眼眶澀爛因風而作用氣藥燥之柴胡羌活防風赤芍藥桔梗荊芥生地黃甘草上水煎服撥雲散見外障蟬花無比散見通治黃連散治眼爛弦風黃連防風荊芥赤芍藥五倍子蔓荊子覆盆子根即甜勾根上煎沸入鹽少許濾淨又入輕粉末少許和勻洗眼亦效爐甘石散治爛風眼以爐甘石不拘多少先用童便煅淬七次次用黃連濃煎汁煅淬七次再用穀雨前茶芽濃煎煅淬七次又並三汁余者合一處再煅淬三次然後安放地上一宿出火氣細細研入冰片麝香點上神妙煅時須用好紫銷炭極大者鑿一穴以安爐甘石目淚不止當歸飲子當歸大黃柴胡人參黃芩甘草芍藥各一兩滑石半兩上銼細每服三錢至五錢水一盞生薑三片同煎七分去滓溫服河間當歸湯治風邪所傷寒中目淚自出肌瘦汗不止當歸人參各三兩官桂陳皮各一兩乾薑炮白朮白茯苓甘草川芎細辛白芍藥各半兩上為末每服二錢水一盞生薑三片棗二枚同煎至八分去渣熱服不計時並三服枸杞酒治肝虛當風眼淚上用枸杞子最肥者二升搗破納絹袋置罐中以酒一斗浸訖密封勿泄氣候三七日每日取飲之勿醉二妙散養肝氣治目昏視物不明淚下當歸熟地黃各等分上為細末每服二錢匕不拘時無灰酒調下治肝虛或當風眼淚鎮肝明目上用臘月牯牛膽盛黑豆不計多少浸候百日開取食後夜間吞三七粒神效洗肝湯治肝實眼人參黃芩去黑心赤茯苓去黑皮山梔子仁芎藭柴胡去苗地骨皮甘菊花桔梗炒各一兩黃連去須甘草炙各半兩上㕮咀每服三錢水一盞入苦竹葉七片煎至七分去滓食後服瀉肝湯治目熱淚生糞者脾肝受熱故也桑白皮一兩地骨皮二兩甘草五錢炒上㕮咀每服三錢白水煎食後服木賊散治眼出冷淚實則用此木賊蒼朮蒺藜防風羌活川芎甘草上水煎服決明子方治肝經熱止淚明目治風赤眼上以決明子朝朝取一匙挼令淨空心水吞下百日見夜光一方取決明作菜食之羌活散治目風冷淚久不瘥羌活去蘆二兩木香官桂去粗皮胡黃連山藥升麻艾葉焙各一兩牛膝酒浸切焙山茱萸去核白附子炮各七錢半上銼每服三錢水一盞煎至八分去滓食後溫服日三羌活散治風氣攻眼昏澀多淚羌活川芎天麻旋覆花藁本防風蟬蛻洗甘菊花細辛杏仁去皮各一兩炙甘草半兩上為細末每服二錢新水一盞半煎食後服菊花散治目風淚出蒼朮四兩肥者用銀石器入河水同皂莢一寸煮一日去皂莢取術銅刀刮去黑皮曝乾取三兩菊花木賊新者草決明洗曝乾荊芥穗旋覆花甘草炙各一兩蟬蛻洗焙七錢半蛇蛻洗炙二錢半上為細末用不津器盛每服一錢臘茶半錢同點空心臨臥時服蟬蛻餅子治目風冷淚去翳暈蟬蛻洗焙木賊新者甘菊花各一兩荊芥穗芎藭各二兩蒼朮米泔浸焙三兩甘草炙半兩上為細末煉蜜和捏作餅子如錢大每服一餅食後細嚼臘茶送下日三阿膠散治目有冷淚流而不結者肝經受風冷故也阿膠馬兜鈴各一兩半紫菀款冬花各一兩甘草半兩白蒺藜二錢半炒糯米一兩上㕮咀每服二錢水一盞半煎八分溫服不拘時候本事方治頭風冷淚龐安常二方甘菊花決明子各二錢白朮羌活川芎細辛白芷荊芥穗各半兩上為細末每服一錢食後溫湯調下日三又方川芎甘菊細辛白芷白朮各等分上為末蠟丸如黍米大夜臥納二丸目中一時辰換一丸川芎丸本事治風盛隔壅鼻塞清涕熱氣攻眼下淚多眵齒間緊急作頭痛川芎柴胡各一兩半夏曲甘草炙甘菊人參前胡防風各半兩上每服四錢水二盞生薑四片薄荷五葉同煎至七分去渣溫服銀海止淚方蒼朮米泔浸一兩半木賊去節二兩香附子炒去毛上為末煉蜜丸如桐子大食後鹽湯下三丸治冷淚方夏枯草香附子各等分上為細末麥門冬湯調下又方用胞棗一枚去核以花椒二十粒入內用濕紙裹煨熟細嚼白湯下立應散治冷淚橡斗子一個甘草三錢上為細末每服二錢熟水調下楮實散治冷淚楮實子去白膜炒夏枯草甘草各半兩香附子炒夏桑葉各一兩上為細末熟水調服不拘時白殭蠶散治衝風淚出白殭蠶炒粉草細辛旋覆花木賊各五錢荊芥二錢半嫩桑葉一兩上水煎食後溫服真珠散治肝虛目風淚出真珠研丹砂研各三分乾薑研二分貝齒五枚以炭火煆為細末上研極細令勻以熟絹帛羅三遍每仰臥以少許點眼中閣眼少時乳汁煎治風淚澀癢人乳一升黃連去須研取末七錢半蕤仁研爛一兩乾薑炮為末二錢半上除乳外再同研極細以乳漬一宿明旦納銅器中微火煎取三合綿濾去滓每以黍米大點眥中勿當風點止淚散治風眼流淚不止爐甘石一錢海螵蛸三分片腦五釐上研細點眼大眥頭目並口淚自收二藥燥要加腦和則不澀也麝香散治眼冷淚不止香附子川椒目各等分蒼朮麝香各少許上為細末吹鼻中目瘡疣消毒飲治瞼生風粒大黃荊芥牛蒡子甘草上水煎食後溫服防風散結湯治目上下睫隱起肉疣用手法除病後服之防風羌活白芍藥當歸尾茯苓蒼朮獨活前胡黃芩各五分炙甘草防己各六分紅花蘇木各少許上作一服水二盞煎至一盞熱服渣再煎上方以防風羌活升發陽氣為君白芍藥當歸尾紅花蘇木破凝行血為臣茯苓瀉邪氣蒼朮去上濕前胡利五臟獨活除風邪黃芩療熱滋化為佐甘草和諸藥防己行十二經為使病在上睫者加黃連柴胡以其手少陰足厥陰受邪也病在下睫者加藁本蔓荊子以其手太陽受邪也漏睛五花丸治漏睛膿出目停風熱在胞中結聚膿汁和淚相雜常流涎水久而不治至烏珠墜落金沸草四兩巴戟三兩川椒皮枸杞子白菊子各二兩上末煉蜜丸梧桐子大每服二十丸空心鹽酒下白薇丸治漏睛膿出白薇五錢防風蒺藜石榴皮羌活各三錢上末米粉糊丸桐子大每服二十丸白湯下糖煎散見外障治眼膿漏不止黃耆防風大黃黃芩各三兩人參遠志去心地骨皮赤茯苓漏蘆各二兩上每服五錢水煎食後服竹葉瀉經湯治眼目隱澀稍覺眊矂視物微昏內眥開竅如針目痛按之浸浸膿出柴胡梔子羌活升麻炙甘草黃連大黃各五分赤芍藥草決明茯苓車前子澤瀉各四分黃芩六分青竹葉十片作一服水二盞煎至一盞食後稍熱服上方逆攻者也先以行足厥陰肝足太陽膀胱之藥為君柴胡羌活是也二經生意皆總於脾胃以調足太陰足陽明之藥為臣升麻甘草是也肝經多血以通順血脈除肝邪之藥膀胱經多濕以利小便除膀胱濕之藥為佐赤芍藥草決明澤瀉茯苓車前子是也總破其積熱者必攻必開必利必除之藥為使梔子黃芩黃連大黃竹葉是也蜜劑解毒丸治證同上石蜜煉一斤山梔十兩末大黃五兩末杏仁去皮尖二兩另研蜜丸梧子大每服三十丸加至百丸茶湯下上方以杏仁甘潤治燥為君為燥為熱之原也山梔微苦寒治煩為臣為煩為熱所産也石蜜甘平溫安五臟為佐為其解毒除邪也大黃苦寒性走不守瀉諸實熱為使為攻其積不令其重疊不解也東垣龍膽飲子治疳眼流膿生疳翳濕熱為病黃芩炒青蛤粉草龍膽酒拌炒焦羌活各三錢升麻二錢麻黃一錢半蛇蛻穀精草川鬱金炙甘草各半錢上為細末食後茶調服二錢能遠視不能近視地芝丸亦能治脈風成癘生地黃焙天門冬去心各四兩枳殼炒甘菊花去蒂各二兩上為細末煉蜜丸如桐子大每服一百丸茶清送下能近視不能遠視定志丸遠志去苗心菖蒲各二兩人參白茯苓去皮各一兩為細末煉蜜丸以硃砂為衣每服十丸加至二十丸米飲下食後目閉不開助陽活血湯見目痛目為物所傷除風益損湯熟地黃當歸白芍藥川芎各一錢藁本前胡防風各七分作一服水二盞煎一盞去滓大熱服上方以熟地黃補腎水為君黑睛為腎之子此虛則補其母也以當歸補血為目為血所養今傷則血病白芍藥補血又補氣為血病氣亦病也為臣川芎治血虛頭痛藁本通血去頭風為佐前胡防風通療風邪俾不凝留為使兼治亡血過多之病傷於眉骨者病自目系而下以其手少陰有隙也加黃連療之傷於䪼者病自抵過而上傷於耳者病自鋭眥而入以其手太陽有隙也加柴胡療之傷於額交巔耳上角及腦者病自內眥而出以其足太陽有隙也加蒼朮療之傷於耳後耳角耳前者病自客主人斜下傷於頰者病自鋭眥而入以其足少陽有隙也加龍膽草療之傷於額角及巔者病自目系而下以其足厥陰有隙也加五味子療之凡傷甚者從權倍加大黃瀉其敗血眵多淚多羞澀赤腫者加黃芩療之加減地黃丸治目為物傷生地黃酒蒸熟地黃各半斤牛膝當歸各三兩枳殼二兩杏仁去皮羌活防風各一兩一本各等分為細末煉蜜丸如桐子大每服三十丸空心食前溫酒送下淡鹽湯亦可上方以地黃補腎水真陰為君夫腎水不足者相火必盛故生熟地黃退相火也牛膝逐敗血當歸益新血為臣麩炒枳殼和胃氣謂胃為多血生血之所是補其原杏仁潤燥謂血少生燥為佐羌活防風俱升發清利大除風邪為使七情五賊飢飽勞役之病睛痛者與當歸養榮湯兼服傷寒愈後之病及血少血虛血亡之病俱互服也補肝丸補腎丸石決明丸皂角丸生熟地黃丸俱見內外障加味四物湯治打損眼目當歸川芎白芍藥熟地黃防風荊芥各等分上㕮咀為散每服三錢水一盞半煎至一盞再入生地黃汁少許去滓溫服再以生地黃一兩杏仁二十粒去皮尖研細用綿子裹藥敷在眼上令乾再將瘦豬肉薄切黏於眼上再服局方黑神散局方黑神散蒲黃熟地黃肉桂當歸赤芍藥白薑甘草各等分上為末童子小便生地黃汁相和調服內消散治傷損眼羌活獨活蘇木紅內消當歸川芎大黃釣鉤藤白芷紅花桃仁甘草節赤芍藥生地黃栝蔞根紫金皮金鎖匙血竭草上水煎食後服次用生地黃一兩杏仁五十枚搗爛貼眼上復以精豬肉貼之又方羌活獨活紅內消蘇木赤芍藥鉤藤白芷各五錢甘草節三錢地榆瓜萎根各四錢上㕮咀每服三錢白水煎食後服經效散治撞刺生翳大黃當歸芍藥各半兩粉草連翹各二錢半北柴胡一兩犀角一錢上水煎食後服一緑散治打撲傷損眼胞赤腫疼痛芙蓉葉生地黃各等分上搗爛敷眼胞上或為末以雞子清調勻敷治目被物刺損有翳生地黃生薄荷生巨葉生土當歸朴硝上不拘多少研爛貼太陽二穴傷寒愈後之病人參補陽湯治傷寒餘邪不散上走空竅其病隱澀赤脹生翳羞明頭腦骨痛羌活獨活各六分白芍藥生地黃澤瀉各三分人參白朮茯苓黃耆炙甘草當歸熟地黃酒洗焙各四分柴胡防風各五分作一服水二盞煎至一盞去渣熱服上方分利陰陽升降上下之藥也羌活獨活為君者導陽之升也茯苓澤瀉為臣者導陰之降也人參白朮大補脾胃內盛則邪自不容黃耆防風大實皮毛外密則邪自不入為之佐也當歸熟地黃俱生血謂目得血而能視生地黃補腎水謂神水屬腎白芍藥理氣柴胡行經甘草和百藥為之使也羌活勝風湯見外障加減地黃丸見前嗅鼻碧雲散見目赤前胡犀角湯治傷寒兩目昏暗或生浮翳前胡去蘆犀角屑蔓荊子青葙子防風去杈梔子仁麥門冬去心生地黃焙菊花羌活去蘆決明子微炒車前子微炒細辛甘草炙各一兩黃耆一兩半上銼每服五錢水一盞半煎至八分去滓食後溫服茺蔚子丸治時氣後目暗及有翳膜茺蔚子澤瀉各一兩半枸杞子青葙子枳殼去瓤麩炒生地黃焙各一兩石決明麥門冬去心焙細辛去苗葉車前子各二兩黃連去須三兩上為細末煉蜜丸如梧子大每服三十丸食後漿水送下瀉肝散治天行後赤眼外障知母黃芩桔梗各一兩半茺蔚子大黃玄參羌活細辛各一兩上銼每服五錢水一盞半煎至五分去滓食後溫服痘疹餘毒羚羊角散治小兒斑疹後餘毒不解上攻眼目生翳羞明眵淚俱多紅赤腫閉羚羊角鎊黃芩黃耆草決明車前子升麻防風大黃芒硝各等分作一服水一盞煎半盞去滓稍熱服上方以羚羊角主明目為君升麻補足太陰以實內逐其毒也黃耆補手太陰以實外御其邪也為臣防風升清陽車前子瀉濁陰為佐草決明療赤痛淚出黃芩大黃芒硝用以攻其錮熱為使然大黃芒硝乃大苦寒之藥智者當量其虛實以為加減未滿二十一日而目疾作者消毒化斑湯主之消毒化斑湯治小兒斑疹未滿二十一日而目疾作者余治同上羌活升麻防風麻黃各五分黃連當歸酒黃柏連翹各三分藁本酒黃芩生地黃蒼朮泔浸炒川芎柴胡各二分細辛白朮生芩陳皮生甘草蘇木葛根各一分吳茱萸紅花各半分作一服水二盞煎至一盞去滓稍熱服上方功非獨能於目蓋專於斑者而置也今以治斑之劑治目者以其毒尚熾盛又旁害於目也夫斑疹之發初則膀胱壬水克小腸丙火羌活藁本乃治足太陽之藥次則腎經癸水又克心火細辛主少陰之藥故為君終則二火熾盛反制寒水故用黃芩黃連黃柏以療二火酒製者反治也生地黃益寒水故為臣麻黃防風川芎升發陽氣祛諸風邪葛根柴胡解利邪毒升麻散諸鬱結白朮蒼朮除濕和胃生甘草大退諸熱故為佐氣不得上下吳茱萸陳皮通之血不得流行蘇木紅花順之當歸愈惡瘡連翹除客熱故為使此方君臣佐使逆從反正用藥治法具備通造化明藥性者能知也如未見斑疹之前小兒耳尖冷呵欠睡中驚嚏噴眼澀知其必出斑者急以此藥投之甚者則稀稀者立已已後無二出之患決明散治小兒痘疹入眼決明子赤芍藥炙甘草各二錢五分天花粉五錢上為末麝香少許和劑三歲半錢米泔調食後服密蒙散治小兒痘疹並諸毒入眼密蒙花二錢半青葙子決明子車前子各五分上為末羊肝一片切開作三片摻藥合作一片濕紙裹於灰火中煨熟空心食之蛇皮散治小兒痘瘡入眼成翳蛇皮炙黃天花粉各等分上為末三歲一錢摻入羊肝內米泔水煮食之又方蟬蛻為末羊肝湯調下蟬蛻散治小兒痘瘡入眼半年已里者一月取效豬懸蹄甲二兩燒存性為末蟬蛻一兩為末羯羊肝焙乾末二錢半上藥三歲一錢豬肝湯調下食後一日四服一年外難治浮萍散治豌豆瘡入眼疼痛恐傷目上以浮萍草陰乾為末三歲一錢羊肝一片盞內杖子刺碎入沸湯半盞絞汁調下食後三兩服立效瀉青丸見頭痛退翳散治目內翳障或瘡疹後餘毒不散真蛤粉另研穀精草生研為末各一兩上研勻每服二錢用豬肝三指大一片批開摻藥在上卷定再用麻線扎之濃米泔一碗煮肝熟為度取出放冷食後臨睡細嚼卻用元煮米泔送下忌一切毒物如齋素只用白柿同煎前藥令乾去藥食白柿孫盈仲云凡痘瘡不可食雞鴨子必生翳膜錢季華之女年數歲瘡疹後兩眼皆生翳只服此藥各退白膜三重瞳子方瞭然也穀精散治癍瘡翳膜眼穀精草豬蹄蛻炒緑豆皮蟬蛻各等分上為末每服三錢食後米泔調下神功散治證同上蛤粉穀精草各一兩緑豆皮羌活蟬蛻各五錢上為末每服三錢用豬肝一具入藥末線縫煮汁同服通神散治斑瘡入目內生翳障白菊花緑豆皮穀精草各等分上為末每服一錢乾柿一個米泔一盞同煎候水乾吃柿不拘時吃三五七次七日得效遠者不過半月鱔血方治痘瘡入眼生翳膜鱔魚系其尾倒垂之從項下割破些少取生血點之於翳上白鱔魚尤佳若翳已凝即用南硼砂末以燈芯蘸點翳上仍用威靈仙仙靈脾洗曬等分為末每一錢米泔水調服通治目疾諸方蟬花無比散和劑治大人小兒遠年近日一切風眼氣眼攻注眼目昏暗瞼生風粟或痛或癢漸生翳膜遮睛視物不明及久患偏正頭風牽搐兩眼漸漸細小連眶赤爛小兒瘡疹入眼白膜遮睛赤澀隱痛常服驅風退翳明目蛇蛻微炙一兩蟬蛻去頭足翅二兩羌活當歸洗焙石決明用鹽入東流水煮一伏時漉出搗如粉川芎各三兩防風去杈茯苓去皮甘草各四兩炙赤芍藥十三兩蒺藜炒去刺半斤蒼朮浸去皮炒十五兩上為末每服三錢食後米泔調服茶清亦得忌食發風毒等物還睛丸和劑治男婦風毒上攻眼目赤腫怕日羞明多饒眵淚隱澀難開眶癢赤痛瞼眥紅爛瘀肉侵睛或患暴赤眼睛痛不可忍者並服立效又治偏正頭痛一切頭風頭目眩暈白朮生用菟絲子酒浸另研青葙子去土防風去蘆甘草炙羌活去苗白蒺藜炒去尖密蒙花木賊去節各等分為細末煉蜜丸如彈子大每服一丸細嚼白湯下空心食前日三七寶散治風眼除瘀熱當歸芍藥黃連銅緑各二錢細研杏仁七粒去皮白礬甘草各一錢上㕮咀以水同放瓷盞內於鍋中頓煎至八分去滓澄清臨臥洗之撥雲散治男婦風毒上攻眼目昏暗翳膜遮障羞明熱淚隱澀難開眶癢赤痛瞼眥紅爛瘀肉侵睛羌活防風柴胡甘草炒各一兩上為細末每服二錢水一盞半煎至七分食後薄荷茶清調服菊花湯調亦可忌醃藏魚鮓鹽醬濕面炙爆發風等毒物蟬殼散治眼目風腫及生翳膜等疾蟬殼地骨皮黃連宣州者去須牡丹皮去木白朮蒼朮米泔浸切焙菊花各一兩龍膽草半兩甜瓜子半升上為細末每服一錢荊芥煎湯調下食後臨臥各一服大治時疾後餘毒上攻眼目甚效忌熱面炒豆醋醬等局方密蒙花散治風氣攻注兩眼昏暗眵淚羞明並暴赤腫羌活白蒺藜炒木賊密蒙花石決明各一兩菊花二兩上為末每服二錢食後茶清調下三因羌活散治風毒上攻眼目昏澀翳膜生瘡及偏正頭風目黑花纍纍者羌活川芎天麻旋覆花青皮南星炮藁本各一兩上為末每服二錢水煎入薑三片薄荷七葉本事方羊肝丸菟絲子車前子麥門冬決明子茯苓五味子枸杞子茺蔚子苦葶藶蕤仁地膚子澤瀉防風黃芩杏仁炒細辛桂心青葙子各一兩白羯羊肝用子肝一片薄切新瓦上炒乾熟地黃一兩半上為細末煉蜜為丸如梧子大每服三四十丸溫湯下日三地黃散治心肝壅熱目赤腫痛赤筋白膜遮睛散在四邊易治若遽遮黑睛多致失明及治疹痘入目者生地黃熟地黃當歸大黃各七錢半穀精草蒺藜木通黃連防風生犀角木賊玄參羌活蟬蛻粉草各半兩上為末每服半錢煮豬羊肝汁食後調服補肝散治三十年失明上用七月七日收蒺藜子陰乾搗末食後水服方寸匕治積年失明方上以決明子杵為末食後以粥飲服方寸匕外治陽丹治諸般外障赤脈貫睛怕日羞明沙澀難開胞弦赤爛星翳覆瞳黃連黃柏各一兩大黃黃芩防風龍膽草各五錢當歸連翹羌活梔子白菊花生地黃赤芍藥苦參各三錢蒼朮麻黃川芎白芷細辛千里光腦荷荊芥木賊各一錢半一方加雞柏樹根不拘多少此藥樹生梗有小刺葉如石榴葉根色如黃芩單用亦可點洗上藥以井水洗淨銼碎以井水浸於銅器內春三夏二秋四冬五日曬常將手挪出藥味曬出藥力熟絹濾淨留清汁一碗以飛藥留濁汁三碗以淬藥卻用熔銅鍋子一個裝打碎甘石一斤在內新瓦蓋上松炭固濟燒令透極紅色鉗出少時淬入藥汁內煅淬三次就將留下清汁飛細碾令千萬餘下澄清去濁曬乾再碾令無聲為度細絹重羅過瓷器收貯聽用爐甘石一錢麝香三釐片腦一分上為細末次入片腦碾嫩熟絹羅過瓷器收貯點眼如有翳膜配合陰丹一九二八三七四六等丹陰丹治翳膜遮睛血灌瞳人拳毛胬肉爛弦風眼諸般眼疾大效如神爐甘石一兩銅青一錢九分半硇砂六分二錢半沒藥二分青鹽三分七釐半乳香三分七釐半熊膽一分二釐半密陀僧二分半以上八味用黃連五錢龍膽草二錢半煎汁濾淨將前藥和一處入汁碾細嫩曬乾再碾極細用之白丁香海螵蛸白礬生輕粉各一分七釐半硼砂二分半雄黃牙硝黃丹血竭硃砂各一分二釐半鉛白霜粉霜鷹條膽礬各七釐半一方有黃連六分二釐胡連腦荷細辛薑粉草烏各一分二釐半按以上六味並無去翳之功不用更妙恐有礙眼作痛害眼之禍也一方有石蟹貝齒玄明粉真珠琥珀各二分按以上五味或多或少皆可增入以有磨翳消膜之功不可缺也上各另制細末依方稱合和勻碾令無聲至千萬餘下瓷器收貯聽用如有翳膜配合陽丹一九二八三七四六等丹點眼大效如神一九丹陰一分陽九分硼九釐礬生五釐二八丹陰二分陽八分硼八釐礬生四釐三七丹陰三分陽七分硼七釐礬生三釐四六丹陰四分陽六分硼六釐礬生二釐陰陽丹陰五分陽五分硼五釐礬生一釐清涼丹陽一錢硼一分礬生一釐以上六丹俱用麝香三釐片腦一分研勻點眼日精丹治一切火熱赤眼爛弦風等症夫日者陽也陽主輕清故其丹輕也專治一切眼目稍輕者用此丹也黃連二兩黃柏三兩龍膽草防風大黃赤芍藥黃芩當歸梔子各五錢白菊花腦荷各二錢又方可加雞柏樹根不拘多少為妙上浸藥水煅淬爐甘石收貯諸法悉同陽丹爐甘石一兩硃砂硼砂各二錢麝香三分白礬生一分上為極細末每末一錢加片腦一分研細羅過點眼如有翳膜配和月華丹封勻點之月華丹治諸般翳膜胬肉等證夫月者陰也陰主重濁故其丹重也專治一切眼目稍重者用此丹爐甘石一兩硃砂硼砂各二錢白丁香真珠珊瑚琥珀水晶瑪瑙石蟹貝齒硇砂各二分乳香沒藥輕粉青鹽玄明粉膽礬海螵蛸蚺蛇膽黃丹山豬膽白礬生雄黃熊膽牛黃各一分麝香三分上二十七味各另修制淨稱合和勻碾令千萬餘下瓷器收貯如臨用時每末一錢加梅花片腦一分研勻羅過點眼如翳膜重厚者加硇砂少許如翳膜薄輕者對和日精丹光明丹治一切眼目翳膜胬肉爛弦赤眼眊矂緊澀羞明惡日以下諸方甘石俱制過者爐甘石三錢硃砂硇砂各一錢麝香一分片腦三分上各另制細末稱合和勻碾令千萬餘下羅過點眼如翳膜加石蟹真珠各三分硇砂白丁香熊膽牛黃琥珀貝齒各一分研細和勻點眼要紅加硃砂一錢白龍丹治一切火熱眼及翳膜胬肉爐甘石一錢玄明粉五分硼砂三分片腦一分上研細末點眼爐甘石散治一切外障白睛傷破爛弦風眼療濕熱平風爛住痛明目去翳退赤除風大效爐甘石一錢片腦一分黃連二分半上制甘石二兩以黃柏一兩黃連五錢煎濃汁濾淨投入甘石內曬乾以汁投曬盡為度依方稱合和勻研為細末乳汁和調勻用鴨毛刷爛處又方以覆盆子根皮即甜勾根洗淨砍爛取汁和乳汁調刷爛處大效紫金錠子治一切眼疾不分遠年近日諸般翳膜血灌瞳仁胬肉攀睛拳毛倒睫積年赤瞎暴發赤腫白睛腫脹沙澀難開眊矂緊澀怕日羞明眵多䁾淚爛弦風癢視物昏花迎煙淚出目中溜火諸般目疾爐甘石黃丹各半斤黃連另研硃砂各一兩當歸硼砂各半兩海螵蛸白丁香白礬生硇砂輕粉貝齒真珠石蟹熊膽乳香沒藥麝香各一錢二分半片腦二錢其片腦久留恐去氣味宜臨用時加入上除腦麝外余各另製為末稱合和勻入黃連水碾至千萬餘下日乾次入麝香研細羅過又次入片腦再研復羅入後膏搜和作錠子陰乾黃連一斤當歸生地黃各四兩防風黃柏龍膽草各二兩蕤仁半兩訶子八枚冬蜜八兩另熬酥干為度鵝梨八枚取汁豬胰子四枚以稻草挪洗去膏膜乾淨無油為度再用布包搗爛入藥上將黃連等八味洗淨銼碎以水浸於銅器內春五夏三秋四冬七濾去滓以滓復添水熬三次取盡藥力以密絹綿紙重濾過澄去砂土慢火煎熬槐柳枝各四十九條互換一順攪不住手攪盡枝條如飴糖相類入蜜和勻瓷器盛放湯瓶口上重湯蒸燉成膏復濾淨滴入水中沉下成珠可丸為度待數日出火毒再熔化入末和勻杵搗為丸錠陰乾金銀箔為衣每以少許新汲水浸化開鴨毛蘸點眼大眥內又可以熱水泡化洗眼藥水冷又暖洗日洗五七次日點十餘次大效熊膽膏錠治風熱上