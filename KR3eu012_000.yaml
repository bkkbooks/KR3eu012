薑五片蔥白二五寸煎至一大盞去渣溫服不拘時大小便不通五苓散見消疸檳榔丸治腳氣發時大小便祕澀腹中滿悶膀胱裡急四肢煩疼檳榔赤茯苓去皮紫蘇葉大麻仁郁李仁各一兩川大黃煨二兩木香桂心各半兩枳殼去瓤麩炒木通去皮澤瀉羚羊角屑各七錢半上為細末煉蜜和搗二三百下丸如梧子大每服三四十丸食前溫水送下以利為度澤瀉散治腳氣大小便祕澀膀胱氣壅攻心腹痞悶澤瀉赤茯苓去皮枳殼去瓤麩炒各七錢半木通去皮銼豬苓去蘆檳榔各一兩牽牛二兩炒上為細末每服二錢生薑蔥白湯調下日二三服以利為度復元通氣散見諸氣發熱敗毒散治足三陽經熱證若自汗惡風加肉桂無汗惡寒加去節麻黃若風濕發熱焮腫加蒼朮檳榔大黃微利愈見傷濕和氣飲見水腫獨活寄生湯見腰痛附子八味湯活人附子炮去皮臍乾薑炮芍藥茯苓甘草炙桂心各三兩白朮四兩人參三兩每服四錢水一盞煎七分食前溫服又方去桂心加乾地黃三兩活絡丹和劑川烏炮去皮臍草烏炮去皮臍地龍去土天南星炮各六兩乳香研沒藥研各二兩上為末酒麵糊丸如梧桐子大每服二十丸空心日午冷酒送下荊芥湯下亦可虎骨四斤丸和劑宣州木瓜去瓤天麻去蘆肉蓯蓉洗淨牛膝去蘆各焙乾稱一斤附子炮去皮尖二兩虎骨塗酥炙一兩上以上各如法修制先將前四味用無灰酒五升浸春秋各五日夏三日冬十日取出焙乾入附子虎骨共研為末用浸藥酒打麵糊丸如梧子大每服五十丸食前鹽湯送下生瘡犀角散治腳氣風毒生瘡腫痛心神煩熱犀角屑天麻羌活去蘆枳殼去瓤麩炒防風去蘆黃耆白蒺藜黃芩白鮮皮各七錢半檳榔一兩甘草半兩炙烏蛇二兩酒浸上為㕮咀每服八錢以水一中盞半生薑五片煎至一大盞去渣溫服不拘時候鹿茸丸治腳氣腿腕生瘡鹿茸酥炙另搗成泥五味子當歸去蘆熟地黃上等分為細末酒糊和丸如梧桐子大每服三四十丸溫酒或鹽湯食前下次服後方芎歸散川芎當歸去蘆上二味等分為細末每服二三錢煎荊芥湯調下食後空心日進二服腳心痛大聖散濟生木香不見火人參甘草炙各半兩白茯苓去皮川芎麥門冬去心黃耆去蘆蜜炙當歸去蘆酒浸各一兩每服四錢水一盞薑五片煎七分溫服不拘時雞鳴散治腳氣疼痛不問男女皆可服如人感風濕流注腳足痛不可忍筋脈浮腫宜服之檳榔七枚陳皮去白木瓜各一兩吳茱萸紫蘇葉各三錢桔梗去蘆生薑和皮各半兩上㕮咀只作一遍煎用水三大碗慢火煎至一碗半去渣再入水二碗煎渣取一小碗兩次藥汁相和安置床頭次日五更分作三五服只是冷服冬月略溫服亦得服了用乾物壓下如服不盡留次日漸漸服之亦可服藥至天明大便當下黑糞水即是元腎家感寒濕毒之氣下也至早飯痛住腫消只宜遲吃飯候藥力作效此藥不是宣藥並無所忌加減檳榔湯治一切腳氣腳弱名曰壅疾貴乎疏通春夏多宜服之檳榔陳皮去白紫蘇莖葉各一兩甘草炙半兩每服五錢水一盞半生薑五片煎至八分去渣溫服不拘時如腳痛不已者加木瓜五加皮煎婦人腳痛加當歸煎室女腳痛多是肝血盈實宜加赤芍藥煎師尼寡婦亦然中滿不食者加枳實煎痰厥或嘔者加半夏煎腹痛大便不通者用此湯下青木香丸如更不通加大黃煎小便不利者加木通煎轉筋者加吳茱萸煎腳腫而痛者加大腹皮木瓜煎足痛而熱加地骨皮煎導氣除濕湯威靈仙防風荊介穗當歸地骨皮升麻白芍藥蒴藋葉上等分銼細水二斗煮取一斗五升去渣熱淋洗無時第五册癘風樺皮散保命治肺壅風毒遍身癮疹瘙癢荊芥穗二兩枳殼去瓤燒存性樺皮各四兩炒存性甘草炙半兩杏仁二兩去皮尖水一碗煎令減半取出令乾另研上為末每服二錢食後溫酒調下二聖散保命疏風和血大黃半兩皂角刺三錢上將皂角刺燒灰研細用大黃半兩煎湯調下二錢早服樺皮散中以升麻湯下瀉青丸晚服二聖散此為緩治補氣瀉榮湯東垣升麻連翹各六分蘇木當歸全蠍黃連地龍去土黃耆各五分黃芩生四分甘草一分半白豆蔻二分人參二分生地黃四分桃仁三粒桔梗五分麝香少許梧桐淚一分水蛭三條炒令煙盡虻蟲去翅足微炒三個上銼如麻豆大除連翹另銼梧桐淚研白豆蔻二分為細末二味另放麝香虻蟲水蛭三味為末另放外都作一服水二大盞酒一匙入連翹煎至一盞六分再入梧桐淚白豆蔻二味並麝香等三味再上火煎一二沸去渣稍熱早飯後午飯前服忌酒濕面生冷硬物醉仙散寶鑑治癘風遍身麻木胡麻子炒牛蒡子炒枸杞子蔓荊子炒各一兩白蒺藜苦參防風栝蔞根各五錢上為細末每一兩五錢入輕粉二錢拌勻每服一錢茶清調晨午各一服至五七日於牙縫中出臭涎令人如醉或下膿血病根乃去仍量人病之輕重虛實用病重者須先以再造散下之候元氣將復方用此藥忌一切炙爆厚味止可食淡粥時菜諸蛇以淡酒蒸熟食之可以助藥勢通天再造散治大風惡疾鬱金半兩大黃煨皂角刺黑大者炒各一兩白牽牛六錢半生半炒上為末每服五錢日未出時面東以無灰酒調下瀉黃散見發熱小柴胡湯見往來寒熱黃連解毒湯見發熱犀角地黃湯見諸血七味白朮散見消疸加味逍遙散治血虛有熱遍身瘙癢心煩目昏怔忡頰赤口燥咽乾發熱盜汗食少嗜臥當歸芍藥酒炒茯苓白朮炒各一錢柴胡五分牡丹皮甘草炙山梔炒各八分上作一劑水煎服室鑑換肌散治癘風久不愈或眉毛脫落鼻梁崩壞其效如神白花蛇黑花蛇各三兩酒浸地龍去土當歸細辛白芷天麻蔓荊子威靈仙荊芥穗菊花苦參紫參沙參木賊草白蒺藜炒不灰木甘草天門冬去心赤芍藥九節菖蒲定風草何首烏不犯鐵胡麻子炒川芎草烏頭炮去皮臍蒼朮木鱉子各一兩上