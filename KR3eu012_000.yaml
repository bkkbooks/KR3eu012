二三斗米頃若心悶即出湯數食莫令飢虛則於人無力七七四十九日即為一徹以瘥為度或一二年忌房室房室脈通其蟲得便病即更加其患非冷熱風治如此此是橫病非正報也若出青蟲即是青風患氣由冷風至多其蟲皆青即是東方木中毒風青蟲宜服自身小便亦名清陽亦名遠中水服法空腹服一七日一服六合旦起日初出即服服不過一升飢即食不得食五辛豬肉雞犬穢食臭惡之食大嗔怒房室皆忌之服法第一忌之至二七日一日再服服別四合服小便常取空腹服之則不過一升三七日一日三服至四七日小便一出即服乃至周年以瘥為度服之不過一升百日外小便至少一日之中止可一度二度服之大香美好如羹如漿忌法三年犯即難瘥不犯永愈青蟲如此是橫病非正報也出白蟲者即是白風赤蟲者即是赤風同為一等療二風由熱為根蟲皆赤白乃是南風西風入五臟通徹骨髓成患為疾此之二風與苦參消石酒飲之除患最疾熱去其患即愈也苦參消石酒方浸酒法在後苦參消石清酒上三味先與清酒下消石浸之二七日或三七日然後與苦參同入酒甕中盛浸之七日漸漸服之飲法空腹服之一日三服初七日中一服如半雞子許七日後可飲一升任情飲之多則為善患去則速風動亦多勿使醉吐寧漸少飲不用多飲赤白二風此藥至日無有不愈余非難治何以故熱為根本故苦參能治熱消石除熱消蟲赤白二蟲但聞消石氣皆變為水能去熱根本若患赤白二風不問年月多者五年以外加黃消石加酒苦參乃至三四兩無有不愈乃至三十年無鼻柱肢節墮落者但非黑蟲皆得永愈第一忌房室大嗔怒大熱食禁黏食五辛生冷大醋酪白酒豬魚雞犬驢馬牛羊等肉皆為大忌自余不禁此為對治非正報也若人頑痹不覺痛癢處者當作大白膏藥摩之一日三四度七日徹或二三七日徹乃至七七四十九日名曰一大徹頑痹即覺癢平復如本即止摩若不平復但使摩之以瘥為限不過兩大徹三大徹無有不愈針刺灸燒割劫亦不及摩之為良乃至身上多有瘡痕生摩之悉愈大白膏方白芷白朮前胡吳茱萸各一升芎藭二升蜀椒細辛各三兩當歸桂心各二兩苦酒四升候上一十味以苦酒浸藥經一宿取不中水豬脂十斤銅器中煎令三沸三上三下候白芷色黃膏成貯以瓶中隨病摩之即愈若遍體生瘡膿血潰壞當作大黑膏摩之大黑膏方烏頭芎藭雄黃胡粉木防己升麻黃連雌黃藜蘆礬石各半兩杏仁去皮尖巴豆各四十枚黃柏一錢八分松脂亂髮各如雞子大上一十五味搗篩為末以豬脂二斤合藥煎亂髮消盡膏成用塗瘡上日三敷先以鹽湯洗然後塗之勿令婦人小兒雞犬見若患人眉睫墮落不生者服藥後經一百日外即以鐵漿洳其眉睫處所一日三度洗之生毛則速出一大徹眉睫如本與不患時同也浸酒法苦參去上黃皮薄切曝乾搗令散莫使作末稱取三十斤取不津甕受兩斛者甕底鑽作孔甕底著二三十青石子如桃李雞子許丸過底孔上二三寸然後下苦參消石末酒一時著甕中遣童子年十三四者和合調停然後即與五六重故紙扎甕口用小甕口合上泥之莫使漏氣取酒服時法孔中出酒服之一日一服或再服亦得還如法密塞孔勿漏泄不得開甕口取酒酒欲盡時開甕取苦參滓急絞取酒其滓去卻其酒密處盛之莫使漏氣服酒法一一如前無有不愈若患不瘥除者皆由年多十年者更作此藥酒至兩劑無有不愈依法如前雖良醫治之亦須好酒須行忠直不得不孝不義患除則速矣論曰苦參處處有之至神良黃消石出龍窟其狀有三種一者黃消石二者青消石三者白消石其形如鹽雪體濡燒之融似曲鱔見鹽為水消石真者燒煉皆融真偽可辨三種消石黃者為上青者為中白者為下用之殺蟲皆不如黃者最良是百藥之王能殺諸蟲可以長生出烏場國採無時服藥時先令服長壽延年符能蕩除身中五臟六腑遊滯惡氣皆出盡然後服藥得力其疾速驗無疑符力亦是不思議神力先服藥者無有不效又生造藥入甕中時令童子小兒和合訖即告符書鎮藥符鎮在甕腹令藥不壞久久為好一切神鬼不敢近之矣先服此符然後服藥一服之後更不須再服書符用六合日勿令小兒女子六畜雞犬等見之符成不忌雷丸散雷丸硃砂細研水飛阿魏各一兩硝石五兩一兩細研四兩浸酒用雄黃細研水飛雌黃細研各七錢半紫石英細研水飛犀角屑藜蘆各半兩斑蝥去頭足翅芫青去頭足翅各二十個用芝麻一合同炒芝麻熟去之只用斑芫二味上為細末取苦參五兩同硝石搗碎用生絹袋盛入瓷瓶中用無灰酒一斗浸七日密封每服一中盞溫過食前調雷丸散二錢雷丸散雷丸雄黃研水飛硃砂研水飛滑石紫石英研犀角屑牛黃各半兩研斑蝥去頭足翅芫青各二十個去頭足翅並用糯米炒白蘞阿魏各二錢半上為細末入研令勻每服一錢空心清酒調下上二方皆本耆婆方而增損之傳用皆效以藥有難致拘方取足則畢世不成矣小有出入亦何不可故備列焉治癘風白花蛇丸丹陽荊上舍得癘疾一僧療之而愈以數百金求方祕不肯傳館賓袁生窺知藏衲衣領中因醉之而竊録焉用者多效防風去苗二兩荊芥穗一兩半金銀花去葉二兩川芎一兩枸杞子甘州二兩黃芩黃連山梔子黃柏全蠍用醋浸一日去鹽味各一兩蟬蛻二兩用草鞋踏去土漏蘆半斤洗淨去苗取四兩烏藥何首烏不犯鐵牛膝去蘆牛蒡子連翹天花粉白蒺藜威靈仙細辛金毛狗脊胡麻子炒蔓荊子各一兩槐花苦參生地黃各二兩白花蛇一條去頭尾連骨生用烏梢蛇一條去頭尾生用如上頭面者加香白芷一兩如肌肉潰爛加大皂角一兩一僧加風藤一兩上共為細末米糊為丸如梧桐子大每服五六十丸茶清送下空心午後臨臥各一服行藥方大黃白牽牛檳榔以上各一兩甘草三兩輕粉五分上共為細末每服二錢用白蜜三匙薑汁二匙調服五更時進病勢重者七日行一次稍輕者半月一次輕者一月一次或二十日一次以三五遍為度防風天麻丸治癘風癩病此方料是神仙所傳一年中常療數人初服藥有嘔吐者不可怪服藥得安如故其效如神防風去蘆天麻升麻白附子炮定風草細辛去苗川芎人參去蘆丹參去蘆苦參去蘆玄參去蘆紫參去蘆蔓荊子威靈仙穿山甲炒何首烏各一兩另搗為末蜈蚣一對上為細末與何首烏末拌勻每藥末二兩胡麻一斤淘淨曬乾炒香熟另碾為極細末與藥末一處拌勻煉蜜和丸共作九十丸每服一丸細嚼溫漿水送下不拘時候日三服宜食淡白粥一百二十日病人大忌房勞將息慎口歙墨丸治癘風神效歙墨燒存性兩頭尖甘草炙香白芷防風去蘆各二兩乳香三錢另研川芎一兩五靈脂三兩淨麝香三錢另研上為細末酒糊丸每兩作十丸每服一丸食後細嚼溫酒送下茶清亦得日進二服乳香丸治癘風神效通明乳香二十兩苦參肥好者去蘆銼四兩上先用好酒五升浸苦參於瓶內以重湯煮一伏時常用文武火慢熬令小沸為候一伏時取出濾去渣將酒浸乳香於銀砂石器內煎如餳入天麻四兩為末大麻仁二兩另研如膏入於乳香膏內攪令勻慢火熬之可丸如梧桐子大每服二十丸用大麻仁酒送下空心及晚食前服之大麻仁酒法大麻仁三升水淘淨候乾以酒一斗浸一宿和酒研取白汁用生絹濾過卻入瓷瓶中重湯煮數沸即止每服一小盞溫過下藥仍兼紫茄子根散相間服之紫茄子根散紫茄子根一斤細切曝乾搗羅為末白芍藥二兩末炙甘草一兩末上件藥末相和令勻每服二錢溫水調下日進三服自早至晚常令均勻服之神仙退風丹知母貝母烏梅肉海桐皮金毛狗脊上各等分為細末煉蜜和丸如梧子大每日空心日中臨睡各服三十丸又每夜第一次睡覺時急於頭邊取三十丸便服並用羊蹄根自然汁下大忌酒及房事一切發風之物只吃淡粥一百日皮肉漸皆復舊半年後須忌房事服藥時每夜專用一二勤謹人就病人睡處坐守等候第一次睡覺時便扶起吃藥一服華宮使親見林承服之取效治癘風如此神妙若不禁忌恐無益也天麻散治一切癘風癩疾天麻二兩何首烏胡麻子各三兩蔓荊子威靈仙菖蒲荊芥穗地骨皮苦參去蘆白蒺藜甘菊花牛蒡子炒各一兩薄荷半兩上為細末每服三錢溫酒調下茶清亦得日進二服先食前服半月次食後服半月大有神效蔓荊子散治肺臟蘊熱風毒如癩變成惡風蔓荊子生用甘菊花枸杞子苦參去蘆各四兩天麻二兩天南星薑製胡麻各一兩炒熟搗為末上為細末每服二錢煎荊芥湯調下茶清亦可日進二服不拘時候苦參散苦參取頭末稱二兩豬肚一具去脂上用苦參末摻豬肚用線縫合隔宿煮軟取出洗去元藥先不吃飯一日至第二日先飲新水一盞後將豬肚食之如吐了再食之食罷待一二時用肉湯調無憂散五七錢取出小蟲一二萬為效後用不蛀皂角一斤去皮弦及子捶碎用水四碗煮至一碗用生絹濾去渣再入苦參末攪熟稀麵糊膏子相似取出放冷再入後藥相和何首烏去皮二兩防風去蘆一兩半當歸去蘆一兩芍藥五錢人參去蘆三錢上為細末入皂角膏子為丸如桐子大每服三五十丸溫酒或茶清送下不拘時候日進三服後用苦參荊芥麻黃煎湯洗浴何首烏散治癘風癩疾何首烏一斤入白米泔浸一七日夏月逐日換水用竹刀刮令碎九蒸九曬胡麻子四兩九蒸九曬上為細末每服二錢食前溫酒或薄荷湯調下追命散川大黃皂角刺各半斤川鬱金五兩上為細末每服三大錢用好真小油入無灰酒調藥末覷虛實加減服之取下蟲多年者其蟲色黑日近者其蟲色赤隔三二日再服直候無蟲方是病瘥即止其藥後只服平常風藥及諸補藥此藥大有功效下藥切不可許病人知恐蟲藏匿則病難愈六十日內用清齋戒房色欲卻一切俗念亦不可嗔怒常淨口念孝敬善言救苦救難觀世音菩薩名號萬千百聲最好心絶一切惡念此疾易療故發善言戒勸伏幸聽信六香散淋泄癩病其效如神甘松去土零陵香香白芷茅香去土銼香附子炒藿香川芎各二兩三奈子半兩上除三奈子另研餘七味同為㕮咀分作四劑每用一劑以水六大碗煎至三碗去渣卻入三奈子攪勻乘熱洗瘡若瘡不破用鎞針於疙瘩瘡上刺破令惡血出盡然後淋洗一伏時洗一番浴室毋令透風臥處須令暖和得所一月之間不可出外水火亦就其中洗了拭乾用八金散點若熱不可飲冷水八金散金精石銀精石陽起石玄精石磁石石膏滑石禹餘糧石上件各等分碾末入金銀鉗鍋子內盛之用鹽泥固濟口以文武火煅煉紅透放冷研如粉入水銀半兩輕粉一錢研令不見星子卻入余藥再研勻令患人先洗瘡拭乾便用小油調稠硬作劑子於有瘡處擦上藥兼治疙瘩擦藥之後大忌飲水宜禁身靜坐至三日口中涎出為度二次藥了用貫衆湯漱其口不可咽下藥汁兩手便洗淨不可近口鼻耳目第四日一伏時依前上藥第七日不可更用見效即止貫衆湯漱口安牙貫衆四兩上為㕮咀用淨黑豆半升水三碗者軟若用前藥畢將此藥急漱其口以去其毒恐傷牙齒也一方加黃連泄洗癘瘡藥何首烏荊芥防風馬鞭草蔓荊子各等分每用十兩水一斗煎數沸無風處洗出汗解毒散治風瘡解外毒巴豆肉皮硝各一兩黃蜂窠黑狗脊各七錢白芷雄黃豬牙皂角羊蹄根輕粉蟬蛻去土枯礬寒水石各五錢上為末臘豬油調搽外毒既去卻搽黃連散愚按洗藥雖能疏通腠理而損元氣解毒散雖能攻毒而傷良肉不宜多用黃連散治癘瘡清熱解毒黃連五兩五倍子一兩上為末唾津調塗之白丁香散治癘風眼中生胬肉白丁香貝母上為