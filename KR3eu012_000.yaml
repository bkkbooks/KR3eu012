牙疼去木律草豆蔻散丹溪治寒多熱少牙齒疼痛草豆蔻一錢二分黃連升麻各二錢半細辛葉防風各二分熟地黃羊脛骨灰各五分當歸身六分上為細末痛處擦之麝香散治熱多寒少牙露齦肉脫血出齒動欲落大作疼痛妨食麝香少許升麻一錢黃連草豆蔻各一錢半熟地黃麻黃各一分益智仁二分半羊脛骨灰二錢人參生地黃當歸漢防己酒製各三分上為細末每用少許擦牙疼處噙良久有涎吐去立效散東垣治牙齒痛不可忍及頭腦項背痛微惡寒飲大惡熱飲其脈上中下三部陽虛陰盛是五臟內盛六腑陽道微脈微小小便滑數防風一錢升麻七分炙甘草三分細辛二分草龍膽酒洗四分水一盞煎至五分去滓以匙抄在口中泄痛處少時立止如多惡熱飲更加草龍膽一錢如更惡風作痛加草豆蔻黃連各五分勿加龍膽隨寒熱多少臨時加減升麻散治上爿牙疼細辛倍黃柏知母防己黃連升麻白芷蔓荊子牛蒡子薄荷上末薄荷湯調服及搽牙齦或煎服亦可白芷散治下爿牙疼白芷防風連翹石膏煅荊芥赤芍藥升麻倍薄荷上件為細末薄荷湯調服及搽牙齦或煎服亦可神功丸東垣蘭香葉如無藿香代之當歸身木香各一錢升麻二錢生地黃酒洗生甘草各三錢黃連去須揀淨酒洗稱縮砂仁各五錢上同為細末湯浸蒸餅為丸如緑豆大每服一百丸或加至二百丸止白湯下食遠服兼治血痢及血崩血下不止血下褐色或紫色黑色及腸澼下血空心服米湯下其脈洪大而緩者及治麻木厥氣上衝逆氣上行妄聞妄見者牢牙散東垣治牙齦肉綻有根牙疳腫痛動搖欲落牙齒不長牙黃口臭升麻羌活羊脛骨灰各一兩草龍膽酒洗一兩五錢上為細末以紗羅子羅骨灰作微塵末和勻臥時貼在牙齦上升麻古本作四分亦一兩也安腎丸見喘良方於本方內去肉桂茯苓二味余藥等分統旨無肉桂川烏桃仁萆薢白朮有杜仲菟絲子八味丸還少丹並見虛勞黑錫丹見諸逆衝上嘉禾散見反胃牢牙散治牙無力不能嚼物升麻三錢生地黃石膏各一錢白茯苓玄參各五分羊脛骨灰梧桐律各三分黃連一錢三分麝香少許另研上為細末研勻每用少許臨臥擦牙復以溫水漱去塞耳雄黃定痛膏大蒜二枚細辛去苗盆硝另研各二錢雄黃另研一錢豬牙皂角四錠上為細末同大蒜一處搗為膏丸如梧桐子大每用一丸將綿子裹藥左邊牙疼放在左耳右邊牙疼放在右耳良久痛止一丸可治數人透關散蜈蚣頭蠍梢去毒草烏尖如麥粒大者川烏底如錢薄者各七枚雄黃如麥大七粒另研胡椒七粒上細末用紙捻子蘸醋點藥少許於火上炙乾塞兩耳內閉口少時即效刷牙牢牙散去風冷蛀齲宣露用之甚效槐枝柳枝各長四寸四十九枝皂角不蛀者七莖鹽四十文重上同入瓷瓶內黃泥固濟粳火燒一夜候冷取出研細用如常法白牙散升麻一錢羊脛骨灰二錢白芷七分石膏一錢半麝香少許上為細末先用溫水漱口擦之妙麝香刷牙散麝香一分升麻一錢黃連二錢白豆蔻羊脛骨灰草豆蔻各三錢半當歸身防己酒浸人參各三分生地黃熟地黃各二分沒石子三枚五倍子一個上為細末用如前法刷牙方羊脛骨灰一兩升麻一錢黃連一錢上為末擦之長春牢牙散烏髭發去牙風川芎砂仁香附子百藥煎丁香升麻五倍子白茯苓細辛青鹽金絲礬白疾藜檀香甘松破故紙各半兩石膏二兩沒石子訶子去核各九個膽礬三錢麝香半錢上為細末研勻早晚刷牙次以溫水漱口吐出沉香散堅固牙齒榮養髭發沉香訶子皮青鹽青黛研各二錢白檀母丁香各一錢半當歸香附子炒去毛細辛去苗各半兩荷葉灰乳香研各一錢苦楝子破四片炒半兩龍腦另研麝香另研各半錢酸石榴皮二兩半上為細末每用半錢如常刷牙溫水刷漱了早晚二次硃砂散揩牙令白淨硃砂細研茅香藿香丁皮香附甘松白芷升麻黃丹各一兩石膏四兩寒水石八兩豬牙皂角二兩白檀零陵香各半兩上為細末研勻每用揩齒甚佳妙應散牢牙疏風理氣烏髭發人參細辛去苗白茯苓香附子炒去毛川芎白疾藜炒去角砂仁各半兩百藥煎白芷石膏煅龍骨研各六錢麝香另研少許上為細末早晨臨臥溫水刷漱之齲蛀桃仁承氣湯見蓄血動搖地黃丸白茯苓去皮人參山芋各四兩枸杞根三兩生地黃五斤取汁白蜜一斤酥少許上將前四味為末以好酒一斗煎至三升去滓入地黃汁白蜜酥同煎至可丸即丸如小豆大每服二十丸用溫酒送下一日三服漸加至五服甘露飲和劑治丈夫婦人小兒胃中客熱牙宣口氣齒齦腫爛時出膿血目瞼垂重常欲合閉或即飢煩不欲飲食及赤目腫痛不任涼藥口舌生瘡咽喉腫痛瘡疹已發未發皆可服之又療脾胃受濕瘀熱在裡或醉飽房勞濕熱相搏致生疸病身面皆黃肢體微腫胸滿氣短大便不調小便黃澀或時身熱並皆治之枇杷葉刷去毛干熟地黃去土天門冬去心焙枳殼去穰麩炒山茵陳去梗生乾地黃麥門冬去心焙石斛去蘆炙甘草黃芩上等分為末每服二錢水一盞煎至七分去滓溫服食後臨臥小兒一服分兩服仍量歲數加減與之五靈膏治牙齒動搖五靈脂半兩松脂黃蠟各一兩黃丹二錢半蟾酥半字上於瓷器中以慢火熬成膏用白熟絹上攤候冷剪作片子每夜貼於齦上有津即吐誤咽不妨此藥臨臥時用一次於惡硬物底一個牙根兒下里外貼之亦不甚悶若是牙兒堅固自然得力不惡硬物也治牙動搖疼痛五倍子白茯苓細辛各五錢青鹽三錢上為細末早晚刷牙久有大效宣牙膏治牙齒動搖不牢疼痛不止定粉龍骨各二錢半麝香一字黃蠟一兩上為細末研勻將黃蠟熔化和藥放冷取出尉斗燒熱鋪紙用藥攤之勻薄每用剪作紙條兒臨臥於齒患處齒齦間封貼一宿至次日早晨取出藥每夜用之如此半月消牙齒腫悶坐生齦肉治疳蝕去風邪牢牙齒大有神效五倍子散治牙齒搖及外物所傷諸藥不效欲落者川五倍子乾地龍去土微炒各半兩上為細末先用生薑揩牙根後以藥末敷之五日內不得咬硬物如齒初折落時熱貼齒槽中貼藥齒上即牢如故治牙齒動搖髭發赤黃一服髭黑牙牢生薑半斤取汁地黃一斤洗淨研細取自然汁仍留滓上以不蛀皂角十莖刮去黑皮弦將前藥汁蘸皂角慢火炙乾再蘸再炙用藥盡為度並前藥滓同入瓷瓶內用火煅存性為末牙齒動搖用藥擦牙齦上如髭黃以鐵器盛藥末三錢湯調過三日後將藥汁蘸擦髭發臨臥時用次早已黑色三夜三次用其黑如漆甚妙治齒根動欲脫落上用生地黃綿裹著齒上咂之又㕮咀以汁漬齒根日四五夜著之並咽汁十日大佳如齒挺出嚼之亦可土蒺藜散治牙齒疼痛齦腫搖動及打動牙齒上用土蒺藜去角生用不以多少為粗末每服五錢以淡漿水半碗煎七八沸去滓入鹽末一捻帶熱時時漱之別無所忌或用根燒灰貼動牙即牢治牙齒動搖上用黑鉛半斤大鍋內熔成汁旋入桑條灰柳木捶研令沙以熟絹羅為末每日早晨如常揩牙後用溫水漱在盂內以水洗眼能明目烏髭發及治諸般眼疾麝香礬雄散治大人小兒牙齒動搖齦齶宣露骨槽風毒宣蝕漬爛不能下食麝香龍骨膽礬雄黃上為細末每用一字鵝毛蘸藥掃患處又用三錢以水七分煎至五分熱呷滿口候冷吐去或每日揩牙溫水漱之熟銅末散治牙齒非時脫落令牢定熟銅末一兩當歸細辛地骨皮防風各二錢半上為細末研如粉每用塗藥在患處以蠟紙封之日夜二三度三五日牢定一日忌嚼硬物露蜂房散治牙齒不生及齒風痛露蜂房炙荊芥川椒去目及合口者炒出汗地骨皮松節青鹽白礬枯各一兩上為細末每用半錢綿裹於患處咬之有涎吐之川升麻散治牙齒不生齒風宣露川升麻白附子炮各一兩上為細末研勻於八月內取生地黃四斤洗去土絞取汁二大盞即下藥攪令勻放瓷器中每用以柳枝綿裹一頭點藥炙令熱烙齒根下縫中更塗膏少許即驗唇濟陰地黃丸治陰虛火燥唇裂如繭五味子熟地黃自制杵膏麥門冬當歸肉蓯蓉山茱萸去核乾山藥枸杞子甘州菊花巴戟肉各等分上為末煉蜜丸桐子大每服七八十丸空心食前白湯送下柴胡清肝散柴胡黃芩炒各一錢黃連炒山梔炒各七分當歸一錢川芎六分生地黃一錢升麻八分牡丹皮一錢甘草三分上水煎服若脾胃弱去芩連加白朮茯苓清胃散見齒歸脾湯見健忘補中益氣湯見勞倦羌活散羌活茯苓薏苡仁各等分上每服三五錢水煎入竹瀝一匙服瀉黃飲子治風熱在於脾經唇燥裂無色白芷升麻枳殼麩炒黃芩防風各一錢半夏薑湯泡七次一錢石斛一錢二分甘草七分水二盅薑三片煎八分食後服五福化毒丹治唇舌腫破生瘡煩渴玄參洗焙桔梗各二兩人參半兩茯苓一兩半馬牙硝風化青黛各一兩麝香一字甘草七錢半焙上為細末研勻煉蜜為丸如皂角子大以金銀箔各四十片為衣每服一二丸薄荷湯化下如口臭以生地黃汁化下食遠服白燈散治緊唇上纏白布作大燈炷如指安斧刃燃熱令刃汗出拭取敷唇上日三二度獨活散治唇上生惡核腫由脾胃熱壅滯獨活升麻桑寄生犀角屑沉香連翹漢防己大黃炒各七錢半炙甘草半兩每服三錢水一中盞煎至六分去渣不拘時溫服升麻飲治脾胃有熱風冷相乘唇腫生核疼痛升麻前胡犀角鎊薏苡仁炙甘草各半兩葛根龍膽草青竹皮各二錢半上㕮咀每服五錢水一盞半煎至八分去滓食後服生地黃煎治脾熱唇焦枯無潤澤生地黃汁生天門冬汁各半升生麥門冬去心葳蕤各二兩黃耆升麻各一兩半細辛川芎白朮甘草生用各一兩上細銼綿裹酒浸一宿以豬脂二斤煎至藥色焦綿濾去滓納鍋中後下地黃天門冬汁熬令稠瓷器盛每服半匙不拘時含咽下治唇生腫核方松脂大黃白蘞赤小豆胡粉各等分上為末以雞子清調敷黃柏散治繭唇黃柏一兩五倍子二錢密陀僧甘草各一錢上除黃柏外余藥為末用水調敷於柏上火炙三五次將柏切成片子臨睡貼之天明即愈舌小續命湯見中風升麻散濟生治熱毒口舌生瘡咽喉腫痛升麻赤芍藥人參桔梗乾葛甘草上㕮咀薑煎溫服一方有黃連大黃黃芩玄參麥門冬碧雪和劑治積熱口舌生瘡心煩喉閉芒硝青黛寒水石石膏煅各飛研朴硝硝石甘草馬牙硝各等分甘草煎湯二升入諸藥再煎用柳枝不住攪令熔方入青黛和勻傾入砂盆內冷即成霜研末每用少許以津含化如喉閉以竹管吹入喉中本事方虛壅上攻口舌生瘡草烏一個南星一個生薑一塊為末臨臥醋調作掩子貼手腳心三黃丸見發熱龍石散三因治上膈蘊熱口舌生瘡咽喉腫痛寒水石煅三兩硃砂二錢半另研龍腦半字為末少許摻患處小兒疹毒攻口用五福化毒丹後用此清熱補氣湯治中氣虛熱口舌如無皮狀或發熱作渴人參白朮茯苓當歸酒洗芍藥炒各一錢升麻五味子麥門冬玄參炙甘草各五分上水煎服如不應加炮薑更不應加附子清熱補血湯治口舌生瘡體倦少食日晡益甚或目澀熱痛當歸酒洗川芎芍藥熟地酒洗各一錢玄參七分知母五味子黃柏麥門冬去心柴胡牡丹皮各五分上水煎服如不應用補中益氣湯加五味治之六味丸八味丸俱見虛勞涼膈散見發熱加味歸脾湯即本方加當歸柴胡山梔丹皮見健忘玄參升麻湯治心脾壅熱舌上生瘡木舌舌腫或連頰兩項腫痛玄參升麻犀角赤芍藥桔梗貫衆黃芩甘草各等分上㕮咀每服四錢水一盞半煎七分去滓不拘時服清熱化痰湯治上焦有熱痰盛作渴口舌腫痛貝母天花粉枳實炒桔梗各一錢黃芩黃連各一錢二分玄參升麻各七分甘草五分上水煎服小柴胡湯見往來寒熱八珍湯見虛勞舌腫痛金沸草散世醫