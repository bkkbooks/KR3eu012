天麻甘菊花山茱萸肉蔓荊子藁本川芎當歸各一錢細辛甘草各五分水二盅煎至一盅溫分二服日三頭面腫加牛蒡子炒研二錢邪風證羌活勝風湯見外障目赤還陰救苦湯原機治目久病白睛微變青色黑睛稍帶白色黑白之間赤環如帶謂之抱輪紅視物不明昏如霧露中睛白高低不平其色如死甚不光澤口乾舌苦眵多羞澀上焦應有熱邪升麻蒼朮桔梗甘草炙柴胡防風羌活各半兩細辛二錢藁本四錢川芎一兩紅花一錢當歸尾七錢黃連黃芩黃柏知母連翹生地黃各半兩龍膽草三錢每服七錢水二盞煎至一盞去滓熱服上方以升麻蒼朮甘草諸主元氣為君為損者溫之也以柴胡防風羌活細辛藁本諸升陽化滯為臣為結者散之也以川芎桔梗紅花當歸尾諸補行血脈為佐為留者行之也以黃連黃芩黃柏知母連翹生地黃龍膽草諸去除熱邪為使為客者除之也奇經客邪之病強陽搏實陰之病服此亦具驗菊花決明散治證同上草決明石決明東流水煮一伏時另研極細入藥木賊草防風羌活蔓荊子甘菊花甘草炙川芎石膏另研極細入藥黃芩各半兩為細末每服二錢水一盞半煎八分連末服食後上方以明目除翳為君者草決明石決明木賊草也以散風升陽為臣者防風羌活蔓荊子甘菊花也以和氣順血為佐者甘草川芎也以療除邪熱為使者黃芩石膏也內急外弛之病亦宜其治神驗錦鳩丸治證同上兼口乾舌苦眵多羞澀上焦邪熱甘菊花牡蠣洗煆粉各五錢肉桂二兩瞿麥蕤仁去皮草決明羌活各三兩白茯苓四兩蒺藜炒去尖細辛防風黃連各五兩斑鳩一隻跌死去皮毛腸嘴爪文武火連骨炙乾羯羊肝一具竹刀薄批炙令焦忌用鐵刀蔓菁子二升淘淨絹袋盛甑蒸一伏時曬乾上為細末煉蜜為劑杵五百下丸如梧子大每服二十丸加至三五十丸空心溫湯下上方以甘菊花草決明主明目為君以蕤仁牡蠣黃連蒺藜除濕熱為臣以防風羌活細辛之升上瞿麥茯苓之分下為佐以斑鳩補腎羊肝補肝肉桂導群藥入熱邪為使此方制之大者也腎肝位遠服湯藥散不厭頻多之義也萬應蟬花散治證同上蟬蛻去土半兩蛇蛻炙三錢川芎防風羌活炙甘草當歸白茯苓各一兩赤芍藥三兩蒼朮四兩石決明東流水煮一伏時研極細一兩半上為細末每服二錢食後臨臥時濃米泔調下熱茶清亦得上方制之復者也奇之不去則偶之是為重方也今用蟬蛻又用蛇蛻者取其重蛻之義以除翳為君也川芎防風羌活皆能清利頭目為臣也甘草蒼朮通主脾胃又脾胃多氣多血故用赤芍藥補氣當歸補血為佐也石決明鎮墜腎水益精還陰白茯苓分陰陽止下為使也亦治奇經客邪之病黃連羊肝丸助陽活血湯俱見目痛千金磁朱丸見內障芍藥清肝散原機治眵多眊燥緊澀羞明赤脈貫睛臟腑祕結者白朮川芎防風羌活桔梗滑石石膏各三分黃芩薄荷荊芥前胡炙甘草芍藥各二分半柴胡山梔知母各二分大黃四分芒硝三分半水二盅煎至一盅食後熱服上方為治淫熱反克而作也風熱不制之病熱甚大便硬者從權用之蓋苦寒之藥也苦寒敗胃故先以白朮之甘溫甘草之甘平主胃氣為君次以川芎防風荊芥桔梗羌活之辛溫升散清利為臣又以芍藥前胡柴胡之微苦薄荷黃芩山梔之微苦寒且導且攻為佐終以知母滑石石膏之苦寒大黃芒硝之大苦寒祛逐淫熱為使大便不硬者減大黃芒硝此逆則攻之治法也大熱服者反治也通氣利中丸治證同上白朮一兩白芷羌活各半兩黃芩滑石取末各一兩半大黃二兩半牽牛取末一兩半除滑石牽牛另研極細末外余合為細末入上藥和勻滴水為丸如桐子大每服三十丸加至百丸食後臨睡茶湯下上方以白朮苦甘溫除胃中熱為君白芷辛溫解利羌活苦甘平微溫通利諸節為臣黃芩微苦寒療熱滋化滑石甘寒滑利小便以分清濁為佐大黃苦寒通大便瀉諸實熱牽牛辛苦寒利大便除風毒為使逆攻之法也風熱不制之病熱甚而大便硬者亦可兼用然牽牛有毒非神農藥今與大黃並用者取性猛烈而快也大抵不宜久用久用傷元氣蓋從權之藥也量虛實加減黃連天花粉丸治同上黃連菊花川芎薄荷各一兩連翹二兩天花粉黃芩山梔子各四兩黃柏六兩為細末滴水丸如梧子大每服五十丸加至百丸食後臨臥茶清下上方為淫熱反克臟腑不祕結者作也風熱不制之病稍熱者亦可服以黃連天花粉之苦寒為君菊花之苦甘平為臣川芎之辛溫薄荷之辛苦為佐連翹黃芩之苦微寒黃柏梔子之苦寒為使合之則除熱清利治目赤腫痛黃連爐甘石散治眼眶破爛畏日羞明余治同上爐甘石一斤黃連四兩龍腦量入先以爐甘石置巨火中煅通紅為度另以黃連用水一碗瓷器盛貯納黃連於水內卻以通紅爐甘石淬七次就以所貯瓷器置日中曬乾然後同黃連研為細末欲用時以一二兩再研極細旋量入龍腦每用少許井花水調如稠糊臨睡以箸頭蘸敷破爛處不破爛者點眼內眥鋭眥尤佳不宜使入眼內上方以爐甘石收濕除爛為君黃連苦寒為佐龍腦去熱毒為使諸目病者俱可用病宜者治病不宜者無害也奇經客邪之病量加朴硝泡湯滴眼瘀肉黃赤脂上龍腦黃連膏治目中赤脈如火溜熱炙人余治同上黃連半斤龍腦一錢先銼黃連令碎以水三大碗貯瓷器內入黃連於中用文武火慢熬成大半碗濾去滓入薄瓷碗內重湯頓成膏半盞許龍腦以一錢為率用則旋量入之以箸頭點入眼內不拘時上方以黃連治目痛解諸毒為君龍腦去熱毒為臣乃君臣藥也諸目痛者俱宜用蕤仁春雪膏治紅赤羞明眊燥癢痛沙澀蕤仁去油四錢龍腦五分先以蕤仁研細入龍腦和勻用生好真蜜一錢二分再研調勻每用箸頭點內眥鋭眥上方以龍腦除熱毒為君生蜜解毒和百藥為臣蕤仁去暴熱治目痛為使此藥與黃連爐甘石散龍腦黃連膏並用嗅鼻碧雲散治腫脹紅赤昏暗羞明隱澀疼痛風癢鼻塞頭痛腦酸外翳攀睛眵淚稠黏鵝不食草二錢青黛川芎各一錢為細末先噙水滿口每用如米許嗅入鼻內以淚出為度無時上方以鵝不食草解毒為君青黛去熱為佐川芎大辛除邪破留為使升透之藥也大抵如開鍋蓋法常欲使邪毒不閉令有出路然力少而鋭嗅之隨效宜常嗅以聚其力諸目病俱可用羌活勝風湯見外障川芎行經散治目中青黤如物傷狀重者白睛如血貫羌活白芷防風荊芥薄荷蔓荊子獨活各四分柴胡炙甘草當歸川芎枳殼各六分桔梗五分茯苓三分紅花少許水二盞煎至一盞去渣大熱服食後上方以枳殼甘草和胃氣為君白芷防風荊芥薄荷獨活療風邪升胃氣為臣川芎當歸紅花行滯血柴胡去結氣茯苓分利除濕為佐羌活蔓荊子引入太陽經桔梗利五臟為使則胃脈調小腸膀胱皆邪去凝行也見熱者以消凝大丸子主之消凝大丸子治證同上或有眵淚沙澀並治川芎當歸桔梗炙甘草連翹菊花各七錢防風荊芥羌活藁本薄荷各半兩滑石石膏白朮黃芩山梔各一兩先將滑石石膏另研余作細末和勻煉蜜為劑每劑一兩分八丸每服一丸或二丸茶湯嚼下上方消凝滯藥也君以川芎當歸治血和血臣以羌活防風荊芥藁本薄荷桔梗療風散邪引入手足太陽經佐以白朮甘草滑石石膏調補胃虛通泄滯氣除足陽明經熱使以黃芩山梔連翹菊花去熱除煩淫反克風熱不制者俱宜服也黑神散見鼻衄消風散見頭痛洗肝散見目赤菊花散和劑治肝受風毒眼目赤腫昏暗羞明多淚澀痛白蒺藜炒去刺羌活去蘆不見火木賊去節蟬蛻去頭足各三兩菊花去梗六兩為細末每服二錢食後茶清湯調服四物湯見虛勞養正丹蘇子降氣湯並見氣黑錫丹見諸逆衝上三黃丸見發熱四物龍膽湯見目痛散熱飲子保命治眼赤暴發腫防風羌活黃芩黃連各一兩每服半兩水二盞煎食後溫服大腑祕加大黃一兩痛甚加川當歸地黃煩躁不得臥加梔子一兩瀉青丸見頭痛竹葉湯治肝臟實熱目赤腫痛淡竹葉黃芩去黑心犀角屑木通炒各一兩車前子黃連去須玄參各一兩二錢半芒硝二兩梔子仁大黃微炒各一兩半上㕮咀每服五錢水一盞半煎至八分去滓食後溫服龍膽飲治同前龍膽草梔子仁各二錢防風山茵陳川芎玄參荊芥甘菊花楮實甘草各一錢上為細末每服一錢半食後茶清調下決明子湯治肝臟實熱目眥生赤肉澀痛決明子炒柴胡去苗黃連去須苦竹葉防風去叉升麻各七錢半細辛去苗二錢半菊花甘草炙各半兩上㕮咀每服五錢水一盞半煎八分去滓食後溫服麥門冬湯治肝實熱毒氣上熏於目赤腫痛癢麥門冬去心秦皮去粗皮赤茯苓去黑皮萎蕤各一兩半大黃生用升麻各一兩上銼片每服五錢水一盞半入竹葉十片煎至八分去滓入朴硝末一錢更煎令沸空心溫服瀉肝散治肝熱赤眼腫痛梔子仁荊芥大黃甘草以上各等分每服二錢水煎食後服羊肝丸見目痛助陽和血補氣湯東垣治眼發後上熱壅白睛紅多眵淚無疼痛而隱澀難開此服苦寒藥太過而真氣不能通九竅也故眼昏花不明宜助陽和血補氣方見目痛退赤散大黃黃芩黃連白芷赤芍藥當歸山梔子各等分上銼為散桑白皮同煎食後服退赤丸生地黃草決明黃芩當歸白朮木通連翹甘草各等分上為細末煉蜜丸如梧桐子大每服四十丸淡竹葉煎湯吞下退赤山梔子一兩當歸酒浸五錢大黃煨甘草炙各二錢上㕮咀為散每服三錢水一盞半煎至七分去滓溫服去赤脈赤芍藥二兩川芎熟地黃當歸山梔子各一兩上㕮咀為散水煎服碧天丸東垣治目疾纍服寒涼不愈兩目蒸熱有如火熏赤而不痛紅絲血脈滿目貫睛瞀悶昏暗羞明畏日或上下瞼赤爛或不伏風土而內外鋭眥皆破以此洗之瓦粉炒一兩銅緑七分為末枯白礬二分是一錢中五分之一上研銅緑白礬令細旋旋入瓦粉研勻熱水和之共為一百丸每用一丸熱湯半盞浸一二個時辰洗至覺微澀為度少閣眼半時辰許臨臥更洗了瞑目就睡尤神妙一丸可洗十日如再用湯內頓熱此藥治其標為裡熱治已去矣裡實者不宜用此當瀉其實熱本事針頭丸治男婦室女小兒諸般赤眼川烏尖七枚懷干白殭蠶七枚去嘴懷干硼砂十文上為末用豬膽汁調藥成軟塊攤碗內荊芥艾各一兩皂角小者一莖燒將藥碗覆熏之常將藥膏攪勻轉又攤又熏以皂角荊芥艾盡為度再搜成塊用油紙裹入地中出火毒冬天兩日夜夏天一夜春秋一日夜取出丸如針頭大每一丸點眼中妙救苦丸保命治眼暴赤發嗔痛甚者黃連一兩川當歸二錢甘草一錢上銼細水半碗浸一宿以慢火熬約至減半綿絞去渣令淨再熬作稠膏攤在碗上倒合以物蓋之用熟艾一大塊如彈子底下然之熏膏子艾盡為度入下項藥硃砂一錢飛腦子五分乳香沒藥研各等分上研入膏和丸如米大每用兩丸點眼兩角仰面臥藥化方起廣大重明湯東垣治兩目瞼赤爛熱腫疼痛並稍赤及眼瞼癢極抓至破爛赤腫眼楞生瘡癡目多眵痛隱澀難開草龍膽梢防風甘草根細辛各等分上銼如麻豆大內甘草不銼只作一挺先以水一大碗半煎草龍膽一味幹一半再入餘三味煎至小半碗去渣用清汁帶熱洗以重湯頓令熱日用五七次洗畢閣眼須臾即去胬肉縱長及癢亦減矣滌風散治風毒攻眼赤腫癢痛黃連去須蔓荊子各半兩五倍子三錢上銼細分三次新汲水煎濾清汁以手沃洗截惡眼立效方明礬好者黑豆大山梔子一枚剝去皮上咬啐用無糨絹帛包定以井水小半盞浸之候水浸透水黃洗眼二三十次一宿次早無事立效攻毒散治風毒上攻兩眼暴赤隱澀難開上用乾薑不以多少洗淨㕮咀每用二錢以薄綿緊裹沸湯泡乘熱洗如冷再溫洗湯泡散治肝虛風熱攻眼赤腫羞明漸生翳膜杏仁防風黃連去須赤芍藥當歸尾各半兩銅青二錢薄荷葉三錢上銼散每用二錢極沸湯泡乘熱先熏後洗冷則再暖用日兩三次一方入白鹽少許閉目沃洗鹽亦散血垂柳枝煎治風赤眼垂柳枝桃枝枸杞枝桑枝各長二寸各七莖馬牙硝二錢半細研竹葉四十九片黃連去須決明子各半兩龍腦細研半錢上除硝龍腦外以漿水二大盞於銅器中煎至一半去滓以綿濾淨入硝及龍腦攪勻更煎令稠每以銅箸頭取如小豆許點眼日三五次又方治一切風赤眼眼皮上瘙癢赤爛久治不效此藥之功不可具述輕粉十字白蜜白蠟各三株臘月豬脂半兩上先溶豬脂成油漸下蜜次下蠟候三味總化成油入輕粉攪令勻非時搽眼赤皮上銅青湯治風弦赤眼銅青黑豆大防風一寸許杏仁二粒去尖不去皮上各細切於盞中新汲水浸湯瓶上頓令極熱洗之如痛加當歸數片治風赤澀痛取訶黎勒核入白蜜研注目中神良一方以鷹嘴者一枚滴蜜於石磨點治風熱生膚赤白眼及去眼中風癢痛搗枸杞子汁點眼立驗亦治暴赤眼風熱赤膜一方用葉搗汁含一滿口待稍溫就咽之拜堂散治風赤眼上以五倍子研細末貼破赤處熏洗方治風眼爛弦臨洗加輕粉少許凡時氣赤眼自外而入非臟腑病者不必服藥熏洗足矣黃連去毛川芎去蘆荊芥穗各一錢半蔓荊子一錢去膜五倍子三錢剪碎去垢銚內火炒待赤色鋪紙地上用蓋片時出火氣上銼碎作三服每服用生絹一小方洗淨入藥絹內以線扎定水煎仍以紙糊瓶口勿令氣出卻於無風處就瓶口紙上破小孔向眼熏之候氣稍平揭去紙就瓶口熏之氣溫傾藥水出用淨絹蘸洗如此三次為驗仍避風毒嗅鼻藥治目風熱腫赤難開雄黃水透辰砂各二錢半細辛半兩片腦麝香各少許上為細末口含水少許嗅鼻中瘀血灌睛宣明丸治眼內血灌瞳神赤腫澀痛大熱上壅赤芍藥當歸黃連生地黃大黃川芎薄荷黃芩各等分上為末煉蜜丸梧子大每服三十丸食後米飲下分珠散治眼患血灌瞳神惡血不散槐花白芷地黃梔子荊芥甘草黃芩龍膽草赤芍藥當歸各一兩上水煎服春加大黃瀉肝夏加黃連瀉心秋加桑白皮瀉肺麥門冬湯治血灌瞳神昏澀疼痛及轆轤轉關外障麥門冬去心焙大黃炒黃芩去黑心桔梗銼炒玄參各一兩細辛去苗芒硝研各半兩上銼研每服五錢匕水一盞半煎至七分去滓下芒硝少許食後溫服通血丸治血灌瞳神生地黃赤芍藥甘草各五錢川芎防風荊芥當歸各一兩上為末煉蜜丸如彈子大食後荊芥薄荷湯嚼下血即散而歸肝又恐目生花須再用前還睛散服之膽歸糖煎散治血灌瞳神及暴赤目疼痛或生翳膜龍膽草細辛當歸防風各二兩上用砂糖一小塊同煎服車前散治肝經積熱上攻眼目逆順生翳血灌瞳人羞明多淚車前子炒密蒙花去枝草決明白蒺藜炒去刺龍膽草洗淨黃芩羌活菊花去枝粉草各等分上為細末每服二錢食後米湯調服真珠散治眼血灌瞳人生障膜真珠水晶琥珀馬牙硝各半兩硃砂一兩龍腦一分上同研如粉以銅箸取如半小豆大點之血灌瞳神四物湯地黃用生芍藥用赤益陰腎氣丸見內障單方用生地黃汁溫服一盞頻服以瘥為度色似胭脂退血散當歸赤芍藥木賊防風細辛龍膽草各等分㕮咀白水煎先乘熱熏眼後溫服赤脈貫睛芍藥清肝散見前赤絲亂脈點眼蕤仁膏治風熱眼飛血赤脈癢痛無定蕤仁去皮細研半兩好酥一栗子大上將蕤仁與酥和研勻攤碗內用艾一小團燒煙出將碗覆煙上熏待艾煙盡即止重研勻每以麻子大點兩眥頭日二度魚膽敷眼膏治飛血赤脈作痛及暴赤眼澀鯉魚膽五枚黃連去須研末半兩上以膽汁調黃連末內瓷盒盛飯上蒸一次取出如干入蜜少許調似膏塗敷目眥日五七度目珠俱青還陰救苦湯見前目腫脹麥門冬湯瀉肝散龍膽飲俱見目赤金絲膏治風熱上攻目赤腫痛黃連去須二兩大黃黃柏去粗皮龍膽草山梔仁當歸各一兩青竹葉一百片切大棗二十枚去核燈芯切硼砂明者乳香研各二錢五分上用水五升不拘冬夏浸一時辰取出於銀石器內慢火熬不令大沸候泣盡汁輟下火放冷用絹絞取汁於無風塵處澄一時辰去滓於銀器內用慢火熬令減半入白蜜半斤同攪候有蜜者以手挑起有絲則止放冷再以夾絹袋濾過用瓷盒盛之每取一茶腳許研龍腦一字極細入膏同研一二千遍令勻取少許點之琥珀煎治風毒沖目腫赤癢痛乳香另研二錢蕤仁另研半兩滑石另研鉛丹另研各二兩黃連另研青皮各一兩黃芩去黑心白蜜各四兩木鱉子十枚去殼槐枝柳枝並用新青者各一十枝每枝長一寸半上將槐柳枝青皮黃芩滑石以水三碗同煎至兩碗去滓下乳香蕤仁鉛丹木鱉子與蜜同熬如琥珀色卻下黃連末再煎至一碗半用熟絹濾去渣入瓷器內密封繩系墜井底一宿出火毒每用銅箸點以目澀為度熬點俱忌鐵器滌風散見目赤大黃丸桑白皮散青皮湯玄參丸瀉肺湯硃砂煎俱見前目痛條腫脹如杯洗肝散見前瀉青丸見頭痛神芎丸治濕熱內甚目赤腫或白睛黃色大黃黃芩各二兩牽牛滑石各四兩黃連薄荷川芎各半兩上為末水丸如小豆大溫水下十丸至十五二十丸形如蝦座宣明丸分珠散俱見前狀若魚胞桑白皮散玄參丸瀉肺湯見目痛鶻眼凝睛四物湯加醉將軍連翹散見目赤旋矑泛起瀉肝散升麻大黃赤芍藥黃芩薄荷梔子木賊陳皮黃連朴硝菊花甘草防風五靈脂葶藶細辛各等分上為細末每服二錢為散亦可水煎服食後老人加枳殼厚朴救睛丸治睛腫旋螺突出青盲有翳蒼朮枳實甘草川芎荊芥蟬蛻薄荷當歸木賊草決明穀精草各等分上為末煉蜜丸彈子大每服一丸食後茶清磨下旋螺尖起搜風散治旋螺尖起外障防風大黃天門冬五味子桔梗細辛赤芍藥茺蔚子等分上水煎食後服法制黑豆大黃黃連黃芩各半兩甘草密蒙花朴硝各一兩上為末用黑豆一升水三碗入藥煮乾將豆每服二十粒細嚼清米泔送下還睛丸川芎白蒺藜白朮木賊羌活菟絲子熟地黃甘草各等分上為細末煉蜜丸如彈子大空心熟湯嚼下神珠自脹查前去風熱劑中加破血收斂之藥珠突出眶分珠散見目赤糖煎散治風毒攻眼赤腫昏花隱澀難開龍膽草防己大黃荊芥穗赤芍藥土當歸甘草防風各一兩川芎半兩上㕮咀為散每服四錢水一盞砂糖一小塊同煎服水淋法治眼睛腫脹突出新汲水沃眼中頻數換水眼睛自入更以麥門冬桑白皮梔子仁煎湯通口服田螺膏治眼睛腫脹突出及赤眼生翳膜田螺七枚去殼撮地金錢多生地黃根田茶菊葉上同搗爛貼太陽穴及眼泡洗障散附治障眼及眼泡赤腫翳膜遮睛田茶菊七層樓鐵梗子雞屎子上水煎碗盛入鹽少許泡去渣洗眼洗翳散治同上赤梗酸枇草搗爛沸湯泡濾清洗眼神效土朱膏治患眼赤腫閉合土朱三分石膏煅一分片腦少許上為末新汲水入蜜調敷眼眥頭尾及太陽處更以梔子煎湯調治眼流氣飲末服之清涼膏治暴赤火眼腫痛難開及瘴眼並打撲傷損眼大黃朴硝黃連黃柏赤芍藥當歸細辛薄荷芙蓉葉各等分上為末用生地黃汁雞子清蜜同調勻貼太陽穴及眼泡上地黃膏治赤腫疼痛外障等眼大黃黃柏黃連黃芩赤芍藥當歸緑豆粉芙蓉葉薄荷各等分上制貼法俱同上目癢驅風一字散治目癢極難忍川烏炮川芎荊芥各五錢羌活防風各二錢半上為末每服二錢食後薄荷湯調下乳汁煎見目淚四生散治腎風上攻眼目作癢或作昏花白附子黃耆獨活蒺藜各等分上為末每服二錢用豬腰子一枚批開入藥濕紙包裹煨熟細嚼鹽湯下風癬酒下人參羌活散治肝熱眼澀癢昏矇羌活獨活人參川芎柴胡桔梗枳殼赤茯苓前胡天麻甘草地骨皮上水煎服或加防風荊芥菩薩散治風毒攻眼昏淚颼癢蒼朮防風蒺藜炒各二兩荊芥二兩半甘草鹽水炒七錢半上末每服一錢入鹽少許沸湯調下或用消風散夾和亦佳杏仁龍膽草泡散治風上攻眊燥赤癢龍膽草當歸尾黃連滑石另研取末杏仁去皮尖赤芍藥各一錢以白沸湯泡頓蘸洗冷熱任意不拘時候上方以龍膽草黃連苦寒去熱毒為君當歸尾行血杏仁潤燥為佐滑石甘寒泄氣赤芍藥苦酸除癢為使惟風癢者可用外障簡要夏枯草散即補肝散見目痛選奇湯眉痛羌活除翳湯東垣治太陽寒水翳膜遮睛不能視物麻黃根二錢半薄荷葉二錢生地黃酒洗一錢當歸根川芎各三錢黃柏四錢知母五錢酒製荊芥穗煎成方入藁本各七錢防風一兩羌活一兩半川椒五分細辛少許上為㕮咀每服三錢水三大盞煎至一盞半入荊芥穗再煎至一盞去滓食後稍熱服忌酒濕面撥雲湯東垣戊申六月徐總管患眼疾於上眼皮下出黑白翳二個隱澀難開兩目緊縮而無疼痛兩手寸脈細緊按之洪大無力知足太陽膀胱為命門相火煎熬逆行作寒水翳及寒膜遮睛與下項藥一服神效外證呵欠善悲健忘嚏噴時自淚下面赤而白能食不大便小便數而欠氣上而喘黃耆柴胡各七分細辛葉葛根川芎各五分生薑甘草梢川升麻藁本知母當歸身荊芥各一錢防風羌活黃柏各一錢半水二大盞煎至一盞稍熱服食後流氣飲和劑治肝經不足內受風熱上攻眼目昏暗視物不明常見黑花當風多淚怕日羞明堆眵赤腫隱澀難開或生障翳倒睫拳毛眼弦赤爛及婦人血風眼及時行暴赤腫眼眼胞紫黑應作眼病並宜服之大黃煨川芎菊花去梗牛蒡子炒細辛去苗防風去苗山梔子去皮白蒺藜炒去刺黃芩去蘆蔓荊子荊芥去梗木賊去根節甘草炙玄參去蘆各一兩草決明一兩半蒼朮米泔浸一宿控炒三兩上搗羅為末每服二錢半臨臥時用冷酒調下小兒有患只令乳母服之撥雲散寶鑑治眼因發濕熱不退而作翳膜遮睛昏暗羞明隱澀難開川芎草龍膽楮實薄荷羌活荊芥穗石決明草決明蒼朮大黃甘草木賊密蒙花連翹川椒甘菊花桔梗石膏地骨皮白芷白蒺藜檳榔以上各半兩石燕一對重半兩上搗羅細末每服三錢溫茶清一盞調下食後日三服忌雜魚鳥諸肉溫白丸見積聚神仙退云丸東垣治一節翳暈內外障昏無睛者川芎當歸各一兩半犀角酒洗枳實川楝子蟬蛻洗薄荷葉不見火甘菊花各半兩栝蔞仁生者六錢蛇蛻密蒙花荊芥穗各二錢此三味同甘草焙乾去甘草不用地骨皮洗白蒺藜微炒去刺生地黃酒洗焙乾羌活各一錢川木賊一兩半去節童便浸一宿焙乾上為細末煉蜜和丸每一兩作十丸米泔湯調服日進二三丸食後婦人當歸湯下有氣者木香湯下使之在人消息本事方治諸眼患因熱病後毒氣攻眼生翳膜遮障服此藥逐旋消退不犯刀針青葙子防風枳殼各一兩茺蔚子細辛黃連各半兩枸杞子澤瀉生地黃石決明各一兩半車前子川當歸麥門冬去心各二兩上各如法修事焙乾為末煉蜜丸如梧子大每服三十丸飯飲吞下忌一切熱毒物羌活退翳湯羌活五味子黃連升麻當歸身各二錢黃芩黃柏酒炒草龍膽酒洗芍藥甘草各五錢柴胡黃耆各三錢防風一錢半石膏二錢半上銼細分作二服水二盞煎至一盞入酒少許去渣臨臥熱服忌言語消翳散一名龍膽飲子青蛤粉穀精草川鬱金各半兩羌活龍膽草黃芩各三錢炒升麻二錢麻黃一錢半蟬蛻一作蛇蛻甘草根炙各五分上為細末每服二錢食後溫茶調下又方川芎羌活旋覆花防風各二兩甘草蒼朮米泔浸一宿去皮日乾不見火楮實楮葉並八月採陰乾各一兩甘菊花枳實蟬蛻木賊各一錢半上木臼中杵為末茶清調下二錢早食後臨臥各一服治暴赤眼忌濕面及酒楮實須真無實者取葉不爾諸藥無效合時不得焙及犯鐵器豫觀此方取楮葉必無實者蓋陰陽二合相匹配耳有實者陽也無實取葉者陰也所以不得真楮實者悉無效五秀重明丸寶鑑治眼膜遮睛隱澀昏花常服清利頭目甘菊花開頭五百朵荊芥五百穗木賊去節五百節楮實五百枚川椒開口者五百粒上為細末煉蜜為丸如彈子大每服一丸細嚼時時咽下食後噙化無時臨臥大忌酒面熱物以上二方無熱者宜之羚羊角散保命治水翳久不去者羚羊角升麻細辛各等分甘草半之上為末一半煉蜜為丸每服五七十丸用一半為散以泔水煎吞丸子食後補陽湯東垣柴胡去苗二兩獨活甘草梢熟地黃人參去蘆黃耆一方用黃芩羌活白朮各一兩白芍藥澤瀉研為末防風陳皮去白各半兩當歸身去蘆酒製生地黃炒白茯苓去皮知母炒黃色各三錢肉桂一錢上為粗末每服半兩水二盞煎至一盞去滓溫服空心使藥力行盡方許食連柏益陰丸羌活獨活甘草根炒當歸身酒製防風五味子各半兩黃連酒洗或拌銼炒火色一兩石決明燃存性五錢草決明黃芩黃柏知母各一兩上為細末煉蜜丸如緑豆大每服五十丸漸加百丸止臨臥清茶送下常以助陽湯多服少服此藥一則妨飲食二則力大如升陽湯不可多服升陽泄陰丸一名升陽柴胡湯羌活獨活甘草根當歸身白芍藥熟地黃各一兩人參生地黃酒洗炒黃耆白朮楮實酒炒各半兩澤瀉陳皮白茯苓防風各三錢知母酒炒三錢如大暑加一錢柴胡去苗一錢半肉桂半錢上㕮咀每服五錢水煎熱服另合一料煉蜜丸如桐子大食遠茶清送下每日五十丸與前藥各一服不可飽服如天氣熱甚加五味子三錢或半兩天門冬去心半兩楮實亦加半兩上三方合治一證空心補陽湯臨臥連柏丸食遠升陽泄陰丸羌活勝風湯原機治眵多眊燥緊澀羞明赤脈貫睛頭痛鼻塞腫脹涕淚腦巔沉重眉骨痠疼外翳如雲霧絲縷稱星螺蓋白朮五分枳殼羌活川芎白芷獨活防風前胡桔梗薄荷各四分荊芥甘草各三分柴胡七分黃芩五分作一服水二盞煎至一盞去滓熱服上方為風熱不制而作也夫竅不利者皆脾胃不足之證故先以白朮枳殼調治胃氣為君羌活川芎白芷獨活防風前胡諸治風藥皆主升發為臣桔梗除寒熱薄荷荊芥清利上焦甘草和百藥為佐柴胡解熱行少陽厥陰經黃芩療上熱主目中赤腫為使又治傷寒愈後之病熱服者熱性炎上令在上散不令流下也生翳者隨翳所見經絡加藥翳凡自內眥而出者加蔓荊子治太陽經加蒼朮去小腸膀胱之濕內眥者手太陽足太陽之屬也自鋭眥而入客主人斜下者皆龍膽草為膽草味苦與膽昧合小加人參益三焦之氣加藁本乃太陽經風藥鋭眥客主人者足少陽手少陽手太陽之屬也凡自目系而下者倍加柴胡行肝氣加黃連瀉心火目系者足厥陰手少陰之屬也自抵過而上者加木通導小腸中熱五味子酸以收斂抵過者手太陽之屬也嗅鼻碧雲散見目痛還陰救苦湯見目赤撥雲退翳丸治陽蹺受邪內眥即生赤脈縷縷根生瘀肉瘀肉生黃赤脂脂橫侵黑睛漸蝕神水鋭眥亦然俗名攀睛蔓荊子木賊去節密蒙花各二兩川芎白蒺藜去刺當歸各一兩半菊花荊芥穗地骨皮各一兩川椒皮七錢天花粉六錢薄荷葉楮桃仁黃連蟬蛻各半兩蛇蛻炙甘草炙各三錢為細末煉蜜成劑每兩作八丸每服一丸食後臨臥細嚼茶清下上方為奇經客邪而作也八十一難經曰陽蹺脈者起於跟中循外踝上行入風池風池者腦戶也故以川芎治風入腦以菊花治四肢遊風一療其上一平其下為君蔓荊子除手太陰之邪蟬蛻蛇蛻木賊草密蒙花除郁為臣薄荷葉荊芥穗白蒺藜諸療風者清其上也楮桃仁地骨皮諸通小便者利其下也為佐黃連除胃中熱天花粉除腸中熱甘草和協百藥川椒皮利五臟明目諸所病處血亦病故復以當歸和血為使也楮桃仁即楮實子也梔子勝奇散治證同上並有眵淚羞澀難開蛇蛻草決明川芎荊芥穗蒺藜炒穀精草菊花防風羌活密蒙花甘草炙蔓荊子木賊草山梔子黃芩各等分為細末每服二錢食後臨睡熱茶清調下上方以蛇蛻之鹹寒草決明之鹹苦為君為味薄者通通者通其經絡也川芎荊芥穗之辛溫白蒺藜穀精草之苦辛溫菊花之苦甘平防風之甘辛為臣為氣辛者發熱發熱者升其陽也羌活之苦甘溫密蒙花之甘微寒甘草之甘平蔓荊子之辛微寒為佐為氣薄者發泄發泄者清利其諸關節也以木賊草之甘微苦山梔子黃芩之微苦寒為使為厚味者泄泄者攻其壅滯有餘也磨障靈光膏治證同上黃連銼如豆大一兩童便浸一宿曬為末黃丹水飛三兩爐甘石六兩另以黃連一兩銼置水中燒爐甘石通紅淬七次當歸取細末二錢輕粉另研硇砂另研末白丁香取末海螵蛸取末各一錢麝香另研乳香另研各半錢龍腦少許末先用好白沙蜜一十兩或銀器砂鍋內熬五七沸以淨紙搭去蠟面除黃丹外下余藥用柳木攪勻次下黃丹再攪慢火徐徐攪至紫色卻將乳香麝香輕粉硇砂和勻入上藥內以不黏手為度急丸如皂角子大以紙裹之每用一丸新汲水化開旋入龍腦少許時時點翳上上方以黃連去邪熱主明目為君以黃丹除熱除毒爐甘石療濕收散為臣以當歸和血脈麝香乳香眥香通氣輕粉殺瘡為佐以硇砂之能消海螵蛸之磨翳白丁香之主病不移龍腦之除赤脈去外障為使也消翳復明膏治證同上黃丹水飛四兩訶子八個去核取末海螵蛸三錢取末青鹽另研一兩白蜜一斤先將蜜熬數沸淨紙搭去蠟面卻下黃丹用棍攪勻旋下余藥將至紫色取出黃連十兩龍膽草二兩木賊一兩杏仁七十五粒去皮尖蕤仁半兩通入瓷器內水一斗浸之春秋五日夏三日冬十日入鍋內文武火熬至小半升濾去渣重湯燉成膏子卻入前藥熬之攪成紫色入龍腦一錢每用少許點上藥干淨水化開用上方以黃連為君為療邪熱也蕤仁杏仁龍膽草為臣為除赤痛潤煩燥解熱毒也黃丹青鹽龍腦白蜜為佐為收濕爛益腎氣療赤腫和百藥也訶子海螵蛸木賊草為使為澀則不移消障磨翳也萬應蟬花散見前黃膜上衝證通脾瀉胃湯防風大黃玄參知母各一兩天門冬黃芩各一兩半麥門冬茺蔚子各二兩每服五錢水一盞煎五分去滓食遠溫服神消散治眼內黃膜上衝赤膜下垂黃芩蟬蛻甘草木賊各五錢穀精草蒼朮各一兩龍蛻三條炒上末每服二錢夜臥冷水調下皂角丸治內外一切障膜此藥能消膜退翳如十六般內障同生熟地黃丸用之神效龍蛻七條蟬蛻玄精石生穿山甲炒當歸白朮白茯苓穀精草木賊各一兩白菊花刺蝟皮蛤粉炒龍膽草赤芍藥連翹各一兩五錢豶豬爪三十枚蛤粉炒人參川芎各半兩上末一半入豬牙皂角二挺燒灰和勻煉蜜丸桐子大每服三十丸空心食前杏仁湯下一半入仙靈脾一兩為末和勻每服用豬肝夾藥煮熟細嚼及用原汁送下日三犀角飲治黃膜上衝犀角二兩白附子炮麥門冬各二錢半車前子羌活黃芩各五錢上水煎食後溫服赤膜下垂炙肝散治外障赤肉翳膜遮睛不明石決明洗穀精草各四兩皂角炙去皮子二錢半黃芩去黑心木賊各五兩甘草炙二兩蒼朮米泔浸七日切片焙半斤上為細末每用豶豬肝一葉去筋膜剺數縫摻藥末五錢於縫內仍摻鹽一錢合定用旋著濕柳枝三四條合起慢火炙香熟早晨空心冷吃盡仍吃冷飯一盞壓之仍於三里穴灸二三七壯三日後有淚下為驗七日翳膜必退每旦用新水漱口洗眼紫金膏和劑治遠年近日翳膜遮障攀睛胬肉昏暗淚多瞻視不明或風氣攻注瞼生風粟或連眶赤爛怕日羞明隱澀難開黃連去須半兩赤芍藥當歸硃砂另研乳香另研硼砂另研各二錢半雄黃研飛二錢麝香另研半錢上為細末入研藥拌勻再研煉蜜丸如皂角子大每服一丸安淨盞內沸湯泡開於無風處洗藥冷閉目少時候三兩時再煨熱依前洗一點可洗三五次不得犯銅鐵器內洗如暴赤眼腫者不可洗通肝散見風障花翳白陷證知母飲子知母茺蔚子各二兩防風細辛各一兩半桔梗大黃茯苓芒硝各一兩每服五錢水一盞煎至五分去滓食後溫服蕤仁散治目生花翳多年不退蕤仁湯浸去赤皮秦艽去苗各一兩枳殼炒黃赤茯苓各一兩半川大黃炒半兩車前子青葙子赤芍藥各七錢半柴胡去苗一兩上為細末每服三錢水一盞煎六分連滓熱服洗肝散治花翳川芎當歸尾赤芍藥防風生地黃白蒺藜木賊蟬蛻羌活薄荷蘇木菊花紅花各五錢甘草三錢㕮咀每服三錢水一盞半松絲十餘根煎服外用通明散七寶膏盧甘散點桑白皮湯治目生花翳白點狀如棗花桑白皮木通各一兩半澤瀉犀角屑黃芩茯神玄參旋覆花川大黃炒各一兩甘菊花半兩甘草炙二錢半上為細末每服一錢匕水一盞煎六分連滓溫服琥珀散治目積年生花翳琥珀珊瑚硃砂硇砂白者馬牙硝各半兩烏賊魚骨半兩先於粗石磨去其澀用好者一錢真珠末一兩上研極細令勻每服三五次點雞距丸治花翳淚出乾薑炮七錢半蕤仁細研雞舌香胡粉各半兩黃連一兩研末礬石熬研一錢二分半為細末棗肉丸如雞距注眼大眥日再蟹睛證防風瀉肝散治蟹眼睛疼防風遠志桔梗羚羊角甘草赤芍藥細辛人參黃芩各等分上為細末溫水調服磁石丸治肝腎虛蟹眼睛疼黃耆青鹽人參紫巴戟蓯蓉附子木香沉香防風牛乳牛膝覆盆子桂心乾薑遠志熟地黃茯苓磁石蒼朮陳皮白朮川芎檳榔大腹皮白芷青皮烏藥獨活各等分上為細末煉蜜丸如梧桐子大每服三十丸溫鹽湯送下七室丸治內障水翳如冰凍堅結睛上先以針撥取之後以此藥散翳石決明搗研二兩茺蔚子人參各一兩琥珀搗研七錢半龍腦二錢半研熊膽真珠搗研各半兩上為細末煉蜜和丸如梧桐子大每服十五丸加至二十丸食前茶清下七寶湯治內障橫翳橫著瞳人中心起而斂脊針撥後用羚羊角鎊犀角鎊各一兩胡黃連車前子石決明刮洗搗研炙甘草各半兩丹砂另研上除丹砂決明外粗搗篩每服三錢匕水一盞煎七分去滓入丹砂末半錢決明末一字再煎兩沸食後溫服清涼散治冰瑕深翳蔓荊子荊芥苦竹葉甘草各半兩梔子二錢半上薄荷水煎服洗刀散治風熱弦爛眼目赤腫內外障翳羞明怕日倒睫出淚兩瞼赤爛紅筋瘀血宜用此藥防風連翹羌活獨活草決明蔓荊子木賊玄參各一兩當歸荊芥滑石薄荷麻黃白朮赤芍藥大黃各五錢黃芩川芎梔子桔梗石膏芒硝蟬蛻白菊花蒺藜各四錢甘草細辛各三錢上薑同煎食後服再用清涼洗眼之藥二黃散治胬肉攀睛黃芩大黃防風薄荷各等分上水煎入蜜少許食後服定心丸治胬肉攀睛石菖蒲枸杞子白菊花各五錢辰砂二錢遠志二錢半麥門冬去心一兩上為末煉蜜丸如桐子大每服三十丸食後熟水下南硼砂散治胬肉瘀突及痘瘡入眼生翳膜南硼砂一錢即白官砂是片腦一分上研細末點眼用玄參麥門冬生地黃煎湯調洗心散末服抽風湯治雞冠蜆肉外障防風桔梗大黃細辛黃芩玄參芒硝車前子上水煎食遠服地黃散治混睛或白睛先赤而後癢痛迎風有淚隱澀難開生地黃一兩芍藥土當歸甘草各半兩每服三錢水一盞半煎至七分食後溫服七寶膏治混睛外障真珠水晶貝齒各一兩石決明琥珀各七錢半空青瑪瑙龍腦各半兩上為細末研勻水五升石器內煎至一升去滓再煎至一盞入蜜半兩煎和為膏每至夜臥時點之早晨不得點羚羊角飲子治黑翳如珠外障羚羊角五味子細辛大黃知母芒硝各一兩防風二兩上銼碎每服五錢水一盞煎至五分去滓食後溫服補腎丸治證同上人參茯苓細辛五味子肉桂桔梗各一兩乾山藥柏子仁各二兩半