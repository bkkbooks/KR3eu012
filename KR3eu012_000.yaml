赤瞼重頭中濕淫膚翳睛痛肝風盛眼黑腎虛桔梗一斤牽牛頭末二兩上為細末煉蜜丸如桐子大每服四五十丸至一百丸食前溫水下日二次柴胡復生湯原機治紅赤羞明淚多眵少腦巔沉重睛珠痛應太陽眼睫無力常欲垂閉不敢久視久視則痠疼翳陷下所陷者或圓或方或長或短如縷如錐如鑿柴胡六分蒼朮茯苓黃芩各半錢薄荷桔梗炙甘草白芍藥各四分羌活獨活藁本蔓荊子川芎白芷各三分半五味子二十粒水二盞煎至一盞去滓食後熱服上方以藁本蔓荊子為君升發陽氣也川芎白芍羌活獨活白芷柴胡為臣和血補血療風行厥陰經也甘草五味子為佐為協諸藥斂臟氣也薄荷桔梗蒼朮茯苓黃芩為使為清利除熱去濕分上下實脾胃二土療目中赤腫也此病起自七情五賊勞役飢飽故使生意下陷不能上升今主以群隊升發輔以和血補血導入本經助以相協收斂用以清利除熱實脾胃也睛珠痛甚者當歸養榮湯主之當歸養榮湯治睛珠痛甚不可忍余治同上白芍藥熟地黃當歸川芎各一錢羌活防風白芷各一分半上煎服法同上上方以七情五賊勞役飢飽重傷脾胃脾胃者多血多氣之所脾胃受傷則血亦病血養睛睛珠屬腎今生意已不升發又復血虛不能養睛故睛痛甚不可忍以防風升發生意白芷解利引入胃經為君白芍藥止痛益氣通血承接上下為臣熟地黃補腎水真陰為佐當歸川芎行血補血羌活除風引入少陰經為使血為邪勝睛珠痛者及亡血過多之病俱宜服也服此藥後睛痛雖除眼睫無力常欲垂閉不減者助陽活血湯主之助陽活血湯治眼睫無力常欲垂閉余治同上黃耆炙甘草當歸防風各五分白芷蔓荊子各四分升麻柴胡各七分水二盞煎至一盞去滓稍熱服上方以黃耆治虛勞甘草補元氣為君當歸和血補血為臣白芷蔓荊子防風主療風升陽氣為佐升麻導入足陽明足太陰脾胃柴胡引至足厥經肝經為使心火乘金水衰反制者亦宜服也有熱者兼服黃連羊肝丸黃連羊肝丸治目中赤脈紅甚眵多余治同上黃連一錢白竭羊肝一個先以黃連研為細末將羊肝以竹刀刮下如糊除去筋膜入擂盆中研細入黃連末為丸如桐子大每服三五十丸加至七八十丸茶清湯下忌豬肉及冷水上方以黃連除熱毒明目為君以羊肝肝與肝合引入肝經為使不用鐵器者金剋木肝乃木也一有金氣肝則畏而不受蓋專治肝經之藥非與群隊者比也肝受邪者並皆治之睛痛者加當歸決明益陰丸治畏日惡火沙澀難開眵淚俱多久病不痊者立皆治之余治同上羌活獨活歸尾酒製五味子甘草炙防風各五錢石決明煅三錢草決明黃芩黃連酒製黃柏知母各一兩上為末煉蜜丸桐子大每服五十丸加至百丸茶湯下上方以羌活獨活升清陽為君黃連去熱毒當歸尾行血五味收斂為臣石決明明目磨障草決明益腎療盲防風散滯祛風黃芩去目中赤腫為佐甘草協和諸藥黃柏助腎水知母瀉相火為使此蓋益水抑火之藥也內急外弛之病並皆治之加減地黃丸除風益損湯俱見為物所傷龍腦黃連膏嗅鼻碧雲散俱見目赤當歸補血湯原機治男子衄血便血婦人産後崩漏亡血過多致睛珠疼痛不能視物羞明酸澀眼睫無力眉骨太陽俱各痠痛當歸熟地黃各六分川芎牛膝白芍藥炙甘草白朮防風各五分生地黃天門冬各四分水二盞煎至一盞去滓稍熱服噁心不進食者加生薑煎上方專補血故以當歸熟地黃為君川芎牛膝白芍藥為臣以其祛風續絶定痛而通補血也甘草白朮大和胃氣用以為佐防風升發生地黃補腎天門冬治血熱謂血亡生風燥故以為使滋陰地黃丸見目昏選奇湯見頭痛抵聖散治目偏風牽疼痛荊芥穗二兩芎藭羌活去蘆楮實麩炒木賊各一兩甘草炙半兩上為細末每服二錢食後茶清調服菊花散本事治肝腎風毒熱氣上衝眼痛甘菊花牛蒡子炒各八兩防風三兩白蒺藜去刺一兩甘草一兩五錢上為細末每服二錢熟水調下食後臨臥瀉青丸治眼暴發赤腫疼痛見頭痛洗肝散和劑治風毒上攻暴作赤目腫痛難開隱澀眵淚薄荷葉當歸羌活防風山梔仁甘草炙大黃川芎各二兩上為細末每服二錢食後熟水調下四物龍膽湯海藏治目赤暴作雲翳疼痛不可忍四物湯各半兩羌活防風各三錢草龍膽酒拌炒焦防己各二錢上水煎服本事地黃丸治風熱上攻眼目澀痛不可服補藥者熟地黃一兩半黃連決明子各一兩沒藥菊花防風羌活肉桂硃砂各半兩細末蜜丸梧子大每服三十丸食後熟水下桑白皮散治肺氣壅塞毒熱上攻眼目白睛腫脹日夜疼痛心胸煩悶桑白皮玄參川升麻旋覆花去枝梗赤芍藥杏仁甘菊花去枝梗甜葶藶炒防風去蘆黃芩枳殼去瓤麩炒甘草炙各一兩上㕮咀每服四錢水一盞半生薑三片煎至八分去滓食後溫服大黃丸治白睛腫脹痛不可忍大黃銼炒蔓荊子去皮甘菊花土瓜根防風去杈陳皮去白青皮去瓤黃連去須前胡丹參吳藍葳蕤各一兩決明子微炒冬瓜子青葙子地膚子車前子各一兩半上為細末煉蜜和丸如梧桐子大每服三十丸食前用溫酒送下玄參丸治肺臟積熱白睛腫脹遮蓋瞳人開張不得赤澀疼痛玄參川升麻漢防己羚羊角屑沙參車前子梔子仁桑根白皮杏仁湯浸去皮尖雙仁麩炒黃各一兩大麻仁川大黃微炒各一兩半上為細末煉蜜和丸如桐子大每服二十丸食後以溫水送下臨臥時再服瀉肺湯治暴風客熱外障白睛腫脹羌活玄參黃芩各一兩半地骨皮桔梗大黃芒硝各一兩上銼碎每服五錢水一盞煎至五分去滓食後溫服硃砂煎治眼白睛腫起赤澀疼痛硃砂細研杏仁湯浸去皮尖青鹽各二錢半馬牙硝細研黃連細研各半兩上研勻綿裹以雪水參合浸一宿濾入瓷盒中每用以銅箸點之洗眼青皮湯治眼白睛腫起赤磣痛癢青皮