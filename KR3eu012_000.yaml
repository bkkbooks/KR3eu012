涎祛煩熱除驚悸療咽乾口燥育養心氣熟地黃洗人參去蘆白茯苓去皮遠志去心石菖蒲去毛玄參柏子仁桔梗去蘆天門冬去心丹參洗酸棗仁去殼炒甘草炙麥門冬去心百部洗杜仲薑汁炒斷絲茯神去木當歸去蘆尾五味子去枝梗各等分上為末煉蜜丸每兩作十丸金箔為衣每服一丸燈芯棗湯食後臨臥化下或作梧桐子大丸吞服亦可雙補丸得效治腎虛水涸燥渴勞倦鹿角膠二兩白茯苓去皮人參去蘆薏苡仁炒熟地黃洗蒸肉蓯蓉酒浸焙乾菟絲子酒浸蒸焙覆盆子五味子石斛酒浸焙當歸去蘆酒浸焙黃耆去蘆蜜炙宣木瓜各一兩沉香不見火澤瀉蒸各半兩生麝一錢另研上為細末煉蜜為丸如桐子大硃砂為衣每服五十丸空心棗湯送下腎瀝散治消腎腎氣虛損發渴小便數腰膝痛雞䏶胵微炙遠志去心人參桑螵蛸微炒黃耆澤瀉桂心熟地黃白茯苓龍骨當歸以上各一兩麥門冬去心川芎各二兩五味子炙甘草玄參各半兩磁石三兩研碎水淘去赤汁上銼碎每服用羊腎一對切去脂膜先以水一盞半煮腎至一盞去水上浮脂及腎次入藥五錢生薑半分煎至五分去滓空心服晚食前再服金銀箔丸治消腎口乾眼澀陰痿手足煩疼小便多金箔一百片銀箔一百片俱細研丹砂細研栝蔞根各二兩巴戟去心山藥五味子澤瀉各一兩半天門冬去心肉蓯蓉酒浸一宿切焙乾各二兩半黃連四兩白茯苓去皮生地黃焙葛根各三兩麥門冬去心焙三兩半上除別研藥外為細末再研勻煉蜜和丸如梧桐子大每服二十丸加至三十丸不拘時粟米飲送下白茯苓丸治消腎因消中之後胃熱入腎消爍腎脂令腎枯燥遂致此疾兩腿漸細腰腳無力白茯苓覆盆子黃連栝蔞根萆薢人參熟地黃玄參以上各一兩石斛去根蛇床子各七錢半雞䏶胵三十具微炒上為細末煉蜜和搗三五百杵丸如桐子大每服三十丸食前煎磁石湯送下龍鳳丸鹿茸一兩酒炙菟絲子酒浸山藥各二兩上為細末煉蜜丸如桐子大每服三十丸食前米飲送下濃煎人參湯亦可一方用麵糊為丸鹽酒鹽湯任下一名龍肝鳳髓丸參耆湯人參桔梗天花粉甘草各一兩綿黃耆鹽湯浸炙白芍藥各二兩白茯苓北五味子各一兩半上銼每服四錢水一盞半煎八分日進四服留滓合煎一方有乾葛木瓜烏梅加減八味丸治腎水枯竭不能上潤心火上炎不能既濟心煩躁渴小便頻數白濁陰痿飲食不多肌膚漸削或腿腫腳先瘦小白茯苓去皮牡丹皮去骨澤瀉酒潤蒸各八錢五味子微炒一兩半山茱萸肉焙肉桂去粗皮不見火熟地黃蒸七次焙山藥微炒各二兩上各研末稱和勻煉蜜丸梧子大五更初溫酒鹽湯任下三五十丸午前晚間空腹再服此藥不惟止渴亦免生癰疽久服永除渴疾氣血加壯竹龍散三因治消渴五靈脂另研生黑豆去皮各等分上為末每服二錢不拘時冬瓜煎湯調服瓜葉子皆可一日兩服少渴者只一服渴止後宜八味丸仍以五味子代附子此方沈存中載於靈苑方得效者甚多六神湯三因治三消渴疾蓮房乾葛枇杷葉去毛甘草炙栝蔞根黃耆各等分上為銼散每服四錢水一盞煎七分空心溫服小便不利加茯苓四物湯見鼻衄芎歸湯治失血煩熱作渴或頭痛眩暈川芎三錢當歸酒拌五錢上水煎服甘草石膏湯治渴病全愈再劇舌白滑微腫咽喉咽唾覺痛嗌腫時渴飲冷白沫如膠飲冷乃止即止渴潤燥湯無麻仁有生地黃忍冬丸治渴疾愈須預防發癰疽忍冬草不以多少根莖花葉皆可用之一名老公須一名蜜啜花一名金銀花一名左纏滕水洗淨用上用米麴酒於瓶內浸以粳火煨一宿取出曬乾入甘草少許為末即以所浸酒煮糊為丸如梧桐子大每服五十丸至百丸酒飲任下一方用忍冬草煎服此藤凌冬不凋三月開花五出黃白相間微香蒂帶紅外科精要又以酒煮窨服取時不犯鐵氣服至大小腸通利此藥到得力用乾者不及生者效速仍治五種飛尸酒研傳瘡亦好但留一口泄毒氣真經效奇藥也此藥不特治癰亦能止渴並五痔諸漏藍葉散治渴利口乾煩熱背生前疽赤焮疼痛藍葉升麻玄參麥門冬去心黃耆葛根沉香赤芍藥犀角屑甘草生用各一兩大黃二兩微炒上㕮咀每服四錢水一中盞煎至六分去滓不拘時溫服玄參散治渴利煩熱生癰疽焮腫疼痛玄參芒硝大黃微炒犀角屑羚羊角屑沉香木香黃耆各一兩甘草生用七錢半上為細末每服二錢不拘時用溫水調下薺苨丸治強中為病莖長興盛不交精溢自出消渴之後多作癰疽皆由過服丹石所致薺苨大豆去皮茯神去木磁石煅研極細玄參石斛去根栝蔞根地骨皮去木鹿茸各一兩沉香不見火人參各半兩熟地黃酒蒸一兩上為細末用豬腎一具如食法爛煮杵和丸如梧桐子大如難丸入少酒糊丸或煉蜜丸亦可每服七十丸空心鹽湯下紫蘇湯治消渴後遍身浮腫心膈不利紫蘇莖葉桑白皮赤茯苓各一兩郁李仁去皮炒二兩羚羊角鎊檳榔各七錢半桂心去皮枳殼麩炒獨活木香各半兩上㕮咀每服四錢水一盞半生薑半分煎至八分去滓不拘時溫服瞿麥湯治消渴欲成水氣面目並足膝脛浮腫小便不利瞿麥穗澤瀉滑石各半兩防己七錢半黃芩大黃各二錢半桑螵蛸炒十四枚上㕮咀每服三錢用水一盞煎至七分去滓空心溫服良久再服葶藶丸治消渴後成水病浮腫甜葶藶隔紙炒栝蔞仁杏仁湯浸去皮尖及雙仁者麩炒黃漢防己各一兩上為細末煉蜜和搗一二百杵丸如桐子大每服三十丸食前赤茯苓煎湯下日三四服五皮飲濟生腎氣丸俱見水腫中滿分消湯丸見脹滿補遺人參白朮湯儒門事親治胸膈疸熱煩滿不欲食或疸成為消中善食而瘦或燥郁甚而消渴多飲而數小便或熱病或恣酒色誤服熱藥者致脾胃真陰血液損虛肝心相搏風熱燥甚三焦腸胃燥熱怫鬱而水液不能宣行則周身不得潤澤故瘦瘁黃黑而燥熱消渴雖多飲而水液終不能浸潤於腸胃之外渴不止而便注為小便多也叔世俗流不明乎此妄為下焦虛冷誤死多矣又如周身風熱燥郁或為目瘴癰疽瘡瘍上為喘嗽下為痿痹或停積而濕熱內甚不能傳化者變水腫腹脹也凡多飲數溲為渴多食數溲為消中肌肉消瘦小便有脂液者為消腎此世之所傳三消病也雖經所不載以內經考之但燥熱之微甚者也此藥兼療一切陽實陰虛風熱燥郁頭目昏眩風中偏枯酒過積毒一切腸胃澀滯壅塞瘡疥痿痹並傷寒雜病煩渴氣液不得宣通並宜服之人參白朮當歸芍藥大黃山梔子澤瀉各半兩連翹栝蔞根乾葛茯苓各一兩官桂木香藿香各二錢半寒水石二兩甘草三兩石膏四兩滑石芒硝各半斤上為粗末每服五錢水一盞薑三片同煎至半盞絞汁入蜜少許溫服漸加至兩許無時日三服或得臟腑疏利亦不妨取效更妙後卻常服之或兼服消痞丸若覺腸胃結滯或濕熱內甚自利者去大黃芒硝生地黃飲子簡易治消渴咽乾面赤煩躁人參去蘆生乾地黃洗熟乾地黃洗黃耆蜜炙天門冬麥門冬俱去心枳殼去瓤麩炒石斛去根炒枇杷葉去毛炒澤瀉甘草炙各等分上銼散每服三錢水一盞煎至六分去滓食後臨臥服此方乃全用二黃丸甘露飲料生精補血潤燥止渴佐以澤瀉枳殼疏導二腑使心火下行則小腑清利肺經潤澤則大腑流暢宿熱既消其渴自止造化精深妙無逾此黃耆湯治諸渴疾黃耆蜜炙茯苓去皮木栝蔞根麥門冬去心生地黃五味子炙甘草各一錢半水二盅煎至一盅食速服梅蘇丸治消渴膈熱煩躁生津液白梅肉紫蘇葉烏梅肉各半兩麥門冬去心七錢半百藥煎三兩訶藜勒煨用皮人參各二錢半甘草炙一兩半上為細末煉黃蠟汁和為丸如雞頭實大每服一丸不拘時含化咽津行路解渴殺蟲方治消渴有蟲苦楝根取新白皮一握切焙入麝香少許水二碗煎至一碗空心飲之雖困頓不妨自後下蟲三四條類蛔蟲而色紅其渴頓止乃知消渴一證有蟲耗其津液出夷堅志口燥咽乾本事黃耆湯治心中煩躁不生津液不思飲食黃耆熟地黃白芍藥五味子麥門冬各三兩甘草人參天門冬各五錢白茯苓一兩上㕮咀每服三錢薑棗烏梅煎去滓食後服參朮飲即參苓白朮散見滯下參香散和劑治心氣不寧諸虛百損肢體沉重情思不樂夜多異夢盜汗失精恐怖煩悸喜怒無時口乾咽燥渴欲飲水飲食減少肌肉瘦瘁漸成勞瘵常服補精血調心氣進飲食安神守中功效不可具述人參山藥黃耆制白茯苓去皮石蓮肉去心白朮煨各一兩烏藥縮砂仁橘紅乾薑炮各半兩丁香南木香檀香各二錢半沉香二錢甘草七錢半炙上為銼散每服四錢水一大盞生薑三片棗一枚煎七分去滓空心服一方有炮附子半兩四君子湯見虛勞縮脾飲見中暑七珍散見不能食大補湯見虛勞乾葛湯葛根二兩枳實去白麩炒梔子仁豆豉各一兩甘草炙半兩每服四錢水一盞煎八分不拘時溫服烏梅木瓜湯治飲酒多發積為酷熱熏蒸五臟津液枯燥血位小便並多肌肉消爍專嗜冷物寒漿木瓜干烏梅捶破不去仁麥糵炒甘草草果去皮各半兩上銼散每服四錢水一盞半薑五片煎七分不拘時服枳椇子丸治證同前枳椇子二兩麝香一錢上為末麵糊丸如桐子大每服三十丸空心鹽湯下三神湯治證同前烏梅肉遠志去心甘草水煮過用薑汁拌炒各一兩枳實去瓤一兩夏加黃連五錢春秋冬不用上銼散每服四錢水二盞糯禾根一握煎七分去滓不拘時溫服若無糯禾根白茅根亦可如無白茅根禾杆繩亦可防椒藶黃丸治腹滿口乾舌燥此腸間有水氣也見脹滿牛黃丸治心脾壅熱口舌乾燥及煩渴牛黃三分細研黃連去須大黃銼炒各二兩麥門冬去心焙一兩半硃砂半兩細研水飛麝香少許山梔仁馬牙硝細研芎藭黃芩炙甘草各一兩上為細末研勻煉蜜和丸如彈子大每服一丸食後竹葉煎湯化下栝蔞根散治風熱口中乾燥舌裂成瘡栝蔞根胡黃連黃芩各七錢半白殭蠶炒白鮮皮大黃銼炒各半兩牛黃研滑石研各二錢半上為細末研勻每服二錢竹葉湯調服無時甘露丸解壅毒退風熱治口舌乾燥寒水石二斤燒令赤攤地上一宿出火毒馬牙硝三兩細研鉛霜細研甘草炙赤龍腦細研各七錢半上為細末研勻以糯米飯和丸如彈子大每服半丸食後用新汲水磨化服含化丸治上焦煩熱口舌乾燥心神不清頭目不利石膏細研水飛過寒水石研細白蜜各半斤上以水四大盞煎取一大盞半綿濾過入蜜同煎令稠丸如雞頭實大常含一丸咽津黃疸耆芍桂苦酒湯金匱黃耆五兩白芍藥桂枝各三兩上三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也桂枝加黃耆湯金匱治黃疸脈浮而腹中和者宜汗之若腹滿欲嘔吐懊憹而不和者宜吐之不宜汗桂枝白芍藥生薑各三兩黃耆甘草各二兩大棗十二枚上六味以水八升煮取三升溫服一升須臾飲熱稀粥一升余以助藥力取微汗若不汗更服黃耆湯濟生治黃汗身體腫發熱不渴汗出染衣黃色黃耆去蘆蜜炙赤芍藥茵陳蒿各二兩石膏四兩麥門冬去心淡豆豉各一兩甘草炙半兩上㕮咀每服四錢水一盞生薑五片煎七分去滓食前服一方入竹葉十四片不用薑一方無甘草大黃硝石湯金匱大黃黃柏硝石各四兩一作滑石梔子十五枚上四味以水六升煮取二升去滓納硝石更煮取一升頓服小半夏湯見嘔吐茵陳五苓散用茵陳末十分五苓散五分二物和先食飲方寸匕日二服茵陳五苓散治傷寒溫濕熱病感冒後發為黃疸小便黑赤煩渴發熱不得安寧此蓋汗下太早服藥不對證因感濕熱病以致遍身發黃嘗用茵陳五苓散治之甚效上用生料五苓散一兩加入茵陳半兩車前子一錢木通柴胡各一錢半酒後得證加乾葛二錢並前藥和勻分二服每服水一碗燈草五十莖同煎八分去滓食前服滓再煎連進數服小便清利為愈加減五苓散治飲食伏暑郁發為疸煩渴引飲小便不利茵陳豬苓去皮白朮赤茯苓去皮澤瀉各二錢水二盅煎一盅不拘時服一方有桂心茵陳湯金匱治寒熱不食食即頭眩心胸不安久久發黃名為谷疸茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也谷疸丸濟生苦參三兩龍膽草一兩牛膽一枚取汁上為細末用牛膽汁入少煉蜜和丸如桐子大每服五十丸空心熱水或生薑甘草煎湯送下兼紅丸子服亦可方見傷食茯苓茵陳梔子湯寶鑑完顏正卿丙寅二月間因官事勞役飲食不節心火乘脾脾氣虛弱又以恚怒氣逆傷肝心下痞滿四肢困倦身體麻木次傳身目俱黃微見青色顏黑心神煩亂怔忡不安兀兀欲吐口生惡沫飲食遲化時下完穀小便癃閉而赤黑辰巳間發熱日暮則止至四月尤盛其子以危急求請治之具説其事診其脈浮而緩金匱要略云寸口脈浮為風緩為痹痹非中風四肢苦煩脾色必黃瘀熱已行趺陽脈緊為傷脾風寒相搏食谷則眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸此方主之茵陳葉一錢茯苓去皮五分梔子仁蒼朮去皮炒白朮各三錢黃芩生六分黃連去須枳殼麩炒豬苓去皮澤瀉陳皮漢防己各二分青皮去白一分上作一服用長流水三斛煎至一斛去渣溫服食前一服減半二服良愈內經云熱淫於內治以鹹寒佐以苦甘又濕化於火熱反勝之治以苦寒以苦泄之以淡滲之以梔子茵陳苦寒能瀉濕熱而退其黃故以為君難經云並主心下滿以黃連枳實苦寒泄心下痞滿肺主氣今熱傷其氣故身體麻木以黃芩苦寒瀉火補氣故以為臣二術苦甘溫青皮苦辛溫能除胃中濕熱泄其壅滯養其正氣漢防己苦寒能去十二經留濕澤瀉鹹平茯苓豬苓甘平導膀胱中濕熱利小便而去癃閉也梔子大黃湯治酒疸心中懊憹或熱痛山梔十四枚大黃一兩枳實五枚豆豉一升上四味以水六升煎取二升分溫三服葛根湯濟生治酒疸乾葛二錢梔子仁枳實去瓤麩炒豆豉各一錢甘草炙五分水一盅煎至七分不拘時溫服葛花解酲湯見傷飲小柴胡湯見往來寒熱藿枇飲戴氏藿香葉枇杷葉去毛桑白皮陳皮乾葛白茯苓雞距子各等分水煎下酒煮黃連丸五苓散見消痹當歸白朮湯三因當歸黃芩茵陳甘草炙各一錢白朮二錢半夏湯泡杏仁去皮尖麩炒枳實麩炒前胡各一錢半茯苓二錢水二盅生薑三片煎至一盅食後服藿香脾飲厚朴去粗皮薑汁浸炙甘草炙半夏生微熱湯泡切作四塊用薑汁浸一宿以粟米炒黃藿香葉一兩陳皮去白半兩每服二錢水一盞薑三片棗一枚煎七分不拘時熱服日進二三服白朮湯三因治酒疸因下後變為黑疸目青面黑心中如啖蒜齏狀大便黑皮膚不仁其脈微而數白朮桂心各一錢枳實麩炒豆豉乾葛杏仁甘草炙各五分水一盅煎至七分食前服酒煮黃連丸治酒疸見傷暑硝石散金匱硝石礬石各等分燒上二味為末以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是其候也加味四君子湯治色疸人參白朮白茯苓白芍藥黃耆炙白扁豆炒各二錢甘草炙一錢水二盅生薑五片紅棗二枚煎一盅服無時滑石散治女勞疸滑石一兩半白礬一兩枯上為細末每服二錢用大麥粥清食前調服以小便出黃水為度按此即前硝石方硝與滑字形相近未知孰是兩存之腎疸湯東垣治腎疸目黃渾身金色小便赤澀升麻根半兩蒼朮一錢防風根獨活根白朮柴胡根羌活根葛根各半錢白茯苓豬苓澤瀉甘草根各三分黃柏二分人參神麯各六分分作二帖水煎食前稍熱服小菟絲子丸治女勞疸見赤白濁胃苓飲即平胃散五苓散並用見中食並消痹茯苓滲濕湯寶鑑治黃疸寒熱嘔吐渴欲飲水身體面目俱黃小便不利全不食不得臥茵陳七分白茯苓六分木豬苓澤瀉白朮陳皮蒼朮米泔浸一宿炒黃連各五分山梔炒秦艽防己葛根各四分水二盅煎七分食前服參朮健脾湯治發黃日久脾胃虛弱飲食少思人參白朮各一錢五分白茯苓陳皮白芍藥煨當歸酒洗各一錢炙甘草七分水二盅棗二枚煎八分食前服色疸加黃耆炒白扁豆各一錢當歸秦艽散治五疸口淡咽乾倦怠發熱微寒白朮茯苓秦艽當歸川芎芍藥熟地黃酒蒸陳皮各一錢半夏曲炙甘草各五分水二盅薑三片煎八分食前服濟生有肉桂小草名秦艽飲子養榮湯四君子湯八味丸俱見虛勞麻黃醇酒湯金匱治黃疸用麻黃三兩以好清酒五升煮取二升五合頓服盡冬月用酒煮春月用水煮瓜蒂散見傷食百一治疸取藜蘆置灰內炮之少變色搗為末水服半錢匕小便不利數服黃連散寶鑑治黃疸大小便祕澀壅熱纍效黃連二兩大黃醋拌炒二兩黃芩甘草炙各一兩上為極細末食後溫水調下二錢日三服先用瓜蒂散搐鼻取下黃水卻服此藥嗅鼻瓜蒂散寶鑑治黃疸渾身如金色瓜蒂二錢母丁香一錢黍米四十九粒赤小豆五分上為細末每夜臨臥時先含水一口卻於兩鼻孔嗅上半字便睡至明日取下黃水便服黃連散病輕者五日效重者半月效茵陳附子乾薑湯寶鑑至元丙寅六月時雨霖霍人多病濕疫真定韓君祥因勞役過度渴飲涼茶又食冷物遂病頭痛肢節亦疼身體沉重胸滿不食自以為外感用通聖散二服後添身體困甚方命醫治之醫以百解散發其汗越四日以小柴胡湯二服後加煩躁又六日以三乙承氣湯下之躁渴尤甚又投白虎加人參湯柴胡飲之類病愈增又易醫用黃連解毒湯硃砂膏至寶丹十七日後病