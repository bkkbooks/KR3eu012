苓厚朴制半夏制澤瀉豬苓前胡桂心白芍藥炙甘草以上各等分上每一兩分四服薑十片水二盞煎至七分去滓溫服無時因酒成飲加葛根葛花砂仁黃芩利膈丸見痞滾痰丸養生主論痰之為病或偏頭風或雷頭風或太陽頭痛眩暈如坐舟車精神恍惚或口眼瞤動或眉稜耳輪俱癢或頷腮四肢遊風腫硬似疼非疼或渾身燥癢搔之則癮疹隨生皮毛烘熱色如錦斑或齒頰似癢似痛而疼無定所滿口牙浮痛癢不一或噯氣吞酸鼻聞焦臭喉間豆腥氣心煩鼻塞咽嗌不利咯之不出咽之不下或因噴嚏而出或因舉動而唾其痰如墨又如破絮或如桃膠或如蜆肉或心下如停冰鐵閉滯妨悶噯嚏連聲狀如膈氣或寢夢刑戮刀兵劍戟或夢入人家四壁圍繞暫得一竇百計得出則不知何所或夢在燒人地上四面煙火枯骨焦氣撲鼻無路可出或不因觸發忿怒悲啼雨淚而寤或時郊行忽見天邊兩月交輝或見金光數道回頭無有或足膝痠軟或骨節腰腎疼痛呼吸難任或四肢肌骨間痛如擊戳乍起乍止並無常所或不時手臂麻疼狀如風濕或臥如芒刺不安或如毛蟲所螫或四肢不舉或手足重滯或眼如薑蜇膠黏癢澀開合甚難或陰晴交變之時胸痞氣結閉而不發則齒癢咽痛口糜舌爛及其奮然而發則噴嚏連聲初則涕唾稠黏次則清水如注或眼前黑暗腦後風聲耳內蟬鳴眼瞤肉惕治之者或曰腠理不密風府受邪或曰上盛下虛或曰虛或曰寒或曰發邪惟洞虛子備此疾苦乃能治療病勢之來則胸腹間如有二氣交紐噎塞煩郁有如煙火上衝頭面烘熱眼花耳鳴痰涎涕淚並從肺胃間湧起凜然毛豎噴嚏千百然後遍身煩躁則去衣凍體稍止片時或春秋乍涼之時多加衣衾亦得暫緩或頓飲冰水而定或痛飲一醉而寧終不能逐去病根乃得神祕沉香丸方屢獲大效愈人數萬但不欲輕傳匪人故以隱語括之詩曰甑里翻身甲帶金於今頭戴草堂深相逢二八求斤正硝煅青礞倍若沉十七兩中零半兩水丸梧子意須斟除驅怪病安心志水瀉雙身卻不任大黃蒸少頃翻過再蒸少頃即取出不可過黃芩各八兩青礞石硝煅如金色沉香百藥煎此用百藥煎乃得之方外祕傳蓋此丸得此藥乃能收斂周身頑涎聚於一處然後利下甚有奇功曰倍若沉者言五倍子與沉香非礞倍於沉之謂也以上各五錢上為末水丸如梧子大白湯食後空心服一切新舊失心喪志或癲或狂等證每服一百丸氣盛能食狂甚者加二十丸臨時加減消息之一切中風癱瘓痰涎壅塞大便或通或結者每服八九十丸或加至百丸永無祕結之患一切陽證風毒腳氣遍身遊走疼痛每服八九十丸未效加至百丸一切無病之人遍身筋骨疼痛不能名者或頭疼牙痛或搖或癢風蛀等證風寒鼻塞身體或疼或不疼非傷寒證者服八九十丸痰盛氣實者加之一切吞酸噯逆膈氣及胸中疼悶腹中氣塊衝上嘔沫吐涎狀如反胃心下恍惚如畏人捕怵惕不安陰陽關格變生乖證食飢傷飽憂思過慮心下嘈雜或痛或噦或晝夜虛飽或飢不喜食急慢喉閉赤眼每用加減服一切新舊痰氣喘嗽或嘔吐頭運目眩加減服之一切腮頷腫硬若瘰癧者及口糜舌爛咽喉生瘡者每服六七十丸加蜜少許一處嚼碎噙化睡時徐徐咽之曾有口瘡者服二三十丸依前法噙之二三夜瘥一切男婦大小虛實心疼連腹身體羸瘦發時必嘔緑水黑汁冷涎乃至氣絶心下溫暖者量虛實加減服之若事屬不虞之際至於百丸即便回生未至顛危者虛弱疑似之間只服三十丸或五十丸立見生意然後續續進之以瘥為度兼服生津化痰溫中理氣之藥一切荏苒疾病凡男婦患非傷寒內外等證或酒色過度或吐血或月事愆期心煩志亂或腹脹脅痛勞倦痰眩或暴行日中因暑伏痰口眼喎斜目痛耳憒鼻塞骨節痠疼乾嘔噁心諸般內外疼痛百藥無效衆醫不識者依前法加減服之效大抵服藥須臨臥在床用熟水一口許咽下便臥令藥在喉膈間徐徐而下如日間病出不測疼痛不可忍必欲急除者須是一依前臥法服大半日不可食湯水及不可起身行坐言語真候藥丸除逐上焦痰滯惡物過膈入腹然後動作方能中病每夜須連進二次次日痰物既下三五次者仍服前數下五七次或直下二三次而病勢頓已者次夜減二十丸頭夜所服並不下惡物者次夜加十丸人壯病實者多加至百丸惟候虛實消息之或服過仰臥咽喉稠黏壅塞不利者痰氣泛上乃藥病相攻之故也少頃藥力既勝自然寧貼往往病久結實於肺胃之間或只暴病全無泛濫者服藥下咽即仰臥頓然百骸安靜五臟清寧次早先去大便一次其餘遍數皆是痰涕惡物看甚麼糞用水攪之盡是痰片黏涎或稍稍腹痛腰腎拘急者蓋有一種頑痰惡物閉氣滑腸裡急後重者狀如痢疾片晌即已若有痰涎易下者快利不可勝言頓然滿口生津百骸爽快間有片時倦怠者蓋因連日病苦不安一時為藥力所勝氣體暫和如醉得醒如浴方出如睡方起此藥並不洞泄刮腸大瀉但取痰積惡物自腸胃次第而下腹中糟粕並不相傷其推下腹之糞則藥力所到之處是故先去其糞其餘詳悉不能備述服者當自知之利痰丸玄珠南星皂角石膏牽牛頭末芫花以上各二兩上為細末用薑汁糊丸如梧子大每服一二十丸量人虛實用之薑湯下一方加青鹽五錢巴豆少許青礞石硝煅如金色五錢若風痰壅塞此藥乃為先鋒服之痰即已如寒不宜用導痰丸玄珠大半夏六兩分作三分一分用白礬一兩為末浸水一分用肥皂角一兩為末浸水一分用巴豆肉一百粒為末浸水上件余藥在下以半夏在上浸至十日或半月要常動水令二藥相透次相合處揀去巴豆並皂角將余水以慢火煮令水乾取出半夏切搗碎曬乾或陰乾亦佳後入甘遂制百藥煎各二兩全蠍殭蠶各一兩上為細末薄糊丸如梧子大每服十丸或十五丸亦量人虛實白湯下妙應丸即控涎丸見行痹祛風丸寶鑑有人喜食酸鹹酒色過節滲注成痰飲聚於胸膈滿則嘔逆噁心涎流一臂麻木升則頭目昏眩降則腰腳疼痛深則左癱右瘓淺則厥然仆地此藥寬中祛痰搜風理氣和血駐顏延年益壽半夏曲荊芥各四兩槐角子炒白礬生橘紅硃砂各一兩上為末薑汁糊丸每服五六十丸生薑皂角子仁湯送下日三服川芎丸本事治膈上痰川芎二兩細銼慢火熬熟川大黃二兩蒸令乾上件焙乾為末用不蛀皂角五七挺溫水揉汁絹濾出渣瓦罐中熬成膏和前二味為丸如桐子大每服十五丸小兒三丸薑湯下保和丸見傷食消暑丸見傷暑蘇子降氣湯見氣導痰湯濟生治痰涎壅盛胸膈留飲痞塞不通半夏湯洗七次四兩天南星炮去皮枳實去瓤麩炒赤茯苓去皮橘紅各一兩甘草炙半兩上㕮咀每服四錢水二盞薑十片煎八分食後溫服小半夏茯苓湯和劑半夏茯苓各等分每服五錢水一盞半薑五片煎七分服無時丁香五套丸治胃氣虛弱三焦痞澀不能宣行水穀故為痰飲結聚胸膈嘔吐噁心脹滿不食常服溫脾順氣方見肩背痛二陳湯和劑治痰飲為患或嘔逆噁心或頭眩心悸或中脘不快或食生冷飲酒過度脾胃不和並宜服之半夏湯洗七次橘紅各五兩白茯苓三兩炙甘草一兩半上㕮咀每服四錢水一盞薑七片烏梅一枚煎六分不拘時熱服青州白丸子見中風來復丹見中暑八神來復丹濟生硝石一兩同硫黃為末瓷器內以微火炒用柳篦攪不可火太過恐傷藥力再研極細名二氣末太陽玄精石飛研一兩五靈脂水澄清濾去砂石曬乾青皮去白陳皮去白各二兩舶上硫黃透明沉香木香堅實者天南星粉白者各一兩上為末飛麵糊丸如梧桐子大每服三十丸空心米飲送下八味丸見虛勞六君子湯人參白朮茯苓陳皮製半夏各一錢炙甘草五分水二盞薑五片煎至一盅去滓不拘時溫服理中化痰丸治脾胃虛寒痰涎內停嘔吐少食或大便不實飲食難化咳唾痰涎此屬中氣虛弱不能統涎歸源也人參白朮炒乾薑甘草炙茯苓半夏薑製上為末水丸桐子大每服四五十丸白湯下補中益氣湯見傷勞倦七氣湯見氣越鞠丸見郁附方橘皮湯治胸膈停痰橘皮茯苓半夏各一錢半旋覆花青皮桔梗枳殼薑製細辛人參各一錢甘草半錢上作一服用水二盅薑五片煎一盅食遠服前胡半夏湯治痰盛前胡半夏薑製茯苓各二錢陳皮木香紫蘇枳殼甘草各一錢上作一服用水二盅生薑三片烏梅一個煎至一盅食遠服桔梗湯治胸膈脹滿短氣痰盛嘔逆或吐涎沫桔梗炒半夏薑製陳皮去白各三錢枳實麩炒一錢半上作一服水二盅薑五片煎一盅不拘時服枇杷葉散治痰逆此藥溫胃可思飲食青皮去白焙草豆蔻各半兩前胡枇杷葉拭去毛炙黃半夏湯泡茯苓去皮人參大腹皮白朮厚朴去粗皮薑汁炙各一兩上㕮咀每服四錢水一中盞生薑半分煎至六分去滓不拘時熱服旋覆花散治心胸痰熱頭目旋痛飲食不下旋覆花甘草炙各半兩枳殼去瓤麩炒石膏細研各二兩赤茯苓麥門冬去心柴胡去苗人參各一兩犀角屑防風去叉黃芩各七錢半上㕮咀每服五錢水一大盞生薑半分煎至五分去滓食後良久溫服化涎散治熱痰利胸膈止煩渴凝水石煅研一兩鉛白霜另研馬牙硝另研雄黃另研各一錢白礬枯研甘草炙各二錢半龍腦少許上為細末研勻每服一錢不拘時水調下小兒風熱痰涎用砂糖水調下半錢此藥大涼不可多服辰砂化痰丸治風痰安神志利咽膈清頭目辰砂飛研為衣白礬枯研各半兩天南星炮一兩半夏曲三兩上為細末薑汁煮麵糊和丸如桐子大辰砂為衣每服三十丸食後生薑湯下半夏利膈丸治風痰壅盛頭疼目眩咽膈不利涕唾稠黏並治酒過停飲嘔逆噁心胸脅引痛腹內有聲半夏湯洗三兩白附子生用二兩白茯苓去皮白礬生用人參去蘆白朮滑石貝母各一兩天南星生用一兩半上為細末麵糊和丸如梧子大每服三十丸食後薑湯下破痰消飲丸治一切停痰留飲陳皮去白川薑炮京三稜炮捶碎草果麵裹煨良薑濕紙裹煨蓬朮炮青皮各一兩半夏湯泡七次三兩上為細末水煮麵糊和丸桐子大陰乾每服五十丸食遠薑湯送下化痰鐵刷丸治男婦風痰酒痰茶痰食痰氣痰一切痰逆嘔吐頭疼目眩肺痿咯膿聲如拽鋸並皆治之此藥墜痰止嗽定喘白附子炮南星炮半夏洗白礬生用各半兩寒水石皂角去子各一兩乾薑七錢半硇砂輕粉各一錢上為細末水煮麵糊和丸如梧子大每服二三十丸食後用淡薑湯下沉香墮痰丸治宿食不消咽膈不利咳嗽痰涎頭目昏暈嘔逆噁心胸膈不快沉香木香各二錢青皮去白二錢半檳榔大者二枚用麵裹煨熟半夏曲二兩上為細末用生薑汁浸蒸餅和丸如小豆大每服二十丸不拘時薑湯下茯苓丸一名指迷茯苓丸本治臂痛具指迷方中云有人臂痛不能舉手足或左右時復轉移由伏痰在內中脘停滯脾氣不流行上與氣搏四肢屬脾脾滯而氣不下故上行攻臂其脈沉細者是也後人為此臂痛乃痰證也但治痰而臂痛自止及婦人産後發喘四肢浮腫者用此而愈半夏二兩茯苓一兩枳殼去瓤麩炒半兩風化朴硝二錢五分如一時未易成但以朴硝撒在竹盤中少時盛水置當風處即干如芒硝刮取用亦可上為細末生薑汁煮麵糊為丸如桐子大每服三十丸薑湯送下纍有人為痰所苦夜間兩臂如人抽搐兩手戰掉茶盞亦不能舉服此隨愈痰藥方多唯此立見功效神仙墜痰丸治痰飲胸膈痞塞此藥下痰皂角無蟲蛀者刮去皮弦酥炙黃色去子淨一兩六錢白礬一兩二錢生用黑牽牛一斤取頭末四兩為細末滴水丸梧子大每服三十丸漸加至百丸空心溫酒送下看病輕重輕者五日十日愈重者半月一月愈久服永無癱瘓之疾搜飲丸治證同前木瓜一枚切下頂去瓤作罐用生白礬半夏曲等分為細末填木瓜內卻用原頂蓋定麻縷扎縛於飯甑上炊兩次爛研以宿蒸餅和丸如桐子大每服三五十丸不拘時薑湯下治懸飲心腹氣滯兩脅多疼半夏三兩搗為末皂角六兩三兩去黑皮酥炙令黃搗為末三兩去皮子搗碎以酒一升挪取汁去滓煎成膏將半夏以膏和作餅以青蒿蓋出青衣如造麴法搗羅為細末旋覆花一兩木香檳榔各二兩上為細末酒煮麵糊和丸如桐子大每服二十丸食前用薑湯下破飲丸治五飲停蓄胸膈呼吸之間痛引兩脅脹滿氣促胸腹結為癥癖支滿胸膈旁及兩脅搶心疼痛飲食不下反胃吐逆九種心疼積年宿食不消久瘧久痢遁尸疰忤顛癇厥運心氣不足憂愁思慮婦人腹中諸病悉能治之蓽茇丁香不見火縮砂仁蠍梢胡椒木香不見火烏梅肉青皮巴豆去皮上將青皮巴豆以漿水同浸一宿次日濾出同炒青皮焦去巴豆水淹烏梅肉蒸一炊久細研為膏入藥末和勻丸如緑豆大每服五七丸臨睡生薑湯送下八珍丸治膈痰結實滿悶喘逆丹砂研半兩犀角鎊羚羊角鎊茯神去木牛黃研龍腦研各二錢半牛膽南星硼砂研各一兩上為細末研勻煉蜜和丸如雞頭實大每服一丸食後細嚼人參荊芥湯下鵝梨煎丸治熱痰涼心肺利胸膈解熱毒補元氣大鵝梨二十枚去皮核用淨布絞取汁薄荷生半斤研汁皂角不蛀者十挺去皮子漿水二升挪取濃汁白蜜半升生地黃半斤研取汁同上五味慢火熬膏和下藥人參白茯苓去皮白蒺藜炒去刺肉蓯蓉酒浸切焙乾牛膝酒浸半夏湯泡木香各一兩檳榔煨二兩防風去杈青橘皮去白桔梗炒羌活白朮山藥各七錢半甘草炙各半兩上為細末同前膏拌勻杵令得所丸如梧子大每服十五丸加至二十丸食後荊芥湯送下日二服麝香丹砂丸治痰熱咽膈不利頭目昏痛麝香另研木香丁香犀角甘草炙各二錢半龍腦另研一錢人參藿香去梗牛膽南星防風去叉黃耆各半兩麥門冬去心七錢半丹砂另研一兩上為細末煉蜜和丸如雞頭實大每服一丸食後嚼破用荊芥湯下金珠化痰丸治痰熱安神志除頭痛眩暈心忪恍惚胸膈煩悶涕唾稠黏咳嗽咽嗌不利皂角子仁炒天竺黃另研半夏湯浸洗七次生薑二兩去皮同搗作餅炙微黃白礬透明者枯過另研以上各四兩龍腦另研半兩辰砂水飛研二兩上將皂角仁半夏為末與諸藥研勻生薑汁煮麵糊丸如桐子大金箔二十片為衣每服十五丸加至二十五丸食後薑湯下皂角化痰丸東垣治勞風心脾壅滯痰涎盛多喉中不利涕唾稠黏嗌塞吐逆不思飲食或時昏憒皂角木白皮酥炙白附子炮半夏湯洗七次天南星炮白礬枯赤茯苓去皮人參各一兩枳殼炒二兩上為細末生薑汁麵糊丸如梧子大每服三十丸溫水送下食後法制清氣化痰丸順氣快脾化痰消食半夏南星去皮臍白礬皂角切乾薑各四兩上先將白礬等三味用水五碗煎取水三碗卻入半夏二味浸兩日再煮至半夏南星無白點為度曬乾陳皮青皮去穰紫蘇子炒蘿蔔子炒另研杏仁去皮尖炒研葛根神麯炒麥糵炒山楂香附各二兩上為末蒸餅丸桐子大每服五七十丸臨臥食後茶湯下薛新甫曰一男子素厚味胸滿痰盛余以膏粱之人內多積熱興此丸服之而愈彼見有驗修合饋送脾胃虛者無不受害飛礬丹化痰神效白礬通明者二兩枯白殭蠶一兩半用米醋浸一宿炒半夏湯洗七次南星各一兩切作片子用皂角一兩半去皮弦用水一小碗同熬水盡去皂角不用只用南星細末薑汁糊丸如桐子大水丸亦可每服十五丸至二十丸薑湯下又治喉閉用薄荷兩葉以新汲水浸少時嚼薄荷吞藥用水送下咽不得即用十五丸搗細用皂角水調灌下即開又治小兒急慢驚風牙關緊急不可開者亦用皂角水調塗牙齦上入咽即活法制半夏御藥消飲化痰壯脾順氣用大半夏湯洗泡七遍以濃米泔浸一日夜每半夏一兩用白礬一兩半研細溫水化浸半夏上留水兩指許頻攪冬月於暖處頓放浸五日夜取出焙乾用鉛白霜一錢溫水化又浸一日夜通七日盡取出再用漿水慢火煮勿令滾候漿水極熟取出焙乾以瓷器收貯每服一二粒食後細嚼溫薑湯下又一法依前製成半夏每一兩用白礬水少許漬半夏細飛硃砂末淹一宿斂干焙用依前法亦可用生薑自然汁漬焙用神芎導水丸心印下同黃芩一兩黃連川芎薄荷各半兩大黃二兩滑石黑牽牛頭末各四兩河間制治一切熱證其功不可盡述設或久病熱鬱無問瘦悴老弱並一切證可下者始自十丸以為度常服此藥除腸胃積滯不傷和氣推陳致新得利便快並無藥燥搔擾亦不困倦虛損遂病人心意或熱甚必急須下者使服四五十丸未效再服以意消息常服二三十丸不動臟腑有益無損或婦人血病下惡物加桂半兩病微者常服甚者取利因而結滯開通惡物自下也凡老弱虛人脾胃經虛風熱所郁色黑齒稿身瘦萎黃或服甘熱過度成三消等病若熱甚於外則肢體躁擾病於內則神志躁動怫鬱不開變生諸證皆令服之惟臟腑滑泄者或裡寒脈遲者或婦人經病産後血下不止及孕婦等不宜服十棗湯見水腫舟車神祐丸甘遂芫花大戟各一兩俱醋炒大黃二兩黑牽牛頭末四兩青皮陳皮木香檳榔各半兩輕粉一錢取蠱加蕪荑半兩為末水丸空心服河間依仲景十棗湯例製出此方主療一切水濕為病戴人云十棗泄諸水之上藥所謂溫藥下者是已如中滿腹脹喘嗽淋閉水氣蠱腫留飲癖積氣血壅滯不得宣通風熱燥郁肢體麻痹走注疼痛久新瘧痢等患婦人經病帶下皆令按法治之病去如掃故賈同知稱為神仙之奇藥也緣此方河間所定初服五丸日三服加至快利後卻常服以病去為度設病愈後平人能常服保養宣通氣血消運飲食若病痞悶極甚者便多服反煩滿不開轉加痛悶宜初服二丸每服加二丸加至快利為度以意消息小兒丸如麻子大隨強弱增損三四歲者三五丸依前法加減至戴人變為神芎丸神祕不傳然每令病人夜臥先服百餘粒繼以濬川等藥投之五更當下種種病出投下少末再服和膈藥須以利為度有五日一下者三日一下者病輕者可一二度止重者五六度方愈是擒縱卷舒之妙臨證制宜非言可諭觀其藥雖峻急認病的確自非老手諳練有大負荷者焉敢見諸行事豫每親制用之若合符節然又隨人強弱當依河間漸次進服強實之人依戴人治法行之神效大聖浚川散大黃煨牽牛取頭末郁李仁各一兩木香三錢芒硝三錢甘遂半錢評曰此下諸積之聖藥也諸濕為土火熱能生濕土故夏熱則萬物濕潤秋涼則濕復燥干濕病本不自生因於火熱怫鬱水液不能宣通停滯而生水濕也凡病濕者多自熱生而熱氣多為兼病內經云明知標本正行無間者是也夫濕在上者目黃而面浮在下者股膝腫厥在中者肢滿痞膈痿逆在陽不去者久則化氣在陰不去者久則成形世俗不詳內經所言留者攻之但執補燥之劑怫鬱轉加而病愈甚也法當求病之所在而為施治瀉實補虛除邪養正以平為期而已又嘗考戴人治法假如肝木乘脾土此土不勝木也不勝之氣尋救於子已土能生庚金庚為大腸味辛者為金故大加生薑使伐肝木然不開脾土無由行也遂以舟車丸先通閉塞之路是先瀉其所不勝後以薑汁調濬川散大下之是瀉其所勝也戴人每言導水丸必用禹功散繼之舟車丸必以濬川散隨後如寒疝氣發動腰腳胯急痛者亦當下之以瀉其寒水世俗喑於治體一概鹵莽有當下而非其藥終致委頓而已豈知巴豆可以下寒甘遂芫花可以下濕大黃芒硝可以下燥如是分經下藥兼食療之非守一方求其備也故戴人曰養生與攻疴本自不同今人以補劑療病宜乎不效是難言也咳嗽金匱咳而脈浮者厚朴麻黃湯主之厚朴五兩麻黃四兩石膏如雞子大杏仁半夏五味子各半升乾薑細辛各二兩小麥一升上以水一斗三升先煮小麥熟去渣內諸藥煮取三升溫服一升日三服安腎丸直指治腎經虛寒咳嗽痰唾面色黯黑小腹動氣作痛見喘桂枝湯見傷濕易簡杏子湯治咳嗽不問外感風寒內傷生冷及虛勞咯血痰飲停積皆治療之人參半夏茯苓細辛減半乾薑減半甘草桂枝減半五味子芍藥各等分上㕮咀每服四錢水一盞半杏仁去皮尖銼五枚生薑三片煎至六分去渣溫服若感冒得加麻黃等分若脾胃素實者用御米殼去筋膜銼碎以醋淹炒等分加之每帖加烏梅一枚煎服尤妙嘔逆噁心者不可用此若久年咳嗽氣虛喘急去杏仁人參倍加麻黃芍藥乾薑五味子各增一半一名小青龍湯附濟生橘蘇散治傷風咳嗽身熱有汗惡風脈浮數有熱服杏子湯不得者橘紅紫蘇葉杏仁去皮五味子製半夏桑白皮炙貝母去心白朮各一兩甘草炙半兩上㕮咀每服四錢水一盞生薑五片煎七分溫服無時二陳湯見痰飲寧嗽化痰湯治感冒風寒咳嗽鼻塞桔梗枳殼麩炒半夏薑湯泡七次陳皮前胡乾葛茯苓各一錢紫蘇一錢二分麻黃一錢冬月加夏月減杏仁炒去皮尖桑皮各一錢甘草四分水二盅薑三片煎八分食遠熱服金沸草散和劑治肺感寒邪鼻塞聲重咳嗽不已旋覆花去梗麻黃去節前胡去蘆各七分荊芥穗一錢甘草炒半夏湯洗七次薑汁浸赤芍藥各五分水一盞半生薑三片棗一枚煎八分不拘時溫服消風散見眩暈六君子湯見痰飲六味丸見虛勞黃連解毒湯見發熱梔子仁湯鬱金枳殼麩炒升麻山梔仁炒各等分上每服五錢水煎麥門冬湯治火熱乘肺咳嗽有血胸膈脹滿五心煩熱麥門冬桑白皮炒生地黃各一錢半夏紫菀桔梗淡竹葉麻黃各七分五味子甘草各五分上薑水煎服白虎湯見發熱香薷飲見中暑補中益氣湯見勞倦華蓋散和劑治肺受風寒咳嗽聲重胸膈煩滿頭目昏眩麻黃去根節紫蘇子炒杏仁炒去皮尖桑白皮炒赤茯苓去皮橘紅以上各一錢甘草五分水二盅生薑五片紅棗一枚煎至一盅去滓不拘時服加減麻黃湯治肺感寒邪咳嗽麻黃去節二錢杏仁炒去皮尖半夏薑製陳皮各一錢辣桂甘草炙各半錢水二盅生薑四片紫蘇半錢同煎至一盅去滓不拘時服小柴胡湯見往來寒熱小青龍湯麻黃芍藥乾薑炙甘草細辛桂枝各三兩五味子半夏各半升湯洗上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升白朮酒見中濕辰砂化痰丸見痰飲八風丹治諸風及痰熱上攻頭痛面赤目眩旋運鼻塞咽乾頸項不利痰唾稠濁神情如醉百節疼痛耳嘯蟬鳴面上遊風口眼蠕動滑石細研天麻酒浸各一兩龍腦研麝香研各二錢五分白殭蠶微炒白附子炮各半兩半夏白礬制二兩凝水石火燒通赤細研水飛半斤上件藥搗羅為細末入研者藥同研令勻煉蜜和丸如櫻桃大每服一丸細嚼溫荊芥湯下茶清亦得食後服竹葉石膏湯見消疸應夢人參散和劑甘草炙六兩人參桔梗青皮白芷乾葛白朮各三兩乾薑炮五錢半每服三錢水一盞薑二片棗二枚煎七分不拘時熱服觀音應夢散夷堅志人參一寸用官楝者胡桃二枚去殼不去皮上以水二盞薑五片棗二枚臨臥煎服蓋人參定喘帶皮胡桃能斂肺也款冬花散和劑知母桑葉洗焙款冬花去梗各十兩阿膠炒麻黃去根節貝母去心炒杏仁去皮尖各四十兩甘草炙半夏湯洗薑製各二十兩每服三錢水一盞薑三片煎七分食後溫服二母散和劑知母貝母各等分每服五錢水二盞薑三片煎八分溫服無時四七湯見氣紫菀茸湯濟生治飲食過度或食煎爆邪熱傷肺咳嗽咽癢痰多唾血喘急脅痛不得睡臥紫菀茸洗款冬花百合蒸焙杏仁去皮尖阿膠蛤粉炒經霜桑葉貝母去心蒲黃炒半夏各一兩制犀角鎊甘草炙人參各半兩上㕮咀每服四錢水盞半薑五片煎八分食後溫服潤肺丸統旨訶子五味子五倍子甘草各等分上為末蜜丸噙化久嗽加罌粟殼清音丸統旨桔梗訶子各一兩甘草五錢硼砂青黛各三錢冰片三分上為細末煉蜜丸如龍眼大每服一丸噙化橄欖丸得效百藥煎烏梅甘草石膏各等分上為末煉蜜丸如彈子大臨臥噙化一丸清咽寧肺湯統旨桔梗二錢山梔炒黃芩桑皮甘草前胡知母貝母各一錢水二盅煎八分食後服蛤蚧湯治咳嗽吐膿血及肺痿羸瘦涎涕稠黏蛤蚧酒浸酥炙知母焙貝母焙鹿角膠炙令燥枇杷葉去毛炙葛根桑皮炙人參甘草炙杏仁湯浸去皮尖雙仁炒以上各一兩每服三錢水一盞半煎至八分去滓不拘時溫服保和湯治勞證久嗽肺燥成痿服之決效知母貝母天門冬去心麥門冬去心款冬花各一錢天花粉薏苡仁炒杏仁去皮尖炒各五分五味子十二粒馬兜鈴紫菀桔梗百合阿膠蛤粉炒當歸百部各六分粉草炙紫蘇薄荷各四分水二盅薑三片煎七分入飴糖一匙食後服吐血或痰帶血加炒蒲黃生地黃小薊痰多加橘紅茯苓栝蔞仁喘去紫蘇薄荷加蘇子桑皮陳皮知母茯苓湯治肺痿喘嗽不已往來寒熱自汗知母白朮各八分茯苓去皮五味子人參半夏湯泡七次柴胡甘草炙各一錢薄荷川芎阿膠各半錢款冬花桔梗麥門冬黃芩各七分水二盅生薑五片煎至一盅食後服紫菀散治咳中有血虛勞肺痿人參紫菀各一錢茯苓知母桔梗各一錢半阿膠蛤粉炒一錢貝母一錢二分五味子十五粒甘草五分水二盅煎八分食後服五味子湯治咳嗽皮膚乾燥唾中有血胸膈疼痛五味子炒桔梗炒紫菀甘草炒續斷各五分竹茹一錢赤小豆一撮生地黃桑白皮炒各二錢上水煎服本事鱉甲丸治勞嗽虛證及鼻流清涕耳作蟬鳴眼見黑花一切虛證丈夫婦人皆可服五味子二兩鱉甲地骨皮各三兩上為末煉蜜丸如梧子大空心食前溫酒或鹽湯任意服三五十丸婦人醋湯下此方乃曲江人家祕方服效者衆且處方有理三拗湯和劑治寒燠不常暴嗽喘急鼻塞痰壅麻黃不去節杏仁不去尖甘草不炙各等分一本甘草減半每服五錢水一盅生薑五片煎服有汗即愈青金丸三因治肺虛風壅咳嗽喘滿咯痰血杏仁去皮尖二兩用牡蠣煅成粉與杏仁同炒黃色去牡蠣粉不用青黛一兩上為末研勻用黃蠟一兩熔化搜和丸如彈子大壓扁如餅每用梨三個或軟柿餅一個去核入藥在內濕紙裹煨約藥熔方取出去火毒細嚼糯米飲下一方名甲乙餅治咳出血片兼痰內有血絲不問年深日近但只聲在一服取效上用青黛一兩牡蠣粉七錢杏仁七粒去皮尖研蠟丸湯使同上人參養肺丸治肺胃俱傷氣奔於上客熱熏肺咳嗽喘急胸中煩悸涕唾稠黏吐血嘔血並皆治之人參去蘆黃耆蜜炙各一兩八錢白茯苓去皮栝蔞根各六錢杏仁炒去皮二兩四錢半夏曲炒四兩皂角子三十個炒去皮上為細末煉蜜和丸如彈子大每服一丸食後細嚼用紫蘇湯送下喘用桑白皮湯下寧肺湯治榮衛俱虛發熱自汗肺氣喘急咳嗽痰涎人參當歸白朮熟地黃川芎白芍藥五味子麥門冬去心桑白皮白茯苓去皮甘草炙以上各一錢阿膠蛤粉炒一錢半上作一服用水二盅生薑五片煎至一盅食後服貝母散治暴發咳嗽多日不愈貝母杏仁去皮尖桑白皮各二錢五味子知母甘草各一錢款冬花一錢半上作一服用水二盅生薑三片煎至一盅食後服治嗽得效方治諸嗽久不瘥人參款冬花白礬枯佛耳草甘草各二錢上銼碎作一服用水二盅生薑三片棗一枚烏梅半個煎至七分食後服治嗽補虛方牛骨一副取髓白沙蜜八兩杏仁四兩湯去皮尖另研如泥乾山藥刮去皮四兩研為細末胡桃肉四兩去皮另研如泥上將牛骨髓沙蜜砂鍋內煎熬沸以絹帛濾去滓盛在瓷瓶內將山藥杏仁胡桃三味亦入瓶內以紙密封瓶口重湯內煮一日一夜取出每日早晨用白湯化一匙服雌黃丸治暴嗽久嗽勞嗽上以金粟丸葉子雌黃一兩研細用紙筋泥固濟小盒子一個令乾勿令泥厚將藥入盒子內水調赤石脂封盒子口更以泥封之候乾坐盒子於地上上面以未入窯瓦坯子擁盒子令作一尖子上用炭十斤簇定頂上著火一尉斗籠起令火從上漸熾候火銷三分去一看瓦坯通紅則去火候冷開盒子取藥當如鏡面光明紅色入乳鉢內細研湯浸蒸餅和丸如粟米大每服三丸五丸食後用甘草湯下服後睡良久妙紫金散治一切痰嗽日夜不得眠臥天南星去皮臍白礬甘草以上各半兩烏梅取肉二兩上為粗散用慢火於銀石器內炒令紫色放冷研為細末每服二錢臨臥時身體都入鋪臥內用齏汁七分溫湯三分暖令稍熱調前藥末服之咽下便仰臥低枕想藥入於肺中須臾得睡其嗽立止治久咳嗽上氣心胸煩熱唾膿血紫蘇子微炒鹿角膠搗碎炒杏仁湯泡去皮尖雙仁炒微黃以上各三兩生薑汁一合白蜜一中盞生地黃汁一合上前三味都搗令熟入薑汁地黃汁蜜相和以慢火熬成膏於不津器中密封之每服半匙許用溫粥飲調下日三四服蘇子煎治上氣咳嗽紫蘇子生薑汁生地黃汁白蜜杏仁各一升上搗蘇子以地黃汁薑汁澆之以絹絞取汁更搗以汁澆之絞令味盡去滓熬令杏仁微黃黑如脂又以汁澆之絹絞往來六七度令味盡去滓納蜜合和置銅器中於湯上煎之令如飴每服方寸匕日三夜一一方無地黃汁救急療上氣咳肺氣胸痛病源咳嗽上氣者肺氣有餘也肺感於寒則成咳嗽肺主氣氣有餘則喘咳上氣此為邪搏於氣氣壅滯不得宣通是為有餘故咳嗽而上氣也其狀喘咳上氣及多涕唾面目浮腫則氣逆也杏仁三大升去皮尖及雙仁者研如泥白蜜一大升牛酥二大升上將杏仁於瓷盆中用水研取汁五升淨磨銅鐺勿令脂膩先傾三升汁於鐺中刻木記其深淺又傾汁二升以緩火煎減至於所記處即內蜜酥等煎還至木記處藥乃成貯於不津瓷器中每日三度以暖酒服一大匙不能飲酒和粥服亦得服至一七日唾色變白二七日唾稀三七日咳斷此方非獨治咳兼補虛損去風冷悅肌膚白如瓠婦人服之尤佳百合湯治肺氣壅滯咳嗽喘悶膈脘不利氣痞多渴腰膝浮腫小便淋澀百合赤茯苓陳皮湯浸去白紫蘇莖葉人參大腹皮豬苓去黑皮桑根白皮枳殼麩炒麥門冬去心甘草炙各一兩馬兜鈴七枚和皮上粗搗篩每服四錢水一盞半入生薑一棗大同煎至八分去滓不拘時溫服葶藶散治咳嗽面目浮腫不得安臥涕唾稠黏甜葶藶隔紙炒郁李仁湯去皮炒桑白皮各一兩紫菀去苗土旋覆花檳榔木通各半兩大腹皮七錢半上為散每服三錢水一中盞生薑半分煎至六分去滓不拘時溫服天門冬丸治肺臟壅熱咳嗽痰唾稠黏天門冬去心一兩半焙百合前胡貝母煨半夏湯洗去滑桔梗桑白皮防己紫菀赤茯苓生乾地黃杏仁湯浸去皮尖雙仁麩炒黃研如膏以上各七錢半上為細末煉蜜和搗二三百杵丸如桐子大每服二十丸不拘時生薑湯送下日三服前胡散治咳嗽涕唾稠黏心胸不利時有煩熱前胡桑白皮貝母煨各一兩麥門冬一兩半去心甘草炙二錢半杏仁半兩湯浸去皮尖雙仁炒上為散每服四錢以水一中盞入薑半分煎至六分去滓溫服無時久嗽丹溪肺受風寒久嗽非此不能除南星款花鵝管石佛耳草雄黃為末拌艾以薑一厚片留舌上次用艾上燒之須令煙入喉中一方無佛耳草有鬱金又方鵝管石雄黃各一分半另為末款花佛耳草各一分半另為末卻用紙一幅方方闊四五寸以雞子清塗中央四旁各懸一寸許不塗然後以鵝管石雄黃末摻於雞子清上又以款花佛耳草末摻其上敷之又用箭箸從不塗紙旁捲起為一紙筒用糊黏牢其旁抽箭箸出焙乾用時將一紙筒含在口一頭火燒以口吸煙令滿咽之咽至燒筒盡為度卻吃茶二三口壓之療久嗽熏法每旦取款花如雞子少許蜜拌花使潤納一升鐵鐺中又用一瓦碗鑽一孔孔內安小竹筒或筆管亦得其筒稍長置碗鐺相合及插筒處皆麵糊塗之勿令泄氣鐺下著炭火少時款冬煙自行管出以口含筒吸取咽之如胸中稍悶須舉頭即將指按住竹筒勿令漏煙出氣及煙盡止凡如是五日一為之至六日則飽食羊肉餛飩一頓永瘥一法不用鐺碗用有嘴瓦瓶燒藥蓋住瓶口卻以口於瓶嘴吸煙咽之尤捷枳殼湯潔古治久嗽胸膈不利者多上焦發熱枳殼炒三兩桔梗二兩黃芩一兩半上為細末每早取二兩半水三盞煎至一盞日作三服午時中時臥時各一服三日七兩半服盡又服半夏湯用半夏薑製切片每三錢半水盞半薑五片煎至一盞食後日二三服二三日服了再服枳殼丸盡其痰為度論曰先消胸中痰氣後去膈上痰再與枳朮丸謂首尾合治盡消其氣令痰不復作也款氣丸潔古治久嗽痰喘肺氣浮腫青皮陳皮檳榔木香杏仁茯苓郁李仁去皮川當歸廣朮馬兜鈴炮葶藶各三錢人參防己各四錢牽牛頭末二兩半上為細末薑汁麵糊丸如梧桐子大每服二十丸加至七十丸食後薑湯送下馬兜鈴丸潔古治多年喘嗽不止大有神功馬兜鈴去土半夏湯洗七次焙乾杏仁去皮尖麩炒各一兩巴豆二十一粒去皮油研以上除巴豆杏仁另研外余為細末用皂角膏子為丸如梧子大雄黃為衣每十丸臨臥煎烏梅湯下以利為度貝母湯本事治諸嗽久不瘥貝母一兩去心薑製黃芩半兩乾薑生五味子陳皮各一兩桑白皮半兩半夏柴胡桂心各一兩木香甘草各二錢半上為粗末每服五錢水一盞半加杏仁七粒去皮尖生薑七片煎去滓熱服有蔣氏之妻積年嗽制此方授之一服瘥以治諸般嗽悉愈上方有寒有熱有收有散諸嗽通用也人參散治諸咳嗽喘急語言不出年久者多服見效人參知母貝母馬兜鈴去皮用肉麻黃去節杏仁生用半夏以上各一錢半天仙藤一錢上作一服水二盅烏梅一枚蜜一匙煎至一盅臨睡服人參清肺湯和劑治肺胃虛寒咳嗽喘急坐臥不安並治久年勞嗽吐血腥臭地骨皮人參去蘆阿膠麩炒杏仁去皮尖麩炒桑白皮去粗皮知母烏梅去核炙甘草罌粟殼去蒂蓋蜜炙各等分上㕮咀每服三錢水一盞半烏梅棗子各一枚煎一盞臨臥溫服參粟湯和劑人參款冬花罌粟殼醋炙各等分每服四錢水一盅阿膠一錢烏梅一個煎七分臨臥溫服丹溪久嗽丸子海蛤粉研細膽星臣杏仁臣訶子佐青黛佐皂角使上為末薑汁丸如桐子大薑湯下久嗽乃積痰久留肺脘黏滯如膠氣不能升降或挾濕與酒而作香附子童便浸殭蠶炒海蛤粉栝蔞仁蜂房杏仁薑汁竹瀝神麯各等分上為末蜜調噙化謝老人形實夏月無汗成久嗽痰半夏薑製紫蘇葉各一兩上二味入莎末蜆殼末神麯末以栝蔞瓤桃仁半兩和丸先服三拗湯三帖方服此丸子男子五十歲舊年因暑月入冷水作勞患瘧後得痰嗽次年夏末得弦脈而左手虛叩之必汗少而有痰身時時發熱痰如稠黃膠與下項方藥仍灸大椎風門肺俞五處半夏一兩白朮七錢茯苓六錢黃芩陳皮桔梗枳殼石膏煅各半兩殭蠶炒二錢半五味子一錢半上用神麯糊丸薑湯下三十丸先與三拗湯加黃芩白朮二帖夜與小胃丹十丸以攪其痰腎氣八味丸見虛損生料鹿茸丸見溲血大菟絲子丸和劑治腎氣虛損五勞七傷腳膝痠疼面色黧黑目眩耳鳴心忡氣短時有盜汗小便滑數菟絲子淨洗酒浸澤瀉鹿茸去毛酥炙石龍芮去土肉桂去粗皮附子炮去皮各一兩石斛去根熟乾地黃白茯苓去皮牛膝酒浸一宿焙乾續斷山茱萸去核肉蓯蓉酒浸切焙防風去蘆杜仲去粗皮炒去絲補骨脂去毛酒炒蓽澄茄沉香巴戟去心茴香炒各三兩五味子桑螵蛸酒浸炒覆盆子去枝葉萼芎藭各半兩上為細末酒煮麵糊丸如桐子大每服二十丸空心溫酒鹽湯任下時行參蘇飲見發熱乾咳嗽丹溪云乾咳嗽極難治此係火鬱之證乃痰鬱其火邪在中用苦桔梗以開之下用補陰降火之劑不已即成勞倒倉法好此不得志者有之宜用補陰方四物湯加竹瀝炒柏之類海藏云甘桔湯此仲景少陰咽痛藥也孫真人治肺癰吐膿血用生甘草加減二十餘條甘桔湯方用桔梗三兩甘草一兩白水煎服咳逆氣者加陳皮咳嗽者加貝母知母咳發渴者加五味子吐膿血者加紫菀肺痰者加阿膠面目腫者加茯苓嘔者加生薑半夏少氣者加人參麥門冬膚痛者加黃耆目赤者加梔子黃連咽痛者加鼠黏子竹茹聲不出者加半夏桂枝疫毒頭腫者加鼠黏子大黃芒硝胸痛膈不利者加枳殼心胸痞者加枳實不得眠者加梔子發狂者加防風荊芥酒毒者加葛根陳皮一中年婦人乾咳寸脈滑動似豆狀余皆散大不浮左大於右每五更心躁熱有汗但怒氣則甚與桔梗不開諸藥不效遂以石膏香附為君芩連青黛門冬栝蔞陳皮炒柏歸桔為臣五味砂仁川芎紫菀佐之凡二十餘帖而安喉中有聲射干麻黃湯仲景射干細辛紫菀款冬花各三兩麻黃生薑各四兩五味子半夏各半升大棗七枚水一斗二升先煮麻黃兩沸去上沫納諸藥煮取三升分溫三服白前湯千金治咳逆上氣身體浮腫短氣腫滿旦夕倚壁不得臥喉中水雞聲白前紫菀半夏大戟各三兩水一斗浸一宿明旦煮取三升分三服清金湯治丈夫婦人遠年近日咳嗽上氣喘急喉中涎聲胸滿氣逆坐臥不寧飲食不下陳皮去白薏苡仁五味子阿膠炒茯苓去皮紫蘇桑白皮杏仁去皮尖炒貝母去心款冬花半夏曲百合各一錢粟殼蜜炒人參甘草炙各半錢上作一服水二盅生薑三片棗二枚烏梅一枚煎一盅食後服失音杏仁煎治咳嗽失音不出杏仁去皮尖三兩研生薑汁白蜜餳糖各一兩半桑皮貝母去心木通各一兩二錢半紫菀去土五味子各一兩上銼碎用水三升熬至半升去滓入前杏仁等四味再熬成膏每服一匕含化一方加款冬花知母各一兩通聲煎治咳嗽氣促胸中滿悶語聲不出杏仁一升去皮尖雙仁炒另研如泥木通五味子人參桂心去粗皮細辛款冬花菖蒲竹茹酥以上各三兩白蜜生薑汁各一升棗肉二升上前八味銼如麻豆大以水五升微火煎五七沸去滓納酥蜜薑汁並棗肉再煎令稀稠得所每服一匙用溫酒一小盞化下一方無酒含咽之熱痰小陷胸湯仲景黃連一兩半夏半升洗栝蔞實大者一枚上以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服青礞石丸去痰或痞痛經絡中有痰青礞石煅五錢半夏二兩風化硝二錢白朮一兩陳皮茯苓各七錢半黃芩半兩上炒神麯薑汁糊丸又方礞石丸礞石半兩煅半夏七錢半南星茯苓各五錢風化硝二錢上為末神麯糊丸痰嗽化痰方白芥子去殼滑石各半兩貝母南星各一兩風化硝二錢半黃芩酒洗一兩半上為末湯浸蒸餅丸丹溪云脅下痰非芥子不能除人參半夏丸寶鑑化痰墜涎止嗽定喘療風痰食痰一切痰逆嘔吐痰厥頭痛或風氣偏正頭痛或風壅頭目昏或耳鳴鼻塞咽乾胸膈不利人參茯苓去皮南星薄荷各半兩寒水石白礬生用半夏薑屑各一兩蛤粉二兩藿香二錢半上為末水麵糊為丸如桐子大每服三十丸薑湯下食後日三服白湯亦得一方加黃連半兩黃柏二兩尤效又治酒病調和臟腑殊妙人參清鎮丸治熱止嗽消痰定喘人參柴胡各一兩黃芩半夏甘草炙各七錢麥門冬青黛各三錢陳皮二錢五味子十三粒上為末麵糊丸如桐子大每服三十丸溫白湯送下食後玉液丸治風壅化痰涎利咽膈清頭目止咳嗽除煩熱寒水石煅令赤出火毒水飛過三十兩半夏湯洗焙為細末白礬枯研細各十兩上研和勻麵糊丸如桐子大每服三十丸食後用淡生薑湯下寒痰半夏溫肺湯拔粹治心腹中脘痰水冷氣心下汪洋嘈雜常多涎唾口中清水自出脅肋急脹痛不欲食此胃氣虛冷所致其脈沉弦細遲旋覆花人參細辛桂心甘草陳皮桔梗芍藥半夏制各半兩赤茯苓七錢半上㕮咀每服四錢生薑三片水煎食後服溫中化痰丸治停痰留飲胸膈滿悶頭眩目暈咳嗽涎唾或飲酒過多嘔噦噁心良薑炒青皮去白乾薑炒陳皮去白各五錢上為細末醋煮麵糊為丸如桐子大每服五十丸食後用米飲送下風痰祛痰丸治風痰喘嗽人參去蘆陳皮去白青皮去白茯苓去皮白朮煨木香天麻各一兩槐角子半夏湯泡七次各七錢半豬牙皂角去皮弦子酥炙五錢上為細末薑汁煮麵糊為丸如梧子大每服五七十丸食後溫酒送下生薑湯亦可氣痰星香丸治諸氣嗽生痰南星半夏各三兩用白礬一兩入水同二味浸一宿陳皮五兩米泔浸一周時去白取淨三兩香附子三兩皂角水浸一周時曬乾上四味俱不見火碾為細末薑汁煮麵糊和丸如梧子大每服五十丸食後淡生薑湯送下濕痰白朮湯治五臟受濕咳嗽痰多上氣喘急身體重痛脈濡細白朮三錢白茯苓去皮半夏湯泡七次橘紅各二錢五味子甘草炙各一錢上作一服用水二盅生薑五片煎至一盅不拘時服麻黃湯治肺臟發咳咳而喘急有聲甚則唾血麻黃三錢桂枝二錢甘草一錢杏仁二十粒上水煎服桔梗湯治心臟發咳咳而喉中如梗狀甚則咽腫喉痹苦桔梗三錢甘草六錢上水煎服小柴胡湯見往來寒熱升麻湯治脾臟發咳咳而右脅下痛痛引肩背甚則不可以動升麻白芍藥甘草各二錢葛根三錢上水煎服麻黃附子細辛湯治腎臟發咳咳則腰背相引而痛甚則咳涎又治寒邪犯齒致腦齒痛宜急用之緩則不救麻黃細辛各二錢附子一錢上水煎服烏梅丸治胃腑發咳咳而嘔嘔甚則長蟲出烏梅三十枚細辛附子桂枝人參黃柏各六錢乾薑一兩黃連一兩五錢當歸蜀椒各四兩上為末先用酒浸烏梅一宿去核蒸之與米飯搗如泥為丸桐子大每服三十丸白湯下黃芩半夏生薑湯治膽腑發咳嘔苦水如膽汁黃芩炒生薑各三錢甘草炙半夏各二錢上薑水煎服赤石脂禹餘糧湯治大腸腑發咳咳而遺矢赤石脂禹餘糧各二兩並打碎上水煎服芍藥甘草湯治小腸腑發咳咳而失氣芍藥甘草炙各四錢上水煎服茯苓甘草湯治膀胱腑發咳咳而遺溺茯苓二錢桂枝二錢五分生薑五大片炙甘草一錢上水煎服錢氏異功散治久咳不已或腹痛少食面腫氣逆又治脾胃虛弱飲食少思等證人參茯苓白朮甘草陳皮各等分上每服三五錢薑棗水煎服肺痿人參養肺湯治肺痿咳嗽有痰午後熱並聲嘶者人參去蘆阿膠蛤粉炒貝母杏仁炒桔梗茯苓桑皮枳實甘草以上各一錢柴胡二錢五味子半錢上水二盅生薑三片棗一枚煎至一盅食遠服肺脹越婢加半夏湯見喘喘三拗湯華蓋散俱見咳嗽滲濕湯見傷濕白虎湯見發熱越婢加半夏湯金匱麻黃六兩石膏半斤生薑三兩甘草一兩半夏半升大棗十五枚上六味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服小青龍加石膏湯金匱麻黃芍藥桂枝細辛甘草乾薑各三錢五味子半夏各半升石膏二兩上九味以水一斗先煮麻黃去上沫納諸藥煮取三升強人服一升羸者減之日三服小兒服四合麻黃定喘湯東垣治小兒寒鬱而喘喉鳴腹內鳴堅滿鼻流清涕脈沉急而數麻黃草豆蔻各一錢益智仁一分半厚朴吳茱萸各二分甘草柴胡梢黃芩生各一分當歸尾蘇木升麻神麯各半分紅花少許全蠍一枚上分二服水一大盞煎七分稍熱服食遠忌風寒微汗效麻黃蒼朮湯東垣治秋暮冬天每夜連聲嗽不絶大喘至天明日高方緩口苦兩脅下痛心下痞悶臥而多驚筋攣肢節痛痰唾涎沫日晚神昏呵欠不進飲食柴胡根羌活根蒼朮各五分麻黃八分防風根甘草根生歸梢各四分黃芩熟甘草各三分五味子九個草豆蔻六分黃耆一錢半上分二帖水煎稍熱服臨臥四磨湯四七湯俱見氣平氣散寶鑑白牽牛二兩半生半炒取頭末一半青皮去白雞心檳榔各三錢陳皮去白半兩大黃七錢上為細末每服三錢生薑湯一盞調下無時內經曰肺苦氣上逆急食苦以瀉之故白牽牛苦寒瀉氣分濕熱上攻喘滿故以為君陳皮苦溫體輕浮理肺氣青皮苦辛平散肺中滯氣故以為臣檳榔辛溫性沉重下痰降氣大黃苦寒蕩滌滿實故以為使也加減瀉白散桑白皮一兩地骨皮知母陳皮去白桔梗各五錢青皮去白黃芩炙甘草各三錢上㕮咀每服五錢水二盞煎至一盞食後溫服木防己湯金匱木防己三兩石膏雞子大一塊桂枝二兩人參四兩上四味以水六升煮取二升分溫再服木防己加茯苓芒硝湯木防己桂枝各二兩人參茯苓各四兩芒硝三合上五味以水六升煮取二升去滓納芒硝再微煎分溫再服微利則愈葶藶大棗瀉肺湯三因治肺癰胸膈脹滿上氣喘急身面目俱浮腫鼻塞聲重不知香臭葶藶不以多少炒令黃上件細研丸如彈子大水三盞棗十枚煎一盞去棗入藥煎七分食後服法令先投小青龍湯三服乃進此藥即濟生葶藶散湯使不同濟生方炒甜葶藶桔梗栝蔞子薏苡仁升麻桑皮葛根各一兩炙甘草半兩干緡湯婦人大全治喘急有風痰者半夏七個炮製四片破之皂角去皮弦甘草炙各一寸生薑如指大上用水一碗煮去半頓服一方不用甘草但用半夏末一兩皂角半兩生薑七片同入紗袋中水三升煎至一盞五分以手揉洗取清汁分作三服並服二服效半夏丸保命治因傷風而痰作喘逆兀兀欲吐噁心欲倒半夏一兩檳榔雄黃各三錢上為細末薑汁浸蒸餅為丸桐子大每服三五十丸薑湯下小兒丸如米大人參半夏丸見嗽沉香滾痰丸見痰飲槐角利膈丸寶鑑治風勝痰實胸滿及喘滿咳嗽皂角一兩酥炙去皮弦子半夏槐角炒各半兩牽牛一兩半上同為細末生薑汁麵糊丸如桐子大每服三十丸食後生薑湯下定喘餅子寶鑑芫花醋浸一宿炒桑白皮炒吳茱萸炒馬兜鈴陳皮去白各一兩寒食麵三兩白牽牛三兩半生半炒取頭末二兩上為末和勻滴水丸如櫻桃大捏餅子取熱灰半碗在鍋內同炒餅子熱每夜服一餅嚼爛煎馬兜鈴湯下如患人心頭不快加上一餅或二餅至微明利下神效婦人有胎者不可服木香金鈴散保命治暴熱心肺上喘不已大黃五錢金鈴子去核木香各三錢朴硝二錢輕粉少許上為末柳白皮煎湯調下食後參四錢以利為度麥門冬湯金匱麥門冬七升半夏一升人參二兩甘草二兩粳米三合大棗十二枚上六味以水一斗二升煮取六升溫服一升日三夜一服天門冬丸保命治婦人喘嗽手足煩熱骨蒸寢汗口乾引飲面目浮腫天門冬十兩去心麥門冬八兩去心生地黃三斤取汁為膏上前二味為細末膏子為丸如桐子大每服五十丸逍遙散下逍遙散須去甘草加人參或與王氏博濟方人參荊芥散亦得如面腫不已經曰面腫因風故宜汗麻黃桂枝可發其汗後與柴胡飲子去大黃咳論曰治臟者治其腧治腑者治其合浮腫者治其經治腧者治其土也治合者亦治其土也如兵圍魏救趙之法也人參平肺散東垣治肺受熱而喘桑白皮炒二錢知母一錢半甘草炙茯苓人參地骨皮天門冬去心各一錢青皮陳皮各六分五味子三十粒捶碎水二盅生薑五片煎一盅食遠溫服如熱甚加黃芩薄荷葉各一錢參蘇溫肺湯東垣治肺受寒而喘人參肉桂甘草木香五味子陳皮製半夏桑白皮白朮紫蘇莖葉各二兩白茯苓一兩上㕮咀每服五錢水一盞半生薑三片煎至七分去滓食後溫服如冬寒每服不去節麻黃半分先煎去沫下諸藥調中益氣湯見勞倦分氣紫蘇飲見氣指迷七氣湯即大七氣湯去三稜加半夏見積聚安腎丸和劑治腎經久積陰寒膀胱虛冷下元衰憊耳重唇焦腰腿腫疼臍腹撮痛兩脅刺脹小腹堅疼下