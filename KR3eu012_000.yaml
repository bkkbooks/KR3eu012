各等分上二味合煉一處以淨瓷器貯之每日空心用三匙熱酒調服蜜湯亦可久服滋陰養血止嗽榮筋大黃蟅蟲丸見虛勞葦莖湯當於瘍科求之髭發張天師草還丹海藏此上少陰下厥陰藥也地骨皮生地黃菟絲子酒浸三宿炒黃牛膝遠志去心石菖蒲各等分上為細末煉蜜丸如桐子大每服三十丸空心溫酒下鹽湯亦可修合忌女人雞犬見七寶美髯丹補腎丸烏鬚髮延年益壽何首烏赤白雌雄各一斤川牛膝八兩以何首烏先用米泔水浸一日夜以竹刀刮去粗皮切作大片用黑豆鋪甑中一層卻鋪何首烏一層再鋪豆一層卻鋪川牛膝一層又豆一層重重相間面上鋪豆覆之以豆熟為度取去豆曬乾次日如前用生豆再蒸如法蒸七次曬七次去豆用破故紙半斤以水洗淨用黑芝麻同炒無聲為度去芝麻白茯苓半斤用人乳汁拌浸透曬乾蒸過赤茯苓半斤用黑牛乳汁浸透曬乾蒸過菟絲子半斤酒浸一宿洗去砂土曬乾蒸三次曬三次當歸身半斤淨身去頭尾酒洗過枸杞子半斤去蒂枯者上末之煉蜜丸如龍眼大每日空心嚼二三丸溫酒下或米湯白湯鹽湯皆可製藥不犯鐵器玄精丹北方黑色入通於腎開竅於二陰藏精於腎其味鹹其類水其病在骨此藥主之血餘自己發及父子一本者及少壯男女發揀去黃白色者用灰湯洗二三次再以大皂角四兩捶碎煮水洗淨務期無油氣為佳將發扯碎曬乾每淨髮一斤用川椒四兩揀去梗核於大鍋內發一層椒一層和勻以中鍋蓋之鹽泥固濟勿令泄氣桑柴慢火煅三炷香退火待冷取出約重四兩有餘於無風處研為細末何首烏用黑豆九蒸九曬揀去豆取淨末一斤黑脂麻九蒸九曬取淨末八兩破故紙炒取淨末四兩生地黃懷慶沉水者酒浸杵膏八兩熟地黃同上制八兩桑堪取淨汁熬膏四兩女貞實四兩旱蓮草取淨汁熬膏四兩胡桃肉研膏二兩膠棗肉研膏二兩槐角子入牛膽內百日四兩上以藥末入諸膏和勻加煉蜜一斤成劑入石臼內舂千餘下如桐子大每服六十丸空心用何首烏釀酒每溫二三杯送下日三青絲散東垣補虛牢牙黑髭鬚香白芷白茯苓各五錢母丁香細辛當歸川芎甘草甘松各三錢升麻旱蓮草地骨皮生地黃熟地黃青鹽破故紙各二錢寒水石七錢煅香附米一兩生薑汁浸一宿炒何首烏一兩麝香五分高茶末為末庚日為始背東面西擦牙早不見日夜不見燈刷畢咽藥余津潤髭一月頓黑忌食蘿蔔擦牙方六月六日取槐枝刀銼碎如黃豆粗用一斗著東流水一桶煮至五分撈去槐枝又煎至三分用食鹽三斤入鍋炒乾取出研細用黑鉛一斤鍋煅成灰與前鹽羅成末再入鍋炒如磚色每日擦牙取漱口水通著打四鬢併發令自干日久去頭風固齒去酒刺烏鬚髮擦牙烏須方豬牙皂角七錢炮白茯苓去皮破故紙熟地黃酒浸焙五倍子制青鹽細辛各三錢去根土桑椹子曬乾五錢上為細末每清晨擦牙用水漱口洗須鬢不可將漱水入盆內恐傷眼目易便擦牙方用五倍子大者一百個裝食鹽一斤鋪在鍋內大火燒過存性為細末每日擦之丁砂散瑞竹掠髭發大訶子一個母丁香十五個百藥煎一錢針砂少許醋炒七次高茶末上為細末用水一大碗熬數沸不去滓收於淨瓷器內每夜臨臥溫漿洗淨髭發用藥水掠之次早再用溫漿水淨洗百日其髭發自黑藥用更浸一新釘尤妙訶子散瑞竹訶子兩個去核沒食子百藥煎各三兩金絲礬一兩半研針砂三兩用好醋一碗瓷器浸三日炒七次上將蕎麵入針砂打糊先一夜將針砂糊抹在頭上用荷葉包到天明溫漿水洗淨次夜卻將前藥末四味調入針砂糊內用生薑一塊捶碎再加些少輕粉一處調勻抹在頭上仍用荷葉包到天明用溫漿水加清油數點在內洗淨其發黑且光制五倍子法揀大五倍子去蛀屑敲作碎粒分粗細為二先將粗片於瓦器中內用文火炒成糊次入細者同炒初時大黑煙起取出不住手炒將冷又上火炒昏黃煙起又取開炒再上火炒青黃煙間出即住火先以真青布一大片浸濕將五倍子傾在布上捏成一團用腳踏成餅上用濕泥一擔盦一夜色如烏鴉羽為妙瓷器盛之勿令泄氣烏須易簡方制五倍子一錢膽礬白礬各七釐鹽一分四釐榆皮面二分上俱研細末茶清調如稀糊隔湯頓稠黃昏乘熱刷上待有一個更次洗去又方金鉛一錢青錠粉三分海砂一分樟腦半分上和勻茶滷調搽髭發點線香一炷完即洗去以油潤之點白方每日拔去白鬚即以銀簪點丁香末和薑汁在根孔內則再生黑鬚又方銀礦當歸各三錢白礬生飛面真粉各一分硃砂一分半上用清水調拔去白髮點如前浸油銀礦一兩當歸三兩核桃油八兩上末浸瓷罐內七日後搽黑雲散五倍子炒百藥煎生胡桃皮青石榴皮訶子肉青木瓜皮青柿子皮何首烏豬牙皂角炒黑青礬細辛水銀各等分上以水銀入石榴皮內月餘再以榴皮曬乾同諸藥研末煉蜜丸如小錢大常於木炭灰內焙養勿得離灰如要烏鬚髮時先用皂角水洗淨次用熱酒調化塗之好熱醋亦可滋榮散瑞竹長養髮發落最宜生薑焙乾人參各一兩上為細末每用生薑一塊切片蘸藥末於發落處擦之二日一次三聖膏必用治髭發脫落能令再生黑附子蔓荊子柏子仁各半兩上為末烏雞脂和勻搗研干置瓦盆內封固百日取出塗脫處三五日即生腋氣六物散治漏腋腋下手掌足心陰下股裹常如汗濕汙衣干枸杞根干薔薇根甘草各二兩胡粉商陸根滑石各一兩上為末以苦酒少許和塗當微汗出易衣更塗之不過三著便愈或一歲復發又塗之治陰汗鴉臭兩腋下臭不可與人同行白礬密陀僧黃丹各二錢半麝香五分上於乳鉢內研如飛塵以醋於手心內調藥末搽腋下經兩時辰許卻以香白芷煎湯洗之一日用一次治腋臭神效密陀僧四兩白礬枯過二兩輕粉三錢上為細末頻擦兩腋下擦至半月見效半年全愈又方密陀僧一兩白礬七錢硇砂麝香各少許上為細末先用皂角煎湯洗後敷上又方用白礬飛過不以多少臨睡時以紙襯卓上伸手托壁柱上以藥干揩令腋下十分熱痛兩腋揩遍先於日中將所著上截衣服用灰汁淨洗又泡去衣袖中臭氣皆無氣息如新衣方可著若洗氣息不斷枉用其藥大概藥無不驗多是衣服再作氣故不能斷根一方用燒好礬石末絹袋盛常以粉腋下不過十度一方唾調塗之治腋氣方上用熱蒸餅一枚擘作兩片摻密陀僧細末一錢許急挾在腋下略睡少時候冷棄之如一腋有病只用一半葉元方平生苦此疾來紹興偶得此方用一次遂絶根本又方撏去腋下毛以甘遂半兩為末用豬肉兩片薄批開將甘遂摻肉上午後貼放兩腋下候明旦五更濃煎甘草半兩為湯一碗服之良久瀉出穢物即愈又方治腋氣先用刀削去腋毛淨用白澱粉水調搽敷患處至過六七日夜後次日早看腋下有一黑點如針孔大用筆點定即用艾炷灸七枚灸過攻心中痛當用後藥下之青木香檳榔丁香檀香麝香大黃上煎服以下為度蠱毒解毒丸潔古善治男子婦人及小兒一切積熱不解停留作毒上焦壅熱咽喉不利口乾多渴伏暑困悶霍亂不寧或山嵐瘴氣及食毒酒毒吐逆不定遊風丹毒迷惑昏困不省人事虛煩發躁赤目口瘡善解四時傷寒之疾發散瘟疫毒邪之氣及四方人不服水土一切諸毒並皆解之常服補真益氣化毒除風神效不可細述滑石黃芩貫衆茯苓山梔子乾薑草龍膽大豆青黛甘草薄荷寒水石各一兩益智仁砂仁大黃山豆根生地黃桔梗百藥煎紫河車即蚤休緑豆粉馬屁勃板藍根黃藥子各半兩上為細末煉蜜為丸如彈子大每服一丸新汲水化下細嚼或噙化亦得小兒半丸如婦人血暈不省生薑薄荷水磨下一丸又解毒丸解世間不測一切毒山豆根山茨菰緑豆粉各三兩板藍根土馬棕黃藥子紫河車續隨子仁木通盆硝藿香五味子薄荷貫衆寒水石白殭蠶乾葛雄黃百藥煎各二兩茜草根大黃硃砂各一兩麝香半兩甘草臘月竹筒盛置糞清內春日開取陰乾四兩上為細末蒸餅和丸如彈子大以螺青三兩和勻留一半為衣每服半丸用生薑蜜水化下三因解黴丸治誤食毒草並百物毒救人於必死板藍根四兩乾者洗淨曬乾貫衆一兩銼去毛青黛研甘草生用各一兩上為末煉蜜丸如桐子大以青黛另為衣如稍覺精神恍惚即是誤中諸毒急取十五丸爛嚼用新水送下即解或用水浸蒸餅為丸尤佳常服三五丸大解暑熱神仙解毒萬病丹一名玉樞丹一名紫金錠治一切藥毒菰子毒鼠莽毒惡菌菌金石毒吃疫死牛馬肉毒河豚毒時行瘟疫山嵐瘴瘧忽喉閉纏喉風脾病黃腫赤眼瘡癤沖冒寒暑熱毒上攻或自縊溺水打撲傷損癰疽發背未破魚臍瘡腫湯火所傷百蟲鼠犬蛇傷男子婦人或中顛邪狂走鬼胎鬼氣並宜服之凡人居家或出入不可無此藥真濟世衛家之寶如毒藥嶺南最多若遊宦嶺表才覺意思不快便服之即安二廣山谷間有草曰胡蔓草又名斷腸草若人以急水吞之急死緩水吞之緩死又取毒蛇殺之以草覆上以水灑之數日菌生其上取為末酒調以毒人始亦無患再飲灑即毒發立死其俗淫婦人多自配合北人與人情分相好多不肯逐北人回陰以藥置食中北人遠即戒之曰子某年來若從其言即復以藥解之若過期不往必死矣名曰定年藥北人屆彼亦宜志之若覺中毒四大不調即便服之或於雞豚魚羊鵝鴨等肉下藥復食此物即觸發其毒急服此藥一粒或吐或痢隨服便瘥昔有一女子久患勞瘵病為尸蟲所噬磨一粒服之一時久吐下小蟲千餘條一大者正為兩段後只服蘇合香丸半月遂復如常至牛馬六畜中毒亦以此救之無不效山茨菰南北處處有之俗名金燈籠葉似韭花似燈籠白色上有黑點結子三梭二月開花三月結子四月初苗枯即挖地得之遲則苗腐爛難尋矣與有毒老鴉蒜極相類但蒜無毛茨菰上有毛包裹宜辨去皮洗極淨焙二兩川文蛤一名五倍子捶破洗刮內浮焙乾二兩千金子一名續隨子去殼揀色極白者用紙包裹換紙研數十次去盡油以色白再研紙無油成霜為度用一兩麝香揀盡血毛皮殼細研淨三錢紅芽大戟杭州紫大戟為上江南上大戟次之去蘆根洗極淨焙乾一兩半北方綿大戟色白者大峻利反能傷人弱人服有吐血者忌之慎之上各研為細末和勻以糯米粥為劑每料分作四十粒於端午重陽七夕合如欲急用辰日亦得於木臼中杵數百下不得令婦人孝子不具足人雞犬之類見之切宜祕惜不可廣傳輕之無效如癰疽發背未破之時用冷水磨塗痛處並磨服良久覺癢立消陰陽二毒傷寒心悶狂言亂語胸膈壅滯邪毒未發及瘟疫山嵐瘴氣纏喉風冷水入薄荷一葉同研下急中顛邪喝叫亂走鬼胎鬼氣並用暖無灰酒下自縊落水死心頭暖者及驚死鬼迷死未隔宿者並冷水磨灌下蛇犬蜈蚣傷並用冷水磨塗傷處諸般瘧疾不問新久臨發時煎桃柳枝湯磨下小兒急慢驚風五疳八痢蜜水薄荷一葉同磨下牙關緊急酒磨塗一丸分作三服量大小與之牙痛酒磨塗及含藥少許吞下湯火傷東流水磨塗傷處打撲傷損炒松節無灰酒下年深日近頭疼太陽疼用酒入薄菏葉磨紙花貼太陽穴上諸般癇疾口眼喎斜眼目掣眨言語謇澀卒中風口噤牙關緊急筋脈攣縮骨節風腫手腳疼痛行步艱辛一應風氣疼痛並用酒磨下有孕婦人不可服一方加山豆根全蠍硃砂雄黃各一兩保靈丹治蠱毒諸毒一切藥毒神效硃砂淨細研一兩大山豆根半兩雄黃黃丹麝香黃藥子續隨子生杵末各二錢半川巴豆肥者取肉不去油二錢半斑蝥二錢半去頭足糯米半生半炒赤蜈蚣二條一生一炙上各修治入乳鉢研和於端午重陽臘日修合不令雞犬婦人見用糯米稀糊丸如龍眼核大陰乾瓷盒收每一丸好茶清吞下不得嚼破須臾病人自覺心頭如拽斷皮條聲將次毒物下或自口出或大便出嫩則是血老則成鱉或蜷螂諸雜帶命之物藥丸凝血並下以水洗淨收可救三人如中毒口噤即挑開下藥或蛇蠍兩汗諸毒以好醋磨敷患處立解服藥已效如知毒害之家不必研究若訴之其毒再發不救瘥後更忌酒肉毒食一月惟軟飯可也或急用但擇吉日精潔修合青黛雄黃散凡始覺中毒及蛇蟲咬癰疽才作即服此令毒氣不聚好青黛雄黃各等分上研細新汲水調下二錢歸魂散凡初中蠱在膈上者當用此藥吐之白礬建茶各一兩上二味為細末每服五大錢新汲水調下頓服一時久當吐毒出此藥入口其味甘甜並不覺苦味者是也雄朱丸治蠱毒從酒食中著者端午日合麝香二錢半別研雄黃硃砂俱另研水飛過赤腳蜈蚣微炙去足續隨子各一兩上為細末入雄黃硃砂麝香研勻以糯米煮粥和丸如芡實大每服一丸熱酒吞下毒當與藥俱下桔梗散桔梗去蘆不以多少擇味苦者銼碎微炒上為細末每服三錢米飲調服不拘時候此藥不吐不痢加之易為收買多服有益如服吐痢藥後日進兩三服使毒氣日漸消散不致再發動也石刻方治蠱毒無論年代遠近但煮一鴨卵插銀叉於內並噙之約一食頃取視叉股俱黑即中毒也五倍子二兩硫黃末一錢丁香麝香輕粉各少許糯米二十粒甘草三寸半生半炙上用水十分於瓶內煎七分候藥面生皺皮為熟絹濾去滓通口服病人平正仰臥令頭高覺腹中有物衝心者三次即不得動若吐以盆桶盛之如鰇魚之類乃是惡物吐罷飲茶一盞瀉亦無妨旋煮白粥補忌生冷油膩鮓醬十日後服解毒丸三五丸經旬平復七寶丸治蠱毒敗鼓皮蠶蛻紙各燒存性刺蝟皮五倍子續隨子硃砂研雄黃研各等分上為細末糯米稀糊和丸如梧子大每服七丸空心用熟水送下東坡雄黃丸治蠱毒及蟲蛇畜獸毒雄黃明礬生用各等分上於端午日合研細熔黃蠟和丸如梧桐子大每服七丸念藥王菩薩藥王菩薩七遍白湯送下蜜髓煎治中蠱毒令人腹內堅痛面目青黃病變無常蜜一碗豬骨髓五兩研上同煎令熟分作十服日三服即瘥馬兜鈴根湯治五種蠱毒及草蠱術在西京處及嶺南人若行此毒人人咽刺痛欲死者用馬兜鈴根一兩細銼以水一盞煎至七分去滓空心頓服當時吐出蠱未吐再服以快為度一方以苗為末溫水調服一方用根搗末水服方寸匕治諸蠱毒方上用鰻鱺魚乾末空心服之三五度瘥一方燒炙令香食之尤佳其魚有五色紋者良鐵精丸治食中有蠱毒腹內堅痛面目青黃瘦瘁淋露骨立病變無常鐵精乃煅鐵爐中如塵紫色輕者為佳不拘多少上為細末以生雞肝搗和丸如梧桐子大曝乾每服五丸七丸溫酒下治中蠱毒上用山豆根不以多少密遣人和水研已禁聲服少許不止再服槲皮散治蠱毒下血如爛肉片心腹㽱痛如有物齧若不即治食人五臟乃死槲木北陰白皮桃根白皮各四兩並細銼蝟皮灰亂髮灰各一兩火麻子汁五升上先以水五盞煮槲皮桃根皮取濃汁二盞和麻子汁每服暖汁一盞調蝟皮灰發灰二錢匕令患人少食旦服須臾用水一盞以雞翎引吐於水中如牛涎諸蠱並出治中蠱毒下血如肝萆麻子一粒去皮朴硝一錢上細研作一服新汲水調下連作二三服效地榆散治蠱毒下血或腹痛或不痛百治不效煩渴不止臭榆根東引根白皮密炙焙乾地榆各半兩上為細末每服一錢熱米飲調下苦瓠湯治蠱毒吐血或下血如爛肝上用苦瓠一枚切以水二大盞煎取一盞去滓空心分溫二服吐下蠱即愈範汪方云苦瓠毒當臨時量用之肘後方云用苦酒一升煮令消飲之神驗一名苦葫蘆療卒中蠱下血如雞肝者晝夜出血石余四臟皆損惟心未毀或鼻破待死者上以桔梗搗屑以酒服方寸匕日三服不能下藥者以物拗口開灌之心中當煩須臾自定服七日止當豬肝臛以補之神良茜根散治蠱注下血如雞肝體熱心腹中煩悶茜根川升麻犀角屑地榆銼黃芩黃連炒各一兩上為散每服四錢水一中盞煎六分去滓不拘時溫服雄黃散治中蠱毒吐血雄黃二錢五分研伏龍肝半兩研斑蝥去足翅糯米炒十四枚去糯米獺肝如棗大炙上為細末每服二錢匕空心以酪漿調下或吐蛤蟆及蛇蟲等出是效麥面散治中蠱吐血上用小麥面二合分為三服以冷水調下半日服盡當下蠱即瘥黃龍湯治因食中毒上將灶底當釜直下掘取赤土為細末以冷水調隨多少服之或以犀角水磨取汁飲亦治食六畜肉中毒大效解一切食毒及飲酒不知中何毒卒急無藥可解蕎苨甘草生用各二兩上細銼以水五盞同煎取二盞停冷去滓分三服一方解一切藥毒加蜜少許同煎服之食躁或躁方用豉煮濃汁飲之解面毒方上以蘿蔔啖之麥面太熱蘿蔔能解其性治中豆腐毒方上用生蘿蔔煎湯如非時無蘿蔔用子煎湯亦可有人好食豆腐因中其毒醫治不效偶更醫醫至中途適見做豆腐之家夫婦相爭因問云今早做豆腐妻誤將蘿蔔湯置腐鍋中今豆腐不成蓋豆腐畏蘿蔔也醫得其説至病家凡用湯使具以蘿蔔煎湯或調或咽病者遂愈解菰子毒及一切菌毒上用芫花生者為末每服一錢新汲水下以利為好中菌毒方忍冬草生啖之即金銀花也又名老翁須又名鴛鴦草掘地作坑以新汲水投坑中攪之乘渾濁取出以絹濾過用瓷器盛每服時調轉飲一盞至三盞當效人糞汁飲一升大豆濃煮汁飲之服諸吐痢藥並解取糞汁法截淡竹去青皮浸滲其中取筒中汁是也食楓樹菌而笑不止亦治以前方菌毒吐瀉不止者用細茶芽研細以新汲井水服神效治菌毒欲死方用石首魚頭或鯗頭亦妙白水煮汁灌之即愈治中菌毒用笆竹不入泥者數節煎湯飲之立效荷葉殺菌毒誤食芋煩毒欲死亦治以前方其芋根山東人名魁芋人種芋三年不收亦成野芋並殺人蜀椒閉口者有毒誤食之戟人咽喉氣欲絶或吐下白沫身體痹冷急治之用肉桂煎汁飲之或食蒜或食地漿或濃煮豆豉汁飲之並解鉤吻與芹菜相似誤食殺人解之用薺苨八兩水六升煮取二升分溫二服鉤吻生池傍無他異其莖有毛以此別之菜中有水莨菪葉員而光有毒誤食之令人狂亂狀如中風或吐血治之用甘草煮汁服之解春秋二時龍帶精入芹菜中人偶食之為病發時手青腹滿痛不可忍名蛟龍病治之用餳糖二三升日兩度服之吐出如晰蠍三五枚瘥食苦瓠中毒治之用黍穰煮汁服之解飲食中毒煩滿治之用苦參三兩苦酒一升半煮半沸三上三下服之吐食出即瘥或以水煮亦得犀角湯亦解貪食食多不消心腹堅滿痛治之用鹽一升水三升煮令鹽消分三服當吐出食便瘥治郁肉漏脯中毒燒犬屎酒服方寸匕或服人乳汁或飲韭汁二三升亦良郁肉密器蓋之隔宿者是也漏脯茅屋漏下沾著者是也治黍禾中藏肝脯食之中毒方大豆濃汁飲數升即解亦治貍肉漏脯等毒治食生肉中毒方掘地深三尺取其下土三升以水五升煮數沸澄清汁飲一升即愈治自死六畜肉中毒方用黃柏搗屑服方寸匕治食自死鳥獸肝中毒方上取故頭巾垢一錢匕熱湯中煬服之亦治卒心痛以沸湯取汁飲之頭巾即縛髻帛也又方飲豉汁數升良治食六畜肝中毒方凡物肝臟不可輕啖自死者尤毒上用豆豉以水浸絞取汁旋服之治食馬肝牛肉毒方上以人乳汁合豉濃汁服之神效治馬肝毒中人未死方雄鼠屎二七粒末之水和服日再服屎尖者是又人垢取方寸匕服之佳治馬肉中毒欲死方香豉二兩杏仁三兩相和蒸一食頃熟杵服日再服又方煮蘆根汁飲之良治啖蛇牛肉食之欲死方飲乳汁一升立愈以泔洗頭飲一升愈牛膝細切以水一斗煮取一升飲之即解辨啖蛇牛肉毛髮向後順者是也鳥獸有中毒箭死者其肉毒用大豆煮汁及藍汁服之即解治河豚毒方五倍子白礬上等分為細末水調服之治食河豚魚中毒一時困殆倉卒無藥以清油多灌之使毒物盡吐出為愈食魚後中毒物煩亂用陳皮濃煎汁服之即解食鯸鮧魚中毒用蘆根煮汁服之即解食蟹中毒用紫蘇煮汁飲三升紫蘇子搗飲之亦良冬瓜汁飲二升吃冬瓜亦可食果中毒用豬骨燒過末之服方寸匕亦治馬肝漏脯等毒誤飲蛇交水毒方陳齋郎湖州安吉人因涉春渴掬澗水兩口咽數日覺心腹微痛日久疼甚服藥醫診之云心脾受毒今心脈損甚齋答云去年涉春渴飲澗水得此病醫云吃卻蛇在澗邊遣下不淨在澗水內蛇已成形在腹中食其心而痛也遂以水調雄黃服之果下赤蛇數條皆能走誤吞蜈蚣用生雞血令病人吃須更以清油灌口中其蜈蚣滾在血中吐出繼以雄黃細研水調服愈治中諸藥毒生甘草黑豆淡竹葉各等分上㕮咀用水一碗濃煎連服藍根散解藥毒藍根銼一握蘆根銼一握緑豆研二錢半澱腳一合研上先將二根以水一碗煎至七分去滓次入後二味和勻分三服或一二服利下惡物不用再服粉草飲凡中藥毒即令食生黑豆數粒食之聞腥者即非中毒也若是吐逆躁煩服藥須極冷即解也甘草生用一兩白礬生半兩延胡索一兩上銼細每服半錢水一盞煎至六分去滓放冷細細呷之解一切藥毒草毒六畜肉中毒方上用白扁豆生曬乾為細末新汲水調下二三錢匕解藥毒方王仲禮嗜酒壯歲時瘡㾴發於鼻延於顙心甚惡之服藥不效僧法滿使服何首烏丸當用二斤適墳僕識草藥乃掘得之其法忌鐵器但於砂鉢中藉黑豆蒸熟既成香味可人念所蒸水必能去風證以頮面初覺極熱漸加不仁至晚大腫眉目耳鼻渾然無別望之者莫不驚畏王之母高氏曰凡人感風癩非一日積吾兒遇毒何至於是吾聞山豆根赤小豆黑蛤粉生薑汁上急命僕搗捩薑汁以上三味為末調敷之中夜腫消到曉如初蓋先採何首烏擇焉不精為狼毒雜其中以致此撓也解藥過劑毒服附子酒多而覺頭重如斗唇裂血流急求黑豆緑豆各數合嚼之及濃煎黑豆緑豆湯並飲服風藥多悶亂不省醋灌濃煎甘草同生薑自然汁頓飲之又方以螺青細研新汲水調下白扁豆飲一名巴豆膏解砒毒等上用白扁豆不以多少為細末入青黛等分細研再入甘草末少許巴豆一枚去殼不去油別研為細末取一半入藥內以砂糖一大塊水化開添成一大盞飲之毒隨痢去後卻服五苓散之類解砒毒鼠莽毒用旋刺下羊血及雞鴨血熱服藍飲子解砒毒及巴豆毒用藍根砂糖二味相和擂水服之更入薄荷汁尤妙解砒毒方其證煩躁如狂心腹攪痛頭旋欲吐不吐面色青黑四肢逆冷命在須臾不救用緑豆半升擂去滓以新汲水調通口服或用真靛花二錢分二服以井花水濃調服之又方治悶絶心頭溫者新汲水調水粉服之治中砒毒方用甘草汁同藍汁飲之即愈解砒毒方上以豆豉煎濃汁飲之亦治服藥過劑心中煩悶解砒毒用早禾杆燒灰新汲水淋汁濾過冷服一碗毒從痢下即安又方用井花水調豆粉或緑豆擂水汁皆可解砒毒漢椒四十九粒黑豆十四粒甘草節二寸碎之烏梅二個水一盞煎至七分溫服解鼠莽草毒用枯過明礬同上等好茶末少許新汲水調服人有用之纍效又用大黑江豆煮汁服之如欲試其驗先刈鼠莽苗葉以豆汁澆其根從此敗爛不復生矣又用枯蓮房殼帶梗陰乾㕮咀煎水二三碗灌之如無用荷葉中心蒂或用藕節煎湯一碗溫冷灌之毒即散解巴豆毒方其證口乾兩臉赤五心熱痢不止諸藥不效者上用芭蕉根葉研取自然汁服痢止而安治藥中用巴豆下痢不止乾薑炮黃連微炒各一兩上為細末每服二錢水調下如人行五里再服又煮緑豆湯冷服之瘥薺苨湯療石毒卒發者栗栗如寒或飲食或不飲食若服紫石英發毒者亦熱悶昏昏喜臥起止無氣力或寒皆是臟腑氣不和以此治之薺苨四兩茯苓黃芩芍藥各二兩蔓青子一升藍子人參炙甘草各一兩以水一斗先煮蔓菁子取八升去滓納余藥煎取三升去滓分三服日三若虛弱人加人參一兩若上氣加茯苓薺苨各一兩甚良治銀毒方黃連去毛甘草生銼各一兩上銼碎以水三盞煎取二盞去滓時時飲之良治丹砂毒方用鹽半兩以冷水攪勻令澄旋旋服之治石鐘乳毒方上用紫石英為細末每服一錢匕溫水調下連三服黑鉛酒治中金石藥毒黑鉛一斤以乾鍋溶作汁投酒一升如此十數回候酒至半升去鉛頓服之效一方以井水磨下解砒毒解丹毒方以地漿服之甚效治一切藥毒蠱毒金石毒並用石蟹以熟水磨服治五石毒用薺苨汁生服良治丹石毒以蚌肉食之良解漆毒方一州牧以生漆塗囚兩眼囚已盲適有村臾憐而語之曰汝急尋蟹搗碎濾汁滴眼內漆當隨汁流散瘡赤愈矣如其言訪得一小蟹用之目睛好略無損治中蠱毒上用生蒼耳七個白礬皂角子嚼塗咬處須男子嚼之余藥敷腫處治溪毒中毒上以知母連根葉搗作末服之亦可服水搗取汁飲二升夏月出行多取此屑自隨欲入水先取少許投水上流便無畏兼闢射工亦可和水作湯浴之甚佳蔥白湯治中水毒溪毒如傷寒狀蔥白一握切豉半升葛根二兩升麻七錢半上銼如豆大每服四錢匕水二盞煎至一盞去滓不拘時溫服移時再服五加皮散治中水毒溪毒如傷寒狀上用五加皮研為細末每服一錢匕酒一盞調下日二夜一粥飲調亦得一方以五加皮根燒研為末水調服牡丹散治中水毒溪毒下部蟲蝕生瘡牡丹皮為細末每服二錢匕酒一盞調下日三服蟲神效剪紅丸專取一切蟲積神效無比凡人百病皆因飲灑過度食傷生冷致使脾胃不和心膈脹滿嘔惡咽酸常吐清水面色痿黃不進飲食山嵐瘴氣水腫蠱脹齁䶎咳嗽痰涎壅滯酒積食積氣積氣塊翻胃噎膈嘔逆噁心腸風痔漏臟毒酒痢纍蘊積熱上攻頭目下生瘡癬婦人血氣寒熱往來肌體羸弱月經不調赤白帶下鬼氣鬼胎産後諸疾小兒五疳蟲積誤吞銅鐵誤食惡毒等物並宜服之每服五更雞鳴時用冷茶清吞下更用馬桶盛糞於野地看之庶見藥功易辨或蟲或積或如爛魚凍或作五色等積若一次未見蟲積更看第二三次下來此即是病根有積消積有氣消氣有蟲取蟲有塊消塊若病根去其病自消若病淺即一服見效若源深更須再一服能宣導四時蘊積春宣積滯不生瘡毒夏宣暑濕不生熱痢秋宣痰飲不生瘴瘧冬宣風寒不生瘟疫此藥溫和不動元陽真氣亦無反惡小兒半服孕婦休服其效如神一上末檳榔生研細取淨末一斤以二兩為母餘十四兩上第一次以一等羅篩過取齊曬乾二上末商陸即樟柳根白者可用赤者殺人金毛狗脊貫衆各四兩以上三味和一處研極細末上第二次以二等羅篩過取齊曬乾又方不用貫衆則蟲出來猶未死也三上末三稜醋煮莪朮醋煮各八兩青木香西木香各四兩雷丸醋煮二兩半南木香二兩以上六味和一處研極細末上第三次以三等羅篩過取齊四上末大黃鍘碎酒浸曬乾研細取淨末一斤上第四次以四等羅篩取齊曬乾五上末黑牽牛半生半炒研細取頭末淨一斤上第五次以五等羅篩過取齊曬乾又方有枳殼一斤為母有藿香四兩和人諸香上作五處另研極細末要作五次上末卻用茵陳半斤大皂角一斤煎汁濾淨法水為丸如緑豆大曬乾後用丁香末一兩或加蘆薈末一兩亦妙以前淨汁煎一滾灑入丸藥旋搖令光瑩為度再以阿膠二兩生以前汁熬熔灑入丸藥旋搖光瑩曬乾壯人每服五錢弱人每服四錢五更以茶清吞下小兒減半萬應丸取蟲積神效黑牽牛取頭末大黃檳榔各八兩雷丸醋煮南木香各一兩沉香五錢上將黑牽牛大黃檳榔和一處為末以大皂角苦楝皮各四兩煎汁法水為丸如緑豆大後以雷丸木香沉香和一處研末為衣每服三四十丸五更用砂糖水送下或作末服亦可追蟲丸取一切蟲積黑牽牛取頭末檳榔各八兩雷丸醋炙南木香各二兩上為末茵陳二兩大皂角苦楝皮各一兩煎濃汁法水為丸如緑豆大大人每服四錢小兒三錢或二錢或一錢半量人虛實五更用砂糖水吞下待追去惡毒蟲積二三次方以粥補之下蟲丸追蟲取積苦楝皮去外粗皮用根皮為上樹皮次之上末麵糊丸如彈子大如欲服藥宜戒午飯晡時預食油煎雞卵餅一二個待上床時滾白湯化下一丸至五更取下異蟲為效化蟲丸治諸蟲鶴蝨去土檳榔苦楝根胡粉炒各一兩白礬枯二錢半上為末米糊為丸如桐子大一歲服五丸量人大小加減丸數溫漿水入生麻油三四點打勻送下清米湯亦可不拘時其蟲細小者皆化為水大者自下集效丸治因臟腑虛弱或多食甘肥致蛔蟲動作心腹絞痛發則腫聚往來上下痛有休止腹中煩熱口吐涎沫是蛔咬宜服此藥若積年不瘥服之亦愈又治下部有蟲生痔癢痛木香鶴蝨炒檳榔訶子麵裹煨去核蕪荑炒附子煨去皮臍乾薑各七錢半大黃一兩半烏梅十四個去核上為末煉蜜丸如桐子大每服三四十丸食前用陳皮湯下婦人淡醋湯送下祕方萬應丸治大人小兒腹內有蟲及積氣塊痛小兒疳病三稜醋炒莪朮各五錢醋炒檳榔一兩陳皮麩炒黃色橘紅各五錢蕪荑二錢半雷丸五錢鶴蝨三錢微炒乾漆炒無煙五錢木香二錢不見火良薑二錢陳壁土炒砂仁二錢去殼使君子取肉麥糵面炒各五錢胡黃連炒炙甘草各三錢神麯炒黃色五錢上為細末醋打米糊丸如緑豆大每服三五十丸空心淡薑湯送下取蟲積方檳榔牽牛各半斤雷丸一兩半苦楝皮一兩大黃四兩皂角半斤三稜蓬朮各二兩另銼同醋煮木香隨意加入上為細末煎皂角膏子煮糊和丸如黍米大每服二錢四更時分冷茶送下小兒一錢下蟲以白粥補之萬靈丸取積追蟲黑牽牛一斤取頭末十兩生用大腹子一斤扁者取末七兩生用如尖者是檳榔蓬朮二兩煨京三稜炮雷丸炮廣木香各五兩煨上為細末研勻用好紫色皂角半斤去皮弦切碎用水兩大盞浸一宿冬月浸兩宿撈去粗滓銅瓷器內熬數沸白沫出為度放冷和藥必須揉搗為丸如梧桐子大每服四錢重五更時砂糖水送下溫冷不妨至天明利三五行看取下是何蟲積以溫白粥補之忌食生冷魚腥硬物孕婦勿服檳榔湯治三蟲並寸白蟲上用檳榔三枚以灰火煨過粗搗篩用水三盞煎至一盞半去滓分三服空心日午近夜各一服其蟲盡下或和蔥白鹽豉同煮飲之亦佳一方治寸白蟲用檳榔二七枚銼碎以水二升半煮皮取一升半去滓內末頻服暖臥蟲出或不盡更服取瘥止宿勿食旦服之麥門冬湯治肺勞熱生蟲其形如蠶令人咳逆氣喘或謂憂膈氣膈恚膈寒膈熱膈此皆從勞氣所生名曰膏盲病針灸不至麥門冬去心十兩乾薑炮蜀椒去目併合口者微炒出汗各一兩黃耆銼百部焙白朮人參桂去粗皮各一兩二錢半遠志去心附子炮去皮臍細辛去苗葉炙甘草各一兩半杏仁去雙仁皮尖焙乾麩炒令黃半兩上為細末煉蜜和更於鐵臼內塗酥杵令勻熟丸如酸棗大含化稍稍咽津一方有檳榔一方無白朮桑根白皮酒治肺勞熱生蟲在肺為病桑根白皮取東引者銼一升吳茱萸根皮取東引者淨刷去土五兩狼牙去連苗處淨刷去土三兩上細銼用酒七升煮至二升去滓分作三服每日空心一服一方無狼牙前胡湯治脾勞有白蟲長一寸在脾為病令人好嘔胸中咳咳即嘔而不出前胡去蘆白朮銼細辛去苗葉赤茯苓枳殼去穰麩炒常山銼松蘿旋覆花各一兩半龍膽去苗杏仁去雙仁皮尖麩炒各一兩上銼碎每服半兩水二盞入竹葉十片洗淨細切同煎至一盞去滓空心服吐之即瘥若腹中熱滿加芒硝半錢梔子仁一兩黃芩一兩半苦參一兩一方用枳實無枳殼茱萸根浸酒方治脾勞熱有白蟲在脾中為病令人好嘔吳茱萸根取東引者一尺銼麻子八升淨揀陳皮去白炒二兩上先搗碎橘皮麻子如泥然後拌茱萸根用酒一斗浸一宿慢火上微煎絞去滓分作五服每空心溫服蟲即下凡合藥時忌言合殺蟲藥一方以水煎服雷丸丸治心臟勞熱傷心有長蟲名曰蠱長一尺貫心為病雷丸灰火炮過橘皮湯浸去白焙桃仁去雙仁皮尖麩炒各一兩二錢半貫衆大者去須半兩白蕪荑炒青葙子炒乾漆炒煙出各一兩狼牙去連苗處淨刷去土一兩半亂髮如雞子大一塊燒為灰研上為細末研勻煉蜜和更於鐵臼內塗酥杵令勻熟丸如梧桐子大每服十五丸空心用溫酒送下至晚再服米飲亦得一方不用塗酥一方有殭蠶吳茱萸根皮貫衆散治腎勞熱四肢腫急有蟯蟲如菜中蟲生於腎中貫衆大者三枚去須乾漆炒令煙絶二兩吳茱萸水洗七遍焙乾炒一兩半槐白皮乾者銼白蕪荑炒各一兩胡粉粉黃色研一兩杏仁去皮尖雙仁炒半兩上為細末研勻每服二錢空心井花水調下日晚再服水銀膏治蟯蟲咬人下部癢上水銀一兩用蒸棗膏和丸如人指大綿裹臨臥納下部中一宿納藥時常留綿帶子在外一方云水銀損腸宜慎之蠶蛹汁方治蛔蟲上取縹絲蠶蛹兩合爛研生布絞取汁空心頓飲之非繅絲即須依時收取蠶蛹曝為細末用時以意斟酌多少和粥飲服之錫灰丸取寸白諸蟲錫灰一兩雞心檳榔貫衆各半兩木香二錢半輕粉黃丹各二錢上為細末灑醋煮麵糊為丸如荔枝大每服一丸米泔浸軟日午先吃飯了至黃昏不飢飽時吃肉脯一片引蟲少刻溫酒嚼下至天明蟲出又吃韭菜亦治寸白蟲治寸白蟲令化為水狗脊貫衆白蕪荑酸石榴根銼各一兩上銼碎每服半兩以漿水一大盞煎至五分去滓四更初溫服先於晚間不得吃夜飯治寸白蟲為水瀉出永除方棐子檳榔蕪荑各等分上為細末每服二錢溫酒調服先吃燒牛肉脯後服藥聖功散治寸白蟲不拘久近神效南木香檳榔各等分上為細末每服三錢濃米飲調下黎明空心先熟嚼炙豬肉之屬只咽汁吐去滓便服藥辰已間蟲下其疾永除治寸白蟲方上用棐子四十九枚去皮以月上旬平旦空心服七枚七日服盡蟲消成水永瘥又云食實七枚七日滿蟲化為水一方以百枚只燃啖之食盡佳不能者但啖五十枚亦得經宿蟲消自下一方並治三尸蟲又方用黑鉛灰錫灰炒四錢一服先吃豬肉脯少許一時來卻用砂糖濃水半盞調灰五更服蟲盡下白粥將息一日良豫宣閣中每覺心中多嘈雜意謂飲作又疑是蟲漫依良方所説服翼日下蟲二條一長二尺五寸頭扁闊尾尖鋭每寸作一節斑斑如錦紋一條皆寸斷矣治濕𧈟方青黛二兩黃連黃柏丁香各一兩麝香二分上為細末以車脂和如棗大納下部日一二度治蟲蝕下部肛盡腸穿者上取長股蛤蟆青背者一枚雞骨一分燒為灰合和吹下部令深入纍用效
