body:
  text: 第一册卒中暴厥蘇合香丸療傳尸骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐痢時氣鬼魅瘴瘧赤白暴痢瘀血月閉痃癖疔腫驚癇鬼忤中人小兒吐乳大人狐貍等病白朮青木香烏犀角屑香附子炒去毛硃砂研水飛訶藜勒煨取皮白檀香安息香另末無灰酒一升熬膏沉香麝香研丁香蓽茇各二兩龍腦研蘇合香油入安息香膏內各一兩熏陸香別研一兩上為細末入研藥勻用安息香膏並煉白蜜和劑每服旋丸如梧桐子大早朝取井華水溫冷任意化服四丸老人小兒化服一丸溫酒化服亦得並空心服之用蠟紙裹一丸如彈子大緋絹袋當心帶之一切邪神不敢近易簡三生飲治卒中昏不知人事口眼喎斜半身不遂咽喉作聲痰氣上壅無問外感風寒內傷喜怒或六脈沉伏或指下浮盛並宜服之兼治痰厥飲厥及氣虛眩暈悉有神效但口開手散眼合遺尿聲如鼾鼻者難治南星一兩川烏去皮生附子各半兩木香二錢半上㕮咀每服半兩水二盞薑十片煎至六分去渣溫服或口噤不省人事者用細辛皂角各少許為細末以蘆管吹入鼻中候噴嚏其人少蘇然後進藥痰涎壅盛者每服加全蠍四枚仍用養正丹鎮墜之一方氣盛人止用南星半兩木香一錢加生薑七片名星香散一方氣虛人用生附子並木香如前敷煎名附香飲亦有天雄代附子者並治卒中始作無不克效因氣中以淨湯化蘇合香丸乘熱灌服仍用前藥汁濃磨沉香一呷許再煎一沸服之候服前藥已定審的是風方用醒風湯小續命湯之類中寒則用附子理中湯薑附湯之類中濕則白朮酒朮附湯之類皆可用中暑不録於此痰飲厥逆氣虛眩暈止守本方勝金丸本事治中風忽然昏倒若醉形體昏悶四肢不收風涎潮於上膈氣閉不通生薄荷半兩豬牙皂角二兩捶碎水一升二味一處浸取汁慢火研成膏瓜蒂末一兩藜蘆二兩硃砂半兩研上將硃砂末二分與二味末研勻用膏子搜和丸如龍眼大以硃砂為衣溫酒化下一丸甚者二丸以吐為度得吐即醒不醒者不可治必用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關緊急氣閉不行湯藥不能入命在須臾者執以無吐法可乎但不當用銀粉藥恐損脾壞人四肢爾羅謙甫方有粉霜鉛粉無藜蘆治法同治急中風口閉涎上欲垂死者一服即瘥江子二粒去皮膜白礬如拇指大一塊為末上將二味在於新瓦上煅令江子焦赤為度煉蜜丸如芡實大每服一丸用綿裹放患人口中近喉處良久吐痰立愈更參中風門口噤條附還魂湯千金治卒感忤鬼擊飛尸諸奄忽氣絶無復覺或已死絞口口噤不開去齒下湯湯入口不下者分病人發左右捉踏肩引之藥下復增取盡一升須臾立蘇麻黃三兩桂心二兩甘草一兩杏仁七十粒上㕮咀水八升煮取三升分三服肘後方云張仲景方無桂心只三味中風小續命湯千金通治八風五痹痿厥等疾以一歲為總六經為別春夏加石膏知母黃芩秋冬加官桂附子芍藥又於六經別藥內隨證細分加減自古名醫不能越此麻黃去節人參去蘆黃芩去腐芍藥甘草炙川芎杏仁去皮尖炒防己官桂各一兩防風一兩半附子炮去皮臍半兩上除附子杏仁外為粗末後入二味和勻每服五錢水一盞半生薑五片煎至一盞去滓稍熱服食前附云岐子加減法如精神恍惚加茯苓遠志心煩多驚者加犀角屑半兩骨節間煩痛有熱者去附子倍芍藥骨間冷痛倍用桂枝附子躁悶大便澀者去附子倍芍藥入竹瀝一合煎臟寒下痢者去防己黃芩倍附子加白朮一兩熱痢不可用附子腳弱加牛膝石斛各一兩身疼痛加秦艽一兩腰痛加桃仁杜仲各半兩失音加杏仁一兩如或歌笑語無所不及者用麻黃三兩人參桂枝白朮各二兩無附子防風生薑有當歸一兩自汗者去麻黃杏仁加白朮春加麻黃一兩夏加黃芩七錢秋加當歸四兩冬加附子半兩疏風湯潔古治表中風邪半身不遂麻木語言微澀季春初夏宜服麻黃三兩去節杏仁炒去皮益智仁各一兩炙甘草升麻各半兩上㕮咀每服五錢水一小碗煎至六分去渣溫服腳蹬熱水葫蘆候大汗出去葫蘆冬月忌服三化湯潔古厚朴薑製大黃枳實羌活各等分每服三兩水三升煎至一升半終日服以微利則止麻仁丸見大便不通大秦艽湯潔古秦艽石膏各二兩甘草川芎當歸芍藥羌活獨活防風黃芩白朮白芷茯苓生地黃熟地黃各一兩細辛半兩上十六味㕮咀每服一兩水二盞煎至一盞去滓溫服無時如遇天陰加生薑七片煎如心下痞每服一兩加枳實一錢煎此是秋冬藥如春夏加知母一兩羌活愈風湯潔古療肝腎虛筋骨弱語言難精神昏憒是中風濕熱內弱者是為風熱體重也或瘦一臂肢偏枯或肥而半身不遂或恐而健忘喜以多思思忘之道皆精不足也故心亂則百病生心靜則萬病息此藥能安心養神調陰陽無偏勝羌活甘草炙防風防己黃耆蔓荊子川芎獨活細辛枳殼麻黃去根地骨皮人參知母甘菊花薄荷葉白芷枸杞子當歸杜仲炒秦艽柴胡半夏厚朴薑製前胡熟地黃各二兩白茯苓黃芩各三兩生地黃蒼朮石膏芍藥各四兩官桂一兩上三十三味重七十五兩㕮咀每服一兩水二盅煎至一盅溫服天陰加生薑三片煎空心一服臨臥再煎渣服俱要食遠空心咽下二丹丸為之重劑臨臥咽下四白丹為之輕劑立其法是動以安神靜以清肺假令一氣之微汗用愈風湯三兩加麻黃一兩勻作四服每服加生薑五七片空心服以粥投之得微汗則佳如一旬之通利用愈風湯三兩加大黃一兩亦勻作四服每服加生薑五七片臨臥煎服得利為度此藥常服之不可失於四時之輔如望春大寒之後本方中加半夏人參柴胡各二兩木通四兩謂迎而奪少陽之氣也如望夏穀雨之後本方中加石膏黃芩知母各二兩謂迎而奪陽明之氣也如季夏之月本方中加防己白朮茯苓各二兩謂勝脾土之濕也如初秋大暑之後本方中加厚朴二兩藿香桂各一兩謂迎而奪太陰之氣也如望冬霜降之後本方中加附子官桂各一兩當歸二兩謂勝少陰之氣也如得春氣候減冬所加藥四時加減類此雖立此四時加減更宜臨病之際審證之虛實土地之所宜邪氣之多少此藥具七情六欲四氣無使五臟偏勝及不動於榮衛如風祕服之則永不燥結久瀉服之能自調適初覺風氣能便服此藥及新方中天麻丸各一料相為表裡乃治未病之聖藥也若已病者更宜常服無問男女小兒風癇急慢驚風皆可服之如解利四時傷寒隨四時加減服四白丹潔古清肺氣養魄謂中風者多昏冒氣不清利也兼能下強骨髓白朮砂仁白茯苓香附防風川芎甘草人參各半兩白芷一兩羌活獨活薄荷各二錢半藿香白檀香各一錢半知母細辛各二錢甜竹葉二兩麝香一錢另研龍腦另研牛黃另研各半錢上為末蜜丸每兩作十丸臨臥服一丸分五七次細嚼之煎愈風湯送下二丹丸見健忘前方清肺此方安神清中清者歸肺以助天真清中濁者堅強骨髓濁中之清者榮養於神濁中之濁者榮華腠理天麻丸潔古風能動而多變因熱勝則動宜以靜勝躁是養血也宜和是行榮衛壯筋骨也非大藥不能治附子一兩炮天麻酒浸三宿曬乾牛膝酒浸一宿焙乾萆薢另研玄參各六兩杜仲七兩炒去絲當歸十兩全用羌活十兩或十五兩生地黃十六兩獨活五兩上為末煉蜜丸桐子大每服五七十丸病大者加至百丸空心食前溫酒或白湯下平明服藥日高飢則食不飢且止大忌壅塞失於通利故服藥半月稍覺壅塞微以七宣丸疏之使藥再為用也牛膝萆薢強壯筋骨杜仲使筋骨相著羌活防風治風要藥當歸地黃養血和榮衛玄參主用附子佐之行經也如風癇病不能愈者吐論厚朴丸出潔古家珍其本方後另有此病加添藥如中風自汗昏冒發熱不惡風寒不能安臥此是風熱煩躁瀉青丸主之如小便少不可以藥利之既自汗津液外泄小便內少若利之使榮衛枯竭無以制火煩熱愈甚俟熱退汗止小便自行也兼此證屬陽明經大忌利小便須識之瀉青丸治中風自汗昏冒發熱不惡寒不能安臥此是風熱煩躁之故也見頭痛至寶丹和劑治卒中急風不語中惡氣絶中諸物毒暗風中熱疫毒陰陽二毒山嵐瘴氣毒蠱毒水毒産後血暈口鼻血出惡血攻心煩躁氣喘吐逆難産悶亂死胎不下以上諸疾並用童子小便一合生薑自然汁三五滴人小便內溫過化下三丸至五丸神效又療心肺積熱伏熱嘔吐邪氣攻心大腸風祕神魂恍惚頭目昏眩眠睡不安唇口乾燥傷寒狂語人參天竺黃生烏犀屑研硃砂研飛雄黃研飛生玳瑁屑研琥珀研各一兩麝香研龍腦研各二錢半金箔半入藥半為衣銀箔研各五十片牛黃研天南星水煮軟切片各半兩安息香一兩半為末以無灰酒攪澄飛過濾去沙土大約得淨數一兩火熬成膏上將生犀玳瑁為細末入余藥研勻將安息香膏重湯煮煬入諸藥中和搜成劑盛不津器中並旋丸如桐子大用人參湯化下三丸至五丸又療小兒諸癇急驚心熱卒中客忤不得眠睡煩躁風涎搐搦每二歲兒服二丸人參湯化下活命金丹寶鑑治中風不語半身不遂肢節頑麻痰涎上潮咽嗌不利飲食不下牙關緊急口噤及解一切酒毒藥毒發熱腹脹大小便不利胸膈痞滿上實下虛氣閉面赤汗後餘熱不退勞病諸藥不治無問男女老幼皆可服貫衆甘草板藍根乾葛甜硝各一兩川大黃一兩半牛黃研珠子粉生犀角薄荷各五錢辰砂四錢研一半為衣麝香研桂青黛各三錢龍腦研二錢上為末與研藥和勻蜜水浸蒸餅為劑每兩作十丸硃砂為衣就濕用真金箔四十片為衣臘月修合瓷器收貯多年不壞如療風毒茶清化下解毒藥新汲水化下汗後餘熱勞病及小兒驚熱並用薄荷湯化下以上並量大小加減服之射干湯治肝經受病多汗惡風善悲嗑干善怒時憎女子目下青黃色可治急灸肝腧百壯更宜行經順氣若目下大段青黑一黃一白者不可治射干白芍藥各一兩薏苡仁二兩桂心牡蠣石膏各半兩上為㕮咀每服五錢水二盞煎至一盞去滓不拘時溫服犀角散治肝中風流注四肢上攻頭面疼痛言語謇澀上焦風熱口眼喎斜腳膝痛無力犀角屑石膏各一兩羌活去蘆羚羊角屑各七錢半人參去蘆甘菊花獨活去蘆黃耆去蘆芎藭白朮黃芩天麻枳殼去瓤麩炒當歸去蘆酸棗仁防風去蘆白芷各半兩甘草炙二錢半上㕮咀每服五錢水一盞生薑五片煎至六分去滓溫服無時治肝中風心神煩熱言語謇澀不得眠臥竹瀝荊瀝葛根汁各三合生薑汁白蜜各一合上五味相調和令勻每溫服一合宜頻頻飲之遠志湯治心經受病多汗惡風善怒赤色口不能言但得偃臥不可轉側悶亂冒絶汗出風中於心也唇色正赤猶可治急灸心腧百壯或青黃不定面色聤聤戰栗動者不可治遠志去心二錢半人參去蘆石菖蒲羌活去蘆細辛洗去苗麻黃去根各半兩赤芍藥白朮各一兩上為細末每服二錢煎小麥湯下不拘時日進二服牛黃散治心臟中風恍惚恐懼悶亂不得睡臥語言錯亂牛黃另研麝香另研犀角屑羚羊角屑龍齒另研防風天麻獨活人參去蘆沙參茯神去木川升麻甘草炙白鮮皮遠志去心天竺黃另研各二錢半龍腦另研一錢硃砂水飛鐵粉另研麥門冬去心各半兩上為細末研令勻每服二錢煎麥門冬湯調下不拘時麻黃散治心臟中風虛寒顫心驚掣悸語聲混濁口喎冒昧好笑麻黃去節白朮防風芎藭各一兩甘草炙漢防己各半兩當歸去蘆人參去蘆遠志去心川升麻桂心茯神去木羌活去蘆各七錢半上㕮咀每服五錢水一中盞薑五片煎至五分去滓入荊瀝半合更煎一二沸溫服無時茯神散治心臟中風精神不安語澀昏悶四肢沉重茯神去木羌活麻黃去節龍齒另研各一兩赤芍藥甘草炙各半兩蔓荊子薏苡仁麥門冬去心人參去蘆防風遠志去心犀角屑各七錢半上㕮咀每服四錢水一盞半生薑四片煎至一盞去滓溫服不拘時犀角丸治心臟中風言語顛倒神思錯亂頭面心胸煩熱或時舌強語澀驚悸不安犀解屑羚羊角屑天麻防風去蘆遠志去心羌活去蘆沙參去蘆茯神去木川升麻天門冬去心葳蕤去皮玄參各七錢半牛黃另研麝香另研各二錢半龍齒另研鐵粉另研硃砂各一兩水飛金箔研銀箔研各五十片上為細末入研令勻煉蜜和搗五七百下丸如梧子大每服五十丸薄荷湯下不拘時石斛酒治心臟中風下注腰腳除頭面遊風兼補虛損石斛四兩黃耆去蘆人參去蘆防風各一兩半丹砂水飛杜仲去粗皮銼牛膝酒浸五味子白茯苓去皮山藥山茱萸萆薢各二兩細辛去苗一兩天門冬去心生薑各三兩薏苡仁枸杞子各半升上㕮咀酒五斗同浸一宿每服二三合加至一升酒力須要相續不可斷絶白朮湯治脾經受病多汗惡風身體怠惰四肢不動不能飲食口色黃者可治其狀但踞而腹滿通身黃色口吐鹹水風中於脾也急灸脾腧百壯目下及手足青色者不可治白朮去蘆厚朴薑製防風各一兩附子炮去皮臍橘皮去白白鮮皮五加皮各半兩上㕮咀每服五錢水二盞生薑五片煎一盞半去滓溫服無時防風散治脾臟中風手足緩弱舌強語澀胸膈煩悶志意恍惚身體沉重防風去蘆麻黃去節人參去蘆芎藭附子炮去皮臍桂心黃耆去蘆赤茯苓去皮酸棗仁白朮獨活去蘆桑白皮銼羚羊角屑各七錢半甘草炙半兩上為㕮咀每服四錢水一中盞薑五片煎至六分去滓溫服不拘時七聖散治脾臟中風心腹煩躁頭面微腫冷汗頻出枳殼去瓤麩炒天麻各一兩川大黃地骨皮白蒺藜芎藭各半兩薏苡仁七錢半上為細末每服二錢溫水調下不拘時忌食生冷油膩豬雞五味子湯治肺經受病多汗惡風時咳短氣晝瘥夜甚其狀偃臥胸滿息促冒悶風中於肺也其鼻兩邊下至於口上至於眉色白急灸肺腧百壯若色黃其肺已傷化而為血不可治也若妄掇空指地拈衣摸床如此數日必死矣五味子杏仁炒去皮尖桂心各半兩防風炙甘草赤芍藥川芎各一兩川椒二錢半上㕮咀每服五錢水二盞煎至一盞半去滓溫服不拘時萆薢散治腎經受病則多汗惡風面龐浮腫脊骨痛不能行立肌膚變色但坐而腰痛此風中腎經也視脅下左右上下有赤黃色如餅者可治急灸腎腧百餘壯齒黃發須直面如土色者不可治萆薢酒浸狗脊杜仲去皮銼炒白茯苓去皮各一兩何首烏天雄炮去皮臍澤瀉各半兩上為細末每服二錢米飲調下無時獨活散治腎臟中風腰脊疼痛不得俯仰兩腳冷痹緩弱不隨頭昏耳聾語音渾濁四肢沉重獨活去蘆附子炮去皮臍當歸去蘆防風天麻桂心各一兩川芎甘菊花枳殼去瓤麩炒山茱萸去核黃耆丹參去蘆牛膝酒浸萆薢酒浸甘草炙細辛去苗菖蒲白朮各半兩上㕮咀每服四錢水一盞半生薑五片煎至一盞去滓溫服無時風中腑兼中臟治驗張安撫年六十一歲已未冬月患半身不遂語言謇澀心神昏憒煩躁自汗表虛惡風如灑冰雪口不知味鼻不聞香臭耳聞木音則驚怖小便頻多大便結燥欲用大黃之類下之則平日飲食減少不敢用不然則又滿悶晝夜不得瞑目而寐最苦於此約有三月餘凡三易醫病全不減至庚申三月七日又因風邪加之痰嗽咽乾燥疼痛不利唾多中脘氣痞似噎豫因思經云風寒傷形憂恐忿怒傷氣氣傷臟乃病臟病形乃應又云人之氣以天地之疾風名之此風氣下陷入陰中不能生髮上行則為疾矣又云形樂志苦病生於脈神先病也邪風加之邪入於經動無常處前證互相出現治病必求其本邪氣乃復論時月則宜升陽補脾胃瀉風木論病則宜實表裡養衛氣瀉肝木潤燥益元氣慎喜怒是治其本也宜以加減沖和湯主之柴胡黃耆各五分升麻當歸甘草炙各三分半夏黃柏酒洗黃芩陳皮人參芍藥各二分上㕮咀作一服水二盞煎至一盞去渣溫服自汗加黃耆五分嗽者加五味子二十粒晝夜不得睡乃因心事煩擾心火內動上乘陽分衛氣不得交入陰分故使然也以硃砂安神丸服之由是晝亦得睡十日後安撫曰不得睡三月有餘今困睡不已莫非它病生乎豫曰不然衛氣者晝則行陽二十五度夜則行陰二十五度此衛氣交入陰分循其天度故安撫得睡也何病之有焉止有眼白睛紅隱澀難開宜以當歸連翹湯洗之黃連黃柏各五分連翹四分當歸甘草各三分上作一服水二盞煎一盞時時熱洗十三日後至日晡微有悶亂不安於前沖和湯又加柴胡三分以升少陽之氣飲三服至十五日全得安臥減自汗惡寒躁熱胸膈痞原小便多服藥後小便減少大便一二日一行鼻聞香臭口知味飲食如常脈微弦而柔和按之微有力止有咽喉中妨悶會厭後腫舌赤早晨語言快利午後微澀宜以玄參升麻湯治之升麻黃連各五分黃芩炒四分連翹桔梗各三分鼠黏子玄參甘草殭蠶各二分防風一分上㕮咀總作一服水二盞煎至七分去滓稍熱噙漱時時咽之前證良愈止有牙齒無力不能嚼物宜以牢牙散治之羊脛骨灰升麻各二錢生地黃黃連石膏各一錢白茯苓人參各五分梧桐淚三分上為細末入麝香少許研勻臨臥擦牙後以溫水漱之安撫初病時右肩臂膊痛無主持不能舉動多汗出肌肉瘦不能正臥臥則痛甚經云汗出偏沮使人偏枯余思針經云虛與實鄰決而通之又云留瘦不移節而刺之使經絡通和血氣乃復又云陷下者灸之為陽氣下陷入陰中肩膊時痛不能運動以火導之火引而上補之溫之以上證皆宜灸刺為此先刺十二經之井穴於四月十二日右肩臂上肩井穴內先針後灸二七壯及至灸瘡發於枯瘦處漸添肌肉汗出少肩臂微有力至五月初八日再灸左肩井次於尺澤穴各灸二十八壯引氣下行興正氣相接次日臂膊又添氣力自能搖動矣時值仲夏暑熱漸盛以清肺飲子補肺氣養脾胃定心氣白芍藥五分人參升麻柴胡各四分天門冬麥門冬各三分陳皮二分半甘草生二分炙二分黃芩黃柏各二分上㕮咀作一服水二盞煎至一盞去滓溫服食後汗多加黃耆五分後以潤腸丸治其胸膈痞滿大便澀滯麻子仁另研泥大黃酒煨各一兩半當歸尾枳實麩炒白芍藥桃仁泥升麻各半兩人參生甘草陳皮各三錢木香檳榔各二錢上除桃仁麻仁外為末卻入二仁泥蜜和丸如桐子大每服七八十丸溫水食前服初六日得處暑節暑猶未退宜微收實皮毛益胃氣秋以胃氣為本以益氣調榮湯主之藥中加時藥使邪氣不能傷也人參三分為臣益氣和中陳皮二分為佐順氣和中熟地二分為佐養血潤燥瀉陰火白芍四分為佐補脾微收治肝木之邪白朮三分為佐養胃和中厚腸胃升麻二分為使使陽明氣上升滋榮百脈當歸二分為佐和血潤燥黃耆五分為君實皮毛止自汗益元氣半夏三分佐療風痰強胃進食甘草二分炎為佐引用調和胃氣溫中益氣柴胡二分為使引少陽之氣使出於胃中乃行於天上麥門冬三分為佐猶有暑氣未退故加之安肺氣得秋分節不用上㕮咀作一服水二盞煎至一盞去滓溫服忌食辛熱之物反助暑邪秋氣不能收正氣得復而安矣四物湯見鼻衄小便不利三因白散子治肝腎中風涎潮壅塞不語嘔吐痰沫頭目眩暈兼治陰證傷寒六脈沉伏及霍亂吐瀉小便淋瀝不通大附子去皮臍生滑石桂府者各半兩製半夏七錢半上為末每服二錢水二盞薑七片蜜半匙煎七分空心冷服霍亂加藿香小便不利加木通燈芯茆根煎痰涎壅盛二陳湯見痰飲星香湯易簡治中風痰盛服熱藥不得者南星八錢木香一錢每服四錢水一盞薑十片煎七分不拘時溫服藿香正氣散治傷寒頭疼憎寒壯熱或感濕氣霍亂吐瀉常服除山嵐瘴氣伏暑吐瀉腳轉筋加香薷扁豆黃連名藿薷湯大腹皮白芷茯苓蘇莖葉藿香各三兩厚朴白朮陳皮去白苦梗半夏各二兩炙甘草一兩上㕮咀每服三錢薑三片棗一枚煎熱服四君子湯見虛勞養正丹見氣青州白丸子和劑治男婦手足癱瘓風痰壅盛嘔吐涎沫及小兒驚風婦人血風半夏生七兩水浸洗南星生三兩白附子生二兩川烏生半兩去皮臍上為末以生絹袋盛於井花水內擺出如未出者更以手揉出如有滓更研再入絹袋擺盡為度置瓷盆中日曬夜露至曉撇去舊水別用井水攪又曬至來日早再換新水攪如此法春五日夏三日秋七日冬十日去水曬乾後如玉片研細以糯米粉煎粥清丸緑豆大薑湯下二十丸無時如癱瘓風溫酒下小兒驚風薄荷湯下三五丸碧霞丹治卒中急風眩暈僵仆痰涎壅塞心神迷悶牙關緊急目睛上視及五種癇病涎潮搐溺石緑研九度飛十兩附子尖烏頭尖蠍梢各七十個上三味為末入石緑令勻麵糊為丸如雞頭實大每服急用薄荷汁化下一丸更入酒半合溫暖服之須臾吐出痰涎然後隨證治之如牙關緊急斡開灌之立驗口噤稀涎散治中風不語牙關緊急單蛾雙蛾江子仁六粒每粒分作兩半牙皂三錢切片明礬一兩上先將礬化開卻入二味攪勻待礬枯為末每用三分吹入諸病皆愈痰涎壅盛者以五分燈芯湯下喉中之痰逆上者即吐膈間者即下凡中風口噤不能開用白鹽梅揩齒即能開口眼喎斜清陽湯東垣治口喎斜頰腮緊急胃中火盛汗不出而小便數黃耆當歸身升麻各二錢葛根一錢半炙甘草紅花黃柏酒桂枝各一錢蘇木生甘草各五分㕮咀作一服酒三盞煎至一盞三分去滓稍熱食前服訖以火尉摩緊急處即愈夫口喎筋急者是筋脈血絡中大寒此藥少代燔針劫刺破惡血以去凝結內泄衝脈之火熾秦艽升麻湯寶鑑治中風手足陽明經口眼喎斜四肢拘急惡風寒升麻葛根甘草炙芍藥人參各半兩秦艽白芷防風桂枝各三錢每服一兩水二盞連須蔥根白三莖煎至一盞去滓稍熱服食後服藥畢避風寒臥得微汗出則止半身不遂順風勻氣散良方治中風中氣半身不遂口眼喎斜先宜服此白朮四錢人參天麻各一錢沉香白芷紫蘇木瓜青皮甘草炙各半錢烏藥三錢分作二帖每帖水二盞生薑三片煎八分溫服二滓並煎風氣腰痛亦宜服之虎骨散簡易治半身不遂肌肉乾瘦為偏枯忌用麻黃髮汗枯津液惟此方潤筋去風當歸二兩赤芍藥續斷白朮藁本虎骨各一兩烏蛇肉半兩為細末每服二錢食後溫酒調下骨中煩疼加生地黃一兩臟寒自利加天雄半兩虎脛骨酒濟生治中風偏枯不隨一切諸風攣拳石斛去根石楠葉防風虎脛骨酥炙當歸茵芋葉杜仲炒川牛膝芎藭狗脊燎去毛川續斷巴戟去心各一兩上銼如豆囊藥以酒一斗漬十日每熱服一盞無時黃耆酒治風濕痹身體痹麻皮膚瘙癢筋脈拘攣言語謇澀手足不遂時覺不仁見著痹治半身不遂口眼喎斜頭目眩暈痰火熾盛筋骨時疼此乃原於血虛血熱挾痰挾火經絡肌表之間先已有其病根後因感冒風寒或過嗜醇酒膏粱而助痰火或惱怒而逆肝氣遂有此半身不遂之證其在於經絡肌表筋骨之間尚未入臟腑並以此方治之蓋此方有補血活血之功不致於滯有健脾燥濕消痰之能不致於燥又清熱運動疏風開經絡通腠理內固根本外散病邪王道劑也多服見功白朮川芎各一錢半南星半夏芍藥茯苓天麻各一錢川當歸生地黃熟地黃牛膝酸棗仁黃芩橘紅各八分羌活防風桂各六分紅花甘草炙各四分黃柏三分水煎入竹瀝薑汁侵晨服失音不語地黃飲子宣明治舌喑不能言足廢不能用腎虛弱其氣厥不至舌下熟地黃巴戟去心山茱萸去核肉蓯蓉酒浸焙石斛附子炮五味子白茯苓菖蒲遠志去心官桂麥門冬去心各等