活升麻各一錢獨活七分蒼朮防風去蘆杈甘草威靈仙去蘆茯苓去皮當歸澤瀉各半錢上銼作一服水二盞煎至一盞溫服食前一服食後一服忌酒面生冷硬物桂枝芍藥知母湯仲景桂枝知母防風各四兩芍藥三兩附子炮甘草麻黃各二兩白朮生薑各五兩水七升煮取二升溫服七合日三服烏頭湯仲景治病歷節不可屈伸疼痛麻黃芍藥黃耆各三兩甘草炙川烏五枚㕮咀以蜜二升煎取一升即去烏頭上㕮咀五味以水三升煮取一升去渣納蜜再煎服七合不時盡服之牛蒡子散本事牛蒡子新豆豉炒羌活各三兩生地黃二兩半黃耆一兩半上為細末湯調二錢空心食前日三服犀角湯千金治熱毒流入四肢歷節腫痛犀角二兩羚羊角一兩前胡黃芩梔子仁射干大黃升麻各四兩豉一升上㕮咀每服五錢水二盞煎服茵芋丸本事治歷節腫滿疼痛茵芋硃砂薏苡仁各一兩牽牛一兩半郁李仁半兩上為細末煉蜜杵丸如桐子大輕粉滾為衣每服十丸至十五丸五更溫水下到晚未利可二三服快利為度白粥將息趁痛散乳香沒藥桃仁紅花當歸羌活地龍酒炒牛膝酒洗甘草五靈脂酒炒香附童便浸上為末每服二錢酒調或加酒炒芩柏治酒濕痰痛風黃柏酒炒威靈仙酒炒各五錢蒼朮羌活甘草三錢陳皮芍藥各一錢上為末每服一錢或二錢沸湯入薑汁調服治氣實表實骨節痛方滑石飛六錢甘草一錢香附片芩各三錢上為末薑汁糊丸梧子大每服五七十丸白湯送下治食積肩腿痛龜板酒浸炙一兩酒柏葉香附五錢辣芥子凌霄花一錢半上為末酒糊為丸桐子大煎四物加陳皮甘草湯下丹溪治一男子家貧多勞秋涼忽渾身發熱兩臂膊及腕兩足並胯皆疼痛如煅晝輕夜劇醫與風藥則增痛與血藥則不效惟待斃而已脈之兩手俱澀而數右甚於左飲食則如平時形瘦削蓋大痛而瘦非病也用蒼朮酒黃柏各一錢生附子一片生甘草三分麻黃五分研桃仁五粒作一帖煎入薑汁些少令辣服至四帖後去附子加牛膝一錢至八帖後來告急云氣上喘促不得睡痛似微減意其血虛因服麻黃過劑陽虛被髮動而上奔當與補血鎮墜及酸劑收之遂以四物湯加川芎芍藥人參二錢五味子十二粒與二帖服之喘隨定是夜遂安三日脈之數減大半澀脈如舊問其痛則曰不減然呻吟之聲卻無察其起居則疲弱無力病人卻自謂不弱遂以四物湯加牛膝白朮人參桃仁陳皮甘草檳榔入薑三片煎服如此藥與五十帖而安一月後因負重擔復痛作飲食亦減再與此藥加黃耆三分又二十帖全愈一人年逾六十性急作勞患兩腿痛動作則痛甚視之曰此兼虛證當補血則病自安遂與四物加桃仁陳皮牛膝生甘草煎入薑研潛行散熱飲三四十帖而安何縣長年四十餘形瘦性急因作勞背痛臂疼骨節疼足心發熱可與四物湯帶熱下大補丸保和丸共六十粒食前服一婦人腳疼怕冷夜劇日輕生地黃白芍藥歸尾各五錢黃柏炒黃芩白朮蒼朮陳皮各三錢牛膝二錢甘草梢二錢上分四帖水煎帶熱服朱閫內年三十味厚性急患痛風攣縮數月醫不應豫視之曰此挾痰與氣證當和血疏痰導氣病自安遂以潛行散入生甘草牛膝枳殼通草陳皮桃仁薑汁煎飲半年而安陸郎左腿叉骨臼痛小便赤澀此積憂痰涎所為白朮枳殼赤芍藥各一錢條芩連翹通草甘草梢各三分上銼水煎服一婦腳叉骨痛蒼朮白朮陳皮芍藥各三分木通二錢甘草五分作二服水煎下大補丸五十粒經驗九藤酒治遠年痛風及中風左癱右瘓筋脈拘急日夜作痛叫呼不已等證其功甚速青藤釣鉤藤紅藤即理省藤丁公藤又名風藤桑絡藤兔絲藤即無根藤天仙藤即青木香陰地蕨名地茶取根各四兩五味子藤俗名紅內消忍冬藤各二兩上細切以無灰老酒一大斗用瓷罐一個盛酒其藥用真綿包裹放酒中浸之密封罐口不可泄氣春秋七日冬十日夏五日每服一盞日三服病在上食後及臥後服病在下空心食前服加味二妙丸治兩足濕痹疼痛或如火療從足跗熱起漸至腰胯或麻痹痿軟皆是濕為病此藥主之蒼朮四兩米泔浸黃柏二兩酒浸日乾川牛膝去蘆當歸尾酒洗川萆薢防己龜板酥炙各一兩上為細末酒煮麵糊為丸如梧桐子大每服一百丸空心薑鹽湯下熏洗痛風法治手足冷痛如虎咬者上用樟木屑一斗以急流水一擔熬沸以樟木屑置於大桶內桶邊放一兀凳用前沸湯泡之桶內安一矮凳子令人坐桶邊放腳在內外以草荐一領圍之勿令湯氣入眼恐壞眼其功甚捷著痹即麻木神效黃耆湯東垣黃耆二錢人參去蘆白芍藥炙甘草各一錢蔓荊子銼二分陳皮去白五分水一盞八分煎至一盞去渣臨臥稍熱服如小便淋澀加澤瀉五分如有大熱證加黃柏酒炒四次三分麻木不仁雖有熱不用黃柏再加黃柏一錢如眼縮小去芍藥忌酒醋濕面大料物蔥韭蒜及淡滲生冷硬物如麻木重甚者加芍藥木通各一錢芍藥補氣湯東垣黃耆一兩白芍藥一兩半陳皮一兩澤瀉半兩甘草一兩炙上每服一兩用水二大盞煎至一盞去渣溫服人參益氣湯治五六月間兩手麻木四肢困倦怠惰嗜臥乃濕熱傷元氣也黃耆八錢人參生甘草各五錢炙甘草二錢五味子一百二十粒升麻二錢柴胡二錢半芍藥三錢上㕮咀每服半兩水二盞煎一盞去渣空心服服後少臥於麻痹處按摩屈伸少時午飯前又一服日二服第二次藥煎服如前黃耆八錢紅花五分陳皮一錢澤瀉五分第三次服藥黃耆六錢黃柏一錢二分陳皮三錢澤瀉升麻各二錢白芍藥五錢生甘草四錢五味子一百粒生黃芩八錢炙甘草一分分作四服煎服如前法稍熱服秋涼去五味子冬月去黃芩服之大效除濕補氣湯東垣黃耆八錢甘草梢六錢五味子一百二十粒升麻梢六錢當歸柴胡梢澤瀉各二錢紅花二錢半陳皮一錢青皮四錢分作四服水三大盞煎至一盞去渣稍熱服食前黃耆桂枝五物湯仲景黃耆芍藥桂枝各三兩生薑六兩大棗十二枚水六升煮取二升溫服七合日三服一方有人參補氣升陽和中湯東垣黃耆五錢人參三錢甘草炙四錢陳皮當歸身各二錢甘草根生一錢去腎熱佛耳草四錢白芍藥三錢草豆蔻一錢半益陽退寒黃柏一錢酒洗除濕瀉火白朮二錢蒼朮一錢半除濕調中白茯苓一錢除濕導火澤瀉一錢用同上升麻一錢行陽明經柴胡一錢每服三錢水二大盞煎至一盞去渣稍熱服早飯後午飯前服之溫經除濕湯東垣治肢節沉重疼痛無力之聖藥也羌活七分獨活黃柏麻黃去節當歸各三分柴胡黃耆黃連木香草豆蔻神麯各二分人參甘草炙澤瀉豬苓白朮各一錢陳皮蒼朮各二錢白芍藥三錢升麻五分上作二服用水二大盞煎至一盞去渣稍熱服食遠除風濕羌活湯東垣羌活防風各一兩柴胡五分藁本三分獨活五分蒼朮米泔制一錢茯苓二錢澤瀉二分豬苓去皮二分甘草炙五分黃耆一錢陳皮三分黃柏三分黃連去須一分升麻七分川芎三分去頭痛每服三錢或五錢水二盞煎至一盞去渣稍熱服量虛實施用如不盡證候依加減法用之茯苓湯濟生半夏湯泡赤茯苓去皮陳皮各一兩枳實去瓤麩炒桔梗去蘆甘草炙各半兩每服四錢水一盞薑七片煎服不拘時前胡散河間前胡白芷細辛官桂白朮川芎各三兩附子炮吳茱萸湯泡炒當歸各二兩川椒去目並閉口者生用二兩上銼以茶酒三升拌勻同窨一宿以煉成豬脂膏五斤入藥煎候白芷黃紫色漉去渣成膏在病處摩之大凡癥瘕瘡痍皆治並去諸風痛癢傷折墜損苦參丸苦參二兩取粉丹參去土炙沙參去土人參防風去杈五加皮蒺藜炒去刺烏蛇酒浸用肉蔓荊子敗龜板酥炙黃虎骨酥炙黃玄參堅者各一兩上為細末用不蛀皂角一斤銼碎以水三升挪取汁去滓於無油鐵器內熬成膏用煉蜜四兩和丸如梧桐子大每服十五丸至二十丸食後良久夜臥共三服荊芥薄荷酒下補中益氣湯見勞倦四君子湯見虛勞二陳湯見痰飲四物湯見鼻衄清陽補氣湯東垣戊申春節使趙君年七旬病體熱麻股膝無力飲食有汗妄喜笑善飢痰涎不利舌強難言聲嘎不鳴身重如山求治於先師診得左手脈洪大而有力是邪熱客於經絡中也兩臂外有數瘢遂問其故對以燃香所致先師曰君之病皆此也夫人之十二經灌溉周身終而復始蓋手之三陽從手表上行於頭加之以火邪陽並於陽勢甚熾焉故邪熱毒行流散於周身而熱麻針經云胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下熱傷元氣而沉重無力飲食入胃剽悍之氣不循常度故多汗心火盛則妄喜笑脾胃熱則消穀善飢肺金衰則聲嘎不鳴仲景云微數之脈慎不可灸焦骨傷筋血難復也君奉養以膏粱之味無故加以大毒熱傷於經絡而為此病明矣內經曰熱淫所勝治以苦寒佐以苦甘以甘瀉之以酸收之當以黃柏知母之苦寒為君以瀉火邪壯筋骨又腎欲堅急食苦以堅之黃耆生甘草之甘寒瀉熱補表五味子酸止汗補肺氣之不足以為臣炙甘草當歸之甘辛和血潤燥柴胡升麻之苦平行少陽陽明二經自地升天以苦發之者也以為佐㕮咀同煎取清汁服之更繆刺四肢以瀉諸陽之本使十二經絡相接而泄火邪不旬日而良愈蒼朮四錢藁本二錢升麻六錢柴胡三錢五味子一錢半黃柏酒製三錢知母酒二錢陳皮二錢半甘草生二錢當歸二錢黃耆三錢上㕮咀每服五錢水一盞半煎至一盞去渣空心服待少時復以美膳壓之續斷丸奇效下同治風濕流注四肢浮腫肌肉麻痹川續斷當歸炒萆薢附子防風天麻各一兩乳香沒藥各半兩川芎七錢半上為細末煉蜜丸如桐子大每服四十丸空心用溫酒或米飲送下防風湯治血痹皮膚不仁防風二錢赤茯苓去皮川獨活桂心秦艽去蘆赤芍藥杏仁去皮尖黃芩甘草炙各一錢川當歸去蘆洗一錢半上作一服用水二盅生薑五片煎至一盅不拘時候服一方有葛根麻黃無獨活赤芍羌活散治風痹手足不仁羌活漢防己防風酸棗仁道人頭川芎各一兩附子炮去皮臍麻黃去根節天麻各一兩半黃松節薏苡仁各二兩荊芥一握上為細末每服二錢不拘時用溫酒調下烏頭粥治風寒濕痹麻木不仁川烏頭生研為細末上用熟白米半碗入藥末四錢同米以慢火熬熟作稀薄粥不可稠下生薑汁一茶腳許白蜜三大匙攪勻空心溫啜之為佳如是中濕更入薏苡仁末二錢增米作一中碗煮服此粥大治手足四肢不隨及重痛不能舉者有此證者預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝克故疾在末穀氣引風溫之藥徑入脾經故四肢得安此湯劑極有功余嘗制此方以授人服者良驗蔓荊實丸治皮痹不仁蔓荊實去浮皮七錢五分枳殼麩炒蒺藜子炒去刺白附子炮桔梗炒羌活去蘆防風去杈以上各半兩皂莢不蛀者半斤銼碎用新汲水浸一宿以熟絹濾去滓入面少許同煎成膏和藥上為細末以皂莢膏和丸如梧桐子大每服二十丸食後用熟水送下黃耆酒一名小黃耆酒治血痹及諸痹甚者四肢不遂風濕寒痹舉體腫滿疼痛不仁下有伏水脅下有積飲夜夢悲愁不樂恍惚善忘由風虛五臟受邪所致或久坐腰痛耳聾卒起眼眩頭重或舉體腫疼飲食惡冷嗇嗇惡寒胸中痰滿心下寒疝及治婦人産後余疾風虛積冷之不除者黃耆獨活防風去叉細辛去苗牛膝川芎附子炮去皮臍甘草炙蜀椒去目併合口者炒出汗以上各三兩川烏炮去皮臍山茱萸去核秦艽去苗土葛根各二兩官桂去粗皮當歸切焙各二兩半大黃生銼一兩白朮乾薑炮各一兩半上銼如麻豆大用夾絹囊盛貯以清酒一斗浸之春夏五日秋冬七日初服一合日二夜一漸增之以知為度虛弱者加蓯蓉二兩